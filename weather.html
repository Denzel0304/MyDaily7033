<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7BD3F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="날씨">
<title>오늘 날씨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Pretendard:wght@400;500;600;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, #E8F7FF 0%, #F4FBF6 50%, #FFF7E8 100%);
    color: #2C3E50;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    overflow-x: hidden;
    line-height: 1.5;
  }
  /* 배경 부드러운 원형 장식 */
  body::before {
    content: '';
    position: fixed;
    top: -100px; right: -100px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(255, 213, 79, 0.35), transparent 70%);
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -100px;
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(123, 211, 247, 0.25), transparent 70%);
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
  }
  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }

  /* ---------- 헤더 ---------- */
  .header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 8px 4px 14px;
  }
  .loc-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.8);
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #2C3E50;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 2px 10px rgba(123, 211, 247, 0.15);
    justify-self: start;
  }
  .loc-btn:active { transform: scale(0.97); }
  .loc-btn .pin { font-size: 14px; }
  .loc-btn .arrow { font-size: 11px; opacity: 0.6; margin-left: 2px; }

  /* 가운데 브랜드 */
  .brand {
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    pointer-events: none;
    user-select: none;
    overflow: hidden;
  }
  .brand-emoji {
    font-size: 18px;
    line-height: 1;
    display: inline-block;
    animation: brandFloat 4s ease-in-out infinite;
    filter: drop-shadow(0 1px 3px rgba(255, 200, 100, 0.4));
  }
  @keyframes brandFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-2px) rotate(-3deg); }
  }
  .brand-text {
    font-family: 'Gowun Dodum', 'Pretendard', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #2C3E50;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #2C3E50 0%, #4A6B8C 50%, #6FA8DC 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* 좁은 화면(360px 이하)에선 텍스트 숨기고 이모지만 */
  @media (max-width: 360px) {
    .brand-text { display: none; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #7E8B96;
    justify-self: end;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 12px;
    border: none;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #2C3E50;
    transition: transform 0.3s ease;
    box-shadow: 0 2px 10px rgba(123, 211, 247, 0.15);
  }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- 현재 날씨 카드 ---------- */
  .now {
    text-align: center;
    padding: 18px 10px 10px;
    margin-bottom: 16px;
  }
  .now .emoji {
    font-size: 76px;
    line-height: 1;
    filter: drop-shadow(0 4px 14px rgba(255, 200, 100, 0.35));
    margin-bottom: 8px;
    display: inline-block;
    animation: float 3.5s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .now .temp {
    font-family: 'Outfit', 'Pretendard', sans-serif;
    font-weight: 300;
    font-size: 84px;
    line-height: 1;
    color: #2C3E50;
    letter-spacing: -3px;
  }
  .now .temp .deg { font-size: 56px; opacity: 0.55; vertical-align: top; margin-left: 4px; }
  .now .sky-text {
    font-size: 17px;
    color: #5A6B7A;
    font-weight: 500;
    margin-top: 4px;
  }
  .now .sub {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 13.5px;
    color: #7E8B96;
    flex-wrap: wrap;
  }
  .now .sub span { display: inline-flex; gap: 4px; align-items: center; }
  .now .sub b { color: #2C3E50; font-weight: 600; }

  /* ---------- 카드 공통 ---------- */
  .card {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(123, 211, 247, 0.12), 0 1px 3px rgba(0,0,0,0.02);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #7E8B96;
    margin-bottom: 12px;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ---------- 챙길 것 (1순위) ---------- */
  .pack-card { background: linear-gradient(135deg, rgba(255,232,168,0.6), rgba(255,255,255,0.85)); }
  .pack-list { display: flex; flex-direction: column; gap: 10px; }
  .pack-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.9);
  }
  .pack-item.muted { opacity: 0.55; background: rgba(255,255,255,0.4); }
  .pack-item .ico { font-size: 28px; flex-shrink: 0; }
  .pack-item .text { flex: 1; }
  .pack-item .text .main { font-size: 16px; font-weight: 600; color: #2C3E50; }
  .pack-item .text .sub { font-size: 12.5px; color: #7E8B96; margin-top: 2px; }
  .pack-item .text .sub .pm-num {
    color: #2C3E50;
    font-weight: 600;
  }
  .pack-item .text .sub .pm-num em {
    font-style: normal;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #1A2A3A;
    margin-left: 1px;
  }
  .pack-item .text .sub .pm-num sub {
    font-size: 9px;
    vertical-align: baseline;
    margin-left: 1px;
    opacity: 0.7;
  }
  .pack-item .text .sub .pm-grade {
    color: #7E8B96;
    font-weight: 500;
    margin-left: 1px;
  }
  .vent-text .desc em {
    font-style: normal;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #2C3E50;
    margin-left: 2px;
  }
  .vent-text .desc sub {
    font-size: 9px;
    vertical-align: baseline;
    margin-left: 1px;
    opacity: 0.7;
  }
  .pack-item .badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .badge-need { background: #FFE0A8; color: #B86F00; }
  .badge-skip { background: #E0F0E5; color: #4A8568; }

  /* ---------- 환기 (2순위) ---------- */
  .vent-card { padding: 22px 18px; }
  .vent-main {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .vent-circle {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
    position: relative;
  }
  .vent-circle.ok { background: radial-gradient(circle, #C6F2D6, #8FE0AB); box-shadow: 0 0 0 8px rgba(143, 224, 171, 0.18); }
  .vent-circle.no { background: radial-gradient(circle, #FFD0CB, #FF9A95); box-shadow: 0 0 0 8px rgba(255, 154, 149, 0.18); }
  .vent-circle.maybe { background: radial-gradient(circle, #FFE89C, #FFD460); box-shadow: 0 0 0 8px rgba(255, 212, 96, 0.18); }
  .vent-text .head { font-size: 19px; font-weight: 700; color: #2C3E50; }
  .vent-text .desc { font-size: 13px; color: #7E8B96; margin-top: 4px; }

  /* ---------- 시간별 (3순위) ---------- */
  .hourly-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    margin: 0 -18px;
    padding: 4px 18px 6px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-cell {
    flex: 0 0 auto;
    width: 60px;
    text-align: center;
    padding: 12px 4px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 16px;
    scroll-snap-align: start;
    border: 1px solid rgba(255,255,255,0.85);
  }
  .hour-cell.now-cell {
    background: linear-gradient(160deg, #FFE89C, #FFB75E);
    color: #4A2F00;
    border-color: rgba(255,200,100,0.6);
    box-shadow: 0 4px 12px rgba(255, 183, 94, 0.25);
  }
  .hour-cell .h-time { font-size: 12px; font-weight: 600; color: #7E8B96; }
  .hour-cell.now-cell .h-time { color: #6B4500; }
  .hour-cell .h-emoji { font-size: 22px; margin: 6px 0 4px; line-height: 1; }
  .hour-cell .h-temp { font-size: 14px; font-weight: 700; color: #2C3E50; font-family: 'Outfit', sans-serif; }
  .hour-cell.now-cell .h-temp { color: #4A2F00; }
  .hour-cell .h-pop { font-size: 10.5px; color: #4A90E2; margin-top: 3px; font-weight: 600; min-height: 14px; }
  .hour-cell.now-cell .h-pop { color: #2A6BC4; }

  /* ---------- 3일 예보 ---------- */
  .day-list { display: flex; flex-direction: column; }
  .day-row {
    display: grid;
    grid-template-columns: 64px 36px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(126, 139, 150, 0.08);
  }
  .day-row:last-child { border-bottom: none; }
  .day-row.today .day-name { color: #B86F00; font-weight: 700; }
  .day-row .day-label { display: flex; flex-direction: column; }
  .day-row .day-name {
    font-size: 14px;
    font-weight: 600;
    color: #2C3E50;
    line-height: 1.2;
  }
  .day-row .day-dow {
    font-size: 11px;
    color: #A0AEB8;
    font-weight: 500;
    margin-top: 1px;
  }
  .day-row .day-emoji {
    font-size: 22px;
    text-align: center;
    line-height: 1;
  }
  .day-row .day-pop-wrap {
    text-align: left;
    font-size: 11.5px;
  }
  .day-row .day-pop {
    color: #4A90E2;
    font-weight: 600;
    background: rgba(74, 144, 226, 0.08);
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .day-row .day-temps {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 14px;
  }
  .day-row .t-min { color: #6FA8DC; min-width: 28px; text-align: right; }
  .day-row .t-max { color: #E07A5F; min-width: 28px; text-align: right; }
  .day-row .t-sep {
    width: 24px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #6FA8DC, #FFB75E, #E07A5F);
    opacity: 0.5;
  }

  /* ---------- 대기질 ---------- */
  .air-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .air-tile {
    background: rgba(255, 255, 255, 0.7);
    border-radius: 14px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.9);
  }
  .air-tile .label { font-size: 11.5px; color: #7E8B96; font-weight: 600; }
  .air-tile .val {
    font-family: 'Outfit', sans-serif;
    font-size: 26px;
    font-weight: 600;
    color: #2C3E50;
    margin-top: 2px;
    line-height: 1.1;
  }
  .air-tile .grade {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 700;
  }
  .grade-1 { background: #D5F0E2; color: #2D7A4F; }
  .grade-2 { background: #D6EAFB; color: #2566A8; }
  .grade-3 { background: #FFE2B0; color: #A36400; }
  .grade-4 { background: #FFCFCB; color: #B83A33; }

  /* ---------- 모달 (도시 선택) ---------- */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(30, 50, 70, 0.35);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-back.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s cubic-bezier(0.2, 0.9, 0.3, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h3 { font-size: 16px; margin-bottom: 14px; color: #2C3E50; }
  .modal-handle {
    width: 40px; height: 4px;
    background: #DDE3E8;
    border-radius: 999px;
    margin: 0 auto 14px;
  }
  .gps-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #E8F7FF, #F4FBF6);
    border: 1px solid #D4ECFF;
    border-radius: 14px;
    cursor: pointer;
    margin-bottom: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #2C3E50;
  }
  .gps-btn:active { transform: scale(0.98); }
  .city-section h4 {
    font-size: 12px;
    color: #7E8B96;
    font-weight: 600;
    margin: 8px 4px 8px;
    letter-spacing: 0.3px;
  }
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .city-search {
    width: 100%;
    padding: 13px 38px 13px 38px;
    background: #F4F7FA;
    border: 1.5px solid transparent;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    color: #2C3E50;
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .city-search:focus { border-color: #7BD3F7; background: #fff; }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
    opacity: 0.5;
  }
  .search-clear {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    border: none;
    background: rgba(126, 139, 150, 0.15);
    color: #7E8B96;
    border-radius: 50%;
    cursor: pointer;
    font-size: 11px;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .search-clear.show { display: flex; }
  .city-list {
    max-height: 50vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
  }
  .city-list::-webkit-scrollbar { width: 4px; }
  .city-list::-webkit-scrollbar-thumb { background: #DDE3E8; border-radius: 4px; }
  .city-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14.5px;
    color: #2C3E50;
    transition: background 0.1s ease;
  }
  .city-row:hover { background: #F4F7FA; }
  .city-row:active { background: #E8F0F6; }
  .city-row.active { background: #FFE89C; color: #4A2F00; font-weight: 700; }
  .city-row .sido-tag {
    font-size: 11px;
    color: #A0AEB8;
    font-weight: 500;
    background: rgba(0,0,0,0.04);
    padding: 2px 8px;
    border-radius: 999px;
  }
  .city-row.active .sido-tag { background: rgba(74,47,0,0.12); color: #6B4500; }
  .city-empty {
    text-align: center;
    padding: 30px 16px;
    color: #A0AEB8;
    font-size: 13.5px;
  }

  .loc-btn { max-width: 145px; overflow: hidden; }
  .loc-btn span:not(.pin):not(.arrow) {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  /* ---------- 로딩/에러 ---------- */
  .loading, .err-box {
    text-align: center;
    padding: 40px 20px;
    color: #7E8B96;
    font-size: 14px;
  }
  .loading .dots { display: inline-block; margin-left: 4px; }
  .loading .dots::after {
    content: '';
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; }
  }
  .err-box .err-emoji { font-size: 40px; display: block; margin-bottom: 10px; }
  .err-box button {
    margin-top: 14px;
    padding: 10px 24px;
    background: #2C3E50;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
  }

  .hidden { display: none !important; }

  /* 로드 시 카드 부드럽게 등장 */
  .card, .now {
    animation: rise 0.5s ease backwards;
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- 토스트 ---------- */
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(28px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    z-index: 200;
    background: rgba(44, 62, 80, 0.95);
    color: #fff;
    padding: 12px 18px;
    border-radius: 14px;
    font-size: 13.5px;
    font-weight: 500;
    box-shadow: 0 10px 30px rgba(44, 62, 80, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    max-width: calc(100vw - 32px);
    text-align: center;
    line-height: 1.5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <button class="loc-btn" id="locBtn">
      <span class="pin">📍</span>
      <span id="locName">위치 선택</span>
      <span class="arrow">▼</span>
    </button>
    <div class="brand">

/* ============================================================
   유틸: 위경도 → 기상청 격자 (LCC DFS 변환식)
   기상청 공식 변환 알고리즘
   ============================================================ */
function dfsXyConv(lat, lon) {
  const RE = 6371.00877;
  const GRID = 5.0;
  const SLAT1 = 30.0, SLAT2 = 60.0;
  const OLON = 126.0, OLAT = 38.0;
  const XO = 43, YO = 136;
  const DEGRAD = Math.PI / 180.0;

  const re = RE / GRID;
  const slat1 = SLAT1 * DEGRAD;
  const slat2 = SLAT2 * DEGRAD;
  const olon = OLON * DEGRAD;
  const olat = OLAT * DEGRAD;

  let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
  sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
  let sf = Math.tan(Math.PI * 0.25 + slat1 * 0.5);
  sf = (Math.pow(sf, sn) * Math.cos(slat1)) / sn;
  let ro = Math.tan(Math.PI * 0.25 + olat * 0.5);
  ro = (re * sf) / Math.pow(ro, sn);

  let ra = Math.tan(Math.PI * 0.25 + lat * DEGRAD * 0.5);
  ra = (re * sf) / Math.pow(ra, sn);
  let theta = lon * DEGRAD - olon;
  if (theta > Math.PI) theta -= 2.0 * Math.PI;
  if (theta < -Math.PI) theta += 2.0 * Math.PI;
  theta *= sn;

  const nx = Math.floor(ra * Math.sin(theta) + XO + 0.5);
  const ny = Math.floor(ro - ra * Math.cos(theta) + YO + 0.5);
  return { nx, ny };
}

/* ============================================================
   날짜/시각 헬퍼
   ============================================================ */
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function fmtKstNow() {
  const now = new Date();
  return {
    yyyymmdd: now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()),
    hh: pad(now.getHours()),
    mm: pad(now.getMinutes()),
    obj: now
  };
}

// 단기예보 base_time: 02, 05, 08, 11, 14, 17, 20, 23 (발표 후 약 10분 지난 시점부터 가용)
function vilageFcstBase() {
  const now = new Date();
  // 안전마진 위해 base 시각보다 30분 이상 지난 가장 최근 발표시각 사용
  const candidates = [2, 5, 8, 11, 14, 17, 20, 23];
  const cutoff = new Date(now.getTime() - 30 * 60 * 1000);
  const cy = cutoff.getFullYear();
  const cmo = cutoff.getMonth();
  const cd = cutoff.getDate();
  const ch = cutoff.getHours();
  let base = null;
  for (let i = candidates.length - 1; i >= 0; i--) {
    if (ch >= candidates[i]) {
      base = new Date(cy, cmo, cd, candidates[i], 0, 0);
      break;
    }
  }
  if (!base) {
    // 새벽 02시 이전 → 어제 23시 발표
    const yest = new Date(cy, cmo, cd - 1, 23, 0, 0);
    base = yest;
  }
  return {
    base_date: base.getFullYear() + pad(base.getMonth()+1) + pad(base.getDate()),
    base_time: pad(base.getHours()) + '00'
  };
}

// 초단기실황 base_time: 매시 40분 이후부터 해당 시각 사용 가능
function ultraNcstBase() {
  const now = new Date();
  const safe = new Date(now.getTime() - 40 * 60 * 1000);
  return {
    base_date: safe.getFullYear() + pad(safe.getMonth()+1) + pad(safe.getDate()),
    base_time: pad(safe.getHours()) + '00'
  };
}

function getCache(key, maxAge) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const o = JSON.parse(raw);
    if (Date.now() - o.t > maxAge) return null;
    return o.v;
  } catch { return null; }
}
function setCache(key, value) {
  try { localStorage.setItem(key, JSON.stringify({ t: Date.now(), v: value })); } catch {}
}

/* ============================================================
   데이터 정규화
   ============================================================ */
function parseKmaItems(ncstItems, fcstItems) {
  // 현재값 (실황)
  const now = {};
  ncstItems.forEach(it => { now[it.category] = parseFloat(it.obsrValue); });
  // T1H 기온, REH 습도, RN1 강수량, PTY 강수형태, WSD 풍속

  // 예보 (시간별)
  // SKY: 1맑음 3구름많음 4흐림 / PTY: 0없음 1비 2비/눈 3눈 4소나기
  // POP: 강수확률 / TMP: 1시간 기온
  const fcstByTime = {};
  fcstItems.forEach(it => {
    const k = it.fcstDate + it.fcstTime; // YYYYMMDDHHMM
    if (!fcstByTime[k]) fcstByTime[k] = { fcstDate: it.fcstDate, fcstTime: it.fcstTime };
    fcstByTime[k][it.category] = it.fcstValue;
  });
  const hourly = Object.keys(fcstByTime).sort().map(k => fcstByTime[k]);

  return { now, hourly };
}

function parseAirForStation(items, stationName) {
  if (!items || !items.length) return null;
  const found = items.find(it => it.stationName === stationName);
  if (found) return normalizeAir(found);
  // fallback: 첫번째 측정소 (시도 평균 못 잡으면)
  return normalizeAir(items[0]);
}

function normalizeAir(it) {
  const num = (v) => {
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  };
  return {
    stationName: it.stationName,
    dataTime: it.dataTime,
    pm10: num(it.pm10Value),
    pm25: num(it.pm25Value),
    o3: num(it.o3Value),
    no2: num(it.no2Value),
    co: num(it.coValue),
    so2: num(it.so2Value),
    pm10Grade: it.pm10Grade ? parseInt(it.pm10Grade) : null,
    pm25Grade: it.pm25Grade ? parseInt(it.pm25Grade) : null,
    khaiValue: num(it.khaiValue),
    khaiGrade: it.khaiGrade ? parseInt(it.khaiGrade) : null
  };
}

// 측정소 응답이 유효한지 (PM 결측 아닌지)
function validAirItem(it) {
  const v25 = parseFloat(it.pm25Value);
  const v10 = parseFloat(it.pm10Value);
  return !isNaN(v25) || !isNaN(v10);
}

// PM 농도 → 등급 (환경부 기준)
function pm25Grade(v) {
  if (v == null || isNaN(v)) return null;
  if (v <= 15) return 1;
  if (v <= 35) return 2;
  if (v <= 75) return 3;
  return 4;
}
function pm10Grade(v) {
  if (v == null || isNaN(v)) return null;
  if (v <= 30) return 1;
  if (v <= 80) return 2;
  if (v <= 150) return 3;
  return 4;
}

// 시도 전체 평균 계산 (가장 보편적인 표시값)
function computeSidoAverage(items, sidoName) {
  const valid = items.filter(validAirItem);
  if (!valid.length) return null;

  const avg = (key) => {
    const vals = valid.map(it => parseFloat(it[key])).filter(v => !isNaN(v));
    if (!vals.length) return null;
    return vals.reduce((a, b) => a + b, 0) / vals.length;
  };

  const pm25 = avg('pm25Value');
  const pm10 = avg('pm10Value');
  const o3 = avg('o3Value');
  const khai = avg('khaiValue');

  return {
    stationName: sidoName + ' 평균',
    dataTime: valid[0].dataTime,
    pm10: pm10 != null ? Math.round(pm10) : null,
    pm25: pm25 != null ? Math.round(pm25) : null,
    o3: o3,
    no2: avg('no2Value'),
    co: avg('coValue'),
    so2: avg('so2Value'),
    pm10Grade: pm10Grade(pm10),
    pm25Grade: pm25Grade(pm25),
    khaiValue: khai != null ? Math.round(khai) : null,
    khaiGrade: pm25Grade(pm25) // 통합지수 등급은 PM2.5 등급으로 대체 (단순화)
  };
}

// 향후 N시간 예보 슬라이스
function nextHours(hourly, n = 12) {
  const now = new Date();
  const nowKey = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + pad(now.getHours()) + '00';
  return hourly.filter(h => (h.fcstDate + h.fcstTime) >= nowKey).slice(0, n);
}

// 일별 요약 (오늘/내일/모레/글피)
function dailySummary(hourly) {
  // fcstDate 기준으로 그룹핑
  const byDate = {};
  hourly.forEach(h => {
    const d = h.fcstDate;
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(h);
  });

  const today = new Date();
  const todayStr = today.getFullYear() + pad(today.getMonth()+1) + pad(today.getDate());

  const dates = Object.keys(byDate).sort();
  const result = [];

  for (const d of dates) {
    const items = byDate[d];

    // 최고/최저 기온: TMX/TMN이 일별 한 번씩만 있음, 없으면 TMP에서 계산
    let tmax = null, tmin = null;
    items.forEach(h => {
      if (h.TMX != null) {
        const v = parseFloat(h.TMX);
        if (!isNaN(v)) tmax = v;
      }
      if (h.TMN != null) {
        const v = parseFloat(h.TMN);
        if (!isNaN(v)) tmin = v;
      }
    });
    // fallback: TMP 시간별 값에서 min/max
    if (tmax == null || tmin == null) {
      const tmps = items.map(h => parseFloat(h.TMP)).filter(v => !isNaN(v));
      if (tmps.length) {
        if (tmax == null) tmax = Math.max(...tmps);
        if (tmin == null) tmin = Math.min(...tmps);
      }
    }

    // 최대 강수확률
    const pops = items.map(h => parseInt(h.POP || 0)).filter(v => !isNaN(v));
    const maxPop = pops.length ? Math.max(...pops) : 0;

    // 대표 하늘상태 (낮 시간 12~15시 우선, 없으면 가장 빈번한 값)
    const dayItems = items.filter(h => {
      const hh = parseInt(h.fcstTime.substring(0,2));
      return hh >= 12 && hh <= 15;
    });
    const refItems = dayItems.length ? dayItems : items;
    // PTY 우선 (강수형태 있으면 그게 대표)
    let ptyMode = null, skyMode = null;
    const ptyCount = {}, skyCount = {};
    refItems.forEach(h => {
      const p = parseInt(h.PTY || 0);
      if (p > 0) ptyCount[p] = (ptyCount[p] || 0) + 1;
      const s = parseInt(h.SKY || 1);
      skyCount[s] = (skyCount[s] || 0) + 1;
    });
    const ptyKeys = Object.keys(ptyCount);
    if (ptyKeys.length) {
      ptyMode = ptyKeys.reduce((a, b) => ptyCount[a] >= ptyCount[b] ? a : b);
    }
    const skyKeys = Object.keys(skyCount);
    if (skyKeys.length) {
      skyMode = skyKeys.reduce((a, b) => skyCount[a] >= skyCount[b] ? a : b);
    }

    // 라벨
    const dateObj = new Date(parseInt(d.substring(0,4)), parseInt(d.substring(4,6))-1, parseInt(d.substring(6,8)));
    const diffDays = Math.round((dateObj - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / (24*60*60*1000));
    let label;
    if (diffDays === 0) label = '오늘';
    else if (diffDays === 1) label = '내일';
    else if (diffDays === 2) label = '모레';
    else if (diffDays === 3) label = '글피';
    else label = (dateObj.getMonth()+1) + '/' + dateObj.getDate();

    const dayOfWeek = ['일','월','화','수','목','금','토'][dateObj.getDay()];

    result.push({
      date: d,
      label,
      dayOfWeek,
      tmax: tmax != null ? Math.round(tmax) : null,
      tmin: tmin != null ? Math.round(tmin) : null,
      maxPop,
      sky: skyMode,
      pty: ptyMode,
      isPast: d < todayStr
    });
  }

  // 오늘 포함 4일 (오늘/내일/모레/글피)
  return result.filter(r => !r.isPast).slice(0, 4);
}

// "챙길 것" 판단
function decidePack(hourly, air) {
  const next12 = nextHours(hourly, 12);
  // 우산: 향후 12시간 중 강수확률 50% 이상 OR 강수형태 발생 OR 강수량 발생
  let umbrella = false;
  let umbrellaReason = '';
  let maxPop = 0;
  for (const h of next12) {
    const pop = parseInt(h.POP || 0);
    const pty = parseInt(h.PTY || 0);
    if (pop > maxPop) maxPop = pop;
    if (pop >= 50 || pty > 0) {
      umbrella = true;
    }
  }
  if (umbrella) {
    umbrellaReason = `오늘 비 가능성 (최대 ${maxPop}%)`;
  } else if (maxPop > 0) {
    umbrellaReason = `오늘 강수확률 낮음 (최대 ${maxPop}%)`;
  } else {
    umbrellaReason = '오늘 비 예보 없음';
  }

  // 마스크: PM2.5 ≥ 36(나쁨) OR PM10 ≥ 81(나쁨)
  let mask = false;
  let maskReason = '';
  let maskHtml = ''; // HTML 버전 (수치 강조용)
  if (air) {
    const bad25 = (air.pm25 != null && air.pm25 >= 36) || air.pm25Grade >= 3;
    const bad10 = (air.pm10 != null && air.pm10 >= 81) || air.pm10Grade >= 3;
    const fmt = (v) => v == null ? '-' : v;
    const pm25Html = `<b class="pm-num">PM<sub>2.5</sub> <em>${fmt(air.pm25)}</em></b>`;
    const pm10Html = `<b class="pm-num">PM<sub>10</sub> <em>${fmt(air.pm10)}</em></b>`;
    if (bad25 || bad10) {
      mask = true;
      maskHtml = `${pm25Html} · ${pm10Html}`;
    } else {
      maskHtml = `${pm25Html} <span class="pm-grade">${gradeText(air.pm25Grade)}</span> · ${pm10Html} <span class="pm-grade">${gradeText(air.pm10Grade)}</span>`;
    }
    maskReason = maskHtml; // 호환
  } else {
    maskReason = '대기질 정보 없음';
    maskHtml = '대기질 정보 없음';
  }

  return { umbrella, umbrellaReason, mask, maskReason, maskHtml };
}

// 환기 판단
function decideVent(hourly, air) {
  const next3 = nextHours(hourly, 3);
  const willRain = next3.some(h => parseInt(h.PTY || 0) > 0);
  const highPop = next3.some(h => parseInt(h.POP || 0) >= 50);

  if (!air) return { state: 'maybe', head: '판단 어려움', desc: '대기질 정보 없음' };

  const fmt = (v) => v == null ? '-' : v;
  const pm25Html = `PM<sub>2.5</sub> <em>${fmt(air.pm25)}</em>`;
  const pm10Html = `PM<sub>10</sub> <em>${fmt(air.pm10)}</em>`;

  const pm25Bad = (air.pm25 != null && air.pm25 > 35) || air.pm25Grade >= 3;
  const pm10Bad = (air.pm10 != null && air.pm10 > 80) || air.pm10Grade >= 3;

  if (pm25Bad || pm10Bad) {
    return {
      state: 'no',
      head: '환기 비추천',
      desc: `미세먼지 나쁨 · ${pm25Html} · ${pm10Html}`
    };
  }
  if (willRain) {
    return { state: 'maybe', head: '곧 비 예보', desc: `${pm25Html} · ${pm10Html} · 비 오기 전 잠깐만` };
  }
  if (highPop) {
    return { state: 'maybe', head: '비 가능성', desc: `${pm25Html} · ${pm10Html} · 짧게 환기` };
  }
  return {
    state: 'ok',
    head: '환기 좋아요',
    desc: `${pm25Html} · ${pm10Html} · 비 없음`
  };
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render(loc, weather, air) {
  const { now, hourly } = weather;

  const t1h = parseFloat(now.T1H);
  const reh = parseFloat(now.REH);
  const wsd = parseFloat(now.WSD);
  const pty = now.PTY;

  // 현재 SKY는 실황엔 없고 예보에서 가까운 시각 SKY 가져옴
  const sortedHourly = hourly;
  const nowDate = new Date();
  const nowKey = nowDate.getFullYear() + pad(nowDate.getMonth()+1) + pad(nowDate.getDate()) + pad(nowDate.getHours()) + '00';
  const closestFcst = sortedHourly.find(h => (h.fcstDate + h.fcstTime) >= nowKey) || sortedHourly[0] || {};
  const sky = closestFcst.SKY || 1;
  const nowEmoji = emojiFor(sky, pty);
  const skyText = parseInt(pty) > 0 ? PTY_MAP[parseInt(pty)] : SKY_MAP[parseInt(sky)] || '';

  const pack = decidePack(hourly, air);
  const vent = decideVent(hourly, air);

  // 시간별 12시간
  const hourCells = nextHours(hourly, 12).map((h, i) => {
    const hh = parseInt(h.fcstTime.substring(0, 2));
    const isFirst = i === 0;
    const emo = emojiFor(h.SKY, h.PTY);
    const tmp = h.TMP != null ? Math.round(parseFloat(h.TMP)) : '-';
    const pop = parseInt(h.POP || 0);
    return `
      <div class="hour-cell ${isFirst ? 'now-cell' : ''}">
        <div class="h-time">${isFirst ? '지금' : hh + '시'}</div>
        <div class="h-emoji">${emo}</div>
        <div class="h-temp">${tmp}°</div>
        <div class="h-pop">${pop >= 30 ? '💧' + pop + '%' : ''}</div>
      </div>`;
  }).join('');

  // 3일 예보 카드 (오늘 포함, 단기예보는 글피까지 가능)
  const days = dailySummary(hourly);
  let dailyHtml = '';
  if (days.length >= 2) {
    const dayRows = days.map(d => {
      const emo = emojiFor(d.sky, d.pty);
      const tmaxStr = d.tmax != null ? `${d.tmax}°` : '-';
      const tminStr = d.tmin != null ? `${d.tmin}°` : '-';
      const popHtml = d.maxPop >= 30 ? `<span class="day-pop">💧 ${d.maxPop}%</span>` : '';
      return `
        <div class="day-row ${d.label === '오늘' ? 'today' : ''}">
          <div class="day-label">
            <div class="day-name">${d.label}</div>
            <div class="day-dow">${d.dayOfWeek}</div>
          </div>

          <div class="day-pop-wrap">${popHtml}</div>

            <span class="t-min">${tminStr}</span>
            <span class="t-sep"></span>

    }).join('');

      <div class="card">
        <div class="card-title">📅 ${days.length}일 예보</div>
        <div class="day-list">${dayRows}</div>
      </div>`;
  }

  const updTime = `${pad(nowDate.getHours())}:${pad(nowDate.getMinutes())} 기준`;
  document.getElementById('updTime').textContent = updTime;

  // 위치 표시
  document.getElementById('locName').textContent = loc.name;

  document.getElementById('content').innerHTML = `
    <!-- 현재 -->
    <div class="now">
      <div class="emoji">${nowEmoji}</div>
      <div class="temp">${isNaN(t1h) ? '-' : Math.round(t1h)}<span class="deg">°</span></div>
      <div class="sky-text">${skyText}</div>
      <div class="sub">
        <span>💧 습도 <b>${isNaN(reh) ? '-' : Math.round(reh)}%</b></span>
        <span>💨 바람 <b>${isNaN(wsd) ? '-' : wsd.toFixed(1)}m/s</b></span>
      </div>
    </div>

    <!-- 챙길 것 -->
    <div class="card pack-card">
      <div class="card-title">🎒 챙기세요</div>
      <div class="pack-list">
        <div class="pack-item ${pack.umbrella ? '' : 'muted'}">
          <div class="ico">☂️</div>
          <div class="text">
            <div class="main">${pack.umbrella ? '우산 챙기세요' : '우산 불필요'}</div>
            <div class="sub">${escapeHtml(pack.umbrellaReason)}</div>
          </div>
          <div class="badge ${pack.umbrella ? 'badge-need' : 'badge-skip'}">${pack.umbrella ? '필요' : 'OK'}</div>
        </div>
        <div class="pack-item ${pack.mask ? '' : 'muted'}">
          <div class="ico">😷</div>
          <div class="text">
            <div class="main">${pack.mask ? '마스크 챙기세요' : '마스크 불필요'}</div>
            <div class="sub">${pack.maskHtml}</div>
          </div>
          <div class="badge ${pack.mask ? 'badge-need' : 'badge-skip'}">${pack.mask ? '필요' : 'OK'}</div>
        </div>
      </div>
    </div>

    <!-- 환기 -->
    <div class="card vent-card">
      <div class="card-title">💨 환기</div>

        </div>

async function loadAndRender(loc, force = false) {
  document.getElementById('content').innerHTML = `
    <div class="loading">
      <div style="font-size:42px; margin-bottom:10px;">🌤</div>
      ${escapeHtml(loc.name)} 정보를 불러오는 중<span class="dots"></span>
    </div>`;

  document.getElementById('locName').textContent = loc.name;
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.classList.add('spinning');

  try {
    // 캐시 키
    const wxKey = LS_WX_PREFIX + loc.nx + '_' + loc.ny;
    const airKey = LS_AIR_PREFIX + loc.sido + '_' + (loc.sgg || '');

    // 날씨
    let weather;
    if (!force) weather = getCache(wxKey, WX_CACHE_MS);
    if (!weather) {
      const [ncstItems, fcstItems] = await Promise.all([
        fetchKmaUltraNcst(loc.nx, loc.ny),
        fetchKmaVilageFcst(loc.nx, loc.ny)
      ]);
      weather = parseKmaItems(ncstItems, fcstItems);
      setCache(wxKey, weather);
    }

    // 대기질 (시도별 호출 후 측정소 매칭)
    let air = null;
    let airList;
    if (!force) airList = getCache(airKey, AIR_CACHE_MS);
    if (!airList) {
      try {
        airList = await fetchAirBySido(loc.sido);
        setCache(airKey, airList);
      } catch (e) {
        console.warn('대기질 로드 실패', e);
      }
    }
    if (airList && airList.length) {
      // 측정소 매칭 우선순위:
      // 1) sgg와 정확히 일치 (예: 서울 종로구 → "종로구")
      // 2) 우선 매칭 테이블 (도시별 대표 측정소)
      // 3) sgg를 포함하는 측정소
      // 4) GPS면 위경도 거리 기반 (loc.lat/lon이 있는 경우 → 측정소정보 호출은 비용 ↑이라 일단 생략)
      // 5) 시도 전체 평균값 계산 (네이버/에어코리아 표시 방식과 가까움)

      // 도시별 대표 측정소 (시군구명이 측정소명과 다른 경우)
      const STATION_OVERRIDE = {
        '세종': ['신흥동', '아름동', '전의', '조치원', '연기'],
        '제주': ['이도동', '연동', '노형'],
        '서귀포': ['동홍동'],
      };

      let target = null;

      // 1) 정확 일치
      target = airList.find(it => it.stationName === loc.sgg);

      // 2) 오버라이드 테이블 우선순위로 검색
      if (!target && STATION_OVERRIDE[loc.sgg]) {
        for (const stnName of STATION_OVERRIDE[loc.sgg]) {
          target = airList.find(it => it.stationName === stnName && validAirItem(it));
          if (target) break;
        }
      }

      // 3) 부분 일치 (단, 의미있는 매칭 - sgg 길이 2 이상일 때만)
      if (!target && loc.sgg && loc.sgg.length >= 2) {
        target = airList.find(it => it.stationName && it.stationName.includes(loc.sgg) && validAirItem(it));
      }

      // 4) 시도 평균값 계산 (가장 합리적인 fallback)
      if (target) {
        air = normalizeAir(target);
      } else {
        air = computeSidoAverage(airList, loc.sido);
      }
    }

    render(loc, weather, air);
  } catch (e) {
    console.error(e);
    document.getElementById('content').innerHTML = `
      <div class="err-box">
        <span class="err-emoji">😢</span>
        <div>날씨를 불러오지 못했어요.</div>
        <div style="font-size:12px; color:#A0AEB8; margin-top:6px;">${escapeHtml(e.message || 'unknown')}</div>
        <button onclick="window.__retry()">다시 시도</button>
      </div>`;
    window.__retry = () => loadAndRender(loc, true);
  } finally {
    refreshBtn.classList.remove('spinning');
  }
}

/* ============================================================
   GPS → 위치 변환 (위경도 거리 기반, 외부 API 0번)
   ============================================================ */
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

async function resolveByGps() {
  if (!navigator.geolocation) throw new Error('GPS 미지원 브라우저');
  const pos = await new Promise((res, rej) => {
    navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000, maximumAge: 5*60*1000, enableHighAccuracy: false });
  });
  const { latitude, longitude, accuracy } = pos.coords;
  const { nx, ny } = dfsXyConv(latitude, longitude);

  // 위경도 실거리 기반으로 가장 가까운 시군구 찾기
  let nearest = CITIES[0];
  let bestKm = Infinity;
  for (const c of CITIES) {
    const km = haversineKm(latitude, longitude, c.lat, c.lon);
    if (km < bestKm) { bestKm = km; nearest = c; }
  }

  return {
    name: nearest.name,
    nx, ny,
    lat: latitude,
    lon: longitude,
    accuracy: Math.round(accuracy),
    distKm: bestKm.toFixed(1),
    sido: nearest.sido,
    sgg: nearest.sgg,
    isGps: true
  };
}

function showModal() {
  document.getElementById('modal').classList.add('show');
  // 모달 열 때 history에 상태 추가 → 뒤로가기 시 페이지 종료가 아니라 모달만 닫힘
  if (!history.state || !history.state.modal) {
    history.pushState({ modal: true }, '');
  }
  // 모달 열릴 때 입력창 자동 포커스 (모바일에서 키보드는 약간 지연 후)
  setTimeout(() => {
    const inp = document.getElementById('citySearch');
    if (inp) inp.focus();
  }, 250);
}
function hideModal() {
  const el = document.getElementById('modal');
  if (!el.classList.contains('show')) return;
  el.classList.remove('show');
  // 만약 history에 modal 상태가 있다면 빼냄 (사용자가 X/배경 클릭으로 닫은 경우)
  if (history.state && history.state.modal) {
    history.back();
  }
}

function renderCityList(filter) {
  const cur = getSavedLoc();
  const q = (filter || '').trim();
  // 정규화: 공백 제거, 소문자
  const norm = s => s.replace(/\s+/g, '').toLowerCase();
  const qn = norm(q);

  let list;
  if (!qn) {
    list = CITIES;
  } else {
    list = CITIES.filter(c => {
      return norm(c.name).includes(qn)
          || norm(c.sido).includes(qn)
          || norm(c.sgg).includes(qn);
    });
  }

  document.getElementById('cityListCount').textContent = list.length;
  document.getElementById('cityListTitle').firstChild.textContent = qn ? '검색 결과 (' : '전체 도시 (';

  const listEl = document.getElementById('cityList');
  if (!list.length) {
    listEl.innerHTML = `<div class="city-empty">"${escapeHtml(q)}"에 해당하는 도시가 없어요</div>`;
    return;
  }

  listEl.innerHTML = list.map(c => {
    const isActive = cur && !cur.isGps && cur.name === c.name;
    return `
      <div class="city-row ${isActive ? 'active' : ''}" data-name="${escapeHtml(c.name)}">
        <span>${escapeHtml(c.name)}</span>
        <span class="sido-tag">${escapeHtml(c.sido)}</span>
      </div>`;
  }).join('');

  listEl.querySelectorAll('.city-row').forEach(el => {
    el.addEventListener('click', () => {
      const c = CITIES.find(x => x.name === el.dataset.name);
      if (!c) return;
      // GPS 정보 제거하고 도시로 저장
      saveLoc({ name: c.name, nx: c.nx, ny: c.ny, sido: c.sido, sgg: c.sgg, lat: c.lat, lon: c.lon, isGps: false });
      hideModal();
      loadAndRender(getSavedLoc());
    });
  });
}

function getSavedLoc() {
  try { return JSON.parse(localStorage.getItem(LS_LOC) || 'null'); } catch { return null; }
}

    document.getElementById('locName').textContent = prevLocName;
    // 토스트로 안내
    showToast('GPS를 불러올 수 없으니 직접 도시를 선택해주세요');
    console.warn('GPS 실패:', e.message || e);
  }
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  const loc = getSavedLoc();
  if (loc) loadAndRender(loc, true);
});

/* ============================================================
   시작
   ============================================================ */
(function init() {
  const saved = getSavedLoc();
  if (saved) {
    loadAndRender(saved);
  } else {
    // 첫 진입: 서울 중구 기본
    const def = CITIES.find(c => c.name === '서울 중구') || CITIES[0];
    const loc = { name: def.name, nx: def.nx, ny: def.ny, sido: def.sido, sgg: def.sgg, lat: def.lat, lon: def.lon, isGps: false };
    saveLoc(loc);
    loadAndRender(loc);
  }
})();
</script>
</body>
</html>
