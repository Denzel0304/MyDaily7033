<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>경제 지표 – MyDaily7</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green1: #e8f8ef;
      --green2: #b8ecd0;
      --green3: #5dcf8a;
      --green4: #2db96a;
      --green5: #1a8f4e;
      --sky1: #dff1fb;
      --sky2: #b8e0f7;
      --sky3: #85c8f0;
      --accent: #2db96a;
      --red:   #f04060;
      --blue:  #3a7bd5;
      --text-dark: #1a2e3b;
      --text-mid:  #4a6478;
      --text-light:#8aafc2;
      --card-bg: rgba(255,255,255,0.85);
      --shadow: 0 8px 32px rgba(45,185,106,0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #e8f6fd 0%, #ceeaf8 40%, #d9f0fc 70%, #e4f5fb 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.32;
      pointer-events: none;
      z-index: 0;
    }
    .bg-blob-1 { width: 260px; height: 260px; background: #a8e6c4; top: -60px; left: -80px; }
    .bg-blob-2 { width: 180px; height: 180px; background: #c5ecfb; bottom: 80px; right: -50px; }
    .bg-blob-3 { width: 140px; height: 140px; background: #b8ecd0; top: 42%; left: -50px; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 0 16px 48px;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    header {
      padding-top: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
    }

    .btn-home {
      position: absolute;
      left: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--green4);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
      box-shadow: 0 3px 12px rgba(45,185,106,0.28);
    }
    .btn-home:active { transform: scale(0.95); background: var(--green5); }
    .btn-home svg { width: 14px; height: 14px; flex-shrink: 0; }

    .header-title {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: -0.3px;
    }

    /* 업데이트 시간 */
    .update-info {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .update-dot {
      width: 6px; height: 6px;
      background: var(--green3);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1);}
      50%{opacity:0.4;transform:scale(0.7);}
    }

    /* ── 탭 ── */
    .tab-bar {
      display: flex;
      background: rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 22px;
      box-shadow: 0 2px 12px rgba(45,185,106,0.08);
      backdrop-filter: blur(8px);
    }
    .tab-btn {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 50px;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--green4);
      color: white;
      box-shadow: 0 3px 12px rgba(45,185,106,0.30);
    }

    /* ── 카드 ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.75);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green3), #a8e6c4);
      border-radius: 22px 22px 0 0;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-mid);
    }
    .card-icon {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: var(--green1);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .card-value {
      font-family: 'Nunito', sans-serif;
      font-size: 30px;
      font-weight: 900;
      color: var(--text-dark);
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .card-value .unit {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      margin-left: 3px;
    }

    .card-pct {
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 50px;
    }
    .pct-up   { color: var(--red);  background: rgba(240,64,96,0.10); }
    .pct-down { color: var(--blue); background: rgba(58,123,213,0.10); }
    .pct-zero { color: var(--text-light); background: rgba(138,175,194,0.12); }

    /* 시총 카드 특별 레이아웃 */
    .cap-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .cap-rank {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .cap-rank-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 50px;
      color: white;
    }
    .rank1 { background: var(--green4); }
    .rank2 { background: var(--text-light); }
    .cap-name {
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: var(--text-dark);
    }
    .cap-arrow {
      font-size: 20px;
      color: var(--green3);
      font-weight: 900;
    }
    .cap-diff-label {
      font-size: 12px;
      color: var(--text-light);
      text-align: center;
      margin-top: 4px;
    }

    /* ── 주간/월간 그래프 영역 ── */
    .period-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* 종목 서브탭 */
    .metric-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 14px;
    }
    .metric-tab {
      border: none;
      border-radius: 50px;
      padding: 7px 4px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      background: rgba(255,255,255,0.55);
      color: var(--text-mid);
      backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255,255,255,0.7);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-tab.active {
      background: var(--green4);
      color: white;
      box-shadow: 0 3px 12px rgba(45,185,106,0.30);
      border-color: transparent;
    }

    /* 요약 수치 행 */
    .period-summary {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px 14px;
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.75);
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .period-summary::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green3), #a8e6c4);
      border-radius: 22px 22px 0 0;
    }
    .summary-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .summary-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: 0.3px;
    }
    .summary-value {
      font-family: 'Nunito', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: var(--text-dark);
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .summary-value .unit {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      margin-left: 3px;
    }
    .summary-badges {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .summary-badge {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 50px;
    }
    .badge-period { color: var(--text-mid); background: rgba(138,175,194,0.13); font-size:11px; font-weight:600; }

    /* SVG 선 그래프 카드 */
    .chart-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px 18px;
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.75);
      position: relative;
      overflow: hidden;
    }
    .chart-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green3), #a8e6c4);
      border-radius: 22px 22px 0 0;
    }
    .chart-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
    }
    .chart-range-label {
      font-size: 11px;
      color: var(--text-light);
    }
    .chart-svg-wrap {
      width: 100%;
      overflow: hidden;
    }
    .chart-svg-wrap svg {
      display: block;
      width: 100%;
    }
    /* x축 날짜 레이블 */
    .x-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      padding: 0 2px;
    }
    .x-label {
      font-size: 9px;
      color: var(--text-light);
      font-family: 'Nunito', sans-serif;
    }

    /* 로딩 / 오류 */
    .status-box {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--green2);
      border-top-color: var(--green4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-data {
      font-size: 12px;
      color: var(--text-light);
      text-align: center;
      padding: 16px 0 4px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="container">

    <header>
      <a href="index.html" class="btn-home">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 12L6 8l4-4"/>
        </svg>
        홈
      </a>
      <h1 class="header-title">경제 지표</h1>
    </header>

    <div class="update-info">
      <span class="update-dot"></span>
      <span id="update-time">데이터 불러오는 중...</span>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="today">오늘</button>
      <button class="tab-btn" data-tab="week">이번 주</button>
      <button class="tab-btn" data-tab="month">이번 달</button>
    </div>

    <div class="cards" id="cards-area">
      <div class="status-box">
        <div class="spinner"></div>
        데이터를 불러오는 중...
      </div>
    </div>

  </div>

  <script>
  // ── 설정 ──
  const REPO_RAW = 'https://raw.githubusercontent.com/Denzel0304/MyDaily7/main/data/';
  

  let latestData  = null;
  let historyData = [];
  let currentTab  = 'today';

  // ── 유틸 ──
  const fmt = (v, d=2) => v != null ? Number(v).toLocaleString('ko-KR', {maximumFractionDigits:d}) : '--';
  const pctClass = v => v == null ? 'pct-zero' : v > 0 ? 'pct-up' : v < 0 ? 'pct-down' : 'pct-zero';
  const pctSign  = v => v == null ? '--' : (v > 0 ? '+' : '') + v.toFixed(2) + '%';

  // ── 데이터 로드 ──
  async function loadData() {
  try {
    const [latestRes, histRes] = await Promise.all([
      fetch(REPO_RAW + 'economy_latest.json?t=' + Date.now()),
      fetch(REPO_RAW + 'economy_history.json?t=' + Date.now()),
    ]);
    latestData  = await latestRes.json();
    historyData = await histRes.json();
    render();
  } catch(e) {
    document.getElementById('cards-area').innerHTML =
      `<div class="status-box">❌ 데이터를 불러올 수 없습니다.<br><small>인터넷 연결을 확인해 주세요.</small></div>`;
    document.getElementById('update-time').textContent = '로드 실패';
  }
}

  // ── 렌더 분기 ──
  function render() {
    if (!latestData) return;
    document.getElementById('update-time').textContent =
      `기준일: ${latestData.date} · 매일 07:30 갱신`;

    if (currentTab === 'today') renderToday();
    else if (currentTab === 'week') renderPeriod(7, '이번 주');
    else if (currentTab === 'month') renderPeriod(30, '이번 달');
  }

  // ── 오늘 탭 ──
  function renderToday() {
    const d = latestData;

    // pct가 null인 경우 historyData에서 어제 값으로 직접 계산
    function calcPct(key, todayVal) {
      if (todayVal == null) return null;
      if (!historyData || historyData.length === 0) return null;
      // latestData.date 기준 직전 날 유효값 찾기
      const sorted = [...historyData]
        .filter(h => h.date < d.date && h[key]?.value != null)
        .sort((a, b) => b.date.localeCompare(a.date));
      if (sorted.length === 0) return null;
      const prevVal = sorted[0][key].value;
      return prevVal !== 0 ? (todayVal - prevVal) / prevVal * 100 : null;
    }

    const vixPct    = d.vix?.pct    ?? calcPct('vix',    d.vix?.value);
    const nasdaqPct = d.nasdaq?.pct ?? calcPct('nasdaq', d.nasdaq?.value);
    const kospiPct  = d.kospi?.pct  ?? calcPct('kospi',  d.kospi?.value);
    const usdkrwPct = d.usdkrw?.pct ?? calcPct('usdkrw', d.usdkrw?.value);

    const area = document.getElementById('cards-area');
    area.innerHTML = `
      ${makeCard('📊','VIX 지수', d.vix?.value, '', vixPct, 'VIX')}
      ${makeCard('📈','나스닥', d.nasdaq?.value, 'pt', nasdaqPct, 'NASDAQ')}
      ${makeCard('🇰🇷','코스피', d.kospi?.value, 'pt', kospiPct, 'KOSPI')}
      ${makeCard('💵','달러 환율', d.usdkrw?.value, '원', usdkrwPct, 'USD/KRW')}
      ${makeCapCard(d.top_stock)}
    `;
  }

  function makeCard(icon, label, value, unit, pct, tag) {
    return `
    <div class="card">
      <div class="card-header">
        <div class="card-label">
          <div class="card-icon">${icon}</div>
          ${label}
        </div>
        <span class="card-pct ${pctClass(pct)}">${pctSign(pct)}</span>
      </div>
      <div class="card-value">${fmt(value)}${unit ? `<span class="unit">${unit}</span>` : ''}</div>
    </div>`;
  }

  function makeCapCard(t) {
    if (!t) return '';
    return `
    <div class="card">
      <div class="card-header">
        <div class="card-label">
          <div class="card-icon">🏆</div>
          미국 시총 1위 vs 2위
        </div>
        <span class="card-pct pct-up">+${t.cap_diff_pct ?? '--'}%</span>
      </div>
      <div class="cap-row">
        <div class="cap-rank">
          <span class="cap-rank-badge rank1">1위</span>
          <span class="cap-name">${t.rank1 ?? '--'}</span>
        </div>
        <span class="cap-arrow">›</span>
        <div class="cap-rank">
          <span class="cap-rank-badge rank2">2위</span>
          <span class="cap-name">${t.rank2 ?? '--'}</span>
        </div>
      </div>
      <div class="cap-diff-label">시총 차이: ${t.cap_diff_pct != null ? t.cap_diff_pct + '%' : '--'} 앞섬</div>
    </div>`;
  }

  // ── 주간/월간 탭 ──
  const METRICS = [
    { key:'vix',    icon:'📊', label:'VIX',    fullLabel:'VIX 지수',  unit:'',   decimals:2 },
    { key:'nasdaq', icon:'📈', label:'나스닥', fullLabel:'나스닥',    unit:'pt', decimals:0 },
    { key:'kospi',  icon:'🇰🇷', label:'코스피', fullLabel:'코스피',   unit:'pt', decimals:0 },
    { key:'usdkrw', icon:'💵', label:'환율',   fullLabel:'달러 환율', unit:'원', decimals:1 },
  ];
  let periodActiveMetric = 'vix';

  function renderPeriod(days, label) {
    const area = document.getElementById('cards-area');
    if (!historyData || historyData.length < 2) {
      area.innerHTML = `<div class="status-box">📭 누적 데이터가 부족합니다.<br><small>며칠 후 다시 확인해 주세요.</small></div>`;
      return;
    }

    const now = new Date();
    const cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - days);

    const slice = historyData
      .filter(d => new Date(d.date) >= cutoff)
      .sort((a,b) => a.date.localeCompare(b.date));

    if (slice.length < 2) {
      area.innerHTML = `<div class="status-box">📭 ${label} 데이터가 아직 부족합니다.</div>`;
      return;
    }

    area.innerHTML = `
      <div class="period-wrap">
        <div class="metric-tabs" id="metric-tabs">
          ${METRICS.map(m => `
            <button class="metric-tab${m.key === periodActiveMetric ? ' active' : ''}"
                    data-metric="${m.key}">
              ${m.icon} ${m.label}
            </button>`).join('')}
        </div>
        <div id="period-content"></div>
      </div>`;

    // 서브탭 이벤트
    document.querySelectorAll('.metric-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.metric-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        periodActiveMetric = btn.dataset.metric;
        renderMetricView(slice);
      });
    });

    renderMetricView(slice);
  }

  function renderMetricView(slice) {
    const m = METRICS.find(x => x.key === periodActiveMetric);
    const content = document.getElementById('period-content');
    if (!content) return;

    // null 아닌 첫 유효값 찾기 (-- 버그 수정)
    const validSlice = slice.filter(d => d[m.key]?.value != null);
    if (validSlice.length < 2) {
      content.innerHTML = `<div class="status-box">📭 ${m.fullLabel} 데이터가 부족합니다.</div>`;
      return;
    }

    const firstValid = validSlice[0];
    const lastValid  = validSlice[validSlice.length - 1];
    const fv = firstValid[m.key].value;
    const lv = lastValid[m.key].value;
    const diff    = lv - fv;
    const diffPct = fv !== 0 ? (diff / fv * 100) : null;

    // 선 그래프 SVG 생성
    const vals = validSlice.map(d => d[m.key].value);
    const minV = Math.min(...vals);
    const maxV = Math.max(...vals);
    const range = maxV - minV || 1;

    const W = 340, H = 130, PAD_X = 30, PAD_Y = 22;
    const plotW = W - PAD_X * 2;
    const plotH = H - PAD_Y * 2;
    const n = validSlice.length;

    const px = i => PAD_X + (i / (n - 1)) * plotW;
    const py = v => PAD_Y + plotH - ((v - minV) / range) * plotH;

    // 그라데이션 fill path
    const points = vals.map((v, i) => `${px(i)},${py(v)}`).join(' ');
    const linePath = vals.map((v, i) => `${i===0?'M':'L'}${px(i)},${py(v)}`).join(' ');
    const fillPath = `${linePath} L${px(n-1)},${PAD_Y+plotH} L${PAD_X},${PAD_Y+plotH} Z`;

    const isPositive = diff >= 0;
    const lineColor  = isPositive ? 'var(--red)' : 'var(--blue)';
    const fillId     = 'grad_' + m.key;

    // x축 레이블: 균등 5개
    const labelIdxs = [0, Math.floor(n/4), Math.floor(n/2), Math.floor(3*n/4), n-1]
      .filter((v,i,a) => a.indexOf(v) === i && v < n);
    const xLabels = labelIdxs.map(i =>
      `<span class="x-label">${validSlice[i].date.slice(5)}</span>`
    ).join('');

    // 최고/최저 점 표시
    const maxIdx = vals.indexOf(maxV);
    const minIdx = vals.indexOf(minV);
    const dotRadius = 4;

    // 일별 변화 바 (최근 7개)
    const barSlice = validSlice.slice(-Math.min(8, validSlice.length));
    const changes = barSlice.slice(1).map((d, i) => {
      const prev = barSlice[i][m.key].value;
      const curr = d[m.key].value;
      return { date: d.date.slice(5), chg: curr - prev, up: curr >= prev };
    });
    const maxAbs = Math.max(...changes.map(c => Math.abs(c.chg)), 0.001);
    const barRows = changes.map(c => {
      const w = Math.round(Math.abs(c.chg) / maxAbs * 100);
      const col = c.up ? 'var(--red)' : 'var(--blue)';
      const sign = c.up ? '+' : '';
      return `
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
          <span style="font-size:9px;color:var(--text-light);font-family:'Nunito',sans-serif;width:38px;flex-shrink:0;">${c.date}</span>
          <div style="flex:1;height:6px;background:rgba(180,210,200,0.25);border-radius:50px;overflow:hidden;">
            <div style="height:100%;width:${w}%;background:${col};border-radius:50px;"></div>
          </div>
          <span style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:${col};white-space:nowrap;width:54px;text-align:right;">
            ${sign}${fmt(c.chg, m.decimals)}${m.unit}
          </span>
        </div>`;
    }).join('');

    content.innerHTML = `
      <!-- 요약 카드 -->
      <div class="period-summary">
        <div class="summary-label">${m.icon} ${m.fullLabel} · 현재값</div>
        <div class="summary-top">
          <div class="summary-value">${fmt(lv, m.decimals)}${m.unit ? `<span class="unit">${m.unit}</span>` : ''}</div>
          <span class="card-pct ${pctClass(diffPct)}">${pctSign(diffPct)}</span>
        </div>
        <div class="summary-badges">
          <span class="summary-badge badge-period">${firstValid.date} → ${lastValid.date}</span>
          <span class="summary-badge ${pctClass(diff)}" style="font-size:12px;">
            ${diff >= 0 ? '+' : ''}${fmt(diff, m.decimals)}${m.unit}
          </span>
        </div>
      </div>

      <!-- 선 그래프 카드 -->
      <div class="chart-card" style="margin-bottom:12px;">
        <div class="chart-title-row">
          <span class="chart-title">📉 전체 추이</span>
          <span class="chart-range-label">${n}개 데이터</span>
        </div>
        <div class="chart-svg-wrap">
          <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
            <defs>
              <linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="${lineColor}" stop-opacity="0.01"/>
              </linearGradient>
            </defs>
            <!-- 가이드 라인 -->
            <line x1="${PAD_X}" y1="${PAD_Y}" x2="${W-PAD_X}" y2="${PAD_Y}" stroke="rgba(180,210,200,0.3)" stroke-width="1" stroke-dasharray="3,4"/>
            <line x1="${PAD_X}" y1="${PAD_Y+plotH/2}" x2="${W-PAD_X}" y2="${PAD_Y+plotH/2}" stroke="rgba(180,210,200,0.3)" stroke-width="1" stroke-dasharray="3,4"/>
            <line x1="${PAD_X}" y1="${PAD_Y+plotH}" x2="${W-PAD_X}" y2="${PAD_Y+plotH}" stroke="rgba(180,210,200,0.3)" stroke-width="1" stroke-dasharray="3,4"/>
            <!-- fill -->
            <path d="${fillPath}" fill="url(#${fillId})"/>
            <!-- line -->
            <path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- 최고점 -->
            <circle cx="${px(maxIdx)}" cy="${py(maxV)}" r="${dotRadius}" fill="${lineColor}" stroke="white" stroke-width="1.5"/>
            <text x="${px(maxIdx)}" y="${py(maxV)-8}" text-anchor="${maxIdx === 0 ? 'start' : maxIdx === n-1 ? 'end' : 'middle'}" font-size="8" fill="${lineColor}" font-family="Nunito,sans-serif" font-weight="700">${fmt(maxV, m.decimals)}</text>
            <!-- 최저점 -->
            <circle cx="${px(minIdx)}" cy="${py(minV)}" r="${dotRadius}" fill="var(--blue)" stroke="white" stroke-width="1.5"/>
            <text x="${px(minIdx)}" y="${py(minV)+16}" text-anchor="${minIdx === 0 ? 'start' : minIdx === n-1 ? 'end' : 'middle'}" font-size="8" fill="var(--blue)" font-family="Nunito,sans-serif" font-weight="700">${fmt(minV, m.decimals)}</text>
            <!-- 시작/끝 점 -->
            <circle cx="${px(0)}" cy="${py(fv)}" r="3" fill="var(--text-light)" stroke="white" stroke-width="1.5"/>
            <circle cx="${px(n-1)}" cy="${py(lv)}" r="3.5" fill="${lineColor}" stroke="white" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="x-labels">${xLabels}</div>
      </div>

      <!-- 일별 변화 바 카드 -->
      <div class="chart-card">
        <div class="chart-title-row">
          <span class="chart-title">📊 최근 일별 변화</span>
          <span class="chart-range-label">최근 ${changes.length}일</span>
        </div>
        ${barRows || '<div class="no-data">데이터 없음</div>'}
      </div>`;
  }

  // ── 탭 이벤트 ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      render();
    });
  });

  // ── 시작 ──
  loadData();
  </script>
</body>
</html>
