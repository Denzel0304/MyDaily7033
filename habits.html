<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>습관 트래커 · MyDaily7</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky1: #dff1fb;
      --sky2: #b8e0f7;
      --sky3: #85c8f0;
      --sky4: #4faee0;
      --accent: #2e90c8;
      --soft-purple: #e4d8f8;
      --purple-mid: #9370db;
      --purple-dark: #6c3fc5;
      --text-dark: #1a2e3b;
      --text-mid: #4a6478;
      --text-light: #8aafc2;
      --card-bg: rgba(255,255,255,0.85);
      --shadow: 0 8px 32px rgba(79,174,224,0.13);
      --radius: 22px;
      --radius-sm: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #e8f6fd 0%, #ceeaf8 40%, #d9f0fc 70%, #e4f5fb 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.35; pointer-events: none; z-index: 0; }
    .bg-blob-1 { width: 280px; height: 280px; background: #aeddf5; top: -60px; left: -80px; }
    .bg-blob-2 { width: 200px; height: 200px; background: #d8c8f8; bottom: 80px; right: -60px; }
    .bg-blob-3 { width: 150px; height: 150px; background: #fce4ef; top: 40%; left: -50px; }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 0 18px 100px;
      display: flex; flex-direction: column;
    }

    /* 헤더 */
    header {
      padding: 52px 4px 20px;
      animation: fadeUp 0.4s ease both;
    }
    .header-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 4px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: var(--accent);
      text-decoration: none; flex-shrink: 0;
      background: white; border-radius: 50px;
      padding: 10px 16px;
      min-height: 42px;
      box-shadow: 0 2px 10px rgba(79,174,224,0.12);
    }
    .header-title-wrap {
      flex: 1; text-align: center;
    }
    .page-title {
      font-family: 'Nunito', sans-serif;
      font-size: 28px; font-weight: 900;
      color: var(--text-dark); letter-spacing: -0.5px;
      text-align: center;
    }
    .page-title span { color: var(--purple-mid); }
    .page-subtitle { font-size: 13px; color: var(--text-light); margin-top: 4px; text-align: center; }

    /* 주/월 탭 */
    .view-tabs {
      display: flex; gap: 8px;
      margin-top: 20px;
      animation: fadeUp 0.4s 0.08s ease both;
    }
    .tab-btn {
      flex: 1; padding: 10px;
      border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--purple-mid); color: white;
      box-shadow: 0 4px 14px rgba(147,112,219,0.35);
    }
    .tab-btn:not(.active) {
      background: white; color: var(--text-mid);
      box-shadow: 0 2px 8px rgba(79,174,224,0.1);
    }

    /* 주간 네비게이션 */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px;
      animation: fadeUp 0.4s 0.12s ease both;
    }
    .week-nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: none; background: white;
      box-shadow: 0 2px 8px rgba(79,174,224,0.12);
      font-size: 16px; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .week-nav-btn:active { transform: scale(0.9); }
    .week-label {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--text-mid);
    }

    /* 주간 요일 헤더 */
    .week-days {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; margin-top: 14px;
      animation: fadeUp 0.4s 0.14s ease both;
    }
    .day-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .day-name {
      font-size: 11px; font-weight: 600;
      color: var(--text-light); text-align: center;
    }
    .day-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--text-mid);
    }
    .day-num.today {
      background: var(--purple-mid); color: white;
      box-shadow: 0 2px 8px rgba(147,112,219,0.4);
    }

    /* 습관 리스트 (주간) */
    .habits-list {
      display: flex; flex-direction: column; gap: 12px;
      margin-top: 16px;
      animation: fadeUp 0.4s 0.18s ease both;
    }

    .habit-row {
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.7);
      overflow: hidden;
    }
    .habit-row-header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px 11px;
    }
    .habit-icon-badge {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      background: var(--soft-purple);
    }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 800;
      color: var(--text-dark);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .habit-goal-label {
      font-size: 11px; color: var(--text-light); margin-top: 1px;
    }
    .habit-progress-text {
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--purple-mid);
      flex-shrink: 0;
    }

    /* 주간 체크 그리드 */
    .habit-week-checks {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; padding: 0 14px 13px;
    }
    .check-cell {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .check-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #e0eaf2;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
      background: transparent;
      -webkit-user-select: none; user-select: none;
    }
    .check-dot.done {
      background: var(--purple-mid); border-color: var(--purple-mid);
      box-shadow: 0 2px 8px rgba(147,112,219,0.4);
      color: white; font-size: 13px; font-weight: 700;
    }
    .check-dot.partial {
      border-color: var(--purple-mid);
      background: rgba(147,112,219,0.08);
    }
    .check-dot.future { opacity: 0.25; cursor: default; background: #f0f4f8; border-color: #e0eaf2; }
    .check-dot:not(.future):not(.done):active { transform: scale(0.85); }

    /* 진행 바 */
    .habit-prog-bar-wrap {
      padding: 0 14px 13px; margin-top: -4px;
      display: flex; align-items: center; gap: 8px;
    }
    .prog-bar-bg {
      flex: 1; height: 5px; border-radius: 99px;
      background: #e8f0f7; overflow: hidden;
    }
    .prog-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #c4b5fd, #9370db);
      transition: width 0.4s ease;
    }
    .prog-bar-pct {
      font-family: 'Nunito', sans-serif;
      font-size: 10px; font-weight: 800;
      color: var(--purple-mid);
      width: 38px; text-align: right; flex-shrink: 0;
    }

    /* 월간 뷰 */
    .month-view { display: none; margin-top: 16px; }
    .month-view.active { display: block; animation: fadeUp 0.35s ease both; }

    .month-habit-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.7);
      padding: 16px;
      margin-bottom: 14px;
    }
    .month-habit-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .month-habit-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--soft-purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .month-habit-meta { flex: 1; }
    .month-habit-name {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 800; color: var(--text-dark);
    }
    .month-habit-rate {
      font-size: 11px; color: var(--text-light); margin-top: 1px;
    }
    .month-rate-badge {
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 900; color: var(--purple-mid);
    }

    /* 월간 캘린더 도트 그리드 */
    .month-dot-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }
    .month-day-header {
      font-size: 10px; font-weight: 600;
      color: var(--text-light); text-align: center; padding-bottom: 4px;
    }

    /* 습관 추가 버튼 */
    .add-fab {
      position: fixed; bottom: 28px; right: calc(50% - 210px + 18px);
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #b39ddb, #7c4ddb);
      border: none; cursor: pointer;
      box-shadow: 0 6px 20px rgba(124,77,219,0.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: white;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
      z-index: 100;
    }
    .add-fab:active { transform: scale(0.9); }

    /* 모달 오버레이 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(20,40,60,0.45); backdrop-filter: blur(6px);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease both; }

    .modal-sheet {
      width: 100%; max-width: 420px;
      background: linear-gradient(160deg, #f0f8fe 0%, #e8f4fc 100%);
      border-radius: 28px 28px 0 0;
      padding: 24px 22px 40px;
      animation: slideUp 0.3s cubic-bezier(.34,1.2,.64,1) both;
      max-height: 92dvh; overflow-y: auto;
    }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 99px;
      background: #c8dce8; margin: 0 auto 20px;
    }
    .modal-title {
      font-family: 'Nunito', sans-serif;
      font-size: 20px; font-weight: 900;
      color: var(--text-dark); margin-bottom: 20px;
    }

    /* 폼 */
    .form-label {
      font-size: 12px; font-weight: 700;
      color: var(--text-mid); letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 8px;
      display: block;
    }
    .form-group { margin-bottom: 18px; }
    .form-input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(79,174,224,0.2);
      border-radius: var(--radius-sm);
      background: white; font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark); outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--purple-mid); }

    /* 아이콘 피커 */
    .icon-picker-grid {
      display: grid; grid-template-columns: repeat(8, 1fr);
      gap: 6px; max-height: 220px; overflow-y: auto;
      padding: 4px 2px;
    }
    .icon-option {
      width: 100%; aspect-ratio: 1;
      border-radius: 10px; border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer;
      background: white;
      transition: all 0.15s;
      -webkit-user-select: none; user-select: none;
    }
    .icon-option:active { transform: scale(0.85); }
    .icon-option.selected {
      border-color: var(--purple-mid);
      background: var(--soft-purple);
      box-shadow: 0 2px 8px rgba(147,112,219,0.3);
    }

    /* 목표 타입 선택 */
    .goal-type-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .goal-type-btn {
      padding: 10px 6px; border-radius: var(--radius-sm);
      border: 1.5px solid rgba(79,174,224,0.2);
      background: white; cursor: pointer;
      font-size: 11px; font-weight: 700; color: var(--text-mid);
      text-align: center; line-height: 1.4;
      transition: all 0.15s;
    }
    .goal-type-btn.selected {
      border-color: var(--purple-mid); background: var(--soft-purple);
      color: var(--purple-dark);
    }
    .goal-type-btn .type-emoji { font-size: 18px; display: block; margin-bottom: 4px; }

    /* 목표 수치 입력 */
    .goal-num-row {
      display: flex; align-items: center; gap: 10px; margin-top: 12px;
    }
    .num-input {
      width: 80px; padding: 10px 14px;
      border: 1.5px solid rgba(79,174,224,0.2);
      border-radius: var(--radius-sm); background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 800; color: var(--text-dark);
      text-align: center; outline: none;
    }
    .num-input:focus { border-color: var(--purple-mid); }
    .num-unit {
      font-size: 13px; color: var(--text-mid); font-weight: 600;
    }
    .num-unit-input {
      flex: 1; padding: 10px 14px;
      border: 1.5px solid rgba(79,174,224,0.2);
      border-radius: var(--radius-sm); background: white;
      font-size: 14px; color: var(--text-dark); outline: none;
    }
    .num-unit-input:focus { border-color: var(--purple-mid); }

    /* 저장 버튼 */
    .save-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #b39ddb, #7c4ddb);
      border: none; border-radius: var(--radius-sm);
      color: white; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 16px rgba(124,77,219,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .save-btn:active { transform: scale(0.97); box-shadow: none; }

    /* 빈 상태 */
    .empty-state {
      text-align: center; padding: 48px 20px;
      animation: fadeUp 0.4s 0.2s ease both;
    }
    .empty-state .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state p { font-size: 14px; color: var(--text-light); line-height: 1.7; }

    /* 로딩 */
    .loading-wrap {
      text-align: center; padding: 40px;
      color: var(--text-light); font-size: 13px;
    }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #dde8f0;
      border-top-color: var(--purple-mid);
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

    /* 삭제/수정/순서 버튼 */
    .habit-row-header .del-btn,
    .habit-row-header .edit-btn,
    .habit-row-header .drag-handle {
      background: none; border: none; font-size: 15px;
      cursor: pointer; padding: 4px 5px;
      border-radius: 8px; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; flex-shrink: 0;
    }
    .habit-row-header .del-btn { color: #c8d8e4; }
    .habit-row-header .del-btn:hover { background: #fee2e2; color: #ef4444; }
    .habit-row-header .edit-btn { color: #b0c8d8; font-size: 13px; }
    .habit-row-header .edit-btn:hover { background: var(--soft-purple); color: var(--purple-mid); }
    .habit-row-header .drag-handle {
      cursor: grab; color: #c8d8e4; flex-direction: column; gap: 3px;
    }
    .habit-row-header .drag-handle:active { cursor: grabbing; color: var(--purple-mid); }
    .drag-handle-lines { display: flex; flex-direction: column; gap: 3px; pointer-events: none; }
    .drag-handle-lines span { display: block; width: 16px; height: 2px; border-radius: 2px; background: currentColor; }

    /* 드래그 중인 카드 */
    .habit-row.dragging {
      opacity: 0.4; transform: scale(0.98);
      box-shadow: none; transition: none;
    }
    .habit-row.drag-over {
      border-color: var(--purple-mid);
      box-shadow: 0 0 0 2px rgba(147,112,219,0.3);
    }

    /* 배터리 셀 (월간) */
    .month-dot {
      width: 100%; aspect-ratio: 1;
      border-radius: 6px;
      position: relative; overflow: hidden;
      display: flex; align-items: flex-end; justify-content: center;
      cursor: default;
      transition: all 0.15s;
    }
    .month-dot-label {
      position: relative; z-index: 2;
      font-size: 9px; font-weight: 700;
      line-height: 1; padding-bottom: 2px;
      color: var(--text-mid);
    }
    .month-dot-fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(180deg, #c4b5fd, #9370db);
      transition: height 0.3s ease;
    }
    .month-dot.empty { background: transparent; cursor: default; }
    .month-dot.future { background: #f0f4f8; cursor: default; opacity: 0.45; }
    .month-dot.miss { background: #f0f4f8; }
    .month-dot.miss .month-dot-label { color: var(--text-light); }
    .month-dot.today-dot { box-shadow: 0 0 0 2px var(--purple-mid); }
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px; margin-bottom: 4px;
      animation: fadeUp 0.35s ease both;
    }
    .month-nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: none; background: white;
      box-shadow: 0 2px 8px rgba(79,174,224,0.12);
      font-size: 16px; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .month-nav-label {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--text-mid);
    }

    @media (max-width: 400px) {
      .icon-picker-grid { grid-template-columns: repeat(7, 1fr); }
    }
  </style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<div class="container">
  <header>
    <div class="header-top">
      <a href="index.html" class="back-btn">← 홈</a>
      <div class="header-title-wrap">
        <h1 class="page-title">습관 <span>트래커</span></h1>
      </div>
      <!-- 오른쪽 균형용 여백 -->
      <div style="width:60px;flex-shrink:0;"></div>
    </div>
    <p class="page-subtitle">작은 반복이 큰 변화를 만듭니다.</p>
  </header>

  <!-- 주/월 탭 -->
  <div class="view-tabs">
    <button class="tab-btn active" id="tab-week" onclick="switchTab('week')">📅 이번 주</button>
    <button class="tab-btn" id="tab-month" onclick="switchTab('month')">📆 이번 달</button>
  </div>

  <!-- 주간 뷰 -->
  <div id="view-week">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-label" id="week-label">로딩중...</span>
      <button class="week-nav-btn" onclick="shiftWeek(1)">›</button>
    </div>

    <div class="week-days" id="week-days-header"></div>

    <div class="habits-list" id="week-habits-list">
      <div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>

  <!-- 월간 뷰 -->
  <div id="view-month" style="display:none;">
    <div class="month-nav">
      <button class="month-nav-btn" onclick="shiftMonth(-1)">‹</button>
      <span class="month-nav-label" id="month-label">로딩중...</span>
      <button class="month-nav-btn" onclick="shiftMonth(1)">›</button>
    </div>
    <div id="month-habits-list" class="month-view active">
      <div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="add-fab" onclick="openModal()" title="습관 추가">＋</button>

<!-- 추가 모달 -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">

async function sbFetch(method, body, params = '') {
  const url = `${SUPABASE_URL}/rest/v1/${TABLE}${params}`;
  const res = await fetch(url, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function buildIconPicker() {

// ─── 데이터 저장 ──────────────────────────────────────────
async function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) { alert('습관 이름을 입력해주세요.'); return; }
  const num = parseInt(document.getElementById('goal-num').value);
  if (isNaN(num) || num < 1) { alert('목표 수치를 입력해주세요.'); return; }
  if (selectedGoalType === 'weekly' && (num < 1 || num > 7)) {
    alert('주 N회는 1~7 사이 숫자만 입력 가능해요.'); return;
  }
  let daysPerWeek = 7;
  if (selectedGoalType === 'daily_count' || selectedGoalType === 'daily_amount') {
    const dpw = parseInt(document.getElementById('goal-days-per-week').value);
    if (isNaN(dpw) || dpw < 1 || dpw > 7) { alert('주 며칠 실천할지 1~7 사이로 입력해주세요.'); return; }
    daysPerWeek = dpw;
  }
  const customUnit = document.getElementById('goal-unit-custom').value.trim() || '';

  if (editingHabitId) {
    // 수정 모드
    const def = habitDefs.find(d => d.data.habit_id === editingHabitId);
    if (!def) return;
    const updatedData = { ...def.data, name, icon: selectedIcon, goal_type: selectedGoalType, goal_value: num, goal_unit: customUnit, days_per_week: daysPerWeek };
    try {
      await sbFetch('PATCH', { data: updatedData }, `?id=eq.${def.id}`);
      closeModal(); await loadAll();
    } catch(e) { alert('수정 실패: ' + e.message); }
    return;
  }

  // 신규 모드
  const maxOrder = habitDefs.reduce((mx, d) => Math.max(mx, d.data.sort_order || 0), 0);
  const habitId = 'h_' + Date.now();
  const data = {
    habit_id: habitId, name, icon: selectedIcon,
    goal_type: selectedGoalType, goal_value: num,
    goal_unit: customUnit, days_per_week: daysPerWeek,
    sort_order: maxOrder + 1,
    created_at: new Date().toISOString()
  };
  try {
    await sbFetch('POST', { type: 'habit_def', log_date: todayStr(), data });
    closeModal(); await loadAll();
  } catch(e) { alert('저장 실패: ' + e.message); }
}

// ─── 순서 이동 (드래그) ──────────────────────────────────
async function moveHabit(habitId, dir) {
  const idx = habitDefs.findIndex(d => d.data.habit_id === habitId);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= habitDefs.length) return;
  const a = habitDefs[idx], b = habitDefs[swapIdx];
  const aOrder = a.data.sort_order ?? idx, bOrder = b.data.sort_order ?? swapIdx;
  try {
    await sbFetch('PATCH', { data: { ...a.data, sort_order: bOrder } }, `?id=eq.${a.id}`);
    await sbFetch('PATCH', { data: { ...b.data, sort_order: aOrder } }, `?id=eq.${b.id}`);
    await loadAll();
  } catch(e) { console.error(e); }
}

// ─── 드래그 앤 드롭 순서 변경 ────────────────────────────
let dragState = null; // { habitId, startY, clone, origEl }

function initDragHandles() {
  document.getElementById('week-habits-list').addEventListener('touchstart', onDragTouchStart, { passive: false });
  document.getElementById('week-habits-list').addEventListener('mousedown', onDragMouseDown);
}

function getHabitRow(el) {
  return el.closest('.habit-row');
}

function getHandle(el) {
  return el.closest('.drag-handle');
}

// ── 터치 ──
function onDragTouchStart(e) {
  const handle = getHandle(e.target);
  if (!handle) return;
  e.preventDefault();
  const row = handle.closest('.habit-row');
  if (!row) return;
  startDrag(row, e.touches[0].clientY);

  document.addEventListener('touchmove', onDragTouchMove, { passive: false });
  document.addEventListener('touchend', onDragTouchEnd, { once: true });
}

function onDragTouchMove(e) {
  if (!dragState) return;
  e.preventDefault();
  moveDrag(e.touches[0].clientY);
}

function onDragTouchEnd() {
  document.removeEventListener('touchmove', onDragTouchMove);
  endDrag();
}

// ── 마우스 ──
function onDragMouseDown(e) {
  const handle = getHandle(e.target);
  if (!handle) return;
  const row = handle.closest('.habit-row');
  if (!row) return;
  startDrag(row, e.clientY);

  document.addEventListener('mousemove', onDragMouseMove);
  document.addEventListener('mouseup', onDragMouseUp, { once: true });
}

function onDragMouseMove(e) {
  if (!dragState) return;
  moveDrag(e.clientY);
}

function onDragMouseUp() {
  document.removeEventListener('mousemove', onDragMouseMove);
  endDrag();
}

// ── 공통 드래그 로직 ──
function startDrag(row, clientY) {
  const habitId = row.dataset.habitId;
  row.classList.add('dragging');

  // 유령 클론 생성
  const rect = row.getBoundingClientRect();
  const clone = row.cloneNode(true);
  clone.style.cssText = `
    position: fixed; z-index: 999; pointer-events: none;
    width: ${rect.width}px; left: ${rect.left}px; top: ${rect.top}px;
    opacity: 0.85; box-shadow: 0 12px 32px rgba(147,112,219,0.35);
    transform: scale(1.02); border-radius: 14px;
    background: rgba(255,255,255,0.95);
    transition: none;
  `;
  document.body.appendChild(clone);

  dragState = { habitId, startY: clientY, cloneTop: rect.top, clone, origEl: row };
}

function moveDrag(clientY) {
  if (!dragState) return;
  const dy = clientY - dragState.startY;
  dragState.clone.style.top = (dragState.cloneTop + dy) + 'px';

  // 어느 row 위에 있는지 감지
  const list = document.getElementById('week-habits-list');
  const rows = [...list.querySelectorAll('.habit-row:not(.dragging)')];
  let overRow = null;
  for (const r of rows) {
    const rect = r.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    if (clientY >= rect.top && clientY <= rect.bottom) { overRow = r; break; }
  }
  rows.forEach(r => r.classList.remove('drag-over'));
  if (overRow) overRow.classList.add('drag-over');
}

async function endDrag() {
  if (!dragState) return;
  const { habitId, clone, origEl } = dragState;
  clone.remove();
  origEl.classList.remove('dragging');

  const list = document.getElementById('week-habits-list');
  const overRow = list.querySelector('.habit-row.drag-over');
  if (overRow) {
    overRow.classList.remove('drag-over');
    const targetId = overRow.dataset.habitId;
    if (targetId && targetId !== habitId) {
      await swapHabits(habitId, targetId);
    }
  }
  dragState = null;
}

async function swapHabits(idA, idB) {
  const a = habitDefs.find(d => d.data.habit_id === idA);
  const b = habitDefs.find(d => d.data.habit_id === idB);
  if (!a || !b) return;
  const aOrder = a.data.sort_order ?? 0;
  const bOrder = b.data.sort_order ?? 0;
  try {
    await sbFetch('PATCH', { data: { ...a.data, sort_order: bOrder } }, `?id=eq.${a.id}`);
    await sbFetch('PATCH', { data: { ...b.data, sort_order: aOrder } }, `?id=eq.${b.id}`);
    await loadAll();
  } catch(e) { console.error(e); }
}

// ─── 날짜 유틸 ────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function dateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }

const DAY_NAMES = ['일','월','화','수','목','금','토'];

// 주 오프셋 (0 = 이번 주)
let weekOffset = 0;
let monthOffset = 0;

function getWeekDates(offset = 0) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay(); // 0=일
  const monday = addDays(today, -dow + (dow === 0 ? -6 : 1) + offset * 7);
  return Array.from({length:7}, (_,i) => addDays(monday, i));
}

function shiftWeek(dir) {
  if (dir > 0 && weekOffset >= 0) return; // 이번 주 이후로는 이동 불가
  weekOffset += dir;
  renderWeek();
}
function shiftMonth(dir) { monthOffset += dir; renderMonth(); }

// ─── 전체 데이터 로드 ─────────────────────────────────────
let habitDefs = [];
let habitLogs = [];  // type=habit_log

async function loadAll() {
  try {
    const rows = await sbFetch('GET', null,
      `?type=in.("habit_def","habit_log")&order=created_at.asc&select=*`
    );
    habitDefs = (rows || []).filter(r => r.type === 'habit_def')
      .reduce((acc, r) => {
        // deduplicate by habit_id, keep latest definition
        const id = r.data.habit_id;
        if (!acc[id] || r.id > acc[id].id) acc[id] = r;
        return acc;
      }, {});
    habitDefs = Object.values(habitDefs).filter(r => !r.data.deleted)
      .sort((a, b) => (a.data.sort_order ?? 999) - (b.data.sort_order ?? 999));

    habitLogs = (rows || []).filter(r => r.type === 'habit_log');
    renderWeek();
    renderMonth();
  } catch(e) {
    console.error(e);
    document.getElementById('week-habits-list').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><p>연결 오류: Supabase URL/KEY를 확인해주세요.</p></div>`;
  }
}

// ─── 로그 토글 ────────────────────────────────────────────
async function toggleLog(habitId, dateS) {
  const def = habitDefs.find(d => d.data.habit_id === habitId);
  if (!def) return;
  const h = def.data;
  const existing = habitLogs.find(l => l.data.habit_id === habitId && l.log_date === dateS);
  const currentVal = existing ? (existing.data.value || 1) : 0;

  let nextVal;
  if (h.goal_type === 'daily_count') {
    // 0 → 1 → 2 → ... → goal_value → 0
    nextVal = currentVal >= h.goal_value ? 0 : currentVal + 1;
  } else if (h.goal_type === 'daily_amount') {
    // 0 → 25 → 50 → 75 → 100 → 0 (퍼센트)
    const steps = [0, 25, 50, 75, 100];
    const idx = steps.indexOf(currentVal);
    nextVal = steps[(idx + 1) % steps.length];
  } else {
    // weekly: 0 → 1 → 0
    nextVal = currentVal >= 1 ? 0 : 1;
  }

  if (existing) {
    if (nextVal === 0) {
      await sbFetch('DELETE', null, `?id=eq.${existing.id}`);
      habitLogs = habitLogs.filter(l => l.id !== existing.id);
    } else {
      const updated = { ...existing, data: { ...existing.data, value: nextVal } };
      await sbFetch('PATCH', { data: updated.data }, `?id=eq.${existing.id}`);
      const idx = habitLogs.findIndex(l => l.id === existing.id);
      if (idx >= 0) habitLogs[idx] = updated;
    }
  } else if (nextVal > 0) {
    const body = {
      type: 'habit_log',
      log_date: dateS,
      data: { habit_id: habitId, done: true, value: nextVal, ts: new Date().toISOString() }
    };
    const saved = await sbFetch('POST', body);
    if (saved && saved[0]) habitLogs.push(saved[0]);
  }
  renderWeek();
  renderMonth();
}

// ─── 주간 렌더 ────────────────────────────────────────────
function renderWeek() {
  const dates = getWeekDates(weekOffset);
  const today = new Date(); today.setHours(0,0,0,0);

  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-label').textContent =
    `${fmt(dates[0])} – ${fmt(dates[6])}`;

  // 미래 이동 버튼 비활성화 스타일
  const nextBtn = document.querySelector('.week-nav-btn:last-child');
  if (nextBtn) {
    nextBtn.style.opacity = weekOffset >= 0 ? '0.25' : '1';
    nextBtn.style.pointerEvents = weekOffset >= 0 ? 'none' : '';
  }

  const hdr = document.getElementById('week-days-header');
  hdr.innerHTML = dates.map(d => {
    const isToday = dateStr(d) === dateStr(today);
    return `<div class="day-col">
      <div class="day-name">${DAY_NAMES[d.getDay()]}</div>
      <div class="day-num${isToday ? ' today' : ''}">${d.getDate()}</div>
    </div>`;
  }).join('');

  const list = document.getElementById('week-habits-list');

  if (habitDefs.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✅</div>
      <p>아직 등록된 습관이 없어요.<br>아래 <strong>＋</strong> 버튼으로 추가해보세요!</p>
    </div>`;
    return;
  }

  list.innerHTML = habitDefs.map(def => {
    const h = def.data;

    // 총 달성 계산
    let doneCount = 0;
    if (h.goal_type === 'daily_count') {
      dates.forEach(d => {
        const log = habitLogs.find(l => l.data.habit_id === h.habit_id && l.log_date === dateStr(d));
        if (log) doneCount += (log.data.value || 1);
      });
    } else if (h.goal_type === 'daily_amount') {
      // partial 포함: 100% 기준으로 비율 합산
      dates.forEach(d => {
        const log = habitLogs.find(l => l.data.habit_id === h.habit_id && l.log_date === dateStr(d));
        if (log) doneCount += Math.min(100, log.data.value || 0) / 100;
      });
    } else {
      doneCount = dates.filter(d => {
        return habitLogs.some(l => l.data.habit_id === h.habit_id && l.log_date === dateStr(d));
      }).length;
    }

    const target = goalWeeklyTarget(h);

    const checks = dates.map(d => {
      const ds = dateStr(d);
      const isFuture = d > today;
      const clickable = !isFuture;

      const log = habitLogs.find(l => l.data.habit_id === h.habit_id && l.log_date === ds);
      const val = log ? (log.data.value || 1) : 0;

      let dotContent = '';
      let dotCls = 'check-dot';
      if (isFuture) {
        dotCls += ' future';
      } else if (h.goal_type === 'daily_count') {
        const cpd = clicksPerDay(h);
        if (val === 0) { /* empty */ }
        else if (val >= cpd) { dotCls += ' done'; dotContent = '✓'; }
        else {
          dotCls += ' partial';
          dotContent = `<span style="font-size:9px;font-weight:800;color:var(--purple-mid)">${val}/${cpd}</span>`;
        }
      } else if (h.goal_type === 'daily_amount') {
        if (val === 0) { /* empty */ }
        else if (val >= 100) { dotCls += ' done'; dotContent = '✓'; }
        else {
          dotCls += ' partial';
          dotContent = `<svg width="28" height="28" viewBox="0 0 28 28" style="position:absolute;top:0;left:0;pointer-events:none">
            <circle cx="14" cy="14" r="11" fill="none" stroke="#e0d0f8" stroke-width="2.5"/>
            <circle cx="14" cy="14" r="11" fill="none" stroke="var(--purple-mid)" stroke-width="2.5"
              stroke-dasharray="${2*Math.PI*11}" stroke-dashoffset="${2*Math.PI*11*(1-val/100)}"
              stroke-linecap="round" transform="rotate(-90 14 14)"/>
          </svg><span style="font-size:9px;font-weight:800;color:var(--purple-mid);position:relative">${val}%</span>`;
        }
      } else {
        if (val >= 1) { dotCls += ' done'; dotContent = '✓'; }
      }

      const click = clickable ? `onclick="toggleLog('${h.habit_id}','${ds}')"` : '';
      return `<div class="check-cell"><div class="${dotCls}" ${click} style="position:relative;display:flex;align-items:center;justify-content:center">${dotContent}</div></div>`;
    }).join('');

    const pctRaw = Math.min(100, doneCount / target * 100);
    const pctStr = (pctRaw * 10) % 10 === 0
      ? Math.round(pctRaw) + '%'
      : pctRaw.toFixed(1) + '%';
    return `<div class="habit-row" id="row-${h.habit_id}" data-habit-id="${h.habit_id}">
      <div class="habit-row-header">
        <div class="drag-handle" data-habit-id="${h.habit_id}" title="꾹 누르고 드래그">
          <div class="drag-handle-lines"><span></span><span></span><span></span></div>
        </div>
        <div class="habit-icon-badge">${h.icon}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-goal-label">${goalLabel(h)}</div>
        </div>
        <div class="habit-progress-text">${doneCount}/${target}</div>
        <button class="edit-btn" onclick="openEditModal('${h.habit_id}')" title="수정">✏️</button>
        <button class="del-btn" onclick="deleteHabit('${h.habit_id}')" title="삭제">🗑️</button>
      </div>
      <div class="habit-week-checks">${checks}</div>
      <div class="habit-prog-bar-wrap">
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" style="width:${pctRaw}%"></div>
        </div>
        <div class="prog-bar-pct">${pctStr}</div>
      </div>
    </div>`;
  }).join('');
}

function goalWeeklyTarget(h) {
  const dpw = h.days_per_week || 7;
  if (h.goal_type === 'weekly') return h.goal_value;
  if (h.goal_type === 'daily_count') return dpw * h.goal_value; // e.g. 5일 * 2회 = 10
  if (h.goal_type === 'daily_amount') return dpw; // N량 → dpw칸
  return 7;
}

function clicksPerDay(h) {
  if (h.goal_type === 'daily_count') return h.goal_value;
  return 1;
}

function goalLabel(h) {
  const dpw = h.days_per_week || 7;
  if (h.goal_type === 'weekly') return `주 ${h.goal_value}회 목표`;
  if (h.goal_type === 'daily_count') return `하루 ${h.goal_value}회 · 주 ${dpw}일 목표`;
  return `하루 ${h.goal_value}${h.goal_unit || ''} · 주 ${dpw}일 목표`;
}


// ─── 하루 달성도(0~100%) 계산 헬퍼 ──────────────────────
function dayAchievePct(h, ds) {
  const log = habitLogs.find(l => l.data.habit_id === h.habit_id && l.log_date === ds);
  const val = log ? (log.data.value || 0) : 0;
  if (h.goal_type === 'weekly') return val >= 1 ? 100 : 0;
  if (h.goal_type === 'daily_count') return val === 0 ? 0 : Math.min(100, Math.round(val / h.goal_value * 100));
  if (h.goal_type === 'daily_amount') return val; // 이미 0~100 퍼센트로 저장
  return 0;
}

// 10단계 근사 (0,10,20,...,100)
function toStep10(pct) { return Math.round(pct / 10) * 10; }

// ─── 월간 렌더 ────────────────────────────────────────────
function renderMonth() {
  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const y = base.getFullYear(), m = base.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const firstDow = new Date(y, m, 1).getDay();

  document.getElementById('month-label').textContent = `${y}년 ${m+1}월`;

  const list = document.getElementById('month-habits-list');

  if (habitDefs.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📆</div><p>등록된 습관이 없어요.</p></div>`;
    return;
  }

  list.innerHTML = habitDefs.map(def => {
    const h = def.data;
    let totalPctSum = 0, totalDays = 0;

    const dayHeaders = DAY_NAMES.map(n => `<div class="month-day-header">${n}</div>`).join('');
    const blanks = Array.from({length: firstDow}, () => `<div class="month-dot empty"></div>`).join('');

    const dayCells = Array.from({length: daysInMonth}, (_, i) => {
      const day = i + 1;
      const d = new Date(y, m, day); d.setHours(0,0,0,0);
      const ds = dateStr(d);
      const isFuture = d > today;
      const isToday = ds === dateStr(today);

      if (!isFuture) {
        totalDays++;
        const pct = dayAchievePct(h, ds);
        totalPctSum += pct;
      }

      if (isFuture) {
        return `<div class="month-dot future" style="cursor:default"><div class="month-dot-label" style="color:var(--text-light)">${day}</div></div>`;
      }

      const rawPct = dayAchievePct(h, ds);
      const stepPct = toStep10(rawPct);
      // 클릭 없음 — 달력은 읽기 전용

      // 배터리 fill 높이 = stepPct%
      const fillHeight = stepPct;
      // 날짜 텍스트 색: 채워진 정도에 따라
      const labelColor = stepPct >= 60 ? 'white' : (stepPct > 0 ? 'var(--purple-dark)' : 'var(--text-light)');
      let cls = 'month-dot' + (rawPct === 0 ? ' miss' : '') + (isToday ? ' today-dot' : '');

      return `<div class="${cls}" style="cursor:default">
        <div class="month-dot-fill" style="height:${fillHeight}%"></div>
        <div class="month-dot-label" style="color:${labelColor}">${day}</div>
      </div>`;
    }).join('');

    // 전체 달성률: 각 날 달성도 합 / (지나간 날수 * 100) — 소수점 1자리
    const overallRaw = totalDays > 0 ? totalPctSum / (totalDays * 100) * 100 : 0;
    const overallPct = overallRaw % 1 < 0.05 && overallRaw % 1 > -0.05
      ? Math.round(overallRaw) + '%'
      : overallRaw.toFixed(1) + '%';

    return `<div class="month-habit-card">
      <div class="month-habit-header">
        <div class="month-habit-icon">${h.icon}</div>
        <div class="month-habit-meta">
          <div class="month-habit-name">${h.name}</div>
          <div class="month-habit-rate">${goalLabel(h)}</div>
        </div>
        <div class="month-rate-badge">${overallPct}</div>
      </div>
      <div class="month-dot-grid">
        ${dayHeaders}${blanks}${dayCells}
      </div>
    </div>`;
  }).join('');
}

// ─── 습관 삭제 ────────────────────────────────────────────
async function deleteHabit(habitId) {
  if (!confirm('이 습관을 삭제할까요?')) return;
  // habit_def 행 data에 deleted:true 업데이트 방식 대신 직접 삭제
  const def = habitDefs.find(d => d.data.habit_id === habitId);
  if (!def) return;
  await sbFetch('DELETE', null, `?id=eq.${def.id}`);
  await loadAll();
}

// ─── 탭 전환 ─────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-week').classList.toggle('active', tab === 'week');
  document.getElementById('tab-month').classList.toggle('active', tab === 'month');
  document.getElementById('view-week').style.display = tab === 'week' ? '' : 'none';
  document.getElementById('view-month').style.display = tab === 'month' ? '' : 'none';
}

// ─── 초기 로드 ────────────────────────────────────────────
loadAll();
initDragHandles();
</script>
