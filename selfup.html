<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>나를 채우는 시간</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Gowun+Dodum&display=swap');

  :root {
    --bg: #f5f0e8;
    --green-deep: #3d6b4f;
    --green-mid: #5a8a6a;
    --green-light: #a8c5a0;
    --text: #3a3228;
    --text-soft: #7a6a5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Gowun Dodum', serif;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    user-select: none;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(90,138,106,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(61,107,79,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(201,185,154,0.12) 0%, transparent 80%);
    pointer-events: none; z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; width: 100%; height: 100%;
    padding: 20px 16px 12px;
  }

  /* ─── 격려문구 버튼 ─── */
  .msg-edit-btn {
    position: fixed; top: 14px; right: 14px; z-index: 300;
    background: rgba(90,138,106,0.15);
    border: 1.5px solid rgba(90,138,106,0.35);
    border-radius: 20px; padding: 6px 13px;
    font-family: 'Gowun Dodum', serif; font-size: 12px;
    color: var(--green-deep); cursor: pointer;
    letter-spacing: 0.06em; transition: background 0.2s;
  }
  .msg-edit-btn:active { background: rgba(90,138,106,0.28); }

  /* ─── 문구 패널 ─── */
  .msg-panel {
    position: fixed; top: 0; right: 0;
    width: min(340px, 94vw); height: 100%;
    background: rgba(248,244,238,0.97);
    backdrop-filter: blur(12px);
    z-index: 500;
    display: flex; flex-direction: column;
    padding: 56px 20px 24px;
    transform: translateX(110%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -8px 0 32px rgba(61,107,79,0.12);
  }
  .msg-panel.open { transform: translateX(0); }

  .msg-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .msg-panel-header h3 {
    font-family: 'Nanum Myeongjo', serif; font-size: 16px;
    color: var(--green-deep); letter-spacing: 0.1em;
  }
  .panel-close {
    background: none; border: none; font-size: 20px;
    color: var(--text-soft); cursor: pointer; padding: 4px;
  }

  .msg-list {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 14px; padding-right: 2px;
  }
  .msg-list::-webkit-scrollbar { width: 4px; }
  .msg-list::-webkit-scrollbar-thumb { background: rgba(90,138,106,0.3); border-radius: 4px; }

  .msg-item {
    display: flex; align-items: center; gap: 8px;
    background: rgba(90,138,106,0.08);
    border: 1px solid rgba(90,138,106,0.18);
    border-radius: 10px; padding: 10px 12px;
    transition: background 0.15s;
  }
  .msg-item-text {
    flex: 1; font-size: 13px; color: var(--text);
    letter-spacing: 0.04em; line-height: 1.5;
    background: none; border: none; outline: none;
    font-family: 'Gowun Dodum', serif;
    resize: none; overflow: hidden; min-height: 20px;
  }
  .msg-item-text.editing {
    background: rgba(255,255,255,0.7);
    border-radius: 6px; padding: 4px 6px;
  }
  .msg-item-del {
    background: none; border: none;
    color: rgba(150,120,100,0.5); font-size: 18px;
    cursor: pointer; padding: 2px 4px; flex-shrink: 0;
    transition: color 0.15s;
  }
  .msg-item-del:hover { color: #c0705a; }

  .msg-add-row { display: flex; gap: 8px; }
  .msg-add-input {
    flex: 1; border: 1.5px solid rgba(90,138,106,0.3);
    border-radius: 10px; padding: 9px 12px;
    font-family: 'Gowun Dodum', serif; font-size: 13px;
    color: var(--text); background: rgba(255,255,255,0.7);
    outline: none; letter-spacing: 0.04em;
  }
  .msg-add-input:focus { border-color: rgba(90,138,106,0.6); }
  .msg-add-input::placeholder { color: rgba(122,106,90,0.5); }
  .msg-add-btn {
    background: var(--green-deep); color: #fff;
    border: none; border-radius: 10px; padding: 9px 14px;
    font-family: 'Gowun Dodum', serif; font-size: 13px;
    cursor: pointer; transition: background 0.15s;
  }
  .msg-add-btn:active { background: var(--green-mid); }
  .msg-panel-empty {
    font-size: 12px; color: var(--text-soft);
    text-align: center; padding: 20px 0; letter-spacing: 0.06em;
    white-space: pre-line; line-height: 1.8;
  }

  .panel-backdrop {
    position: fixed; inset: 0; z-index: 499; display: none;
  }
  .panel-backdrop.open { display: block; }

  /* ─── Title ─── */
  .title-area {
    text-align: center; margin-bottom: 8px;
    animation: fadeDown 1.2s ease both;
  }
  .title-area h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(18px, 5vw, 24px);
    color: var(--green-deep); letter-spacing: 0.12em; font-weight: 700;
  }
  .title-area p {
    font-size: clamp(11px, 3vw, 13px);
    color: var(--text-soft); margin-top: 4px; letter-spacing: 0.06em;
  }

  /* ─── Count badge ─── */
  .count-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(90,138,106,0.12);
    border: 1px solid rgba(90,138,106,0.25);
    border-radius: 20px; padding: 5px 14px;
    margin-bottom: 10px; animation: fadeDown 1.4s ease both;
  }
  .count-badge .num {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(14px, 4vw, 18px);
    color: var(--green-deep); font-weight: 700;
    min-width: 24px; text-align: center;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .count-badge .num.pop { transform: scale(1.4); }
  .count-badge .label {
    font-size: clamp(10px, 3vw, 12px);
    color: var(--text-soft); letter-spacing: 0.05em;
  }

  /* ─── Jar ─── */
  .jar-wrap {
    position: relative; flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%; max-height: calc(100vh - 200px);
    animation: fadeUp 1.0s ease both;
  }
  .jar-svg-container {
    position: relative; cursor: pointer;
    filter: drop-shadow(0 12px 32px rgba(61,107,79,0.18)) drop-shadow(0 4px 8px rgba(61,107,79,0.10));
    transition: filter 0.3s ease; touch-action: none;
  }
  .jar-svg-container:active {
    filter: drop-shadow(0 8px 20px rgba(61,107,79,0.22)) drop-shadow(0 2px 6px rgba(61,107,79,0.14));
  }
  .jar-svg-container svg { width: min(260px, 68vw); height: auto; display: block; }

  #marbleCanvas {
    position: absolute; left: 0; top: 0;
    width: 100%; height: 100%; pointer-events: none;
  }
  #overflowCanvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
  #sparkCanvas    { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; }

  /* ─── Effects ─── */
  .ripple {
    position: fixed; border-radius: 50%;
    background: radial-gradient(circle, rgba(168,197,160,0.6) 0%, rgba(90,138,106,0.2) 50%, transparent 70%);
    transform: scale(0); animation: rippleAnim 0.7s ease-out forwards;
    pointer-events: none; z-index: 98;
  }
  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

  .float-marble {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 101;
    animation: floatUp 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes floatUp {
    0%   { transform: scale(0) translateY(0); opacity: 1; }
    40%  { transform: scale(1.1) translateY(-30px); opacity: 1; }
    100% { transform: scale(0.7) translateY(-90px); opacity: 0; }
  }

  /* ─── Message ─── */
  .msg-area {
    min-height: 36px; display: flex; align-items: center; justify-content: center;
    margin-top: 6px; animation: fadeDown 1.6s ease both;
  }
  .msg {
    font-size: clamp(12px, 3.5vw, 14px); color: var(--green-mid);
    letter-spacing: 0.08em; opacity: 0; transform: translateY(6px);
    transition: opacity 0.5s ease, transform 0.5s ease; text-align: center;
  }
  .msg.show { opacity: 1; transform: translateY(0); }

  /* ─── Fill bar ─── */
  .fill-bar {
    width: min(200px, 55vw); height: 4px;
    background: rgba(201,185,154,0.35); border-radius: 4px;
    margin-top: 10px; overflow: hidden; animation: fadeDown 1.8s ease both;
  }
  .fill-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--green-light), var(--green-mid));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); width: 0%;
  }

  /* ─── Overflow ─── */
  .overflow-msg {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(245,240,232,0.0); opacity: 0; pointer-events: none;
    transition: opacity 1s ease, background 1s ease;
  }
  .overflow-msg.show { opacity: 1; pointer-events: auto; background: rgba(245,240,232,0.85); }
  .overflow-msg h2 {
    font-family: 'Nanum Myeongjo', serif; font-size: clamp(22px, 6vw, 32px);
    color: var(--green-deep); letter-spacing: 0.15em; margin-bottom: 12px;
  }
  .overflow-msg p {
    font-size: clamp(13px, 3.5vw, 16px); color: var(--text-soft);
    letter-spacing: 0.08em; line-height: 1.8; text-align: center; padding: 0 32px;
  }
  .overflow-msg .reset-btn {
    margin-top: 28px; padding: 12px 32px;
    background: var(--green-deep); color: #fff; border: none; border-radius: 30px;
    font-family: 'Gowun Dodum', serif; font-size: clamp(13px, 3.5vw, 15px);
    letter-spacing: 0.12em; cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .overflow-msg .reset-btn:active { transform: scale(0.96); background: var(--green-mid); }

  /* ─── Jar glow ─── */
  .jar-svg-container.full { animation: jarGlow 2s ease-in-out infinite; }
  @keyframes jarGlow {
    0%,100% { filter: drop-shadow(0 12px 32px rgba(61,107,79,0.18)) drop-shadow(0 4px 8px rgba(90,138,106,0.15)); }
    50%     { filter: drop-shadow(0 16px 40px rgba(90,138,106,0.40)) drop-shadow(0 4px 12px rgba(168,197,160,0.35)); }
  }

  /* ─── Animations ─── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Audio unlock splash ─── */
  #audioUnlock {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(245,240,232,0.97);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  #audioUnlock h2 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(20px, 5vw, 28px);
    color: var(--green-deep); letter-spacing: 0.15em;
  }
  #audioUnlock p {
    font-size: clamp(12px, 3.5vw, 15px); color: var(--text-soft);
    letter-spacing: 0.08em; text-align: center; line-height: 1.8;
  }
  #audioUnlock .start-btn {
    padding: 14px 44px;
    background: var(--green-deep); color: #fff;
    border: none; border-radius: 30px;
    font-family: 'Gowun Dodum', serif; font-size: clamp(14px, 4vw, 16px);
    letter-spacing: 0.14em; cursor: pointer;
    box-shadow: 0 4px 20px rgba(61,107,79,0.25);
    transition: transform 0.15s ease;
  }
  #audioUnlock .start-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<!-- Audio unlock splash — 첫 클릭부터 소리 나도록 여기서 AudioContext 초기화 -->
<div id="audioUnlock">
  <h2>나를 채우는 시간</h2>
  <p>오늘도 잘 버텼어요 🌱<br>하나씩, 천천히 채워가요</p>
  <button class="start-btn" id="startBtn">시작하기</button>
</div>

<div class="page">
  <div class="title-area">
    <h1>나를 채우는 시간</h1>
    <p>오늘도 잘 버텼어요 · 하나씩 채워가요</p>
  </div>

  <div class="count-badge">
    <span class="num" id="countNum">0</span>
    <span class="label">/ <span id="maxCount">50</span> 개</span>
  </div>

  <div class="jar-wrap">
    <div class="jar-svg-container" id="jarContainer">
      <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg" id="jarSvg">
        <defs>
          <clipPath id="jarClip">
            <path d="M 55 44 Q 52 44 50 48 L 42 68 Q 30 80 28 100 L 24 200 Q 22 230 28 248 Q 34 264 50 268 L 150 268 Q 166 264 172 248 Q 178 230 176 200 L 172 100 Q 170 80 158 68 L 150 48 Q 148 44 145 44 Z"/>
          </clipPath>
          <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
            <stop offset="30%"  stop-color="rgba(255,255,255,0.08)"/>
            <stop offset="70%"  stop-color="rgba(255,255,255,0.04)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.45)"/>
          </linearGradient>
          <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="rgba(90,138,106,0.20)"/>
            <stop offset="100%" stop-color="rgba(61,107,79,0.32)"/>
          </linearGradient>
          <linearGradient id="neckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.6)"/>
            <stop offset="50%"  stop-color="rgba(255,255,255,0.05)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.5)"/>
          </linearGradient>
        </defs>

        <ellipse cx="100" cy="276" rx="55" ry="8" fill="rgba(61,107,79,0.12)"/>
        <g clip-path="url(#jarClip)">
          <rect id="fillRect" x="24" y="268" width="152" height="0" fill="url(#fillGrad)" opacity="0.9"/>
        </g>
        <path d="M 55 44 Q 52 44 50 48 L 42 68 Q 30 80 28 100 L 24 200 Q 22 230 28 248 Q 34 264 50 268 L 150 268 Q 166 264 172 248 Q 178 230 176 200 L 172 100 Q 170 80 158 68 L 150 48 Q 148 44 145 44 Z"
              fill="rgba(220,235,225,0.18)" stroke="rgba(90,138,106,0.50)" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M 55 44 Q 52 44 50 48 L 42 68 Q 30 80 28 100 L 24 200 Q 22 230 28 248 Q 34 264 50 268 L 150 268 Q 166 264 172 248 Q 178 230 176 200 L 172 100 Q 170 80 158 68 L 150 48 Q 148 44 145 44 Z"
              fill="url(#glassGrad)" opacity="0.7"/>
        <path d="M 38 90 Q 36 140 37 200 Q 37.5 230 40 245" stroke="rgba(255,255,255,0.55)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 162 90 Q 164 140 163 200 Q 162.5 230 160 245" stroke="rgba(255,255,255,0.30)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="50" y="38" width="100" height="8" rx="4" fill="rgba(200,220,210,0.5)" stroke="rgba(90,138,106,0.45)" stroke-width="2"/>
        <rect x="50" y="38" width="100" height="8" rx="4" fill="url(#neckGrad)" opacity="0.8"/>
        <rect x="46" y="26" width="108" height="16" rx="5" fill="rgba(90,138,106,0.55)" stroke="rgba(61,107,79,0.7)" stroke-width="2"/>
        <rect x="52" y="30" width="96" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
      </svg>
      <canvas id="marbleCanvas"></canvas>
    </div>
  </div>

  <div class="msg-area">
    <p class="msg" id="msgText"></p>
  </div>

  <div class="fill-bar">
    <div class="fill-bar-inner" id="fillBarInner"></div>
  </div>
</div>

<div class="overflow-msg" id="overflowMsg">
  <h2>가득 찼어요 🌊</h2>
  <p>당신이 스스로에게 준<br>소중한 순간들이에요.<br><br>이제 흘러넘칠 만큼<br>충분히 채웠어요.</p>
  <button class="reset-btn" id="resetBtn">다시 채워나가기</button>
</div>

<canvas id="sparkCanvas"></canvas>
<canvas id="overflowCanvas"></canvas>

<!-- 격려문구 버튼 -->
<button class="msg-edit-btn" id="msgEditBtn">✏️ 격려문구</button>

<!-- 패널 backdrop -->
<div class="panel-backdrop" id="panelBackdrop"></div>

<!-- 문구 패널 -->
<div class="msg-panel" id="msgPanel">
  <div class="msg-panel-header">
    <h3>격려문구 편집</h3>
    <button class="panel-close" id="panelClose">✕</button>
  </div>
  <div class="msg-list" id="msgList"></div>
  <div class="msg-add-row">
    <input class="msg-add-input" id="msgAddInput" placeholder="새 문구를 입력해요..." maxlength="40"/>
    <button class="msg-add-btn" id="msgAddBtn">추가</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const MAX = 50;

const MARBLE_COLORS = [
  { base: '#7ec8a0', light: '#d4f0e8', dark: '#3d8a68' }, // mint
  { base: '#70b8e0', light: '#c8e8f8', dark: '#3070b0' }, // sky
  { base: '#a8d870', light: '#e8f4d0', dark: '#5a9830' }, // lime
  { base: '#d8c090', light: '#f0e8d8', dark: '#987840' }, // sand
  { base: '#88c8e0', light: '#d8f0f8', dark: '#4890b8' }, // aqua
  { base: '#c890d8', light: '#f0d8f8', dark: '#8840b0' }, // lavender
  { base: '#e89898', light: '#fce0d8', dark: '#b85050' }, // rose
  { base: '#f0c070', light: '#fcecd0', dark: '#b88030' }, // gold
  { base: '#98d0c0', light: '#d0f0e8', dark: '#409080' }, // seafoam
  { base: '#b0b8e8', light: '#dce0f8', dark: '#5060b0' }, // periwinkle
  { base: '#d0e890', light: '#eef8d0', dark: '#78a030' }, // yellow-green
  { base: '#f0b090', light: '#fce4d8', dark: '#c06838' }, // peach
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let count = Math.min(parseInt(localStorage.getItem('selfup_count') || '0'), MAX);

// 사용자 격려문구
function loadMessages() {
  try {
    const s = JSON.parse(localStorage.getItem('selfup_messages') || 'null');
    if (Array.isArray(s) && s.length > 0) return s;
  } catch(e) {}
  return ['오늘도 잘 버텼어요', '당신은 충분해요', '하나씩, 천천히', '스스로를 믿어요', '잘 하고 있어요'];
}
function saveMessages() { localStorage.setItem('selfup_messages', JSON.stringify(userMessages)); }
let userMessages = loadMessages();

// 구슬별 색 인덱스 고정 (클릭 효과와 일치시킴)
let colorSeeds = JSON.parse(localStorage.getItem('selfup_seeds') || '[]');
// 구슬별 크기 seed (0~1)
let sizeSeeds  = JSON.parse(localStorage.getItem('selfup_sizeseeds') || '[]');

function ensureSeeds(n) {
  while (colorSeeds.length < n) colorSeeds.push(Math.floor(Math.random() * MARBLE_COLORS.length));
  while (sizeSeeds.length  < n) sizeSeeds.push(Math.random());
  colorSeeds.length = n;
  sizeSeeds.length  = n;
  localStorage.setItem('selfup_seeds',     JSON.stringify(colorSeeds));
  localStorage.setItem('selfup_sizeseeds', JSON.stringify(sizeSeeds));
}
ensureSeeds(count);

// ═══════════════════════════════════════
// DOM
// ═══════════════════════════════════════
const jarContainer  = document.getElementById('jarContainer');
const marbleCanvas  = document.getElementById('marbleCanvas');
const sparkCanvas   = document.getElementById('sparkCanvas');
const overflowCanvas= document.getElementById('overflowCanvas');
const countNum      = document.getElementById('countNum');
const fillBarInner  = document.getElementById('fillBarInner');
const msgText       = document.getElementById('msgText');
const overflowMsg   = document.getElementById('overflowMsg');
const resetBtn      = document.getElementById('resetBtn');
const fillRect      = document.getElementById('fillRect');
const jarSvg        = document.getElementById('jarSvg');
const audioUnlock   = document.getElementById('audioUnlock');
const msgEditBtn    = document.getElementById('msgEditBtn');
const msgPanel      = document.getElementById('msgPanel');
const panelClose    = document.getElementById('panelClose');
const panelBackdrop = document.getElementById('panelBackdrop');
const msgList       = document.getElementById('msgList');
const msgAddInput   = document.getElementById('msgAddInput');
const msgAddBtn     = document.getElementById('msgAddBtn');

const mCtx = marbleCanvas.getContext('2d');
const sCtx = sparkCanvas.getContext('2d');
const oCtx = overflowCanvas.getContext('2d');

// ═══════════════════════════════════════
// AUDIO
// 핵심: AudioContext를 사용자 제스처(클릭) 안에서 생성 + resume
// → 시작 화면 버튼 클릭 시 초기화 → 이후 모든 playSound() 정상 작동
// ═══════════════════════════════════════
let audioCtx   = null;
let audioBuffer= null;
let audioReady = false;

async function initAudio() {
  try {
    // 반드시 사용자 제스처 내에서 new AudioContext()
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    // 무음 1샘플 재생 → 브라우저 정책 unlock 확정
    const unlock = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src    = audioCtx.createBufferSource();
    src.buffer   = unlock;
    src.connect(audioCtx.destination);
    src.start(0);

    // mp3 로드
    const res = await fetch('effect 1.mp3');
    if (!res.ok) throw new Error('mp3 not found');
    audioBuffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
    audioReady  = true;
  } catch(e) {
    console.log('Audio init:', e.message);
  }
}

function playSound() {
  if (!audioReady || !audioCtx || !audioBuffer) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {}
}

// 시작 버튼
document.getElementById('startBtn').addEventListener('click', async () => {
  await initAudio();
  audioUnlock.style.transition = 'opacity 0.5s';
  audioUnlock.style.opacity    = '0';
  setTimeout(() => audioUnlock.remove(), 550);
});

// ═══════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════
function resizeCanvases() {
  const r = jarContainer.getBoundingClientRect();
  marbleCanvas.width  = r.width;
  marbleCanvas.height = r.height;
  marbleCanvas.style.width  = r.width  + 'px';
  marbleCanvas.style.height = r.height + 'px';
  sparkCanvas.width  = overflowCanvas.width  = window.innerWidth;
  sparkCanvas.height = overflowCanvas.height = window.innerHeight;
  drawMarbles();
}
window.addEventListener('resize', () => setTimeout(resizeCanvases, 100));

// ═══════════════════════════════════════
// JAR GEOMETRY
// ═══════════════════════════════════════
function getJarBounds() {
  const rect    = jarContainer.getBoundingClientRect();
  const svgRect = jarSvg.getBoundingClientRect();
  const scaleX  = svgRect.width  / 200;
  const scaleY  = svgRect.height / 280;
  const offsetX = svgRect.left - rect.left;
  const offsetY = svgRect.top  - rect.top;
  return {
    left:   offsetX + 32  * scaleX,
    right:  offsetX + 168 * scaleX,
    top:    offsetY + 52  * scaleY,
    bottom: offsetY + 262 * scaleY,
    scaleX, scaleY, offsetX, offsetY
  };
}

// ═══════════════════════════════════════
// MARBLE LAYOUT
// 50개가 병을 꽉 채우도록:
// - 가용 폭/높이에서 cols, rowH 결정
// - 50개 ÷ cols = 행 수 → 행 수 × rowH ≈ 가용 높이
// - baseR을 이 조건으로 역산
// ═══════════════════════════════════════
let marbles = [];

function computeBaseRadius(bounds) {
  const W = bounds.right  - bounds.left;
  const H = bounds.bottom - bounds.top;
  // cols = floor(W / (2r * gap)), rows = ceil(MAX / cols)
  // rows * rowH = H  →  rows * 1.86 * 2r = H
  // cols * 2r * 1.05 = W  →  r = W / (cols * 2.1)
  // Solve: find r such that ceil(MAX / floor(W/(2.1r))) * 1.86*2r ≈ H
  // Binary search
  let lo = 2, hi = Math.min(W / 4, H / 6);
  for (let i = 0; i < 40; i++) {
    const mid  = (lo + hi) / 2;
    const cols = Math.max(1, Math.floor(W / (mid * 2.1)));
    const rows = Math.ceil(MAX / cols);
    const neededH = rows * mid * 1.86 + mid;
    if (neededH < H) lo = mid;
    else             hi = mid;
  }
  return (lo + hi) / 2;
}

function generateMarblePositions(n) {
  if (n === 0) return [];
  const bounds = getJarBounds();
  ensureSeeds(n);

  const W      = bounds.right - bounds.left;
  const baseR  = computeBaseRadius(bounds);
  const minR   = baseR * 0.72;
  const maxR   = baseR * 1.00;
  const cols   = Math.max(1, Math.floor(W / (baseR * 2.1)));
  const rowH   = baseR * 1.86;

  const result = [];
  for (let i = 0; i < n; i++) {
    const r   = minR + sizeSeeds[i] * (maxR - minR);
    const col = i % cols;
    const row = Math.floor(i / cols);

    // 홀수 행 hexagonal offset
    const hexOff = (row % 2) * baseR * 0.88;
    // 작은 jitter (seed 재활용)
    const jx = (sizeSeeds[(i * 7 + 3) % sizeSeeds.length] - 0.5) * r * 0.30;
    const jy = (sizeSeeds[(i * 5 + 1) % sizeSeeds.length] - 0.5) * r * 0.22;

    const x = bounds.left + baseR * 0.6 + col * (baseR * 2.1) + hexOff + jx;
    const y = bounds.bottom - baseR * 0.5 - row * rowH + jy;

    result.push({ x, y, r, color: MARBLE_COLORS[colorSeeds[i]] });
  }
  return result;
}

// ═══════════════════════════════════════
// DRAW MARBLE
// ═══════════════════════════════════════
function drawMarble(ctx, x, y, r, color) {
  const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.05, x, y, r);
  g.addColorStop(0,    color.light);
  g.addColorStop(0.45, color.base);
  g.addColorStop(1,    color.dark);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();

  ctx.beginPath(); ctx.arc(x - r*0.28, y - r*0.28, r*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fill();

  ctx.beginPath(); ctx.arc(x + r*0.18, y - r*0.18, r*0.10, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();

  const sg = ctx.createRadialGradient(x, y + r*0.5, 0, x, y + r*0.5, r*0.6);
  sg.addColorStop(0, 'rgba(0,0,0,0.18)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(x, y + r*0.5, r*0.6, 0, Math.PI*2);
  ctx.fillStyle = sg; ctx.fill();
}

function drawMarbles() {
  if (!marbleCanvas.width) return;
  mCtx.clearRect(0, 0, marbleCanvas.width, marbleCanvas.height);
  marbles = generateMarblePositions(count);
  marbles.forEach(m => drawMarble(mCtx, m.x, m.y, m.r, m.color));
  updateFillRect();
}

function updateFillRect() {
  const pct    = count / MAX;
  const bounds = getJarBounds();
  const totalH = bounds.bottom - bounds.top;
  const fillH  = totalH * pct;
  const fillY  = bounds.bottom - fillH;
  const svgRect= jarSvg.getBoundingClientRect();
  const cRect  = jarContainer.getBoundingClientRect();
  const sY     = 280 / svgRect.height;
  fillRect.setAttribute('y',      Math.max(44, (fillY + cRect.top - svgRect.top) * sY));
  fillRect.setAttribute('height', Math.max(0,  fillH * sY));
}

// ═══════════════════════════════════════
// CLICK EFFECTS
// ═══════════════════════════════════════
function spawnRipple(cx, cy) {
  const el  = document.createElement('div');
  el.className = 'ripple';
  const sz  = 80;
  el.style.cssText = `width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// 클릭 시 보이는 구슬 = 방금 추가된 구슬의 색
function spawnFloatMarble(cx, cy, color) {
  const sz = 24 + Math.random() * 12;
  const el = document.createElement('canvas');
  el.className   = 'float-marble';
  el.width  = sz * 2; el.height = sz * 2;
  el.style.cssText = `width:${sz*2}px;height:${sz*2}px;left:${cx-sz}px;top:${cy-sz}px`;
  drawMarble(el.getContext('2d'), sz, sz, sz * 0.85, color);
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function spawnSparks(cx, cy, color) {
  const pts = [];
  for (let i = 0; i < 14; i++) {
    const a = (Math.PI*2*i/14) + Math.random()*0.4;
    const s = 2.5 + Math.random()*3.5;
    pts.push({ x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
               life:1, decay:0.035+Math.random()*0.025, r:3+Math.random()*4, c:color.base });
  }
  function anim() {
    sCtx.globalCompositeOperation = 'destination-out';
    sCtx.fillStyle = 'rgba(0,0,0,0.15)';
    sCtx.fillRect(0,0,sparkCanvas.width,sparkCanvas.height);
    sCtx.globalCompositeOperation = 'source-over';
    let alive = false;
    pts.forEach(p => {
      if (p.life <= 0) return; alive = true;
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=p.decay;
      sCtx.beginPath(); sCtx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      sCtx.fillStyle = p.c; sCtx.globalAlpha = p.life; sCtx.fill(); sCtx.globalAlpha=1;
    });
    if (alive) requestAnimationFrame(anim);
    else sCtx.clearRect(0,0,sparkCanvas.width,sparkCanvas.height);
  }
  anim();
}

// ═══════════════════════════════════════
// OVERFLOW
// ═══════════════════════════════════════
let overflowParticles = [];
let overflowAnimating = false;

function startOverflow() {
  overflowAnimating = true;
  overflowParticles = [];
  const b   = getJarBounds();
  const sr  = jarContainer.getBoundingClientRect();
  const top = sr.top + b.top;
  const W   = b.right - b.left;

  function spawnOne() {
    if (!overflowAnimating) return;
    const color = MARBLE_COLORS[Math.floor(Math.random()*MARBLE_COLORS.length)];
    overflowParticles.push({
      x: sr.left + b.left + Math.random()*W,
      y: top,
      vx:(Math.random()-0.5)*3, vy:-1-Math.random()*2,
      r:8+Math.random()*10, color, life:1
    });
    if (overflowParticles.length < 60) setTimeout(spawnOne, 60+Math.random()*80);
  }
  spawnOne();

  function anim() {
    oCtx.clearRect(0,0,overflowCanvas.width,overflowCanvas.height);
    overflowParticles.forEach(p => {
      p.vy+=0.4; p.x+=p.vx; p.y+=p.vy; p.life-=0.008;
      if (p.y > overflowCanvas.height+20) p.life=0;
      if (p.life>0) {
        oCtx.save(); oCtx.globalAlpha=Math.min(1,p.life*3);
        drawMarble(oCtx,p.x,p.y,p.r,p.color); oCtx.restore();
      }
    });
    overflowParticles = overflowParticles.filter(p=>p.life>0);
    if (overflowAnimating) requestAnimationFrame(anim);
    else oCtx.clearRect(0,0,overflowCanvas.width,overflowCanvas.height);
  }
  anim();
  setTimeout(()=>overflowMsg.classList.add('show'), 1200);
}

function stopOverflow() {
  overflowAnimating = false;
  overflowMsg.classList.remove('show');
  setTimeout(()=>oCtx.clearRect(0,0,overflowCanvas.width,overflowCanvas.height),500);
}

// ═══════════════════════════════════════
// UI UPDATE
// ═══════════════════════════════════════
function updateUI(doAnim=false) {
  countNum.textContent = count;
  if (doAnim) {
    countNum.classList.add('pop');
    setTimeout(()=>countNum.classList.remove('pop'),400);
  }
  fillBarInner.style.width = (count/MAX*100)+'%';
  jarContainer.classList.toggle('full', count>=MAX);
}

function showMessage() {
  if (!userMessages.length) return;
  const msg = userMessages[Math.floor(Math.random()*userMessages.length)];
  msgText.classList.remove('show');
  setTimeout(()=>{
    msgText.textContent = msg + ' 🌱';
    msgText.classList.add('show');
    setTimeout(()=>msgText.classList.remove('show'), 2800);
  },100);
}

// ═══════════════════════════════════════
// MAIN CLICK
// ═══════════════════════════════════════
function handleJarClick(e) {
  e.preventDefault();
  if (count >= MAX) { startOverflow(); return; }

  const cx = e.clientX || (e.touches&&e.touches[0].clientX) || window.innerWidth/2;
  const cy = e.clientY || (e.touches&&e.touches[0].clientY) || window.innerHeight/2;

  count++;
  ensureSeeds(count);
  localStorage.setItem('selfup_count', count);

  // 방금 추가된 구슬 색
  const newColor = MARBLE_COLORS[colorSeeds[count-1]];

  playSound();
  spawnRipple(cx, cy);
  spawnFloatMarble(cx, cy, newColor);  // ← 동일 색
  spawnSparks(cx, cy, newColor);
  showMessage();
  updateUI(true);
  drawMarbles();

  if (count >= MAX) setTimeout(startOverflow, 400);
}

jarContainer.addEventListener('click',      handleJarClick);
jarContainer.addEventListener('touchstart', handleJarClick, { passive: false });

// ═══════════════════════════════════════
// RESET
// ═══════════════════════════════════════
resetBtn.addEventListener('click', () => {
  stopOverflow();
  count = 0; colorSeeds=[]; sizeSeeds=[];
  localStorage.setItem('selfup_count',     0);
  localStorage.setItem('selfup_seeds',     '[]');
  localStorage.setItem('selfup_sizeseeds', '[]');
  updateUI(false);
  setTimeout(drawMarbles, 300);
});

// ═══════════════════════════════════════
// 격려문구 패널
// ═══════════════════════════════════════
function renderMsgList() {
  msgList.innerHTML = '';
  if (!userMessages.length) {
    const p = document.createElement('p');
    p.className   = 'msg-panel-empty';
    p.textContent = '아직 문구가 없어요.\n아래에서 추가해보세요 🌱';
    msgList.appendChild(p); return;
  }
  userMessages.forEach((msg, idx) => {
    const item = document.createElement('div');
    item.className = 'msg-item';

    const ta = document.createElement('textarea');
    ta.className = 'msg-item-text';
    ta.value = msg; ta.rows = 1; ta.readOnly = true;

    ta.addEventListener('click', ()=>{
      ta.readOnly = false; ta.classList.add('editing');
      ta.focus(); ta.selectionStart = ta.value.length;
    });
    ta.addEventListener('blur', ()=>{
      const v = ta.value.trim();
      if (v) userMessages[idx] = v;
      else   userMessages.splice(idx,1);
      saveMessages(); ta.readOnly=true; ta.classList.remove('editing');
      renderMsgList();
    });
    ta.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();ta.blur();} });
    ta.addEventListener('input',   ()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; });

    const del = document.createElement('button');
    del.className='msg-item-del'; del.textContent='×';
    del.addEventListener('click', ()=>{ userMessages.splice(idx,1); saveMessages(); renderMsgList(); });

    item.append(ta, del);
    msgList.appendChild(item);
  });
}

function openPanel()  { renderMsgList(); msgPanel.classList.add('open'); panelBackdrop.classList.add('open'); }
function closePanel() { msgPanel.classList.remove('open'); panelBackdrop.classList.remove('open'); }

msgEditBtn   .addEventListener('click', openPanel);
panelClose   .addEventListener('click', closePanel);
panelBackdrop.addEventListener('click', closePanel);

msgAddBtn.addEventListener('click', ()=>{
  const v = msgAddInput.value.trim();
  if (!v) return;
  userMessages.push(v); saveMessages(); msgAddInput.value='';
  renderMsgList();
  setTimeout(()=>msgList.scrollTop=msgList.scrollHeight, 50);
});
msgAddInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();msgAddBtn.click();} });

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.addEventListener('load', ()=>{
  setTimeout(()=>{ resizeCanvases(); updateUI(false); if(count>=MAX) jarContainer.classList.add('full'); }, 200);
});
setTimeout(()=>{ if(!marbleCanvas.width){ resizeCanvases(); updateUI(false); } }, 500);
</script>
