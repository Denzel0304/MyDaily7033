<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>칼로리 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #c8f542;
    --accent2: #42f5a8;
    --accent3: #f54242;
    --text: #f0f0f0;
    --text2: #888899;
    --text3: #555566;
    --tab-h: 72px;
    --header-h: 60px;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    height: var(--header-h);
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
  }
  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .header-date {
    font-size: 12px;
    color: var(--text2);
    font-weight: 300;
  }

  /* ── TABS ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    height: var(--tab-h);
    background: rgba(19,19,26,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    background: none; border: none; cursor: pointer;
    color: var(--text3);
    transition: color 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    font-weight: 500;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-icon { font-size: 22px; line-height: 1; }

  /* ── PAGES ── */
  .page {
    display: none;
    padding-top: calc(var(--header-h) + 12px);
    padding-bottom: calc(var(--tab-h) + 16px);
    padding-left: 16px;
    padding-right: 16px;
    min-height: 100dvh;
  }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
  }

  /* ── TODAY SUMMARY ── */
  .summary-ring {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 16px;
  }
  .ring-wrap {
    position: relative; width: 110px; height: 110px; flex-shrink: 0;
  }
  .ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }
  .ring-fill {
    fill: none; stroke: var(--accent); stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 283;
    stroke-dashoffset: 283;
    transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ring-kcal {
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .ring-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

  .summary-stats { flex: 1; }
  .stat-row { margin-bottom: 10px; }
  .stat-name { font-size: 11px; color: var(--text2); margin-bottom: 3px; display: flex; justify-content: space-between; }
  .stat-name span { color: var(--text); font-weight: 500; }
  .stat-bar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .bar-carb { background: #f5c542; }
  .bar-prot { background: var(--accent2); }
  .bar-fat  { background: var(--accent3); }

  .goal-row {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text2);
    margin-top: 4px;
  }
  .goal-row strong { color: var(--text); }

  /* ── MEAL SECTION ── */
  .meal-section-title {
    font-size: 13px; font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 18px 0 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .meal-kcal-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(200,245,66,0.1);
    padding: 2px 8px; border-radius: 20px;
  }

  .meal-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .meal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .meal-info { flex: 1; min-width: 0; }
  .meal-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .meal-kcal { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent); font-weight: 700; }
  .meal-del {
    background: none; border: none; color: var(--text3);
    font-size: 18px; cursor: pointer; padding: 4px;
    transition: color 0.2s;
  }
  .meal-del:hover { color: var(--accent3); }

  .empty-state {
    text-align: center; padding: 32px 0;
    color: var(--text3); font-size: 13px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(var(--tab-h) + 20px);
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-size: 28px;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(200,245,66,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 90;
    font-weight: 700;
    line-height: 1;
  }
  .fab:active { transform: scale(0.92); }

  /* ── SEARCH MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: block; }

  .modal {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--surface);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    border-top: 1px solid var(--border);
    max-height: 90dvh;
    display: flex; flex-direction: column;
    z-index: 201;
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(100%); }
    to   { transform: translateX(-50%) translateY(0); }
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    padding: 16px 20px 12px;
    font-size: 16px; font-weight: 700;
  }
  .modal-meal-select {
    display: flex; gap: 8px;
    padding: 0 20px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .modal-meal-select::-webkit-scrollbar { display:none; }
  .meal-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .meal-chip.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  .search-wrap {
    display: flex; gap: 8px;
    padding: 0 16px 12px;
  }
  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .search-btn {
    padding: 0 18px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }

  .api-key-wrap {
    padding: 0 16px 8px;
  }
  .api-key-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    outline: none;
  }
  .api-key-input::placeholder { color: var(--text3); }
  .api-key-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }

  .search-results {
    flex: 1; overflow-y: auto;
    padding: 0 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .result-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .result-item:active { opacity: 0.6; }
  .result-icon {
    width: 40px; height: 40px;
    background: var(--surface2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 14px; font-weight: 500; }
  .result-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .result-kcal {
    font-family: 'Space Mono', monospace;
    font-size: 15px; color: var(--accent); font-weight: 700;
  }

  .loading-spinner {
    display: none;
    text-align: center; padding: 32px;
    color: var(--text2); font-size: 13px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ADD FORM ── */
  .add-form {
    display: none;
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  .add-form.open { display: block; }
  .selected-food {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .selected-food-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .selected-food-nutri {
    display: flex; gap: 12px;
  }
  .nutri-chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface);
    color: var(--text2);
  }
  .amount-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .amount-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Space Mono', monospace;
    outline: none;
  }
  .amount-unit { color: var(--text2); font-size: 14px; }
  .add-confirm-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── STATS PAGE ── */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-card-val {
    font-family: 'Space Mono', monospace;
    font-size: 24px; font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card-label { font-size: 11px; color: var(--text2); }

  .weekly-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; padding: 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar-body {
    width: 100%;
    background: var(--surface2);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    transition: height 0.8s cubic-bezier(.4,0,.2,1);
  }
  .bar-body-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--accent);
    border-radius: 4px;
    opacity: 0.85;
    transition: height 0.8s cubic-bezier(.4,0,.2,1);
  }
  .bar-body.today .bar-body-fill { background: var(--accent); opacity: 1; }
  .bar-day { font-size: 10px; color: var(--text3); }

  /* ── SETTINGS PAGE ── */
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 14px; }
  .settings-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .settings-val { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent); }
  .settings-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    width: 80px; text-align: right;
    outline: none;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 20px 0 8px;
  }

  /* ── NUTRITION DETAIL ── */
  .nutri-detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .nutri-detail-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
  }
  .nutri-detail-name { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .nutri-detail-val {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700;
    color: var(--text);
  }
  .nutri-detail-val span { font-size: 11px; color: var(--text3); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + 80px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
    max-width: calc(100% - 40px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">KCAL.KR</div>
  <div class="header-date" id="headerDate"></div>
</header>

<!-- PAGE: HOME -->
<div class="page active" id="page-home">

  <!-- 오늘 요약 -->
  <div class="card">
    <div class="summary-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="45"/>
          <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="45"/>
        </svg>
        <div class="ring-center">
          <div class="ring-kcal" id="totalKcal">0</div>
          <div class="ring-label">kcal</div>
        </div>
      </div>
      <div class="summary-stats">
        <div class="stat-row">
          <div class="stat-name">탄수화물 <span id="carbVal">0g</span></div>
          <div class="stat-bar"><div class="stat-bar-fill bar-carb" id="carbBar" style="width:0%"></div></div>
        </div>
        <div class="stat-row">
          <div class="stat-name">단백질 <span id="protVal">0g</span></div>
          <div class="stat-bar"><div class="stat-bar-fill bar-prot" id="protBar" style="width:0%"></div></div>
        </div>
        <div class="stat-row">
          <div class="stat-name">지방 <span id="fatVal">0g</span></div>
          <div class="stat-bar"><div class="stat-bar-fill bar-fat" id="fatBar" style="width:0%"></div></div>
        </div>
        <div class="goal-row">
          <span>목표 <strong id="goalDisplay">2000</strong> kcal</span>
          <span id="remainKcal" style="color:var(--accent2)">남은 2000</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 식사별 목록 -->
  <div id="mealSections"></div>

</div>

<!-- PAGE: STATS -->
<div class="page" id="page-stats">
  <p class="section-title">7일 칼로리</p>
  <div class="card">
    <div class="weekly-chart" id="weeklyChart"></div>
  </div>

  <p class="section-title">오늘 영양소</p>
  <div class="nutri-detail-grid" id="nutriDetailGrid"></div>

  <p class="section-title">주간 평균</p>
  <div class="stats-grid" id="statsGrid"></div>
</div>

<!-- PAGE: SETTINGS -->
<div class="page" id="page-settings">
  <p class="section-title">목표 설정</p>
  <div class="card">
    <div class="settings-row">
      <div>
        <div class="settings-label">일일 칼로리 목표</div>
        <div class="settings-sub">kcal</div>
      </div>
      <input class="settings-input" id="goalInput" type="number" value="2000">
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-label">탄수화물 목표</div>
        <div class="settings-sub">g</div>
      </div>
      <input class="settings-input" id="carbGoalInput" type="number" value="260">
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-label">단백질 목표</div>
        <div class="settings-sub">g</div>
      </div>
      <input class="settings-input" id="protGoalInput" type="number" value="60">
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-label">지방 목표</div>
        <div class="settings-sub">g</div>
      </div>
      <input class="settings-input" id="fatGoalInput" type="number" value="55">
    </div>
  </div>

  <p class="section-title">API 설정</p>
  <div class="card">
    <div class="settings-row">
      <div style="flex:1">
        <div class="settings-label">data.go.kr API 키</div>
        <div class="settings-sub">식품영양성분 서비스 키</div>
        <input class="search-input" id="apiKeyInput" placeholder="발급받은 서비스키 입력" style="margin-top:8px;font-size:12px;font-family:'Space Mono',monospace;width:100%">
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" style="font-size:12px;color:var(--text2)">
        키 발급: <a href="https://www.data.go.kr/data/15100071/openapi.do" target="_blank" style="color:var(--accent);text-decoration:none;">data.go.kr 바로가기 →</a>
      </div>
    </div>
    <div style="padding-top:4px;">
      <button onclick="saveSettings()" style="width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">저장</button>
    </div>
  </div>

  <p class="section-title">데이터</p>
  <div class="card">
    <div class="settings-row">
      <div class="settings-label">오늘 기록 초기화</div>
      <button onclick="clearToday()" style="padding:6px 14px;background:none;border:1px solid var(--accent3);color:var(--accent3);border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">초기화</button>
    </div>
    <div class="settings-row">
      <div class="settings-label">전체 기록 삭제</div>
      <button onclick="clearAll()" style="padding:6px 14px;background:none;border:1px solid var(--text3);color:var(--text3);border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">전체삭제</button>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('home',this)">
    <span class="tab-icon">🏠</span>식단
  </button>
  <button class="tab-btn" onclick="switchTab('stats',this)">
    <span class="tab-icon">📊</span>통계
  </button>
  <button class="tab-btn" onclick="switchTab('settings',this)">
    <span class="tab-icon">⚙️</span>설정
  </button>
</nav>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <div class="modal-header">음식 추가</div>

  <div class="modal-meal-select" id="mealChips">
    <button class="meal-chip active" data-meal="breakfast" onclick="selectMeal(this)">🌅 아침</button>
    <button class="meal-chip" data-meal="lunch" onclick="selectMeal(this)">☀️ 점심</button>
    <button class="meal-chip" data-meal="dinner" onclick="selectMeal(this)">🌙 저녁</button>
    <button class="meal-chip" data-meal="snack" onclick="selectMeal(this)">🍪 간식</button>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="음식 이름 검색..." autocomplete="off"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>

  <div class="loading-spinner" id="loadingSpinner">
    <div class="spinner"></div>
    <div>검색 중...</div>
  </div>

  <div class="search-results" id="searchResults">
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      음식 이름을 검색해보세요<br>
      <span style="font-size:11px;color:var(--text3);margin-top:4px;display:block">
        예: 비빔밥, 삼겹살, 아이스크림
      </span>
    </div>
  </div>

  <div class="add-form" id="addForm">
    <div class="selected-food" id="selectedFoodInfo"></div>
    <div class="amount-row">
      <input class="amount-input" id="amountInput" type="number" value="100" min="1" max="9999">
      <span class="amount-unit">g</span>
    </div>
    <button class="add-confirm-btn" onclick="addFood()">식단에 추가</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const todayKey = () => 'meals_' + new Date().toISOString().slice(0,10);
const MEALS = { breakfast:'🌅 아침', lunch:'☀️ 점심', dinner:'🌙 저녁', snack:'🍪 간식' };
const MEAL_COLORS = { breakfast:'#f5c542', lunch:'#42f5a8', dinner:'#7a8fff', snack:'#f572a8' };

let state = {
  apiKey: localStorage.getItem('apiKey') || '',
  goal: +localStorage.getItem('goal') || 2000,
  carbGoal: +localStorage.getItem('carbGoal') || 260,
  protGoal: +localStorage.getItem('protGoal') || 60,
  fatGoal: +localStorage.getItem('fatGoal') || 55,
  currentMeal: 'breakfast',
  selectedFood: null,
};

function getMeals() {
  try { return JSON.parse(localStorage.getItem(todayKey()) || '[]'); } catch { return []; }
}
function saveMeals(meals) {
  localStorage.setItem(todayKey(), JSON.stringify(meals));
}

// ── INIT ──
window.onload = () => {
  // date header
  const d = new Date();
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short' });

  // load settings
  document.getElementById('goalInput').value = state.goal;
  document.getElementById('carbGoalInput').value = state.carbGoal;
  document.getElementById('protGoalInput').value = state.fatGoal;
  document.getElementById('fatGoalInput').value = state.fatGoal;
  document.getElementById('apiKeyInput').value = state.apiKey;

  renderAll();
};

function renderAll() {
  renderHome();
  renderStats();
}

// ── HOME ──
function renderHome() {
  const meals = getMeals();
  let totalKcal=0, totalCarb=0, totalProt=0, totalFat=0;
  meals.forEach(m => {
    totalKcal += m.kcal; totalCarb += m.carb;
    totalProt += m.prot; totalFat += m.fat;
  });

  document.getElementById('totalKcal').textContent = Math.round(totalKcal);
  document.getElementById('carbVal').textContent = Math.round(totalCarb) + 'g';
  document.getElementById('protVal').textContent = Math.round(totalProt) + 'g';
  document.getElementById('fatVal').textContent = Math.round(totalFat) + 'g';

  const goal = state.goal;
  const pct = Math.min(totalKcal / goal, 1);
  const circ = 283;
  document.getElementById('ringFill').style.strokeDashoffset = circ - circ * pct;

  document.getElementById('goalDisplay').textContent = goal;
  const remain = goal - Math.round(totalKcal);
  const remainEl = document.getElementById('remainKcal');
  if (remain < 0) {
    remainEl.textContent = '초과 ' + Math.abs(remain);
    remainEl.style.color = 'var(--accent3)';
  } else {
    remainEl.textContent = '남은 ' + remain;
    remainEl.style.color = 'var(--accent2)';
  }

  document.getElementById('carbBar').style.width = Math.min(totalCarb/state.carbGoal*100,100) + '%';
  document.getElementById('protBar').style.width = Math.min(totalProt/state.protGoal*100,100) + '%';
  document.getElementById('fatBar').style.width = Math.min(totalFat/state.fatGoal*100,100) + '%';

  // meal sections
  const container = document.getElementById('mealSections');
  container.innerHTML = '';
  Object.keys(MEALS).forEach(mealType => {
    const items = meals.filter(m => m.meal === mealType);
    const sectionKcal = items.reduce((a,b) => a + b.kcal, 0);

    const sec = document.createElement('div');
    sec.innerHTML = `
      <div class="meal-section-title">
        ${MEALS[mealType]}
        ${items.length ? `<span class="meal-kcal-badge">${Math.round(sectionKcal)} kcal</span>` : ''}
      </div>
    `;

    if (!items.length) {
      sec.innerHTML += `<div style="text-align:center;padding:10px 0 4px;color:var(--text3);font-size:12px;">아직 없어요 +</div>`;
    } else {
      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'meal-item';
        el.innerHTML = `
          <div class="meal-dot" style="background:${MEAL_COLORS[mealType]}"></div>
          <div class="meal-info">
            <div class="meal-name">${item.name}</div>
            <div class="meal-meta">${item.amount}g · 탄${Math.round(item.carb)}g 단${Math.round(item.prot)}g 지${Math.round(item.fat)}g</div>
          </div>
          <div class="meal-kcal">${Math.round(item.kcal)}</div>
          <button class="meal-del" onclick="deleteItem('${mealType}',${idx})">×</button>
        `;
        sec.appendChild(el);
      });
    }
    container.appendChild(sec);
  });
}

function deleteItem(mealType, localIdx) {
  const meals = getMeals();
  const filtered = meals.filter(m => m.meal === mealType);
  const target = filtered[localIdx];
  const globalIdx = meals.indexOf(target);
  if (globalIdx > -1) { meals.splice(globalIdx, 1); saveMeals(meals); }
  renderAll(); showToast('삭제했어요');
}

// ── STATS ──
function renderStats() {
  const meals = getMeals();
  let kcal=0, carb=0, prot=0, fat=0, sodium=0, sugar=0;
  meals.forEach(m => {
    kcal += m.kcal; carb += m.carb; prot += m.prot;
    fat += m.fat; sodium += (m.sodium||0); sugar += (m.sugar||0);
  });

  // Nutrient detail
  document.getElementById('nutriDetailGrid').innerHTML = [
    ['칼로리','kcal', Math.round(kcal), '#c8f542'],
    ['탄수화물','g', Math.round(carb), '#f5c542'],
    ['단백질','g', Math.round(prot), '#42f5a8'],
    ['지방','g', Math.round(fat), '#f54242'],
    ['나트륨','mg', Math.round(sodium), '#7a8fff'],
    ['당류','g', Math.round(sugar), '#f572a8'],
  ].map(([name,unit,val,color]) => `
    <div class="nutri-detail-item">
      <div class="nutri-detail-name">${name}</div>
      <div class="nutri-detail-val" style="color:${color}">${val}<span>${unit}</span></div>
    </div>
  `).join('');

  // Weekly chart
  const days = ['일','월','화','수','목','금','토'];
  const today = new Date();
  const chart = document.getElementById('weeklyChart');
  chart.innerHTML = '';

  let weekData = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = 'meals_' + d.toISOString().slice(0,10);
    const ms = JSON.parse(localStorage.getItem(key)||'[]');
    const k = ms.reduce((a,b)=>a+b.kcal,0);
    weekData.push({ day: days[d.getDay()], kcal: k, isToday: i===0 });
  }
  const maxK = Math.max(...weekData.map(d=>d.kcal), state.goal);

  weekData.forEach(d => {
    const h = Math.max(d.kcal/maxK*64, d.kcal>0?4:0);
    const col = document.createElement('div');
    col.className = 'bar-col';
    col.innerHTML = `
      <div class="bar-body${d.isToday?' today':''}" style="height:64px;width:100%">
        <div class="bar-body-fill" style="height:${h}px"></div>
      </div>
      <div class="bar-day">${d.isToday?'오늘':d.day}</div>
    `;
    chart.appendChild(col);
  });

  // Stats grid
  const avg = weekData.filter(d=>d.kcal>0);
  const avgKcal = avg.length ? Math.round(avg.reduce((a,b)=>a+b.kcal,0)/avg.length) : 0;
  document.getElementById('statsGrid').innerHTML = [
    ['평균 칼로리', avgKcal+'<small style="font-size:12px">kcal</small>', '#c8f542'],
    ['오늘 칼로리', Math.round(kcal)+'<small style="font-size:12px">kcal</small>', '#42f5a8'],
    ['총 단백질', Math.round(prot)+'<small style="font-size:12px">g</small>', '#7a8fff'],
    ['식사 횟수', meals.length+'<small style="font-size:12px">회</small>', '#f5c542'],
  ].map(([label,val,color]) => `
    <div class="stat-card">
      <div class="stat-card-val" style="color:${color}">${val}</div>
      <div class="stat-card-label">${label}</div>
    </div>
  `).join('');
}

// ── TAB ──
function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fabBtn').style.display = name==='home' ? 'flex' : 'none';
  if (name==='stats') renderStats();
}

// ── MODAL ──
function openModal() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modal').style.flexDirection = 'column';
  document.getElementById('searchInput').focus();
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modal').style.display = 'none';
  document.getElementById('searchResults').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      음식 이름을 검색해보세요
    </div>`;
  document.getElementById('addForm').classList.remove('open');
  document.getElementById('searchInput').value = '';
  state.selectedFood = null;
}
function selectMeal(btn) {
  document.querySelectorAll('.meal-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  state.currentMeal = btn.dataset.meal;
}

// ── SEARCH ──
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  const apiKey = localStorage.getItem('apiKey') || state.apiKey;
  document.getElementById('loadingSpinner').style.display = 'block';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('addForm').classList.remove('open');

  try {
    let foods = [];

    if (apiKey) {
      // ── 실제 data.go.kr API 호출 ──
      const url = `https://apis.data.go.kr/1471000/FoodNtrCpntDbInfo01/getFoodNtrCpntDbInq01` +
        `?serviceKey=${encodeURIComponent(apiKey)}&pageNo=1&numOfRows=20&type=json&FOOD_NM_KR=${encodeURIComponent(query)}`;
      const res = await fetch(url);
      const json = await res.json();
      const items = json?.body?.items || [];
      foods = items.map(item => ({
        name: item.FOOD_NM_KR || item.foodNmKr || '알 수 없음',
        maker: item.MAKER_NM || item.makerNm || '',
        kcal: parseFloat(item.AMT_NUM1 || item.amtNum1 || 0),
        carb: parseFloat(item.AMT_NUM7 || item.amtNum7 || 0),
        prot: parseFloat(item.AMT_NUM3 || item.amtNum3 || 0),
        fat: parseFloat(item.AMT_NUM4 || item.amtNum4 || 0),
        sodium: parseFloat(item.AMT_NUM14 || item.amtNum14 || 0),
        sugar: parseFloat(item.AMT_NUM8 || item.amtNum8 || 0),
        per: 100,
      }));
    } else {
      // ── 목업 데이터 (API 키 없을 때) ──
      foods = MOCK_FOODS.filter(f => f.name.includes(query)).slice(0, 10);
      if (!foods.length) {
        foods = [{ name: query+'(임시)', maker:'목업', kcal:200, carb:30, prot:10, fat:8, sodium:500, sugar:5, per:100 }];
      }
    }

    renderResults(foods, !!apiKey);
  } catch (e) {
    console.error(e);
    document.getElementById('searchResults').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        검색 실패: ${e.message}<br>
        <span style="font-size:11px;color:var(--text3)">API 키를 설정에서 확인해주세요</span>
      </div>`;
  } finally {
    document.getElementById('loadingSpinner').style.display = 'none';
  }
}

function renderResults(foods, isReal) {
  const container = document.getElementById('searchResults');
  if (!foods.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div>검색 결과가 없어요</div>`;
    return;
  }
  const FOOD_ICONS = ['🍚','🍜','🥩','🐟','🥗','🍱','🥚','🧀','🍕','🍣'];
  container.innerHTML = (!isReal ? `<div style="text-align:center;font-size:11px;color:var(--text3);padding:8px 0 4px;">⚠️ 목업 데이터 · API 키 설정 필요</div>` : '') +
    foods.map((f,i) => `
    <div class="result-item" onclick="selectFood(${i})">
      <div class="result-icon">${FOOD_ICONS[i % FOOD_ICONS.length]}</div>
      <div class="result-info">
        <div class="result-name">${f.name}</div>
        <div class="result-sub">${f.maker || '100g 기준'} · 탄${Math.round(f.carb)}g 단${Math.round(f.prot)}g 지${Math.round(f.fat)}g</div>
      </div>
      <div class="result-kcal">${Math.round(f.kcal)}</div>
    </div>
  `).join('');
  // store foods in state
  state.searchResults = foods;
}

function selectFood(idx) {
  const food = state.searchResults[idx];
  state.selectedFood = food;
  document.getElementById('amountInput').value = 100;

  document.getElementById('selectedFoodInfo').innerHTML = `
    <div class="selected-food-name">${food.name}</div>
    <div class="selected-food-nutri">
      <span class="nutri-chip">열량 ${Math.round(food.kcal)}kcal</span>
      <span class="nutri-chip">탄 ${Math.round(food.carb)}g</span>
      <span class="nutri-chip">단 ${Math.round(food.prot)}g</span>
      <span class="nutri-chip">지 ${Math.round(food.fat)}g</span>
    </div>
  `;
  document.getElementById('addForm').classList.add('open');
  document.getElementById('addForm').scrollIntoView({ behavior:'smooth' });
}

function addFood() {
  const food = state.selectedFood;
  if (!food) return;
  const amount = parseFloat(document.getElementById('amountInput').value) || 100;
  const ratio = amount / 100;

  const meals = getMeals();
  meals.push({
    meal: state.currentMeal,
    name: food.name,
    amount,
    kcal: food.kcal * ratio,
    carb: food.carb * ratio,
    prot: food.prot * ratio,
    fat: food.fat * ratio,
    sodium: (food.sodium||0) * ratio,
    sugar: (food.sugar||0) * ratio,
    addedAt: Date.now(),
  });
  saveMeals(meals);
  closeModal();
  renderAll();
  showToast(`${food.name} 추가 완료! 🎉`);
}

// ── SETTINGS ──
function saveSettings() {
  state.goal = +document.getElementById('goalInput').value || 2000;
  state.carbGoal = +document.getElementById('carbGoalInput').value || 260;
  state.protGoal = +document.getElementById('protGoalInput').value || 60;
  state.fatGoal = +document.getElementById('fatGoalInput').value || 55;
  state.apiKey = document.getElementById('apiKeyInput').value.trim();

  localStorage.setItem('goal', state.goal);
  localStorage.setItem('carbGoal', state.carbGoal);
  localStorage.setItem('protGoal', state.protGoal);
  localStorage.setItem('fatGoal', state.fatGoal);
  localStorage.setItem('apiKey', state.apiKey);

  renderAll();
  showToast('설정 저장 완료 ✓');
}

function clearToday() {
  if (!confirm('오늘 기록을 초기화할까요?')) return;
  localStorage.removeItem(todayKey());
  renderAll();
  showToast('오늘 기록 초기화');
}
function clearAll() {
  if (!confirm('전체 기록을 삭제할까요?')) return;
  Object.keys(localStorage).filter(k=>k.startsWith('meals_')).forEach(k=>localStorage.removeItem(k));
  renderAll();
  showToast('전체 삭제 완료');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── MOCK DATA ──
const MOCK_FOODS = [
  { name:'비빔밥', maker:'한식', kcal:570, carb:97, prot:20, fat:14, sodium:1070, sugar:8, per:100 },
  { name:'삼겹살', maker:'고기류', kcal:393, carb:0, prot:17, fat:36, sodium:60, sugar:0, per:100 },
  { name:'된장찌개', maker:'한식', kcal:52, carb:4, prot:4, fat:2, sodium:800, sugar:1, per:100 },
  { name:'김치찌개', maker:'한식', kcal:55, carb:3, prot:4, fat:3, sodium:900, sugar:1, per:100 },
  { name:'치킨(후라이드)', maker:'패스트푸드', kcal:290, carb:12, prot:22, fat:18, sodium:620, sugar:1, per:100 },
  { name:'불고기', maker:'한식', kcal:187, carb:8, prot:17, fat:10, sodium:500, sugar:4, per:100 },
  { name:'흰쌀밥', maker:'곡류', kcal:148, carb:32, prot:3, fat:0, sodium:0, sugar:0, per:100 },
  { name:'라면(신라면)', maker:'면류', kcal:500, carb:80, prot:10, fat:16, sodium:1900, sugar:2, per:100 },
  { name:'달걀 (계란)', maker:'달걀류', kcal:143, carb:1, prot:13, fat:10, sodium:140, sugar:1, per:100 },
  { name:'두부', maker:'콩류', kcal:84, carb:2, prot:9, fat:5, sodium:10, sugar:0, per:100 },
  { name:'바나나', maker:'과일', kcal:93, carb:23, prot:1, fat:0, sodium:1, sugar:14, per:100 },
  { name:'사과', maker:'과일', kcal:57, carb:15, prot:0, fat:0, sodium:0, sugar:12, per:100 },
  { name:'고구마', maker:'서류', kcal:120, carb:28, prot:2, fat:0, sodium:28, sugar:6, per:100 },
  { name:'요구르트(플레인)', maker:'유제품', kcal:61, carb:7, prot:5, fat:2, sodium:70, sugar:7, per:100 },
  { name:'아이스크림(바닐라)', maker:'빙과류', kcal:207, carb:24, prot:4, fat:11, sodium:90, sugar:20, per:100 },
];
</script>
