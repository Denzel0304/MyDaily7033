<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>KCAL.KR</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surf:#13131a; --surf2:#1c1c27; --border:#2a2a3a;
  --acc:#c8f542; --acc2:#42f5a8; --acc3:#f54242;
  --txt:#f0f0f0; --txt2:#888899; --txt3:#555566;
  --hh:60px; --th:68px; --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--txt);
  max-width:430px;margin:0 auto;
  overflow-x:hidden;
}

/* HEADER */
#header{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:var(--hh);
  background:rgba(10,10,15,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:50;
}
#header-title{font-family:'Space Mono',monospace;font-size:18px;color:var(--acc)}
#header-date{font-size:12px;color:var(--txt2)}

/* TAB BAR */
#tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:var(--th);
  background:rgba(19,19,26,.97);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;z-index:50;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--txt3);font-size:10px;font-weight:500;
  font-family:'Noto Sans KR',sans-serif;
  transition:color .2s;
}
.tab .ico{font-size:22px;line-height:1}
.tab.on{color:var(--acc)}

/* PAGES */
.pg{
  display:none;
  padding-top:calc(var(--hh)+14px);
  padding-bottom:calc(var(--th)+20px);
  padding-left:16px;padding-right:16px;
  min-height:100dvh;
}
.pg.on{display:block}

/* CARD */
.card{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;margin-bottom:12px;
}

/* RING */
.ring-row{display:flex;align-items:center;gap:18px;margin-bottom:12px}
.ring-wrap{position:relative;width:108px;height:108px;flex-shrink:0}
.ring-wrap svg{width:108px;height:108px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surf2);stroke-width:10}
.ring-fill{
  fill:none;stroke:var(--acc);stroke-width:10;stroke-linecap:round;
  stroke-dasharray:283;stroke-dashoffset:283;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.ring-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring-num{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--acc);line-height:1}
.ring-lbl{font-size:10px;color:var(--txt2);margin-top:2px}

/* BARS */
.stats-wrap{flex:1}
.sb{margin-bottom:10px}
.sb-top{font-size:11px;color:var(--txt2);display:flex;justify-content:space-between;margin-bottom:3px}
.sb-top b{color:var(--txt)}
.sb-track{height:5px;background:var(--surf2);border-radius:3px;overflow:hidden}
.sb-fill{height:100%;border-radius:3px;transition:width 1s ease}
.c-carb{background:#f5c542}.c-prot{background:var(--acc2)}.c-fat{background:var(--acc3)}
.goal-row{display:flex;justify-content:space-between;font-size:12px;color:var(--txt2);margin-top:6px}
.goal-row b{color:var(--txt)}

/* MEAL SECTIONS */
.ms-title{
  font-size:12px;font-weight:700;color:var(--txt2);
  text-transform:uppercase;letter-spacing:1px;
  margin:16px 0 6px;display:flex;justify-content:space-between;align-items:center;
}
.ms-badge{
  font-family:'Space Mono',monospace;font-size:11px;
  color:var(--acc);background:rgba(200,245,66,.1);
  padding:2px 8px;border-radius:20px;
}
.mi{
  display:flex;align-items:center;gap:10px;
  padding:12px;background:var(--surf);
  border:1px solid var(--border);border-radius:12px;margin-bottom:7px;
  animation:si .25s ease;
}
@keyframes si{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mi-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-meta{font-size:11px;color:var(--txt2);margin-top:1px}
.mi-kcal{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);font-weight:700}
.mi-del{background:none;border:none;color:var(--txt3);font-size:20px;cursor:pointer;padding:2px 4px;line-height:1}
.empty-ms{text-align:center;padding:8px 0;color:var(--txt3);font-size:12px}

/* FAB */
#fab{
  position:fixed;bottom:calc(var(--th)+18px);right:18px;
  width:54px;height:54px;border-radius:50%;
  background:var(--acc);color:#000;font-size:28px;font-weight:700;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(200,245,66,.4);z-index:49;
  transition:transform .15s;
}
#fab:active{transform:scale(.92)}

/* MODAL */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:100;
}
#overlay.on{display:block}
#modal{
  display:none;position:fixed;
  bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--surf);
  border-top-left-radius:22px;border-top-right-radius:22px;
  border-top:1px solid var(--border);
  max-height:88dvh;flex-direction:column;
  z-index:101;
}
#modal.on{display:flex;animation:su .28s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
.m-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.m-title{padding:14px 18px 10px;font-size:16px;font-weight:700}
.m-chips{display:flex;gap:7px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.m-chips::-webkit-scrollbar{display:none}
.chip{
  padding:6px 13px;border-radius:20px;border:1px solid var(--border);
  background:none;color:var(--txt2);font-size:12px;cursor:pointer;
  white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:all .15s;
}
.chip.on{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700}
.m-search{display:flex;gap:8px;padding:0 14px 10px}
.s-input{
  flex:1;background:var(--surf2);border:1px solid var(--border);
  border-radius:12px;padding:11px 14px;color:var(--txt);
  font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;
  transition:border-color .2s;
}
.s-input:focus{border-color:var(--acc)}
.s-input::placeholder{color:var(--txt3)}
.s-btn{
  padding:0 16px;background:var(--acc);color:#000;
  border:none;border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;
}
.m-results{flex:1;overflow-y:auto;padding:0 14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.empty-s{text-align:center;padding:28px 0;color:var(--txt3);font-size:13px}
.empty-ico{font-size:34px;margin-bottom:8px}
#spinner{display:none;text-align:center;padding:28px}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.ri{
  display:flex;align-items:center;gap:10px;
  padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;
}
.ri:active{opacity:.6}
.ri-ico{width:38px;height:38px;background:var(--surf2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:14px;font-weight:500}
.ri-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.ri-kcal{font-family:'Space Mono',monospace;font-size:15px;color:var(--acc);font-weight:700}

/* ADD FORM */
#addform{display:none;padding:14px;border-top:1px solid var(--border)}
#addform.on{display:block}
.sel-food{background:var(--surf2);border-radius:12px;padding:13px;margin-bottom:11px}
.sel-name{font-size:15px;font-weight:700;margin-bottom:7px}
.sel-nutri{display:flex;gap:7px;flex-wrap:wrap}
.n-chip{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--surf);color:var(--txt2)}
.amt-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.amt-input{
  flex:1;background:var(--surf2);border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;color:var(--txt);
  font-size:16px;font-family:'Space Mono',monospace;outline:none;
}
.amt-unit{color:var(--txt2);font-size:13px}
.add-btn{
  width:100%;padding:13px;background:var(--acc);color:#000;
  border:none;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}

/* STATS PAGE */
.sec-title{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;margin:18px 0 8px}
.week-chart{display:flex;align-items:flex-end;gap:5px;height:80px;padding:0 2px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bb{width:100%;background:var(--surf2);border-radius:4px;position:relative;overflow:hidden}
.bf{position:absolute;bottom:0;left:0;right:0;background:var(--acc);border-radius:4px;opacity:.8;transition:height .8s cubic-bezier(.4,0,.2,1)}
.bb.today .bf{opacity:1}
.bd{font-size:10px;color:var(--txt3)}
.nd-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.nd{background:var(--surf2);border-radius:10px;padding:12px}
.nd-name{font-size:11px;color:var(--txt2);margin-bottom:3px}
.nd-val{font-family:'Space Mono',monospace;font-size:17px;font-weight:700}
.nd-val small{font-size:11px;color:var(--txt3);font-family:'Noto Sans KR',sans-serif}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.sc-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.sc-lbl{font-size:11px;color:var(--txt2)}

/* SETTINGS */
.s-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--border);
}
.s-row:last-child{border-bottom:none}
.s-lbl{font-size:14px}
.s-sub{font-size:11px;color:var(--txt2);margin-top:2px}
.s-num{
  background:var(--surf2);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;color:var(--txt);
  font-size:14px;font-family:'Space Mono',monospace;
  width:80px;text-align:right;outline:none;
}
.api-input{
  width:100%;background:var(--surf2);border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;color:var(--txt);
  font-size:12px;font-family:'Space Mono',monospace;outline:none;
  margin-top:8px;
}
.api-input::placeholder{color:var(--txt3)}
.save-btn{
  width:100%;padding:13px;background:var(--acc);color:#000;
  border:none;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:12px;
}
.danger-btn{
  padding:6px 13px;background:none;border-radius:8px;
  font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
}

/* TOAST */
#toast{
  position:fixed;bottom:calc(var(--th)+80px);
  left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--surf2);border:1px solid var(--acc);
  color:var(--txt);padding:9px 18px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .25s;z-index:200;
  pointer-events:none;white-space:nowrap;max-width:calc(100% - 40px);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* mock warning */
.mock-warn{text-align:center;font-size:11px;color:var(--txt3);padding:6px 0 2px}
</style>
</head>
<body>

<header id="header">
  <div id="header-title">KCAL.KR</div>
  <div id="header-date"></div>
</header>

<!-- ── PAGE: 식단 ── -->
<div class="pg on" id="pg-home">
  <div class="card">
    <div class="ring-row">
      <div class="ring-wrap">
        <svg viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="45"/>
          <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="45"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="tot-kcal">0</div>
          <div class="ring-lbl">kcal</div>
        </div>
      </div>
      <div class="stats-wrap">
        <div class="sb">
          <div class="sb-top">탄수화물 <b id="v-carb">0g</b></div>
          <div class="sb-track"><div class="sb-fill c-carb" id="b-carb" style="width:0%"></div></div>
        </div>
        <div class="sb">
          <div class="sb-top">단백질 <b id="v-prot">0g</b></div>
          <div class="sb-track"><div class="sb-fill c-prot" id="b-prot" style="width:0%"></div></div>
        </div>
        <div class="sb">
          <div class="sb-top">지방 <b id="v-fat">0g</b></div>
          <div class="sb-track"><div class="sb-fill c-fat" id="b-fat" style="width:0%"></div></div>
        </div>
        <div class="goal-row">
          <span>목표 <b id="goal-disp">2000</b> kcal</span>
          <span id="remain" style="color:var(--acc2)">남은 2000</span>
        </div>
      </div>
    </div>
  </div>
  <div id="meal-sections"></div>
</div>

<!-- ── PAGE: 통계 ── -->
<div class="pg" id="pg-stats">
  <p class="sec-title">7일 칼로리</p>
  <div class="card"><div class="week-chart" id="week-chart"></div></div>
  <p class="sec-title">오늘 영양소</p>
  <div class="nd-grid" id="nd-grid"></div>
  <p class="sec-title">주간 평균</p>
  <div class="sg" id="sg"></div>
</div>

<!-- ── PAGE: 설정 ── -->
<div class="pg" id="pg-settings">
  <p class="sec-title">목표 칼로리 / 영양소</p>
  <div class="card">
    <div class="s-row">
      <div><div class="s-lbl">일일 칼로리 목표</div><div class="s-sub">kcal</div></div>
      <input class="s-num" id="set-goal" type="number" value="2000">
    </div>
    <div class="s-row">
      <div><div class="s-lbl">탄수화물 목표</div><div class="s-sub">g</div></div>
      <input class="s-num" id="set-carb" type="number" value="260">
    </div>
    <div class="s-row">
      <div><div class="s-lbl">단백질 목표</div><div class="s-sub">g</div></div>
      <input class="s-num" id="set-prot" type="number" value="60">
    </div>
    <div class="s-row">
      <div><div class="s-lbl">지방 목표</div><div class="s-sub">g</div></div>
      <input class="s-num" id="set-fat" type="number" value="55">
    </div>
  </div>

  <p class="sec-title">API 설정</p>
  <div class="card">
    <div class="s-lbl">data.go.kr API 키</div>
    <div class="s-sub">식품의약품안전처_식품영양성분DB 서비스키</div>
    <input class="api-input" id="set-apikey" placeholder="발급받은 서비스키를 여기에 붙여넣기" autocomplete="off">
    <div style="margin-top:10px;font-size:12px;color:var(--txt2)">
      키 발급 →
      <a href="https://www.data.go.kr/data/15127578/openapi.do" target="_blank"
        style="color:var(--acc);text-decoration:none">data.go.kr 바로가기</a>
    </div>
    <button class="save-btn" id="btn-save">저장</button>
  </div>

  <p class="sec-title">데이터 관리</p>
  <div class="card">
    <div class="s-row">
      <div><div class="s-lbl">오늘 기록 초기화</div></div>
      <button class="danger-btn" id="btn-clear-today"
        style="border:1px solid var(--acc3);color:var(--acc3)">초기화</button>
    </div>
    <div class="s-row">
      <div><div class="s-lbl">전체 기록 삭제</div></div>
      <button class="danger-btn" id="btn-clear-all"
        style="border:1px solid var(--txt3);color:var(--txt3)">전체삭제</button>
    </div>
  </div>
</div>

<!-- ── TAB BAR ── -->
<nav id="tabbar">
  <button class="tab on" data-tab="home">
    <span class="ico">🏠</span>식단
  </button>
  <button class="tab" data-tab="stats">
    <span class="ico">📊</span>통계
  </button>
  <button class="tab" data-tab="settings">
    <span class="ico">⚙️</span>설정
  </button>
</nav>

<!-- FAB -->
<button id="fab">+</button>

<!-- MODAL OVERLAY -->
<div id="overlay"></div>

<!-- MODAL -->
<div id="modal">
  <div class="m-handle"></div>
  <div class="m-title">음식 추가</div>
  <div class="m-chips" id="m-chips">
    <button class="chip on" data-meal="breakfast">🌅 아침</button>
    <button class="chip" data-meal="lunch">☀️ 점심</button>
    <button class="chip" data-meal="dinner">🌙 저녁</button>
    <button class="chip" data-meal="snack">🍪 간식</button>
  </div>
  <div class="m-search">
    <input class="s-input" id="s-input" placeholder="음식 이름 검색..." autocomplete="off">
    <button class="s-btn" id="s-btn">검색</button>
  </div>
  <div class="m-results" id="m-results">
    <div class="empty-s">
      <div class="empty-ico">🔍</div>
      음식 이름을 검색해보세요<br>
      <span style="font-size:11px;color:var(--txt3);display:block;margin-top:4px">예: 비빔밥, 삼겹살, 치킨</span>
    </div>
  </div>
  <div id="spinner"><div class="spin"></div><div style="color:var(--txt2);font-size:13px">검색 중...</div></div>
  <div id="addform">
    <div class="sel-food" id="sel-food"></div>
    <div class="amt-row">
      <input class="amt-input" id="amt" type="number" value="100" min="1" max="9999">
      <span class="amt-unit">g</span>
    </div>
    <button class="add-btn" id="btn-add">식단에 추가</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ──
const MEAL_LABELS = {breakfast:'🌅 아침',lunch:'☀️ 점심',dinner:'🌙 저녁',snack:'🍪 간식'};
const MEAL_COLORS = {breakfast:'#f5c542',lunch:'#42f5a8',dinner:'#7a8fff',snack:'#f572a8'};
const FOOD_ICONS  = ['🍚','🍜','🥩','🐟','🥗','🍱','🥚','🧀','🍕','🍣','🥦','🍎','🍌','🍗','🥐'];

// ── STATE ──
let S = {
  meal: 'breakfast',
  results: [],
  selected: null,
  goal:     +ls('goal')    || 2000,
  carbGoal: +ls('carbGoal')|| 260,
  protGoal: +ls('protGoal')|| 60,
  fatGoal:  +ls('fatGoal') || 55,
  apiKey:    ls('apiKey')  || '',
};

function ls(k){ return localStorage.getItem(k); }
function lss(k,v){ localStorage.setItem(k,v); }

function todayKey(){
  const d = new Date();
  return 'meals_' + d.toISOString().slice(0,10);
}
function getMeals(){ try{return JSON.parse(ls(todayKey())||'[]')}catch{return []} }
function saveMeals(m){ lss(todayKey(), JSON.stringify(m)); }

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  // header date
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});

  // load settings into form
  document.getElementById('set-goal').value   = S.goal;
  document.getElementById('set-carb').value   = S.carbGoal;
  document.getElementById('set-prot').value   = S.protGoal;
  document.getElementById('set-fat').value    = S.fatGoal;
  document.getElementById('set-apikey').value = S.apiKey;

  // TAB events
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // FAB
  document.getElementById('fab').addEventListener('click', openModal);

  // Overlay close
  document.getElementById('overlay').addEventListener('click', closeModal);

  // Meal chips
  document.getElementById('m-chips').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    S.meal = chip.dataset.meal;
  });

  // Search
  document.getElementById('s-btn').addEventListener('click', doSearch);
  document.getElementById('s-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // Add button
  document.getElementById('btn-add').addEventListener('click', addFood);

  // Settings save
  document.getElementById('btn-save').addEventListener('click', saveSettings);

  // Clear buttons
  document.getElementById('btn-clear-today').addEventListener('click', () => {
    if (!confirm('오늘 기록을 초기화할까요?')) return;
    localStorage.removeItem(todayKey());
    renderHome(); toast('오늘 기록 초기화 완료');
  });
  document.getElementById('btn-clear-all').addEventListener('click', () => {
    if (!confirm('전체 기록을 삭제할까요?')) return;
    Object.keys(localStorage).filter(k => k.startsWith('meals_')).forEach(k => localStorage.removeItem(k));
    renderHome(); toast('전체 삭제 완료');
  });

  renderHome();
});

// ── TAB SWITCH ──
function switchTab(name) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('on');
  document.getElementById('fab').style.display = (name === 'home') ? 'flex' : 'none';
  if (name === 'stats') renderStats();
}

// ── RENDER HOME ──
function renderHome() {
  const meals = getMeals();
  let kcal=0, carb=0, prot=0, fat=0;
  meals.forEach(m => { kcal+=m.kcal; carb+=m.carb; prot+=m.prot; fat+=m.fat; });

  document.getElementById('tot-kcal').textContent = Math.round(kcal);
  document.getElementById('v-carb').textContent   = Math.round(carb)+'g';
  document.getElementById('v-prot').textContent   = Math.round(prot)+'g';
  document.getElementById('v-fat').textContent    = Math.round(fat)+'g';
  document.getElementById('goal-disp').textContent = S.goal;

  const rem = S.goal - Math.round(kcal);
  const el = document.getElementById('remain');
  el.textContent = rem < 0 ? '초과 '+Math.abs(rem) : '남은 '+rem;
  el.style.color = rem < 0 ? 'var(--acc3)' : 'var(--acc2)';

  const pct = Math.min(kcal / S.goal, 1);
  document.getElementById('ringFill').style.strokeDashoffset = 283 - 283 * pct;
  document.getElementById('b-carb').style.width = Math.min(carb/S.carbGoal*100,100)+'%';
  document.getElementById('b-prot').style.width = Math.min(prot/S.protGoal*100,100)+'%';
  document.getElementById('b-fat').style.width  = Math.min(fat/S.fatGoal*100,100)+'%';

  // meal sections
  const cont = document.getElementById('meal-sections');
  cont.innerHTML = '';
  Object.keys(MEAL_LABELS).forEach(type => {
    const items = meals.filter(m => m.meal === type);
    const secKcal = items.reduce((a,b) => a+b.kcal, 0);
    const wrap = document.createElement('div');

    let html = `<div class="ms-title">${MEAL_LABELS[type]}`;
    if (items.length) html += `<span class="ms-badge">${Math.round(secKcal)} kcal</span>`;
    html += `</div>`;

    if (!items.length) {
      html += `<div class="empty-ms">비어있어요 — + 버튼으로 추가하세요</div>`;
    } else {
      items.forEach((item, i) => {
        html += `
        <div class="mi">
          <div class="mi-dot" style="background:${MEAL_COLORS[type]}"></div>
          <div class="mi-info">
            <div class="mi-name">${item.name}</div>
            <div class="mi-meta">${item.amount}g &middot; 탄${Math.round(item.carb)}g 단${Math.round(item.prot)}g 지${Math.round(item.fat)}g</div>
          </div>
          <div class="mi-kcal">${Math.round(item.kcal)}</div>
          <button class="mi-del" data-type="${type}" data-i="${i}">×</button>
        </div>`;
      });
    }
    wrap.innerHTML = html;
    cont.appendChild(wrap);
  });

  // delete buttons
  cont.querySelectorAll('.mi-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      const idx  = +btn.dataset.i;
      const all  = getMeals();
      const sameType = all.filter(m => m.meal === type);
      const target   = sameType[idx];
      const gi = all.indexOf(target);
      if (gi > -1) { all.splice(gi,1); saveMeals(all); }
      renderHome(); toast('삭제했어요');
    });
  });
}

// ── RENDER STATS ──
function renderStats() {
  const meals = getMeals();
  let kcal=0,carb=0,prot=0,fat=0,sodium=0,sugar=0;
  meals.forEach(m => { kcal+=m.kcal; carb+=m.carb; prot+=m.prot; fat+=m.fat; sodium+=(m.sodium||0); sugar+=(m.sugar||0); });

  // Nutrient detail
  document.getElementById('nd-grid').innerHTML = [
    ['칼로리','kcal',Math.round(kcal),'#c8f542'],
    ['탄수화물','g',Math.round(carb),'#f5c542'],
    ['단백질','g',Math.round(prot),'#42f5a8'],
    ['지방','g',Math.round(fat),'#f54242'],
    ['나트륨','mg',Math.round(sodium),'#7a8fff'],
    ['당류','g',Math.round(sugar),'#f572a8'],
  ].map(([n,u,v,c]) => `
    <div class="nd">
      <div class="nd-name">${n}</div>
      <div class="nd-val" style="color:${c}">${v}<small>${u}</small></div>
    </div>`).join('');

  // Weekly chart
  const days=['일','월','화','수','목','금','토'];
  const today = new Date();
  const wdata = [];
  for (let i=6;i>=0;i--) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const k='meals_'+d.toISOString().slice(0,10);
    const ms=JSON.parse(ls(k)||'[]');
    wdata.push({day:days[d.getDay()], kcal:ms.reduce((a,b)=>a+b.kcal,0), today:i===0});
  }
  const maxK = Math.max(...wdata.map(d=>d.kcal), S.goal, 1);
  document.getElementById('week-chart').innerHTML = wdata.map(d => {
    const h = Math.max(d.kcal/maxK*68, d.kcal>0?3:0);
    return `<div class="bc">
      <div class="bb${d.today?' today':''}" style="height:68px">
        <div class="bf" style="height:${h}px"></div>
      </div>
      <div class="bd">${d.today?'오늘':d.day}</div>
    </div>`;
  }).join('');

  // Stats grid
  const active = wdata.filter(d=>d.kcal>0);
  const avg = active.length ? Math.round(active.reduce((a,b)=>a+b.kcal,0)/active.length) : 0;
  document.getElementById('sg').innerHTML = [
    ['평균 칼로리', avg+'<small style="font-size:12px"> kcal</small>', '#c8f542'],
    ['오늘 칼로리', Math.round(kcal)+'<small style="font-size:12px"> kcal</small>', '#42f5a8'],
    ['총 단백질',   Math.round(prot)+'<small style="font-size:12px"> g</small>', '#7a8fff'],
    ['식사 횟수',   meals.length+'<small style="font-size:12px"> 회</small>', '#f5c542'],
  ].map(([l,v,c]) => `
    <div class="sc">
      <div class="sc-val" style="color:${c}">${v}</div>
      <div class="sc-lbl">${l}</div>
    </div>`).join('');
}

// ── MODAL ──
function openModal() {
  document.getElementById('overlay').classList.add('on');
  document.getElementById('modal').classList.add('on');
  setTimeout(() => document.getElementById('s-input').focus(), 300);
}
function closeModal() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('modal').classList.remove('on');
  document.getElementById('m-results').innerHTML = `
    <div class="empty-s"><div class="empty-ico">🔍</div>음식 이름을 검색해보세요</div>`;
  document.getElementById('addform').classList.remove('on');
  document.getElementById('s-input').value = '';
  S.selected = null;
}

// ── SEARCH ──
async function doSearch() {
  const q = document.getElementById('s-input').value.trim();
  if (!q) return;
  const apiKey = S.apiKey || ls('apiKey') || '';

  document.getElementById('spinner').style.display = 'block';
  document.getElementById('m-results').innerHTML = '';
  document.getElementById('addform').classList.remove('on');

  try {
    let foods = [];
    if (apiKey) {
      const url = `https://apis.data.go.kr/1471000/FoodNtrCpntDbInfo01/getFoodNtrCpntDbInq01`
        + `?serviceKey=${encodeURIComponent(apiKey)}&pageNo=1&numOfRows=20&type=json`
        + `&FOOD_NM_KR=${encodeURIComponent(q)}`;
      const res  = await fetch(url);
      const json = await res.json();
      const items = json?.body?.items || [];
      foods = items.map(it => ({
        name:   it.FOOD_NM_KR   || it.foodNmKr  || '알 수 없음',
        maker:  it.MAKER_NM     || it.makerNm   || '',
        kcal:   parseFloat(it.AMT_NUM1  || it.amtNum1  || 0),
        carb:   parseFloat(it.AMT_NUM7  || it.amtNum7  || 0),
        prot:   parseFloat(it.AMT_NUM3  || it.amtNum3  || 0),
        fat:    parseFloat(it.AMT_NUM4  || it.amtNum4  || 0),
        sodium: parseFloat(it.AMT_NUM14 || it.amtNum14 || 0),
        sugar:  parseFloat(it.AMT_NUM8  || it.amtNum8  || 0),
      }));
    } else {
      foods = MOCK.filter(f => f.name.includes(q)).slice(0,12);
      if (!foods.length) foods = [{name:q+'(임시)',maker:'목업',kcal:200,carb:30,prot:10,fat:8,sodium:500,sugar:5}];
    }
    S.results = foods;
    renderResults(foods, !!apiKey);
  } catch(e) {
    document.getElementById('m-results').innerHTML =
      `<div class="empty-s"><div class="empty-ico">⚠️</div>오류: ${e.message}<br><span style="font-size:11px;color:var(--txt3)">API 키를 설정에서 확인해주세요</span></div>`;
  } finally {
    document.getElementById('spinner').style.display = 'none';
  }
}

function renderResults(foods, isReal) {
  const cont = document.getElementById('m-results');
  let html = isReal ? '' : '<div class="mock-warn">⚠️ 목업 데이터 · 설정에서 API 키 입력 후 실제 검색 가능</div>';
  if (!foods.length) { cont.innerHTML = '<div class="empty-s"><div class="empty-ico">😕</div>검색 결과 없음</div>'; return; }
  html += foods.map((f,i) => `
    <div class="ri" data-idx="${i}">
      <div class="ri-ico">${FOOD_ICONS[i%FOOD_ICONS.length]}</div>
      <div class="ri-info">
        <div class="ri-name">${f.name}</div>
        <div class="ri-sub">${f.maker||'100g 기준'} · 탄${Math.round(f.carb)}g 단${Math.round(f.prot)}g 지${Math.round(f.fat)}g</div>
      </div>
      <div class="ri-kcal">${Math.round(f.kcal)}</div>
    </div>`).join('');
  cont.innerHTML = html;
  cont.querySelectorAll('.ri').forEach(el => {
    el.addEventListener('click', () => selectFood(+el.dataset.idx));
  });
}

function selectFood(i) {
  S.selected = S.results[i];
  const f = S.selected;
  document.getElementById('sel-food').innerHTML = `
    <div class="sel-name">${f.name}</div>
    <div class="sel-nutri">
      <span class="n-chip">열량 ${Math.round(f.kcal)}kcal</span>
      <span class="n-chip">탄 ${Math.round(f.carb)}g</span>
      <span class="n-chip">단 ${Math.round(f.prot)}g</span>
      <span class="n-chip">지 ${Math.round(f.fat)}g</span>
    </div>`;
  document.getElementById('amt').value = 100;
  const af = document.getElementById('addform');
  af.classList.add('on');
  af.scrollIntoView({behavior:'smooth'});
}

function addFood() {
  if (!S.selected) return;
  const f   = S.selected;
  const amt = parseFloat(document.getElementById('amt').value) || 100;
  const r   = amt / 100;
  const all = getMeals();
  all.push({
    meal:   S.meal,
    name:   f.name, amount: amt,
    kcal:   f.kcal*r, carb:   f.carb*r,
    prot:   f.prot*r, fat:    f.fat*r,
    sodium: (f.sodium||0)*r, sugar: (f.sugar||0)*r,
    ts: Date.now(),
  });
  saveMeals(all);
  closeModal();
  renderHome();
  toast(`${f.name} 추가 완료! 🎉`);
}

// ── SETTINGS ──
function saveSettings() {
  S.goal     = +document.getElementById('set-goal').value   || 2000;
  S.carbGoal = +document.getElementById('set-carb').value   || 260;
  S.protGoal = +document.getElementById('set-prot').value   || 60;
  S.fatGoal  = +document.getElementById('set-fat').value    || 55;
  S.apiKey   =  document.getElementById('set-apikey').value.trim();
  lss('goal',     S.goal);
  lss('carbGoal', S.carbGoal);
  lss('protGoal', S.protGoal);
  lss('fatGoal',  S.fatGoal);
  lss('apiKey',   S.apiKey);
  renderHome();
  toast('설정 저장 완료 ✓');
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}
