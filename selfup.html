<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>나를 채우는 시간</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Gowun+Dodum&display=swap');

  :root {
    --bg-dark: #060d0a;
    --bg-mid:  #0a1510;
    --green-deep: #2d6b4a;
    --green-mid:  #4a9a6a;
    --green-light:#8ad4a8;
    --text: #c8ecd8;
    --text-soft: #5a8a6a;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    background: var(--bg-dark);
    font-family: 'Gowun Dodum', serif;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    user-select: none;
  }

  /* 별 배경 */
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(40,100,60,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(20,60,40,0.12) 0%, transparent 50%);
    pointer-events:none; z-index:0;
  }

  .page {
    position:relative; z-index:1;
    display:flex; flex-direction:column;
    align-items:center; width:100%; height:100%;
    padding:20px 16px 12px;
  }

  /* ─── 격려문구 버튼 ─── */
  .msg-edit-btn {
    position:fixed; top:14px; right:14px; z-index:300;
    background:rgba(40,100,60,0.25);
    border:1px solid rgba(90,180,110,0.3);
    border-radius:20px; padding:6px 13px;
    font-family:'Gowun Dodum',serif; font-size:12px;
    color:var(--green-light); cursor:pointer;
    letter-spacing:0.06em; transition:background 0.2s;
  }
  .msg-edit-btn:active { background:rgba(40,100,60,0.45); }

  /* ─── 패널 ─── */
  .msg-panel {
    position:fixed; top:0; right:0;
    width:min(340px,94vw); height:100%;
    background:rgba(6,15,10,0.97);
    backdrop-filter:blur(16px);
    z-index:500;
    display:flex; flex-direction:column;
    padding:56px 20px 24px;
    transform:translateX(110%);
    transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow:-8px 0 32px rgba(0,0,0,0.5);
    border-left:1px solid rgba(60,150,90,0.2);
  }
  .msg-panel.open { transform:translateX(0); }

  .msg-panel-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .msg-panel-header h3 {
    font-family:'Nanum Myeongjo',serif; font-size:16px;
    color:var(--green-light); letter-spacing:0.1em;
  }
  .panel-close {
    background:none; border:none; font-size:20px;
    color:var(--text-soft); cursor:pointer; padding:4px;
  }

  .msg-list {
    flex:1; overflow-y:auto;
    display:flex; flex-direction:column; gap:8px;
    margin-bottom:14px; padding-right:2px;
  }
  .msg-list::-webkit-scrollbar { width:3px; }
  .msg-list::-webkit-scrollbar-thumb { background:rgba(90,180,110,0.25); border-radius:4px; }

  .msg-item {
    display:flex; align-items:center; gap:8px;
    background:rgba(30,80,50,0.25);
    border:1px solid rgba(60,150,90,0.2);
    border-radius:10px; padding:10px 12px;
  }
  .msg-item-text {
    flex:1; font-size:13px; color:var(--text);
    letter-spacing:0.04em; line-height:1.5;
    background:none; border:none; outline:none;
    font-family:'Gowun Dodum',serif;
    resize:none; overflow:hidden; min-height:20px;
  }
  .msg-item-text.editing {
    background:rgba(255,255,255,0.05);
    border-radius:6px; padding:4px 6px;
  }
  .msg-item-del {
    background:none; border:none;
    color:rgba(150,100,80,0.5); font-size:18px;
    cursor:pointer; padding:2px 4px; flex-shrink:0;
    transition:color 0.15s;
  }
  .msg-item-del:hover { color:#c0705a; }

  .msg-add-row { display:flex; gap:8px; }
  .msg-add-input {
    flex:1; border:1px solid rgba(60,150,90,0.3);
    border-radius:10px; padding:9px 12px;
    font-family:'Gowun Dodum',serif; font-size:13px;
    color:var(--text); background:rgba(255,255,255,0.05);
    outline:none; letter-spacing:0.04em;
  }
  .msg-add-input:focus { border-color:rgba(90,180,110,0.6); }
  .msg-add-input::placeholder { color:rgba(90,180,110,0.35); }
  .msg-add-btn {
    background:var(--green-deep); color:#c8ecd8;
    border:none; border-radius:10px; padding:9px 14px;
    font-family:'Gowun Dodum',serif; font-size:13px;
    cursor:pointer; transition:background 0.15s;
  }
  .msg-add-btn:active { background:var(--green-mid); }
  .msg-panel-empty {
    font-size:12px; color:var(--text-soft);
    text-align:center; padding:20px 0; letter-spacing:0.06em;
    white-space:pre-line; line-height:1.8;
  }

  .panel-backdrop {
    position:fixed; inset:0; z-index:499; display:none;
  }
  .panel-backdrop.open { display:block; }

  /* ─── Title ─── */
  .title-area {
    text-align:center; margin-bottom:8px;
    animation:fadeDown 1.2s ease both;
  }
  .title-area h1 {
    font-family:'Nanum Myeongjo',serif;
    font-size:clamp(18px,5vw,24px);
    color:var(--green-light); letter-spacing:0.14em; font-weight:700;
    text-shadow:0 0 30px rgba(100,220,140,0.3);
  }
  .title-area p {
    font-size:clamp(11px,3vw,13px);
    color:var(--text-soft); margin-top:4px; letter-spacing:0.06em;
  }

  /* ─── Count badge ─── */
  .count-badge {
    display:flex; align-items:center; gap:6px;
    background:rgba(20,60,35,0.4);
    border:1px solid rgba(60,150,90,0.25);
    border-radius:20px; padding:5px 14px;
    margin-bottom:10px; animation:fadeDown 1.4s ease both;
  }
  .count-badge .num {
    font-family:'Nanum Myeongjo',serif;
    font-size:clamp(14px,4vw,18px);
    color:var(--green-light); font-weight:700;
    min-width:24px; text-align:center;
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .count-badge .num.pop { transform:scale(1.4); }
  .count-badge .label {
    font-size:clamp(10px,3vw,12px);
    color:var(--text-soft); letter-spacing:0.05em;
  }

  /* ─── Jar ─── */
  .jar-wrap {
    position:relative; flex:1;
    display:flex; align-items:center; justify-content:center;
    width:100%; max-height:calc(100vh - 220px);
    animation:fadeUp 1.0s ease both;
  }
  .jar-svg-container {
    position:relative; cursor:pointer;
    touch-action:none;
  }
  .jar-svg-container svg { width:min(240px,65vw); height:auto; display:block; }

  #marbleCanvas {
    position:absolute; left:0; top:0;
    width:100%; height:100%; pointer-events:none;
  }
  #overflowCanvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:100; }
  #sparkCanvas    { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:99; }

  /* ─── Click effect ─── */
  .ripple {
    position:fixed; border-radius:50%;
    background:radial-gradient(circle, rgba(140,220,160,0.5) 0%, rgba(60,160,90,0.15) 50%, transparent 70%);
    transform:scale(0); animation:rippleAnim 0.7s ease-out forwards;
    pointer-events:none; z-index:98;
  }
  @keyframes rippleAnim { to { transform:scale(4); opacity:0; } }

  .float-ff {
    position:fixed; border-radius:50%; pointer-events:none; z-index:101;
    animation:floatUp 1.1s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    box-shadow:0 0 12px 4px rgba(120,255,160,0.4);
  }
  @keyframes floatUp {
    0%   { transform:scale(0) translateY(0); opacity:1; }
    40%  { transform:scale(1.2) translateY(-30px); opacity:1; }
    100% { transform:scale(0.5) translateY(-100px); opacity:0; }
  }

  /* ─── Message ─── */
  .msg-area {
    min-height:36px; display:flex; align-items:center; justify-content:center;
    margin-top:6px; animation:fadeDown 1.6s ease both;
  }
  .msg {
    font-size:clamp(12px,3.5vw,14px); color:var(--green-light);
    letter-spacing:0.08em; opacity:0; transform:translateY(6px);
    transition:opacity 0.5s ease,transform 0.5s ease; text-align:center;
    text-shadow:0 0 20px rgba(100,220,140,0.4);
  }
  .msg.show { opacity:1; transform:translateY(0); }

  /* ─── Fill bar ─── */
  .fill-bar {
    width:min(180px,50vw); height:3px;
    background:rgba(255,255,255,0.06); border-radius:4px;
    margin-top:10px; overflow:hidden; animation:fadeDown 1.8s ease both;
  }
  .fill-bar-inner {
    height:100%;
    background:linear-gradient(90deg, var(--green-deep), var(--green-light));
    border-radius:4px;
    transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1); width:0%;
    box-shadow:0 0 8px rgba(100,220,140,0.6);
  }

  /* ─── Overflow ─── */
  .overflow-msg {
    position:fixed; inset:0; z-index:200;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(6,13,10,0); opacity:0; pointer-events:none;
    transition:opacity 1s ease,background 1s ease;
  }
  .overflow-msg.show { opacity:1; pointer-events:auto; background:rgba(6,13,10,0.9); }
  .overflow-msg h2 {
    font-family:'Nanum Myeongjo',serif; font-size:clamp(22px,6vw,32px);
    color:var(--green-light); letter-spacing:0.15em; margin-bottom:12px;
    text-shadow:0 0 40px rgba(100,220,140,0.5);
  }
  .overflow-msg p {
    font-size:clamp(13px,3.5vw,16px); color:var(--text-soft);
    letter-spacing:0.08em; line-height:1.8; text-align:center; padding:0 32px;
  }
  .overflow-msg .reset-btn {
    margin-top:28px; padding:12px 32px;
    background:rgba(30,80,50,0.6); color:var(--green-light);
    border:1px solid rgba(90,180,110,0.4); border-radius:30px;
    font-family:'Gowun Dodum',serif; font-size:clamp(13px,3.5vw,15px);
    letter-spacing:0.12em; cursor:pointer;
    transition:transform 0.2s ease,background 0.2s ease;
  }
  .overflow-msg .reset-btn:active { transform:scale(0.96); background:rgba(40,100,60,0.8); }

  /* ─── Jar full glow ─── */
  .jar-svg-container.full { animation:jarGlow 2.5s ease-in-out infinite; }
  @keyframes jarGlow {
    0%,100% { filter:drop-shadow(0 0 10px rgba(100,220,140,0.15)); }
    50%      { filter:drop-shadow(0 0 30px rgba(100,220,140,0.45)) drop-shadow(0 0 60px rgba(60,180,90,0.2)); }
  }

  /* ─── Animations ─── */
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ─── Audio unlock ─── */
  #audioUnlock {
    position:fixed; inset:0; z-index:999;
    background:var(--bg-dark);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
  }
  #audioUnlock h2 {
    font-family:'Nanum Myeongjo',serif;
    font-size:clamp(20px,5vw,28px);
    color:var(--green-light); letter-spacing:0.15em;
    text-shadow:0 0 40px rgba(100,220,140,0.35);
  }
  #audioUnlock p {
    font-size:clamp(12px,3.5vw,15px); color:var(--text-soft);
    letter-spacing:0.08em; text-align:center; line-height:1.9;
  }
  #audioUnlock .start-btn {
    margin-top:8px; padding:14px 44px;
    background:rgba(25,70,45,0.6); color:var(--green-light);
    border:1px solid rgba(90,180,110,0.4); border-radius:30px;
    font-family:'Gowun Dodum',serif; font-size:clamp(14px,4vw,16px);
    letter-spacing:0.14em; cursor:pointer;
    box-shadow:0 0 30px rgba(60,160,90,0.15);
    transition:transform 0.15s ease,box-shadow 0.15s ease;
  }
  #audioUnlock .start-btn:hover { box-shadow:0 0 40px rgba(80,200,120,0.3); }
  #audioUnlock .start-btn:active { transform:scale(0.96); }

  /* 별 캔버스 */
  #starCanvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div id="audioUnlock">
  <h2>나를 채우는 시간</h2>
  <p>오늘도 잘 버텼어요 ✨<br>하나씩, 천천히 채워가요</p>
  <button class="start-btn" id="startBtn">시작하기</button>
</div>

<div class="page">
  <div class="title-area">
    <h1>나를 채우는 시간</h1>
    <p>오늘도 잘 버텼어요 · 하나씩 채워가요</p>
  </div>

  <div class="count-badge">
    <span class="num" id="countNum">0</span>
    <span class="label">/ <span id="maxCount">50</span> 개</span>
  </div>

  <div class="jar-wrap">
    <div class="jar-svg-container" id="jarContainer">
      <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg" id="jarSvg">
        <defs>
          <clipPath id="jarClip">
            <path d="M 55 44 Q 52 44 50 48 L 42 68 Q 30 80 28 100 L 24 200 Q 22 230 28 248 Q 34 264 50 268 L 150 268 Q 166 264 172 248 Q 178 230 176 200 L 172 100 Q 170 80 158 68 L 150 48 Q 148 44 145 44 Z"/>
          </clipPath>
          <radialGradient id="ambientGlow" cx="50%" cy="70%" r="55%">
            <stop offset="0%"   stop-color="rgba(60,160,90,0.18)"/>
            <stop offset="100%" stop-color="rgba(20,60,40,0)"/>
          </radialGradient>
        </defs>

        <!-- 그림자 -->
        <ellipse cx="100" cy="274" rx="52" ry="7" fill="rgba(0,0,0,0.35)"/>

        <!-- 병 어두운 배경 -->
        <path d="M 55 44 Q 52 44 50 48 L 42 68 Q 30 80 28 100 L 24 200 Q 22 230 28 248 Q 34 264 50 268 L 150 268 Q 166 264 172 248 Q 178 230 176 200 L 172 100 Q 170 80 158 68 L 150 48 Q 148 44 145 44 Z"
              fill="rgba(6,18,12,0.92)" stroke="rgba(60,150,90,0.45)" stroke-width="2" stroke-linejoin="round"/>

        <!-- 앰비언트 글로우 영역 (fill rect용) -->
        <g clip-path="url(#jarClip)">
          <rect id="fillRect" x="24" y="268" width="152" height="0" fill="url(#ambientGlow)" opacity="0"/>
        </g>

        <!-- 유리 하이라이트 -->
        <path d="M 38 88 Q 36 150 37 210 Q 37.5 238 40 252" stroke="rgba(160,240,190,0.18)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 162 88 Q 164 150 163 210 Q 162.5 238 160 252" stroke="rgba(160,240,190,0.10)" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- 병 유리 오버레이 (반투명) -->
        <path d="M 55 44 Q 52 44 50 48 L 42 68 Q 30 80 28 100 L 24 200 Q 22 230 28 248 Q 34 264 50 268 L 150 268 Q 166 264 172 248 Q 178 230 176 200 L 172 100 Q 170 80 158 68 L 150 48 Q 148 44 145 44 Z"
              fill="rgba(80,200,130,0.03)"/>

        <!-- 뚜껑 -->
        <rect x="50" y="38" width="100" height="8" rx="4" fill="rgba(10,40,25,0.7)" stroke="rgba(60,150,90,0.4)" stroke-width="1.5"/>
        <rect x="46" y="26" width="108" height="16" rx="5" fill="rgba(20,70,45,0.8)" stroke="rgba(60,150,90,0.5)" stroke-width="1.5"/>
        <rect x="52" y="30" width="96" height="6" rx="3" fill="rgba(160,240,190,0.12)"/>
      </svg>
      <canvas id="marbleCanvas"></canvas>
    </div>
  </div>

  <div class="msg-area">
    <p class="msg" id="msgText"></p>
  </div>

  <div class="fill-bar">
    <div class="fill-bar-inner" id="fillBarInner"></div>
  </div>
</div>

<div class="overflow-msg" id="overflowMsg">
  <h2>가득 찼어요 ✨</h2>
  <p>당신이 스스로에게 준<br>소중한 순간들이에요.<br><br>이제 흘러넘칠 만큼<br>충분히 채웠어요.</p>
  <button class="reset-btn" id="resetBtn">다시 채워나가기</button>
</div>

<canvas id="sparkCanvas"></canvas>
<canvas id="overflowCanvas"></canvas>

<button class="msg-edit-btn" id="msgEditBtn">✏️ 격려문구</button>
<div class="panel-backdrop" id="panelBackdrop"></div>

<div class="msg-panel" id="msgPanel">
  <div class="msg-panel-header">
    <h3>격려문구 편집</h3>
    <button class="panel-close" id="panelClose">✕</button>
  </div>
  <div class="msg-list" id="msgList"></div>
  <div class="msg-add-row">
    <input class="msg-add-input" id="msgAddInput" placeholder="새 문구를 입력해요..." maxlength="40"/>
    <button class="msg-add-btn" id="msgAddBtn">추가</button>
  </div>
</div>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const MAX = 50;

const FF_PALETTES = [
  { core:'#b8ffcc', glow:'rgba(100,255,140,0.5)',  size:1.0 },
  { core:'#ffffaa', glow:'rgba(255,255,80,0.45)',   size:0.85 },
  { core:'#a0f0ff', glow:'rgba(60,210,255,0.45)',   size:0.9 },
  { core:'#e0c8ff', glow:'rgba(180,100,255,0.40)',  size:0.88 },
  { core:'#c8ffd4', glow:'rgba(80,255,160,0.50)',   size:0.95 },
  { core:'#fff0a0', glow:'rgba(255,220,60,0.42)',   size:0.80 },
  { core:'#d0ffee', glow:'rgba(60,255,180,0.45)',   size:0.92 },
];

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let count = Math.min(parseInt(localStorage.getItem('selfup_count') || '0'), MAX);

function loadMessages() {
  try {
    const s = JSON.parse(localStorage.getItem('selfup_messages') || 'null');
    if (Array.isArray(s) && s.length > 0) return s;
  } catch(e) {}
  return ['오늘도 잘 버텼어요', '당신은 충분해요', '하나씩, 천천히', '스스로를 믿어요', '잘 하고 있어요'];
}
function saveMessages() { localStorage.setItem('selfup_messages', JSON.stringify(userMessages)); }
let userMessages = loadMessages();

// 반딧불 색 시드
let colorSeeds = JSON.parse(localStorage.getItem('selfup_seeds') || '[]');
function ensureSeeds(n) {
  while (colorSeeds.length < n) colorSeeds.push(Math.floor(Math.random() * FF_PALETTES.length));
  colorSeeds.length = n;
  localStorage.setItem('selfup_seeds', JSON.stringify(colorSeeds));
}
ensureSeeds(count);

// ═══════════════════════════════════
// DOM
// ═══════════════════════════════════
const jarContainer   = document.getElementById('jarContainer');
const marbleCanvas   = document.getElementById('marbleCanvas');
const sparkCanvas    = document.getElementById('sparkCanvas');
const overflowCanvas = document.getElementById('overflowCanvas');
const starCanvas     = document.getElementById('starCanvas');
const countNum       = document.getElementById('countNum');
const fillBarInner   = document.getElementById('fillBarInner');
const msgText        = document.getElementById('msgText');
const overflowMsg    = document.getElementById('overflowMsg');
const resetBtn       = document.getElementById('resetBtn');
const fillRect       = document.getElementById('fillRect');
const jarSvg         = document.getElementById('jarSvg');
const audioUnlock    = document.getElementById('audioUnlock');

const mCtx = marbleCanvas.getContext('2d');
const sCtx = sparkCanvas.getContext('2d');
const oCtx = overflowCanvas.getContext('2d');
const starCtx = starCanvas.getContext('2d');

// ═══════════════════════════════════
// STAR BACKGROUND
// ═══════════════════════════════════
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 0.3 + Math.random() * 1.2,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.8,
    });
  }
}
function drawStars(t) {
  starCanvas.width  = window.innerWidth;
  starCanvas.height = window.innerHeight;
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    const b = 0.2 + 0.5 * Math.abs(Math.sin(t * s.speed + s.phase));
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    starCtx.fillStyle = `rgba(200,240,215,${b})`;
    starCtx.fill();
  });
}
initStars();

// ═══════════════════════════════════
// AUDIO
// ═══════════════════════════════════
let audioCtx   = null;
let audioBuffer= null;
let audioReady = false;

async function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const unlock = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src = audioCtx.createBufferSource();
    src.buffer = unlock; src.connect(audioCtx.destination); src.start(0);
    const res = await fetch('effect 1.mp3');
    if (!res.ok) throw new Error('mp3 not found');
    audioBuffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
    audioReady = true;
  } catch(e) { console.log('Audio:', e.message); }
}

function playSound() {
  if (!audioReady || !audioCtx || !audioBuffer) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {}
}

document.getElementById('startBtn').addEventListener('click', async () => {
  await initAudio();
  audioUnlock.style.transition = 'opacity 0.6s';
  audioUnlock.style.opacity = '0';
  setTimeout(() => audioUnlock.remove(), 650);
});

// ═══════════════════════════════════
// RESIZE
// ═══════════════════════════════════
function resizeCanvases() {
  const r = jarContainer.getBoundingClientRect();
  marbleCanvas.width  = r.width;
  marbleCanvas.height = r.height;
  marbleCanvas.style.width  = r.width  + 'px';
  marbleCanvas.style.height = r.height + 'px';
  sparkCanvas.width  = overflowCanvas.width  = window.innerWidth;
  sparkCanvas.height = overflowCanvas.height = window.innerHeight;
  drawFireflies();
}
window.addEventListener('resize', () => setTimeout(resizeCanvases, 100));

// ═══════════════════════════════════
// JAR GEOMETRY
// ═══════════════════════════════════
function getJarBounds() {
  const rect    = jarContainer.getBoundingClientRect();
  const svgRect = jarSvg.getBoundingClientRect();
  const scaleX  = svgRect.width  / 200;
  const scaleY  = svgRect.height / 280;
  const offsetX = svgRect.left - rect.left;
  const offsetY = svgRect.top  - rect.top;
  return {
    left:   offsetX + 34  * scaleX,
    right:  offsetX + 166 * scaleX,
    top:    offsetY + 54  * scaleY,
    bottom: offsetY + 260 * scaleY,
    scaleX, scaleY, offsetX, offsetY
  };
}

// ═══════════════════════════════════
// FIREFLY STATE
// ═══════════════════════════════════
let fireflies = [];

function createFirefly(idx) {
  const bounds = getJarBounds();
  const pal = FF_PALETTES[colorSeeds[idx] % FF_PALETTES.length];
  const W = bounds.right - bounds.left;
  const H = bounds.bottom - bounds.top;
  return {
    x: bounds.left + 10 + Math.random() * (W - 20),
    y: bounds.top  + 10 + Math.random() * (H - 20),
    r: (3.5 + Math.random() * 3) * pal.size,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    blinkPhase: Math.random() * Math.PI * 2,
    blinkSpeed: 1.2 + Math.random() * 2.0,
    trail: [],
    pal,
    idx,
  };
}

function syncFireflies() {
  // 현재 count 수만큼 유지
  while (fireflies.length > count) fireflies.pop();
  while (fireflies.length < count) {
    const idx = fireflies.length;
    fireflies.push(createFirefly(idx));
  }
}

// ═══════════════════════════════════
// DRAW FIREFLY
// ═══════════════════════════════════
function drawSingleFirefly(ctx, ff, t) {
  const blink = 0.35 + 0.65 * Math.abs(Math.sin(t * ff.blinkSpeed + ff.blinkPhase));

  // Trail
  ff.trail.forEach((pt, ti) => {
    const a = (ti / ff.trail.length) * 0.25 * blink;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, ff.r * 0.4 * (ti / ff.trail.length), 0, Math.PI * 2);
    ctx.fillStyle = ff.pal.core;
    ctx.globalAlpha = a;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Outer glow
  const gr = ctx.createRadialGradient(ff.x, ff.y, 0, ff.x, ff.y, ff.r * 7 * blink);
  gr.addColorStop(0, ff.pal.glow);
  gr.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(ff.x, ff.y, ff.r * 7 * blink, 0, Math.PI * 2);
  ctx.fillStyle = gr;
  ctx.fill();

  // Core
  ctx.beginPath();
  ctx.arc(ff.x, ff.y, ff.r * blink, 0, Math.PI * 2);
  ctx.fillStyle = ff.pal.core;
  ctx.globalAlpha = blink;
  ctx.fill();

  // Bright center
  ctx.beginPath();
  ctx.arc(ff.x, ff.y, ff.r * 0.38 * blink, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = blink * 0.85;
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════
// MAIN ANIMATION LOOP
// ═══════════════════════════════════
let animT = 0;
let lastTs = 0;

function drawFireflies(ts) {
  if (ts === undefined) ts = lastTs;
  lastTs = ts;
  animT = ts * 0.001;

  if (!marbleCanvas.width) return;
  mCtx.clearRect(0, 0, marbleCanvas.width, marbleCanvas.height);

  const bounds = getJarBounds();

  // Ambient glow at bottom
  if (count > 0) {
    const pct = count / MAX;
    const glowH = (bounds.bottom - bounds.top) * Math.min(pct * 1.4, 1);
    const glowY = bounds.bottom - glowH;
    const ag = mCtx.createLinearGradient(0, glowY, 0, bounds.bottom);
    ag.addColorStop(0, 'rgba(60,180,90,0)');
    ag.addColorStop(1, `rgba(60,180,90,${0.10 * pct})`);
    mCtx.fillStyle = ag;
    mCtx.fillRect(bounds.left, glowY, bounds.right - bounds.left, glowH);
  }

  // Move & draw fireflies
  fireflies.forEach((ff) => {
    // Drift
    ff.vx += (Math.random() - 0.5) * 0.025;
    ff.vy += (Math.random() - 0.5) * 0.025;
    ff.vx = Math.max(-0.65, Math.min(0.65, ff.vx));
    ff.vy = Math.max(-0.65, Math.min(0.65, ff.vy));

    ff.x += ff.vx;
    ff.y += ff.vy;

    // Bounce inside jar
    if (ff.x < bounds.left  + 8) { ff.x = bounds.left  + 8; ff.vx =  Math.abs(ff.vx); }
    if (ff.x > bounds.right - 8) { ff.x = bounds.right - 8; ff.vx = -Math.abs(ff.vx); }
    if (ff.y < bounds.top   + 8) { ff.y = bounds.top   + 8; ff.vy =  Math.abs(ff.vy); }
    if (ff.y > bounds.bottom- 8) { ff.y = bounds.bottom- 8; ff.vy = -Math.abs(ff.vy); }

    // Trail
    ff.trail.push({ x: ff.x, y: ff.y });
    if (ff.trail.length > 10) ff.trail.shift();

    drawSingleFirefly(mCtx, ff, animT);
  });

  updateFillRect();
}

function startLoop() {
  function loop(ts) {
    drawStars(ts * 0.001);
    drawFireflies(ts);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════
// FILL RECT
// ═══════════════════════════════════
function updateFillRect() {
  const pct    = count / MAX;
  const bounds = getJarBounds();
  const totalH = bounds.bottom - bounds.top;
  const fillH  = totalH * pct;
  const fillY  = bounds.bottom - fillH;
  const svgRect= jarSvg.getBoundingClientRect();
  const cRect  = jarContainer.getBoundingClientRect();
  const sY     = 280 / svgRect.height;
  fillRect.setAttribute('y',      Math.max(44, (fillY + cRect.top - svgRect.top) * sY));
  fillRect.setAttribute('height', Math.max(0, fillH * sY));
  fillRect.setAttribute('opacity', String(Math.min(1, pct * 1.5)));
}

// ═══════════════════════════════════
// CLICK EFFECTS
// ═══════════════════════════════════
function spawnRipple(cx, cy) {
  const el = document.createElement('div');
  el.className = 'ripple';
  const sz = 80;
  el.style.cssText = `width:${sz}px;height:${sz}px;left:${cx - sz/2}px;top:${cy - sz/2}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function spawnFloatFF(cx, cy, pal) {
  const sz = 10 + Math.random() * 8;
  const el = document.createElement('div');
  el.className = 'float-ff';
  el.style.cssText = `width:${sz}px;height:${sz}px;left:${cx - sz/2}px;top:${cy - sz/2}px;background:${pal.core};box-shadow:0 0 ${sz*2}px ${sz/2}px ${pal.glow};`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnSparks(cx, cy, pal) {
  const pts = [];
  for (let i = 0; i < 16; i++) {
    const a = (Math.PI * 2 * i / 16) + Math.random() * 0.4;
    const s = 2 + Math.random() * 4;
    pts.push({ x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
               life:1, decay:0.03+Math.random()*0.025, r:2+Math.random()*4, c:pal.core, g:pal.glow });
  }
  function anim() {
    sCtx.globalCompositeOperation = 'destination-out';
    sCtx.fillStyle = 'rgba(0,0,0,0.12)';
    sCtx.fillRect(0, 0, sparkCanvas.width, sparkCanvas.height);
    sCtx.globalCompositeOperation = 'source-over';
    let alive = false;
    pts.forEach(p => {
      if (p.life <= 0) return; alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay;
      // Glow
      const rg = sCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4 * p.life);
      rg.addColorStop(0, p.g); rg.addColorStop(1, 'rgba(0,0,0,0)');
      sCtx.beginPath(); sCtx.arc(p.x, p.y, p.r * 4 * p.life, 0, Math.PI * 2);
      sCtx.fillStyle = rg; sCtx.globalAlpha = p.life * 0.6; sCtx.fill();
      // Core
      sCtx.beginPath(); sCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      sCtx.fillStyle = p.c; sCtx.globalAlpha = p.life; sCtx.fill();
      sCtx.globalAlpha = 1;
    });
    if (alive) requestAnimationFrame(anim);
    else sCtx.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);
  }
  anim();
}

// ═══════════════════════════════════
// OVERFLOW
// ═══════════════════════════════════
let overflowParticles = [];
let overflowAnimating = false;

function startOverflow() {
  overflowAnimating = true;
  overflowParticles = [];
  const b   = getJarBounds();
  const sr  = jarContainer.getBoundingClientRect();
  const top = sr.top + b.top;
  const W   = b.right - b.left;

  function spawnOne() {
    if (!overflowAnimating) return;
    const pal = FF_PALETTES[Math.floor(Math.random() * FF_PALETTES.length)];
    overflowParticles.push({
      x: sr.left + b.left + Math.random() * W,
      y: top,
      vx: (Math.random() - 0.5) * 2,
      vy: -1.5 - Math.random() * 2.5,
      r: 4 + Math.random() * 8,
      pal,
      life: 1,
      blinkPhase: Math.random() * Math.PI * 2,
    });
    if (overflowParticles.length < 60) setTimeout(spawnOne, 50 + Math.random() * 80);
  }
  spawnOne();

  function anim(ts) {
    const t = ts * 0.001;
    oCtx.clearRect(0, 0, overflowCanvas.width, overflowCanvas.height);
    overflowParticles.forEach(p => {
      p.vy += 0.35; p.x += p.vx; p.y += p.vy; p.life -= 0.006;
      if (p.y > overflowCanvas.height + 20) p.life = 0;
      if (p.life > 0) {
        const blink = 0.5 + 0.5 * Math.abs(Math.sin(t * 3 + p.blinkPhase));
        oCtx.save();
        oCtx.globalAlpha = Math.min(1, p.life * 2.5);
        const rg = oCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6 * blink);
        rg.addColorStop(0, p.pal.glow); rg.addColorStop(1, 'rgba(0,0,0,0)');
        oCtx.beginPath(); oCtx.arc(p.x, p.y, p.r * 6 * blink, 0, Math.PI * 2);
        oCtx.fillStyle = rg; oCtx.fill();
        oCtx.beginPath(); oCtx.arc(p.x, p.y, p.r * blink, 0, Math.PI * 2);
        oCtx.fillStyle = p.pal.core; oCtx.fill();
        oCtx.restore();
      }
    });
    overflowParticles = overflowParticles.filter(p => p.life > 0);
    if (overflowAnimating) requestAnimationFrame(anim);
    else oCtx.clearRect(0, 0, overflowCanvas.width, overflowCanvas.height);
  }
  requestAnimationFrame(anim);
  setTimeout(() => overflowMsg.classList.add('show'), 1200);
}

function stopOverflow() {
  overflowAnimating = false;
  overflowMsg.classList.remove('show');
  setTimeout(() => oCtx.clearRect(0, 0, overflowCanvas.width, overflowCanvas.height), 500);
}

// ═══════════════════════════════════
// UI UPDATE
// ═══════════════════════════════════
function updateUI(doAnim = false) {
  countNum.textContent = count;
  if (doAnim) {
    countNum.classList.add('pop');
    setTimeout(() => countNum.classList.remove('pop'), 400);
  }
  fillBarInner.style.width = (count / MAX * 100) + '%';
  jarContainer.classList.toggle('full', count >= MAX);
}

function showMessage() {
  if (!userMessages.length) return;
  const msg = userMessages[Math.floor(Math.random() * userMessages.length)];
  msgText.classList.remove('show');
  setTimeout(() => {
    msgText.textContent = msg + ' ✨';
    msgText.classList.add('show');
    setTimeout(() => msgText.classList.remove('show'), 2800);
  }, 100);
}

// ═══════════════════════════════════
// MAIN CLICK
// ═══════════════════════════════════
function handleJarClick(e) {
  e.preventDefault();
  if (count >= MAX) { startOverflow(); return; }

  const cx = e.clientX ?? (e.touches && e.touches[0].clientX) ?? window.innerWidth / 2;
  const cy = e.clientY ?? (e.touches && e.touches[0].clientY) ?? window.innerHeight / 2;

  count++;
  ensureSeeds(count);
  localStorage.setItem('selfup_count', count);

  // 새 반딧불 추가
  fireflies.push(createFirefly(count - 1));

  const newPal = FF_PALETTES[colorSeeds[count - 1] % FF_PALETTES.length];

  playSound();
  spawnRipple(cx, cy);
  spawnFloatFF(cx, cy, newPal);
  spawnSparks(cx, cy, newPal);
  showMessage();
  updateUI(true);

  if (count >= MAX) setTimeout(startOverflow, 400);
}

jarContainer.addEventListener('click',      handleJarClick);
jarContainer.addEventListener('touchstart', handleJarClick, { passive: false });

// ═══════════════════════════════════
// RESET
// ═══════════════════════════════════
resetBtn.addEventListener('click', () => {
  stopOverflow();
  count = 0; colorSeeds = []; fireflies = [];
  localStorage.setItem('selfup_count', 0);
  localStorage.setItem('selfup_seeds', '[]');
  updateUI(false);
});

// ═══════════════════════════════════
// 격려문구 패널
// ═══════════════════════════════════
const msgEditBtn    = document.getElementById('msgEditBtn');
const msgPanel      = document.getElementById('msgPanel');
const panelClose    = document.getElementById('panelClose');
const panelBackdrop = document.getElementById('panelBackdrop');
const msgList       = document.getElementById('msgList');
const msgAddInput   = document.getElementById('msgAddInput');
const msgAddBtn     = document.getElementById('msgAddBtn');

function renderMsgList() {
  msgList.innerHTML = '';
  if (!userMessages.length) {
    const p = document.createElement('p');
    p.className = 'msg-panel-empty';
    p.textContent = '아직 문구가 없어요.\n아래에서 추가해보세요 ✨';
    msgList.appendChild(p); return;
  }
  userMessages.forEach((msg, idx) => {
    const item = document.createElement('div');
    item.className = 'msg-item';
    const ta = document.createElement('textarea');
    ta.className = 'msg-item-text'; ta.value = msg; ta.rows = 1; ta.readOnly = true;
    ta.addEventListener('click', () => { ta.readOnly=false; ta.classList.add('editing'); ta.focus(); ta.selectionStart=ta.value.length; });
    ta.addEventListener('blur', () => {
      const v = ta.value.trim();
      if (v) userMessages[idx] = v; else userMessages.splice(idx, 1);
      saveMessages(); ta.readOnly=true; ta.classList.remove('editing'); renderMsgList();
    });
    ta.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();ta.blur();} });
    ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; });
    const del = document.createElement('button');
    del.className='msg-item-del'; del.textContent='×';
    del.addEventListener('click', () => { userMessages.splice(idx,1); saveMessages(); renderMsgList(); });
    item.append(ta, del);
    msgList.appendChild(item);
  });
}

function openPanel()  { renderMsgList(); msgPanel.classList.add('open'); panelBackdrop.classList.add('open'); }
function closePanel() { msgPanel.classList.remove('open'); panelBackdrop.classList.remove('open'); }

msgEditBtn   .addEventListener('click', openPanel);
panelClose   .addEventListener('click', closePanel);
panelBackdrop.addEventListener('click', closePanel);

msgAddBtn.addEventListener('click', () => {
  const v = msgAddInput.value.trim();
  if (!v) return;
  userMessages.push(v); saveMessages(); msgAddInput.value='';
  renderMsgList();
  setTimeout(() => msgList.scrollTop = msgList.scrollHeight, 50);
});
msgAddInput.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();msgAddBtn.click();} });

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.addEventListener('load', () => {
  setTimeout(() => {
    resizeCanvases();
    syncFireflies();
    updateUI(false);
    if (count >= MAX) jarContainer.classList.add('full');
    startLoop();
  }, 200);
});
</script>
