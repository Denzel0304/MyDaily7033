<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>건강 지킴이</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --sky-light: #c8e8f8;
    --sky-dark: #5ba8d4;
    --sky-deep: #3a8bbf;
    --white: #ffffff;
    --card-bg: rgba(255,255,255,0.92);
    --text: #1a2e3b;
    --text-muted: #6b8fa3;
    --border: #b8d8ec;
    --accent: #e8732a;
    --accent-light: #fdeee4;
    --danger: #e05c5c;
    --success: #4caf7d;
    --shadow: 0 4px 20px rgba(58,139,191,0.15);
    --shadow-lg: 0 8px 40px rgba(58,139,191,0.22);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #b8e4f7 0%, #87CEEB 40%, #a8d8ea 80%, #caeaf7 100%);
    min-height: 100vh;
    color: var(--text);
    padding-bottom: 150px;
  }

  /* ── HEADER ── */
  .app-header {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.6);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(58,139,191,0.12);
  }
  .header-top {
    position: relative;
    text-align: center;
  }
  .app-title {
    font-family: 'Gowun Batang', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--sky-deep);
    letter-spacing: -0.5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .header-gear-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--sky-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.2s;
  }
  .header-gear-btn:hover { background: var(--sky-light); }
  .header-gear-btn.open { transform: translateY(-50%) rotate(60deg); background: var(--sky-light); }

  .gear-menu {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 28px rgba(20,50,80,0.20);
    border: 1px solid var(--border);
    z-index: 110;
    min-width: 150px;
    overflow: hidden;
    animation: popIn 0.15s ease;
  }
  .gear-menu.active { display: block; }
  .gear-menu button {
    width: 100%;
    background: none;
    border: none;
    padding: 11px 14px;
    font-size: 0.85rem;
    text-align: left;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gear-menu button:hover { background: var(--sky-light); }
  .gear-menu button + button { border-top: 1px solid var(--sky-light); }

  .search-bar {
    position: relative;
    margin-bottom: 12px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.9);
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--sky-dark); }
  .search-bar .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    color: var(--text-muted);
  }

  /* ── MAIN ── */
  .main-container { padding: 16px; }

  .sort-info {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: right;
    margin-bottom: 8px;
  }

  /* ── RECIPE CARD ── */
  .recipe-list { display: flex; flex-direction: column; gap: 12px; }
  .recipe-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.8);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .recipe-card.dragging {
    opacity: 0.5;
    transform: scale(0.98);
  }
  .recipe-card.drag-over {
    border: 2px dashed var(--sky-dark);
    box-shadow: var(--shadow-lg);
  }

  .card-header {
    display: flex;
    align-items: center;
    padding: 14px 14px 14px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .card-title-area { flex: 1; min-width: 0; }
  .card-title {
    font-family: 'Gowun Batang', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .card-hospital {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-hospital .hosp-icon {
    font-size: 0.85rem;
  }
  .card-hospital-name {
    font-weight: 600;
    color: var(--sky-deep);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-side {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .card-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.74rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 11px;
    line-height: 1.4;
    white-space: nowrap;
  }
  .card-chip.chip-date {
    background: var(--sky-light);
    color: var(--sky-deep);
  }
  .card-chip.chip-duration {
    background: #fdeee4;
    color: var(--accent);
  }
  .card-stars { display: flex; gap: 1px; margin-top: 2px; }
  .star { font-size: 0.9rem; color: #ddd; }
  .star.filled { color: #f5b842; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .card-btn {
    background: none;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .card-btn:hover { background: var(--sky-light); }
  .card-btn.delete:hover { background: #fdeaea; }

  /* card-preview removed – click directly opens view */

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 80px;          /* 탭바(64px) 위 여유 */
    right: 18px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sky-dark), var(--sky-deep));
    color: white;
    font-size: 1.6rem;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(58,139,191,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 200;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 8px 28px rgba(58,139,191,0.5); }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,50,80,0.45);
    backdrop-filter: blur(4px);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-overlay.center-modal { align-items: center; }

  /* ── EDIT MODAL (bottom sheet) ── */
  .edit-sheet {
    background: white;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.28s ease;
    box-shadow: 0 -8px 40px rgba(20,50,80,0.25);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: #ccc;
    border-radius: 2px;
    margin: 10px auto 0;
    flex-shrink: 0;
  }
  .sheet-header {
    display: flex;
    align-items: center;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--sky-light);
    gap: 10px;
    flex-shrink: 0;
  }
  .sheet-title {
    flex: 1;
    font-family: 'Gowun Batang', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
  }
  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── FORM ELEMENTS ── */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--sky-deep);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    background: #fafdff;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--sky-dark); background: white; }

  /* ── STAR RATING (edit) ── */
  .star-rating-edit { display: flex; gap: 6px; padding: 4px 0; }
  .star-edit {
    font-size: 1.6rem;
    cursor: pointer;
    color: #ddd;
    transition: color 0.12s, transform 0.12s;
    user-select: none;
  }
  .star-edit.filled { color: #f5b842; }
  .star-edit:hover { transform: scale(1.2); }

  /* ── SECTION BLOCK (양념장/메모) ── */
  .section-block {
    background: #f4f9fd;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .section-block.dragging { opacity: 0.5; }
  .section-block.drag-over-section { border: 2px dashed var(--sky-dark); }
  .section-block-header {
    display: flex;
    align-items: center;
    background: var(--sky-light);
    border-bottom: 1px solid var(--border);
    gap: 8px;
    /* cursor은 handle에만 적용 */
  }
  .section-drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    min-width: 46px;
    align-self: stretch;        /* 헤더 전체 높이만큼 터치 영역 확보 */
    cursor: grab;
    touch-action: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    border-right: 1px solid var(--border);
    background: rgba(0,0,0,0.03);
    user-select: none;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .section-drag-handle:hover { background: rgba(91,168,212,0.15); color: var(--sky-deep); }
  .section-drag-handle:active { cursor: grabbing; }
  .section-block-header-inner {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 9px 12px 9px 0;
    gap: 8px;
    min-width: 0;
  }
  .section-block-title {
    flex: 1;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--sky-deep);
  }
  .section-block-body { padding: 12px; }
  .btn-remove-section {
    background: none;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    color: var(--danger);
    padding: 2px 6px;
    flex-shrink: 0;
  }

  /* 투약 카드: 두 줄 헤더 (1행: 라벨+✕, 2행: 병원 이름) */
  .section-block-header.two-line {
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    padding: 0;
  }
  .section-block-header.two-line .section-header-row1 {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0;
  }
  .section-block-header.two-line .section-header-row1 .section-drag-handle {
    border-bottom: 1px solid var(--border);
  }
  .section-block-header.two-line .section-header-row2 {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px 9px 12px;
    background: var(--sky-light);
    border-top: 1px dashed var(--border);
    min-width: 0;
  }
  .section-block-header.two-line .section-header-row2 .dose-hosp-input {
    flex: 1;
    min-width: 0;
  }

  /* ── SAUCE ROWS ── */
  .sauce-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .sauce-row.dragging { opacity: 0.4; }
  .sauce-row.drag-over-row { border-top: 2px solid var(--sky-dark); }
  .sauce-drag {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    min-width: 32px;
    height: 36px;           /* 재료 input과 동일한 높이 */
    background: #f0f7fd;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: grab;
    touch-action: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    flex-shrink: 0;
    user-select: none;
    transition: background 0.12s, color 0.12s;
  }
  .sauce-drag:hover { background: var(--sky-light); color: var(--sky-deep); }
  .sauce-drag:active { cursor: grabbing; }
  .sauce-name {
    flex: 2;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: white;
    min-width: 0;
  }
  .sauce-name:focus { border-color: var(--sky-dark); }
  .sauce-amount {
    width: 62px;
    padding: 8px 6px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: white;
    text-align: center;
  }
  .sauce-amount:focus { border-color: var(--sky-dark); }
  .sauce-unit-wrap { position: relative; flex-shrink: 0; }
  .sauce-unit {
    padding: 8px 22px 8px 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: white;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    color: var(--text);
  }
  .sauce-unit:focus { border-color: var(--sky-dark); }
  .sauce-unit-wrap::after {
    content: '▾';
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.65rem;
    color: var(--text-muted);
    pointer-events: none;
  }
  .sauce-del {
    background: none;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    color: #ccc;
    flex-shrink: 0;
    padding: 2px;
  }
  .sauce-del:hover { color: var(--danger); }
  .btn-add-row {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    color: var(--sky-dark);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 7px 12px;
    cursor: pointer;
    width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .btn-add-row:hover { background: var(--sky-light); }

  /* ── MEMO TEXTAREA ── */
  .memo-textarea {
    width: 100%;
    min-height: 90px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.88rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    resize: vertical;
    background: white;
    line-height: 1.7;
  }
  .memo-textarea:focus { border-color: var(--sky-dark); }

  /* ── ADD SECTION BUTTONS ── */
  .add-section-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .btn-add-section {
    flex: 1;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--sky-deep);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .btn-add-section:hover { background: var(--sky-light); border-color: var(--sky-dark); }

  /* ── SHEET FOOTER ── */
  .sheet-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--sky-light);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: white;
  }
  .btn-cancel {
    flex: 1;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-save {
    flex: 2;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--sky-dark), var(--sky-deep));
    color: white;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    box-shadow: 0 4px 14px rgba(58,139,191,0.3);
  }

  /* ── VIEW MODAL ── */
  .view-sheet {
    background: white;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.28s ease;
    box-shadow: 0 -8px 40px rgba(20,50,80,0.25);
  }
  .view-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    -webkit-overflow-scrolling: touch;
  }
  .view-title {
    font-family: 'Gowun Batang', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .view-stars { display: flex; gap: 3px; margin-bottom: 20px; }
  .view-star { font-size: 1.2rem; color: #ddd; }
  .view-star.filled { color: #f5b842; }
  .view-section {
    margin-bottom: 20px;
  }
  .view-section-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--sky-deep);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 2px solid var(--sky-light);
    padding-bottom: 5px;
    margin-bottom: 10px;
  }
  .view-sauce-table { width: 100%; border-collapse: collapse; }
  .view-sauce-table td {
    padding: 6px 8px;
    font-size: 0.88rem;
    border-bottom: 1px solid #f0f7fc;
  }
  .view-sauce-table td:first-child { color: var(--text); font-weight: 500; }
  .view-sauce-table td:last-child { color: var(--text-muted); text-align: right; white-space: nowrap; }
  .view-memo {
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    background: #f8fcff;
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid var(--sky-light);
  }
  .view-close {
    margin: 0 20px 20px;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--sky-light);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--sky-deep);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    width: calc(100% - 40px);
    flex-shrink: 0;
  }

  /* ── CONFIRM MODAL ── */
  .confirm-box {
    background: white;
    border-radius: var(--radius);
    padding: 24px 20px 20px;
    width: 90%;
    max-width: 340px;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .confirm-title {
    font-family: 'Gowun Batang', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
  .confirm-msg { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; }
  .btn-no {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-muted);
  }
  .btn-yes {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: var(--danger);
    color: white;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── ALERT MODAL ── */
  .alert-box {
    background: white;
    border-radius: var(--radius);
    padding: 24px 20px 20px;
    width: 90%;
    max-width: 340px;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.2s ease;
  }
  .alert-icon { font-size: 2rem; margin-bottom: 10px; }
  .alert-title { font-family: 'Gowun Batang', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--danger); }
  .alert-msg { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .btn-alert-ok {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--sky-dark);
    color: white;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.7; }

  /* ── BOTTOM TAB BAR ── */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(184,216,236,0.6);
    display: flex;
    z-index: 150;
    box-shadow: 0 -2px 16px rgba(58,139,191,0.10);
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-muted);
    font-size: 0.7rem;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 6px 4px 8px;
    transition: color 0.15s, background 0.15s, font-size 0.15s;
    position: relative;
  }
  .tab-btn .tab-icon {
    font-size: 1.3rem;
    line-height: 1;
    transition: font-size 0.15s, transform 0.15s;
  }
  .tab-btn.active {
    color: var(--sky-deep);
    font-weight: 700;
    font-size: 0.82rem;
    background: linear-gradient(180deg, rgba(184,228,247,0.55) 0%, rgba(168,216,234,0.55) 100%);
  }
  .tab-btn.active .tab-icon {
    font-size: 1.6rem;
    transform: translateY(-1px);
  }
  /* 탭 위/아래 띠 (active 강조) */
  .tab-btn.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 8%;
    right: 8%;
    height: 3px;
    background: var(--sky-deep);
    border-radius: 0 0 3px 3px;
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 8%;
    right: 8%;
    height: 3px;
    background: var(--sky-deep);
    border-radius: 3px 3px 0 0;
  }

  /* ── DOSE (투약) CARD EXTRAS ── */
  .card-meta-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    font-size: 0.74rem;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .card-meta-row .meta-date { color: var(--sky-deep); font-weight: 600; }

  /* ── DATE INPUT BUTTON (편집 모달) ── */
  .date-input-btn {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: #fafdff;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date-input-btn:hover { border-color: var(--sky-dark); }
  .date-input-btn .date-icon { font-size: 1rem; }

  .dose-hosp-input {
    flex: 1;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: white;
    min-width: 0;
  }
  .dose-hosp-input:focus { border-color: var(--sky-dark); }

  .dose-hosp-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .dose-hosp-row .hosp-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--sky-deep);
    flex-shrink: 0;
  }

  /* sauce-name 단독 사용 시 (약 이름 only) - 양념장 row 재활용하나 amount/unit 숨김 */
  .sauce-row.med-row .sauce-amount,
  .sauce-row.med-row .sauce-unit-wrap { display: none; }
  .sauce-row.med-row .sauce-name { flex: 1; }

  /* ── CALENDAR MODAL ── */
  .calendar-box {
    background: white;
    border-radius: var(--radius);
    width: 90%;
    max-width: 340px;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.2s ease;
    overflow: hidden;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--sky-light);
    border-bottom: 1px solid var(--border);
  }
  .cal-nav {
    background: none;
    border: none;
    font-size: 1.1rem;
    color: var(--sky-deep);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 700;
  }
  .cal-nav:hover { background: rgba(255,255,255,0.6); }
  .cal-title {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    color: var(--sky-deep);
    font-size: 1rem;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 10px;
    gap: 2px;
  }
  .cal-dow {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    padding: 6px 0;
  }
  .cal-dow.sun { color: var(--danger); }
  .cal-dow.sat { color: var(--sky-deep); }
  .cal-day {
    text-align: center;
    padding: 8px 0;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 8px;
    color: var(--text);
    transition: background 0.12s;
  }
  .cal-day:hover { background: var(--sky-light); }
  .cal-day.other { color: #ccc; }
  .cal-day.today { font-weight: 700; color: var(--sky-deep); }
  .cal-day.selected {
    background: var(--sky-dark);
    color: white;
    font-weight: 700;
  }
  .cal-day.sun { color: #e88a8a; }
  .cal-day.sat { color: var(--sky-dark); }
  .cal-day.selected.sun, .cal-day.selected.sat { color: white; }
  .cal-footer {
    display: flex;
    gap: 8px;
    padding: 10px 14px 14px;
  }
  .cal-footer button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-muted);
  }
  .cal-footer .cal-today-btn { color: var(--sky-deep); }
  .cal-footer .cal-confirm {
    background: linear-gradient(135deg, var(--sky-dark), var(--sky-deep));
    color: white;
    border: none;
  }

  /* ── DOSE EDIT: section sauce row date display ── */
  .dose-section-date {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--sky-deep);
    font-weight: 600;
    margin-bottom: 10px;
    width: 100%;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .dose-section-date:hover { background: var(--sky-light); }

  /* ── 복약 (TAKE) ITEMS ── */
  .take-list { display: flex; flex-direction: column; gap: 10px; }
  .take-day-group {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.8);
    overflow: hidden;
  }
  .take-day-group.collapsed .take-bundle {
    display: none;
  }
  .take-day-group.collapsed .take-day-header {
    border-bottom: none;
  }
  /* 하루치 모두 완료된 그룹은 금색 강조 */
  .take-day-group.all-done .take-day-header {
    background: linear-gradient(135deg, #fff4d4, #ffe9a8);
    color: #8a6210;
    border-bottom-color: #f0d68a;
  }
  .take-day-group.all-done .take-day-header .day-progress {
    color: #b8860b;
    background: rgba(255,255,255,0.55);
  }
  .take-day-group.all-done {
    border-color: #f0d68a;
  }
  .take-day-collapse-btn {
    background: none;
    border: none;
    color: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 2px 4px;
    margin-right: 8px;
    transition: transform 0.2s;
    line-height: 1;
    flex-shrink: 0;
    pointer-events: none; /* 클릭은 헤더 전체가 받음 */
  }
  .take-day-collapse-btn.collapsed {
    transform: rotate(-90deg);
  }
  .take-day-header-left {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }
  .take-day-header {
    background: var(--sky-light);
    padding: 10px 14px;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--sky-deep);
    font-family: 'Gowun Batang', serif;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
  }
  .take-day-header:hover {
    filter: brightness(0.97);
  }
  .take-day-header .day-progress {
    font-size: 0.92rem;
    font-weight: 800;
    color: var(--sky-deep);
    background: rgba(255,255,255,0.5);
    padding: 2px 9px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }

  /* 완료 구분선 (하루치 모두 완료된 그룹들과 미완료 그룹들 사이) */
  .take-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 4px;
    margin: 4px 0;
  }
  .take-divider::before,
  .take-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d8b75c, transparent);
  }
  .take-divider-text {
    font-size: 0.72rem;
    font-weight: 700;
    color: #8a6210;
    background: linear-gradient(135deg, #fff4d4, #ffe9a8);
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid #f0d68a;
    white-space: nowrap;
  }
  .take-bundle {
    padding: 10px 14px;
    border-bottom: 1px solid #f0f7fc;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
  }
  .take-bundle:last-child { border-bottom: none; }
  .take-bundle.checked {
    background: #ececec;
    color: #888;
  }
  .take-bundle.checked .take-med-list,
  .take-bundle.checked .take-time { color: #888; }
  .take-check {
    width: 32px;
    height: 32px;
    border: 2px solid var(--sky-dark);
    border-radius: 8px;
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    color: white;
    transition: background 0.12s;
    padding: 0;
  }
  .take-check.checked { background: var(--sky-dark); }
  .take-bundle-info { flex: 1; min-width: 0; }
  /* 약별로 한 줄: [시간 칩] [약 이름] ............ [✕ 우측 끝] */
  .take-med-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
  }
  .take-med-row + .take-med-row {
    margin-top: 2px;
  }
  .take-med-row .med-time {
    font-size: 0.82rem;
    color: var(--sky-deep);
    font-weight: 700;
    flex-shrink: 0;
    padding: 2px 7px;
    background: rgba(135,206,235,0.15);
    border-radius: 8px;
    white-space: nowrap;
    cursor: pointer;
  }
  .take-med-row .med-time.invisible {
    visibility: hidden;
  }
  .take-med-row .med-name {
    flex: 1;
    min-width: 0;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
    line-height: 1.4;
  }
  .take-med-del {
    background: none;
    border: none;
    color: #c8c8c8;
    font-size: 0.95rem;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    flex-shrink: 0;
    line-height: 1;
    transition: background 0.12s, color 0.12s;
  }
  .take-med-del:hover {
    color: var(--danger);
    background: #fdeaea;
  }
  .take-del {
    background: none;
    border: none;
    font-size: 1rem;
    color: #ccc;
    cursor: pointer;
    padding: 4px 6px;
    flex-shrink: 0;
  }
  .take-del:hover { color: var(--danger); }

  /* take edit modal */
  .take-time-input {
    width: 110px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: white;
    text-align: center;
    flex-shrink: 0;
  }
  .take-time-input:focus { border-color: var(--sky-dark); }

  .take-day-count {
    width: 80px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: white;
    text-align: center;
  }

  .take-day-count:focus { border-color: var(--sky-dark); }

  /* ── 투약 → 복약 등록 버튼 ── */
  .btn-to-take {
    width: 100%;
    margin-top: 8px;
    padding: 8px 12px;
    background: linear-gradient(135deg, var(--sky-light), #d8eef9);
    border: 1.5px dashed var(--sky-dark);
    border-radius: 8px;
    color: var(--sky-deep);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-to-take:hover { background: var(--sky-light); border-style: solid; }

  /* ── 복약 등록 미리보기 (모달 내) ── */
  .take-preview {
    background: #f4f9fd;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 14px;
  }
  .take-preview-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--sky-deep);
    margin-bottom: 6px;
  }
  .take-preview-list {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.7;
  }

  /* ── 투약 묶음: 1일 N회 + 시간 입력 ── */
  .dose-times-wrap {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .dose-times-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .dose-times-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--sky-deep);
    flex-shrink: 0;
  }
  .dose-time-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #eef7fc;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 2px 4px 2px 8px;
  }
  .dose-time-chip input[type="time"] {
    border: none;
    background: transparent;
    font-size: 0.82rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    padding: 2px 0;
    outline: none;
    width: 95px;
    min-width: 95px;
  }
  .dose-time-chip input[type="time"]:disabled {
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .dose-time-chip.disabled {
    background: #f0f0f0;
    border-color: #ddd;
    opacity: 0.75;
  }
  .dose-time-chip-del {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0 4px;
    line-height: 1;
  }
  .dose-time-chip-del:hover { color: var(--danger); }
  .dose-time-chip-del:disabled {
    color: #ddd;
    cursor: not-allowed;
  }
  .dose-time-chip-del:disabled:hover { color: #ddd; }
  .dose-time-add {
    background: white;
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    color: var(--sky-deep);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    padding: 3px 10px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .dose-time-add:hover { background: var(--sky-light); }
  .dose-times-count {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* 등록 완료 상태 버튼 */
  .btn-to-take.registered {
    background: #ececec;
    color: #888;
    border: 1.5px solid #ccc;
    cursor: not-allowed;
  }
  .btn-to-take.registered:hover {
    background: #ececec;
    border-style: solid;
  }

  /* 투약/메모 섹션 접기/펴기 */
  .section-collapse-btn {
    background: none;
    border: none;
    color: var(--sky-deep);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px 6px;
    transition: transform 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .section-collapse-btn.collapsed {
    transform: rotate(-90deg);
  }
  .section-block.collapsed .section-block-body {
    display: none;
  }
  .section-block.collapsed .section-block-header {
    border-bottom: none;
  }
  .section-block-summary {
    display: none;
    padding: 6px 12px 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
    background: #fafdff;
    border-top: 1px dashed var(--border);
  }
  .section-block.collapsed .section-block-summary {
    display: block;
  }
  .section-block.collapsed .section-block-summary:empty {
    display: none;
  }

  /* 복약 묶음 헤더의 X 버튼 */
  .take-day-delete {
    background: none;
    border: none;
    color: #aaa;
    font-size: 1rem;
    cursor: pointer;
    padding: 0 4px;
    margin-left: 8px;
    line-height: 1;
    flex-shrink: 0;
  }
  .take-day-delete:hover { color: var(--danger); }
  .take-day-header-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-top">
    <span class="app-title">💙 건강 지킴이</span>
    <button class="header-gear-btn" id="gearBtn" onclick="toggleGearMenu(event)" title="메뉴">⚙️</button>
    <div class="gear-menu" id="gearMenu">
      <button onclick="exportData(); closeGearMenu()">📤 내보내기</button>
      <button onclick="document.getElementById('importFile').click(); closeGearMenu()">📥 가져오기</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- MAIN: 투약 탭 -->
<div class="main-container" id="doseView">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="병명 / 병원 / 약 검색..." oninput="renderList()">
  </div>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════
const FILE_SIGNATURE = 'HEALTH_APP_V1';

// 기존 recipes 변수명을 doses 로 의미 전환 (구조는 동일하게 sections 활용)
// dose item: { id, title(병명), startDate(YYYY-MM-DD), sections:[
//    {id, type:'sauce', title(병원명), date(YYYY-MM-DD),
//     rows:[{id, name(약), starred(bool)}]}
//   |{id, type:'memo', title, content}
// ]}
let doses = loadDoses();
let takeBundles = loadTakes();   // 복약: [{id, day(YYYY-MM-DD), time, meds:[{id,name,time}], checked:bool}]
                                 // 실제 단위는 묶음(bundle) — 같은 묶음의 약들을 한 번에 체크
let editingId = null;
let editMode = 'dose';           // 'dose' | 'take'
let confirmCallback = null;
let currentTab = 'dose';

// ── MODAL HISTORY MANAGEMENT (기존 로직 유지) ──
const modalStack = [];

window.addEventListener('popstate', function() {
  if (modalStack.length > 0) {
    const id = modalStack.pop();
    document.getElementById(id).classList.remove('active');
    if (id === 'confirmModal' && confirmCallback) {
      confirmCallback(false);
      confirmCallback = null;
    }
  }
});

function openModal(id) {
  modalStack.push(id);
  history.pushState({ modal: id, depth: modalStack.length }, '');
  document.getElementById(id).classList.add('active');
}

function closeModal(id) {
  if (modalStack.includes(id)) {
    history.back();
  } else {
    document.getElementById(id).classList.remove('active');
  }
}

function loadDoses() {
  try {
    const raw = localStorage.getItem('health_doses_v1');
    if (!raw) return [];
    return JSON.parse(raw);
  } catch { return []; }
}
function loadTakes() {
  try {
    const raw = localStorage.getItem('health_takes_v1');
    if (!raw) return [];
    return JSON.parse(raw);
  } catch { return []; }
}
function saveToStorage() {
  localStorage.setItem('health_doses_v1', JSON.stringify(doses));
  localStorage.setItem('health_takes_v1', JSON.stringify(takeBundles));
}
function newId() { return Date.now() + Math.random().toString(36).slice(2); }

// ── DATE UTIL ──
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${y}.${m}.${d}`;
}

// ══════════════════════════════════════════════
//  TAB SWITCH
// ══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabDose').classList.toggle('active', tab === 'dose');
  document.getElementById('tabTake').classList.toggle('active', tab === 'take');
  document.getElementById('doseView').style.display = tab === 'dose' ? 'block' : 'none';
  document.getElementById('takeView').style.display = tab === 'take' ? 'block' : 'none';
  if (tab === 'dose') {
    renderList();
  } else {
    // 복약 탭 진입 시: 모든 날짜 그룹을 접고, 스크롤 최상단
    takeDayCollapsed = {};
    takeBundles.forEach(b => { takeDayCollapsed[b.day] = true; });
    renderTakes();
  }
  // 스크롤 최상단 (탭 전환 시 항상)
  const scrollTop = () => window.scrollTo({ top: 0, behavior: 'auto' });
  requestAnimationFrame(scrollTop);
  setTimeout(scrollTop, 50);
}

function onFabClick() {
  if (currentTab === 'dose') openEdit(null);
  else openTakeEdit(null);
}

// ── GEAR MENU ──
function toggleGearMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('gearMenu');
  const btn = document.getElementById('gearBtn');
  const isOpen = menu.classList.toggle('active');
  btn.classList.toggle('open', isOpen);
}
function closeGearMenu() {
  document.getElementById('gearMenu').classList.remove('active');
  document.getElementById('gearBtn').classList.remove('open');
}
document.addEventListener('click', (e) => {
  const menu = document.getElementById('gearMenu');
  const btn = document.getElementById('gearBtn');
  if (!menu || !btn) return;
  if (menu.classList.contains('active') &&
      !menu.contains(e.target) && !btn.contains(e.target)) {
    closeGearMenu();
  }
});

// ══════════════════════════════════════════════
//  EXPORT / IMPORT
// ══════════════════════════════════════════════
function exportData() {
  const data = { __signature__: FILE_SIGNATURE, doses, takeBundles };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `health_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.__signature__ !== FILE_SIGNATURE) {
        showAlert('형식 오류', '이 파일은 이 앱에서 내보낸 파일이 아닙니다.\n올바른 파일을 선택해주세요.');
        return;
      }
      doses = data.doses || [];
      takeBundles = data.takeBundles || [];
      saveToStorage();
      if (currentTab === 'dose') renderList(); else renderTakes();
      showAlert('가져오기 완료', `투약 ${doses.length}건, 복약 ${takeBundles.length}건 불러왔습니다.`, 'success');
    } catch {
      showAlert('형식 오류', '파일을 읽을 수 없어요. 손상된 파일이거나 형식이 맞지 않아요.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ══════════════════════════════════════════════
//  RENDER LIST (투약 탭)
// ══════════════════════════════════════════════
function renderList() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  let list = [...doses];
  if (q) {
    list = list.filter(d => {
      if ((d.title || '').toLowerCase().includes(q)) return true;
      // 병원/약 이름까지 검색
      return (d.sections || []).some(sec => {
        if (sec.type !== 'sauce') return false;
        if ((sec.title || '').toLowerCase().includes(q)) return true;
        return (sec.rows || []).some(r => (r.name || '').toLowerCase().includes(q));
      });
    });
  }

  // 날짜순 (startDate asc - 빠른 날짜가 위)
  list.sort((a, b) => (a.startDate || '').localeCompare(b.startDate || ''));

  const container = document.getElementById('recipeList');
  container.innerHTML = '';
  document.getElementById('emptyState').style.display = list.length === 0 ? 'block' : 'none';

  list.forEach((dose) => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.dataset.id = dose.id;

    // 모든 투약 섹션의 병원 이름 모음 (중복 제거)
    const hospitals = [];
    const seen = new Set();
    (dose.sections || []).forEach(sec => {
      if (sec.type !== 'sauce') return;
      const h = (sec.title || '').trim();
      if (h && !seen.has(h)) { seen.add(h); hospitals.push(h); }
    });
    const hospText = hospitals.length === 0
      ? '<span style="color:#bbb">병원 미입력</span>'
      : hospitals.length === 1
        ? escHtml(hospitals[0])
        : `${escHtml(hospitals[0])} <span style="color:var(--text-muted);font-weight:500">외 ${hospitals.length - 1}</span>`;

    // 총 투약 일수 (모든 sauce 섹션 duration 합산)
    let totalDays = 0;
    (dose.sections || []).forEach(sec => {
      if (sec.type !== 'sauce') return;
      const d = parseInt(sec.duration);
      if (d && d > 0) totalDays += d;
    });

    const dateHtml = dose.startDate
      ? `<span class="card-chip chip-date">📅 ${fmtDate(dose.startDate)}</span>`
      : '';
    const durHtml = totalDays > 0
      ? `<span class="card-chip chip-duration">💊 ${totalDays}일</span>`
      : '';

    card.innerHTML = `
      <div class="card-header" onclick="openEdit('${dose.id}')">
        <div class="card-title-area">
          <div class="card-title">${escHtml(dose.title || '병명 없음')}</div>
          <div class="card-hospital">
            <span class="hosp-icon">🏥</span>
            <span class="card-hospital-name">${hospText}</span>
          </div>
        </div>
        <div class="card-side">
          ${dateHtml}
          ${durHtml}
        </div>
        <div class="card-actions">
          <button class="card-btn delete" title="삭제" onclick="event.stopPropagation(); deleteDose('${dose.id}')">✕</button>
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  EDIT MODAL
// ══════════════════════════════════════════════
let editSections = []; // [{id, type:'sauce'|'memo', rows|content, title, date}]
let editStartDate = '';

// ── 포인터 기반 드래그 정렬 (터치 + 마우스 통합) ──
const _drag = { on: false, el: null, ghost: null, cnt: null, sel: null, from: -1, oy: 0, cb: null, cntRect: null };

function _dragStart(e) {
  if (_drag.on) return;                           // 이미 드래그 중이면 무시
  const cfg = e.currentTarget._sortCfg;
  if (!cfg) return;
  const handle = e.target.closest(cfg.handleSel);
  if (!handle) return;
  const item = handle.closest(cfg.itemSel);
  if (!item || !e.currentTarget.contains(item)) return;

  e.preventDefault();
  e.stopPropagation();                            // 부모 컨테이너로 버블링 차단

  const rect  = item.getBoundingClientRect();
  const cRect = e.currentTarget.getBoundingClientRect();

  _drag.on      = true;
  _drag.el      = item;
  _drag.cnt     = e.currentTarget;
  _drag.sel     = cfg.itemSel;
  _drag.from    = [...e.currentTarget.querySelectorAll(cfg.itemSel)].indexOf(item);
  _drag.oy      = e.clientY - rect.top;
  _drag.cb      = cfg.onReorder;
  _drag.cntRect = cRect;                          // 컨테이너 경계 저장

  const g = item.cloneNode(true);
  g.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;`
    + `opacity:.88;pointer-events:none;z-index:9999;`
    + `box-shadow:0 10px 32px rgba(20,50,80,.28);border-radius:10px;transform:scale(1.03);margin:0;`;
  document.body.appendChild(g);
  _drag.ghost = g;
  item.style.opacity = '.25';
}

document.addEventListener('pointermove', e => {
  if (!_drag.on) return;
  e.preventDefault();

  // ghost를 컨테이너 세로 범위 내로 클램프
  const rawTop  = e.clientY - _drag.oy;
  const minTop  = _drag.cntRect.top;
  const maxTop  = _drag.cntRect.bottom - _drag.ghost.offsetHeight;
  _drag.ghost.style.top = Math.max(minTop, Math.min(maxTop, rawTop)) + 'px';

  _drag.ghost.style.visibility = 'hidden';
  const under = document.elementFromPoint(e.clientX, e.clientY);
  _drag.ghost.style.visibility = '';

  const target = under?.closest(_drag.sel);
  // 반드시 같은 컨테이너 내부의 아이템이어야만 이동
  if (target && target !== _drag.el && _drag.cnt.contains(target)) {
    const items = [..._drag.cnt.querySelectorAll(_drag.sel)];
    const ci = items.indexOf(_drag.el), ti = items.indexOf(target);
    if (ci !== ti) ci < ti ? target.after(_drag.el) : target.before(_drag.el);
  }
}, { passive: false });

function _dragEnd() {
  if (!_drag.on) return;
  _drag.ghost?.remove();
  _drag.el.style.opacity = '';
  const items  = [..._drag.cnt.querySelectorAll(_drag.sel)];
  const toIdx  = items.indexOf(_drag.el);
  // toIdx가 유효하고 위치가 실제로 바뀐 경우에만 콜백
  if (toIdx >= 0 && toIdx !== _drag.from) {
    _drag.cb(_drag.from, toIdx);
  }
  Object.assign(_drag, { on: false, el: null, ghost: null, cnt: null, sel: null, from: -1, cb: null, cntRect: null });
}
document.addEventListener('pointerup', _dragEnd);
document.addEventListener('pointercancel', _dragEnd);

function setupSortable(container, itemSel, handleSel, onReorder) {
  if (container._sortListener) container.removeEventListener('pointerdown', container._sortListener);
  container._sortCfg = { itemSel, handleSel, onReorder };
  container._sortListener = _dragStart;
  container.addEventListener('pointerdown', _dragStart, { passive: false });
}

function openEdit(id) {
  editMode = 'dose';
  editingId = id;
  if (id) {
    const r = doses.find(x => x.id === id);
    document.getElementById('editModalTitle').textContent = '투약 수정';
    editStartDate = r.startDate || todayStr();
    editSections = JSON.parse(JSON.stringify(r.sections || []));
    // 편집 진입 시 모든 투약/메모 카드를 접어서 시작 (필요할 때만 펴서 보도록)
    editSections.forEach(s => { s.collapsed = true; });
    renderEditBody(r.title || '');
  } else {
    document.getElementById('editModalTitle').textContent = '투약';
    editStartDate = todayStr();
    editSections = [];
    renderEditBody('');
  }
  openModal('editModal');
  // 스크롤 항상 최상단으로 (한 번 더 보장)
  const scrollToTop = () => {
    const body = document.getElementById('editBody');
    if (body) body.scrollTop = 0;
  };
  requestAnimationFrame(scrollToTop);
  setTimeout(scrollToTop, 50);
  setTimeout(scrollToTop, 200);
}

function closeEdit() {
  closeModal('editModal');
}

function renderEditBody(titleVal) {
  const body = document.getElementById('editBody');
  body.innerHTML = '';

  // 병명
  const titleGroup = makeEl('div', 'form-group');
  titleGroup.innerHTML = `<label class="form-label">병명</label>
    <input class="form-input" id="editTitle" type="text" placeholder="예: 감기" value="${escHtml(titleVal)}">`;
  body.appendChild(titleGroup);

  // 발병일 (startDate)
  const dateGroup = makeEl('div', 'form-group');
  dateGroup.innerHTML = `<label class="form-label">발병일</label>
    <button type="button" class="date-input-btn" id="editStartDateBtn" onclick="openCalendarFor('start', null, null)">
      <span class="date-icon">📅</span>
      <span id="editStartDateText">${fmtDate(editStartDate)}</span>
    </button>`;
  body.appendChild(dateGroup);

  // Sections
  const sectionsContainer = makeEl('div', '');
  sectionsContainer.id = 'sectionsContainer';
  body.appendChild(sectionsContainer);
  renderSections();

  // Add section buttons
  const addRow = makeEl('div', 'add-section-row');
  addRow.innerHTML = `
    <button class="btn-add-section" onclick="addSection('sauce')">💊 투약 추가</button>
    <button class="btn-add-section" onclick="addSection('memo')">📝 메모 추가</button>
  `;
  body.appendChild(addRow);
}

function renderSections() {
  const container = document.getElementById('sectionsContainer');
  if (!container) return;
  container.innerHTML = '';

  // 메모/투약 별도 넘버링용 카운터
  let doseNum = 0;
  let memoNum = 0;

  editSections.forEach((sec, sIdx) => {
    const block = makeEl('div', 'section-block');
    block.dataset.secId = sec.id;
    block.dataset.secIdx = sIdx;
    if (sec.collapsed) block.classList.add('collapsed');

    if (sec.type === 'sauce') {
      doseNum++;
      // 투약 섹션 (두 줄 헤더):
      //   1행: [드래그] [▼토글] [💊 투약 N]                [✕]
      //   2행:               [병원 이름 입력란]
      const collapsedClass = sec.collapsed ? ' collapsed' : '';
      block.innerHTML = `
        <div class="section-block-header two-line">
          <div class="section-header-row1">
            <span class="section-drag-handle" title="드래그로 순서 변경">☰</span>
            <button class="section-collapse-btn${collapsedClass}" onclick="toggleSectionCollapse(${sIdx})" title="접기/펴기">▼</button>
            <span style="flex:1;font-size:0.78rem;font-weight:700;color:var(--sky-deep);white-space:nowrap;padding:9px 0">💊 투약 ${doseNum}</span>
            <button class="btn-remove-section" onclick="removeDoseSection(${sIdx})" title="삭제" style="margin-right:10px">✕</button>
          </div>
          <div class="section-header-row2">
            <span style="font-size:0.78rem;font-weight:600;color:var(--sky-deep);white-space:nowrap;flex-shrink:0">병원 이름</span>
            <input class="dose-hosp-input" placeholder="예: 서울내과" value="${escHtml(sec.title || '')}" oninput="editSections[${sIdx}].title=this.value">
          </div>
        </div>
        <div class="section-block-summary" id="secSummary-${sec.id}"></div>
        <div class="section-block-body" id="secBody-${sec.id}"></div>
      `;
    } else {
      memoNum++;
      // 메모: [드래그] [▼/▶ 토글] [📝 제목] [✕]
      const defaultTitle = `메모 ${memoNum}`;
      const displayTitle = sec.title || defaultTitle;
      const collapsedClass = sec.collapsed ? ' collapsed' : '';
      block.innerHTML = `
        <div class="section-block-header">
          <span class="section-drag-handle" title="드래그로 순서 변경">☰</span>
          <button class="section-collapse-btn${collapsedClass}" onclick="toggleSectionCollapse(${sIdx})" title="접기/펴기">▼</button>
          <div class="section-block-header-inner" style="padding-left:0">
            <span style="font-size:1rem">📝</span>
            <input class="section-title-input" style="flex:1;min-width:0;background:none;border:none;outline:none;font-size:0.8rem;font-weight:700;color:var(--sky-deep);font-family:'Noto Sans KR',sans-serif;" value="${escHtml(displayTitle)}" placeholder="${defaultTitle}" oninput="editSections[${sIdx}].title=this.value">
            <button class="btn-remove-section" onclick="removeMemoSection(${sIdx})" title="삭제">✕</button>
          </div>
        </div>
        <div class="section-block-summary" id="secSummary-${sec.id}"></div>
        <div class="section-block-body" id="secBody-${sec.id}"></div>
      `;
    }

    container.appendChild(block);
    renderSectionBody(sec, sIdx);
    renderSectionSummary(sec, sIdx);
  });

  // 포인터 기반 드래그 정렬 등록 (투약/메모 모두 가능)
  setupSortable(container, '.section-block', '.section-drag-handle', (from, to) => {
    const [moved] = editSections.splice(from, 1);
    editSections.splice(to, 0, moved);
    renderSections();
  });
}

// 접힌 상태일 때 표시할 요약 텍스트
function renderSectionSummary(sec, sIdx) {
  const el = document.getElementById('secSummary-' + sec.id);
  if (!el) return;
  if (sec.type === 'sauce') {
    const meds = (sec.rows || []).map(r => (r.name || '').trim()).filter(Boolean);
    const medText = meds.length ? meds.join(', ') : '(약 없음)';
    const dateText = sec.date ? `📅 ${fmtDate(sec.date)}` : '';
    const regBadge = sec.registered ? ' · ✓ 등록됨' : '';
    el.textContent = `${dateText} · ${medText}${regBadge}`;
  } else {
    const txt = (sec.content || '').trim();
    if (!txt) {
      el.textContent = '';
    } else {
      const firstLine = txt.split('\n')[0];
      el.textContent = firstLine.length > 40 ? firstLine.slice(0, 40) + '…' : firstLine;
    }
  }
}

function toggleSectionCollapse(sIdx) {
  editSections[sIdx].collapsed = !editSections[sIdx].collapsed;
  renderSections();
}

// 메모 삭제: 내용이 있으면 확인 모달, 없으면 즉시 삭제
function removeMemoSection(sIdx) {
  const sec = editSections[sIdx];
  if (!sec) return;
  const hasContent = (sec.content || '').trim().length > 0 || (sec.title || '').trim().length > 0;
  if (!hasContent) {
    editSections.splice(sIdx, 1);
    renderSections();
    return;
  }
  // 확인 모달
  document.getElementById('confirmTitle').textContent = '메모 삭제';
  document.getElementById('confirmMsg').textContent = '이 메모를 삭제할까요?\n삭제 후 복구할 수 없어요.';
  openModal('confirmModal');
  confirmCallback = (yes) => {
    if (yes) {
      editSections.splice(sIdx, 1);
      renderSections();
    }
  };
}

// 투약 삭제: 비어있으면 즉시, 내용 있으면 확인 모달
function removeDoseSection(sIdx) {
  const sec = editSections[sIdx];
  if (!sec) return;
  // 내용 판정: 병원 이름, 약 이름 1개 이상, 복용 일수, 처방일 변경, 또는 이미 등록됨 — 중 하나라도 있으면 "내용 있음"
  const hasHosp = (sec.title || '').trim().length > 0;
  const hasMeds = (sec.rows || []).some(r => (r.name || '').trim().length > 0);
  const hasDuration = sec.duration !== '' && sec.duration !== undefined && sec.duration !== null && parseInt(sec.duration) >= 1;
  const isReg = !!sec.registered;
  const hasContent = hasHosp || hasMeds || hasDuration || isReg;

  if (!hasContent) {
    editSections.splice(sIdx, 1);
    renderSections();
    return;
  }

  document.getElementById('confirmTitle').textContent = '투약 삭제';
  const msg = isReg
    ? '이 투약은 이미 복약에 등록되었어요.\n투약 항목만 삭제됩니다. 복약은 유지됩니다.'
    : '이 투약을 삭제할까요?\n삭제 후 복구할 수 없어요.';
  document.getElementById('confirmMsg').textContent = msg;
  openModal('confirmModal');
  confirmCallback = (yes) => {
    if (yes) {
      editSections.splice(sIdx, 1);
      renderSections();
    }
  };
}

function renderSectionBody(sec, sIdx) {
  const body = document.getElementById('secBody-' + sec.id);
  if (!body) return;
  body.innerHTML = '';

  if (sec.type === 'sauce') {
    const isReg = !!sec.registered;
    // 처방일 (날짜) 버튼 - 기본은 발병일과 같음
    if (!sec.date) sec.date = editStartDate || todayStr();
    const dateBtn = makeEl('button', 'dose-section-date');
    dateBtn.type = 'button';
    dateBtn.innerHTML = `📅 처방일: <span data-date>${fmtDate(sec.date)}</span>`;
    if (isReg) {
      dateBtn.disabled = true;
      dateBtn.style.opacity = '0.6';
      dateBtn.style.cursor = 'not-allowed';
    } else {
      dateBtn.onclick = () => openCalendarFor('section', sIdx, null);
    }
    body.appendChild(dateBtn);

    // Rows (약 이름만)
    sec.rows = sec.rows || [];
    sec.rows.forEach((row, rIdx) => {
      const rowEl = makeMedRow(sec, sIdx, row, rIdx);
      body.appendChild(rowEl);
    });
    if (!isReg) {
      const addRowBtn = makeEl('button', 'btn-add-row');
      addRowBtn.textContent = '+ 약 추가';
      addRowBtn.onclick = () => {
        sec.rows.push({ id: newId(), name: '' });
        renderSectionBody(sec, sIdx);
      };
      body.appendChild(addRowBtn);
    }

    // 1일 N회 + 시간들 입력
    if (!sec.dailyTimes) sec.dailyTimes = ['09:00'];
    // sec.duration 은 명시적으로 설정되지 않은 경우 빈칸 (사용자가 입력)
    if (sec.duration === undefined) sec.duration = '';
    const disAttr = isReg ? 'disabled' : '';
    const timesWrap = makeEl('div', 'dose-times-wrap');
    timesWrap.style.marginTop = '10px';
    timesWrap.innerHTML = `
      <div class="dose-times-row" style="margin-bottom:8px">
        <span class="dose-times-label">⏰ 1일</span>
        <span class="dose-times-count">${sec.dailyTimes.length}회</span>
      </div>
      <div class="dose-times-row" id="timesRow-${sec.id}"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)">
        <span class="dose-times-label">📆 복용 일수</span>
        <input type="number" min="1" max="60" value="${sec.duration === '' ? '' : sec.duration}" placeholder="숫자" ${disAttr}
               oninput="editSections[${sIdx}].duration=this.value===''?'':parseInt(this.value)||''"
               style="width:60px;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;outline:none${isReg ? ';background:#f0f0f0;color:#888;cursor:not-allowed' : ''}">
        <span style="font-size:0.78rem;color:var(--text-muted)">일</span>
      </div>
    `;
    body.appendChild(timesWrap);
    renderDoseTimes(sec, sIdx);

    // 이 묶음을 복약으로 보내기 버튼 (등록 상태면 비활성)
    const toTakeBtn = makeEl('button', 'btn-to-take');
    toTakeBtn.type = 'button';
    if (sec.registered) {
      toTakeBtn.classList.add('registered');
      toTakeBtn.innerHTML = '✓ 복약에 등록됨';
      toTakeBtn.disabled = true;
      toTakeBtn.onclick = (e) => e.preventDefault();
    } else {
      toTakeBtn.innerHTML = '⏰ 이 투약 묶음을 복약에 등록';
      toTakeBtn.onclick = () => sendSectionToTake(sIdx);
    }
    body.appendChild(toTakeBtn);

    // 포인터 기반 드래그 정렬 등록 (기존 로직 그대로)
    setupSortable(body, '.sauce-row', '.sauce-drag', (from, to) => {
      const rows = editSections[sIdx].rows;
      const [moved] = rows.splice(from, 1);
      rows.splice(to, 0, moved);
      renderSectionBody(editSections[sIdx], sIdx);
    });

  } else {
    // Memo
    const ta = makeEl('textarea', 'memo-textarea');
    ta.value = sec.content || '';
    ta.placeholder = '예: 1. 증상 메모 (Enter로 자동 번호)';
    ta.addEventListener('input', () => {
      renumberMemo(ta);
      sec.content = ta.value;
    });
    ta.addEventListener('keydown', e => handleMemoKey(e, ta, sec));
    body.appendChild(ta);
  }
}

function renderDoseTimes(sec, sIdx) {
  const row = document.getElementById('timesRow-' + sec.id);
  if (!row) return;
  row.innerHTML = '';
  const isReg = !!sec.registered;
  sec.dailyTimes.forEach((t, i) => {
    const chip = makeEl('div', 'dose-time-chip' + (isReg ? ' disabled' : ''));
    chip.innerHTML = `
      <input type="time" value="${escHtml(t)}" data-i="${i}" ${isReg ? 'disabled' : ''}>
      <button class="dose-time-chip-del" title="삭제" ${isReg ? 'disabled' : ''}>✕</button>
    `;
    if (!isReg) {
      chip.querySelector('input').addEventListener('input', e => {
        sec.dailyTimes[i] = e.target.value;
      });
      chip.querySelector('button').addEventListener('click', () => {
        if (sec.dailyTimes.length <= 1) {
          showAlert('알림', '최소 1개의 시간이 필요해요.');
          return;
        }
        sec.dailyTimes.splice(i, 1);
        renderSectionBody(sec, sIdx);
      });
    }
    row.appendChild(chip);
  });
  if (!isReg) {
    const addBtn = makeEl('button', 'dose-time-add');
    addBtn.type = 'button';
    addBtn.textContent = '+ 시간';
    addBtn.onclick = () => {
      // 추가 시간 시퀀스: 1번째=09:00, 2번째=13:00, 3번째=18:00, 4번째 이후=23:00
      const nextIdx = sec.dailyTimes.length; // 추가될 위치(0-based) → 즉 (현재 길이)번째
      const seq = ['09:00', '13:00', '18:00', '23:00'];
      const next = seq[nextIdx] || '23:00';
      sec.dailyTimes.push(next);
      renderSectionBody(sec, sIdx);
    };
    row.appendChild(addBtn);
  }
}

function makeMedRow(sec, sIdx, row, rIdx) {
  // sauce-row 클래스 + med-row 추가하면 amount/unit 자동 숨김
  const rowEl = makeEl('div', 'sauce-row med-row');
  rowEl.dataset.rIdx = rIdx;
  const isReg = !!sec.registered;

  if (isReg) {
    rowEl.innerHTML = `
      <span class="sauce-drag" style="opacity:0.4;cursor:not-allowed" title="등록된 투약은 변경할 수 없어요">☰</span>
      <input class="sauce-name" type="text" placeholder="약 이름" value="${escHtml(row.name||'')}" disabled style="background:#f0f0f0;color:#666;cursor:not-allowed">
    `;
  } else {
    rowEl.innerHTML = `
      <span class="sauce-drag" title="드래그로 순서 변경">☰</span>
      <input class="sauce-name" type="text" placeholder="약 이름" value="${escHtml(row.name||'')}" oninput="editSections[${sIdx}].rows[${rIdx}].name=this.value">
      <button class="sauce-del" onclick="removeMedRow(${sIdx},${rIdx})" title="삭제">✕</button>
    `;
  }

  return rowEl;
}

function removeMedRow(sIdx, rIdx) {
  editSections[sIdx].rows.splice(rIdx, 1);
  renderSectionBody(editSections[sIdx], sIdx);
}

function addSection(type) {
  editSections.push({
    id: newId(),
    type,
    title: '',
    date: editStartDate || todayStr(),
    rows: type === 'sauce' ? [{ id: newId(), name: '' }] : undefined,
