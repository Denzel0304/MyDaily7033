<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0820">
<title>N멍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap');
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#000;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    user-select:none; -webkit-user-select:none;
  }
  #app {
    position:fixed; top:0; left:0; width:100%; height:100%;
    touch-action:none; overflow:hidden;
  }
  canvas#c {
    position:absolute; top:0; left:0; width:100%; height:100%; display:block;
  }
  canvas#leaf-canvas {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:2; display:block;
  }
  /* ── UI 숨김 처리 (주석으로 보존) ──────────────────────────────
  #top-bar {
    position:absolute; top:0; left:0; right:0;
    padding:max(env(safe-area-inset-top,16px),16px) 20px 0;
    display:flex; align-items:center; gap:10px;
    z-index:30; pointer-events:none;
  }
  #app-icon {
    width:38px; height:38px; border-radius:11px;
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:0.5px solid rgba(255,255,255,0.22);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  #app-name {
    font-family:'Noto Serif KR',serif; font-size:22px; font-weight:300;
    color:rgba(255,255,255,0.92); letter-spacing:2px;
    text-shadow:0 2px 12px rgba(0,0,0,0.3);
  }
  #scene-label {
    position:absolute;
    bottom:calc(env(safe-area-inset-bottom,0px) + 58px);
    left:50%; transform:translateX(-50%);
    font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:300;
    color:rgba(255,255,255,0.65); letter-spacing:2.5px;
    text-shadow:0 1px 8px rgba(0,0,0,0.4);
    white-space:nowrap; z-index:30; pointer-events:none;
    transition:opacity 0.6s ease;
  }
  #dots {
    position:absolute;
    bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    left:50%; transform:translateX(-50%);
    display:flex; gap:7px; align-items:center;
    z-index:30; pointer-events:none;
  }
  .dot {
    width:5px; height:5px; border-radius:50%;
    background:rgba(255,255,255,0.3);
    transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  .dot.active { width:20px; border-radius:3px; background:rgba(255,255,255,0.82); }
  .arrow-btn {
    position:absolute; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:0.5px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:30;
    transition:background 0.2s, transform 0.15s;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .arrow-btn:active { background:rgba(255,255,255,0.25); transform:translateY(-50%) scale(0.93); }
  #btn-left  { left:14px; }
  #btn-right { right:14px; }
  ────────────────────────────────────────────────────────────── */
  /* 상단 아이콘+앱명 바 숨김 */
  #top-bar   { display:none; }
  /* 씬 이름 라벨 숨김 */
  #scene-label { display:none; }
  /* 하단 점(dot) 인디케이터 숨김 */
  #dots      { display:none; }
  /* 좌우 화살표 버튼 숨김 */
  .arrow-btn { display:none; }
  #fade {
    position:absolute; top:0; left:0; right:0; bottom:0;
    background:#000; opacity:0; pointer-events:none; z-index:20;
    transition:opacity 0.32s ease;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>
  <canvas id="leaf-canvas"></canvas>
  <div id="fade"></div>
  <div id="top-bar">
    <div id="app-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C7.5 2 4 6.5 4 11C4 16 8 20 12 22C16 20 20 16 20 11C20 6.5 16.5 2 12 2Z"
              fill="rgba(255,255,255,0.75)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        <path d="M12 8V16M9 12.5C10.5 14 13.5 14 15 12.5"
              stroke="rgba(255,255,255,0.45)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <span id="app-name">N멍</span>
  </div>
  <div id="scene-label"></div>
  <div id="dots"></div>
  <button class="arrow-btn" id="btn-left" aria-label="이전 장면">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M11 4L6 9L11 14" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="arrow-btn" id="btn-right" aria-label="다음 장면">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M7 4L12 9L7 14" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const fade   = document.getElementById('fade');
const labelEl= document.getElementById('scene-label');
const dotsEl = document.getElementById('dots');
let W, H, dpr = Math.min(window.devicePixelRatio||1,2);

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.round(W*dpr);
  canvas.height = Math.round(H*dpr);
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.scale(dpr,dpr);
  const lc = document.getElementById('leaf-canvas');
  lc.width  = Math.round(W*dpr);
  lc.height = Math.round(H*dpr);
  lc.style.width = W+'px'; lc.style.height = H+'px';
  fireflyStars = null; // 리사이즈 시 별 위치 재생성
  initScene();
}
window.addEventListener('resize', resize);

const scenes = [
  { name:'봄 나무',      id:'spring_tree'    },
  { name:'별똥별',       id:'shooting_stars' },
  { name:'눈 내리는 밤', id:'snowfall'       },
  { name:'반딧불이',     id:'fireflies'      },
  { name:'벚꽃 비',      id:'sakura'         },
  { name:'불꽃놀이',     id:'fireworks'      },
  { name:'빗소리',       id:'rain'           },
  { name:'달빛 구름',    id:'mooncloud'      },
];

let currentIdx = Math.floor(Math.random()*scenes.length);
let particles=[], extras=[], animId, t=0;

/* buildDots: 하단 점 인디케이터 생성 함수 (숨김 처리됨)
function buildDots() {
  dotsEl.innerHTML='';
  scenes.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===currentIdx?' active':'');
    dotsEl.appendChild(d);
  });
}
*/
function buildDots() {} // 숨김 — 위 주석 참고
/* updateUI: 씬 이름 라벨 + 점 인디케이터 갱신 (숨김 처리됨)
function updateUI(){ labelEl.textContent=scenes[currentIdx].name; buildDots(); }
*/
function updateUI(){ buildDots(); } // 숨김 — 위 주석 참고

function changeScene(dir) {
  fade.style.opacity='1';
  setTimeout(()=>{
    currentIdx=(currentIdx+dir+scenes.length)%scenes.length;
    updateUI(); initScene(); fade.style.opacity='0';
  },320);
}

// 1분마다 랜덤으로 씬 전환 (현재 씬 제외)
function changeSceneRandom() {
  let nextIdx;
  do { nextIdx = Math.floor(Math.random()*scenes.length); } while(nextIdx === currentIdx);
  fade.style.opacity='1';
  setTimeout(()=>{
    currentIdx = nextIdx;
    updateUI(); initScene(); fade.style.opacity='0';
  },320);
}
let autoTimer = setInterval(changeSceneRandom, 60000);

// 드래그로 수동 전환 시 타이머를 리셋해서 1분 다시 카운트
function changeSceneManual(dir) {
  clearInterval(autoTimer);
  autoTimer = setInterval(changeSceneRandom, 60000);
  changeScene(dir);
}

document.getElementById('btn-left').addEventListener('click',()=>changeSceneManual(-1));
document.getElementById('btn-right').addEventListener('click',()=>changeSceneManual(1));

let touchX0=null, touchY0=null;
document.getElementById('app').addEventListener('touchstart',e=>{
  touchX0=e.touches[0].clientX; touchY0=e.touches[0].clientY;
},{passive:true});
document.getElementById('app').addEventListener('touchend',e=>{
  if(touchX0===null) return;
  const dx=e.changedTouches[0].clientX-touchX0;
  const dy=e.changedTouches[0].clientY-touchY0;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>48) changeSceneManual(dx<0?1:-1);
  touchX0=touchY0=null;
},{passive:true});
document.getElementById('app').addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

function initScene() {
  particles=[]; extras=[]; t=0;
  cancelAnimationFrame(animId);
  const id=scenes[currentIdx].id;
  if      (id==='spring_tree')    initSpringTree();
  else if (id==='shooting_stars') initShootingStars();
  else if (id==='snowfall')       initSnowfall();
  else if (id==='autumn')         initAutumn();
  else if (id==='fireflies')      initFireflies();
  else if (id==='sakura')         initSakura();
  else if (id==='jellyfish')      initJellyfish();
  else if (id==='fireworks')      initFireworks();
  else if (id==='rain')           initRain();
  else if (id==='aurora')         initAurora();
  else if (id==='mooncloud')      initMoonCloud();
  else if (id==='campfire')       initCampfire();
  else if (id==='candle')         initCandle();
  else if (id==='bamboo')         initBamboo();
  else if (id==='seaweed')        initSeaweed();
  loop();
}

/* ════════════════════════════════════════════
   1. 봄 나무
   ════════════════════════════════════════════ */
function initSpringTree() {}

function drawSpringBG() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#bde8a8');
  sky.addColorStop(0.5, '#d8f0c8');
  sky.addColorStop(1, '#e8f5d8');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  const gr = ctx.createLinearGradient(0, H*0.78, 0, H);
  gr.addColorStop(0, 'rgba(130,185,95,0.7)');
  gr.addColorStop(1, 'rgba(100,155,65,0.9)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, H*0.80, W, H*0.20);

  const sx = W / 390;
  const sy = H / 540;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#d4c4a8';
  ctx.beginPath();
  ctx.ellipse(195*sx, 494*sy, 82*sx, 13*sy, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.strokeStyle = '#c8a97a'; ctx.lineWidth = 26*Math.min(sx,sy);
  ctx.beginPath();
  ctx.moveTo(174*sx, 496*sy);
  ctx.bezierCurveTo(175*sx,430*sy, 179*sx,368*sy, 181*sx,328*sy);
  ctx.stroke();

  ctx.strokeStyle = '#b8956a'; ctx.lineWidth = 19*Math.min(sx,sy);
  ctx.beginPath();
  ctx.moveTo(216*sx, 496*sy);
  ctx.bezierCurveTo(215*sx,430*sy, 211*sx,368*sy, 209*sx,328*sy);
  ctx.stroke();

  ctx.strokeStyle = '#c8a97a';
  [
    {w:12, pts:[181,328, 158,286, 122,242, 84,198]},
    {w:11, pts:[196,302, 220,260, 258,226, 296,194]},
    {w:10, pts:[183,344, 150,328, 115,306, 82,268]},
    {w:10, pts:[207,340, 242,324, 278,304, 308,268]},
    {w:9,  pts:[190,275, 192,234, 191,192, 192,152]},
  ].forEach(b => {
    ctx.lineWidth = b.w * Math.min(sx,sy);
    ctx.beginPath();
    ctx.moveTo(b.pts[0]*sx, b.pts[1]*sy);
    ctx.bezierCurveTo(b.pts[2]*sx,b.pts[3]*sy, b.pts[4]*sx,b.pts[5]*sy, b.pts[6]*sx,b.pts[7]*sy);
    ctx.stroke();
  });

  ctx.lineWidth = 6*Math.min(sx,sy);
  ctx.beginPath(); ctx.moveTo(192*sx,165*sy); ctx.lineTo(118*sx,125*sy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(192*sx,165*sy); ctx.lineTo(264*sx,125*sy); ctx.stroke();

  [
    {cx:195,cy:255,rx:155,ry:138,op:0.17,c:'#5fa85f'},
    {cx:148,cy:232,rx:135,ry:120,op:0.19,c:'#6ab86a'},
    {cx:244,cy:228,rx:132,ry:118,op:0.19,c:'#6ab86a'},
    {cx:195,cy:218,rx:145,ry:128,op:0.23,c:'#78c878'},
    {cx:162,cy:200,rx:118,ry:106,op:0.27,c:'#88d288'},
    {cx:230,cy:196,rx:115,ry:103,op:0.27,c:'#88d288'},
    {cx:195,cy:178,rx:128,ry:114,op:0.30,c:'#96dc96'},
    {cx:172,cy:164,rx:100,ry:90, op:0.28,c:'#a4e0a4'},
    {cx:220,cy:161,rx:97, ry:87, op:0.28,c:'#a4e0a4'},
    {cx:195,cy:142,rx:102,ry:92, op:0.32,c:'#b0e6b0'},
    {cx:176,cy:128,rx:78, ry:70, op:0.28,c:'#bceabc'},
    {cx:215,cy:125,rx:75, ry:67, op:0.28,c:'#bceabc'},
    {cx:195,cy:110,rx:65, ry:58, op:0.30,c:'#c6eec6'},
  ].forEach(b => {
    ctx.globalAlpha = b.op;
    ctx.fillStyle   = b.c;
    ctx.beginPath();
    ctx.ellipse(b.cx*sx, b.cy*sy, b.rx*sx, b.ry*sy, 0, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ════════════════════════════════════════════
   2. 별똥별 — 달 거울 대칭 (그림자 왼쪽으로)
   ════════════════════════════════════════════ */
function initShootingStars() {
  for(let i=0;i<130;i++) particles.push({
    type:'star', x:Math.random()*W, y:Math.random()*H*0.88,
    r:0.3+Math.random()*1.3, a:0.25+Math.random()*0.75,
    twk:Math.random()*Math.PI*2, twkS:0.005+Math.random()*0.015,
  });
  spawnShooter();
}

function spawnShooter() {
  const speed = 0.6 + Math.random()*1.0;
  let sx, sy, angle;
  const edge = Math.floor(Math.random()*3);
  if(edge===0){
    sx = Math.random()*W; sy = -10;
    angle = (25+Math.random()*130)*Math.PI/180;
  } else if(edge===1){
    sx = -10; sy = Math.random()*H*0.4;
    angle = (10+Math.random()*65)*Math.PI/180;
  } else {
    sx = W+10; sy = Math.random()*H*0.4;
    angle = (105+Math.random()*65)*Math.PI/180;
  }
  extras.push({
    type:'shooter',
    x:sx, y:sy,
    vx:Math.cos(angle)*speed,
    vy:Math.sin(angle)*speed,
    trail:[],
    life:0,
    maxLife:200+Math.random()*150,
  });
}

function drawNightBG() {
  const skyG=ctx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,'#080620'); skyG.addColorStop(0.45,'#100e38'); skyG.addColorStop(1,'#181658');
  ctx.fillStyle=skyG; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.globalAlpha=0.06;
  const mw=ctx.createRadialGradient(W*0.5,H*0.32,0,W*0.5,H*0.32,W*0.7);
  mw.addColorStop(0,'#c8b8ee'); mw.addColorStop(1,'transparent');
  ctx.fillStyle=mw;
  ctx.beginPath(); ctx.ellipse(W*0.5,H*0.32,W*0.72,H*0.22,-0.28,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const mx = W*0.82, my = H*0.10, mr = 26;

  ctx.save();
  const moonGlow = ctx.createRadialGradient(mx,my,0,mx,my,mr*4);
  moonGlow.addColorStop(0,'rgba(255,248,210,0.20)');
  moonGlow.addColorStop(0.4,'rgba(255,242,190,0.08)');
  moonGlow.addColorStop(1,'transparent');
  ctx.fillStyle=moonGlow; ctx.beginPath(); ctx.arc(mx,my,mr*4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 달 — 그림자 원을 왼쪽으로 이동 (거울 대칭)
  const oc=document.createElement('canvas');
  const ocSize=mr*10;
  oc.width=ocSize; oc.height=ocSize;
  const oc2=oc.getContext('2d');
  const ocCx=ocSize/2, ocCy=ocSize/2;
  oc2.beginPath(); oc2.arc(ocCx,ocCy,mr,0,Math.PI*2);
  const mg=oc2.createRadialGradient(ocCx-mr*0.1,ocCy-mr*0.1,0,ocCx,ocCy,mr);
  mg.addColorStop(0,'#fffef0'); mg.addColorStop(0.7,'#fff8d8'); mg.addColorStop(1,'#ffe8a8');
  oc2.fillStyle=mg; oc2.fill();
  oc2.globalCompositeOperation='destination-out';
  oc2.beginPath(); oc2.arc(ocCx - mr*0.62, ocCy - mr*0.08, mr*0.92, 0, Math.PI*2);
  oc2.fillStyle='rgba(0,0,0,1)'; oc2.fill();
  ctx.save();
  ctx.drawImage(oc, mx-ocCx, my-ocCy);
  ctx.restore();

  ctx.fillStyle='rgba(5,4,20,0.96)';
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.bezierCurveTo(W*0.1,H*0.84,W*0.22,H*0.80,W*0.32,H*0.86);
  ctx.bezierCurveTo(W*0.42,H*0.92,W*0.52,H*0.78,W*0.64,H*0.84);
  ctx.bezierCurveTo(W*0.76,H*0.90,W*0.88,H*0.82,W,H*0.87);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

/* ════════════════════════════════════════════
   3. 눈 내리는 밤
   ════════════════════════════════════════════ */
function initSnowfall() {
  for(let i=0;i<60;i++) particles.push(makeSnow(true));
}
function makeSnow(scatter) {
  return {
    type:'snow',
    x:Math.random()*W,
    y:scatter?Math.random()*H:-8,
    r:1.4+Math.random()*3.8,
    vx:(Math.random()-0.5)*0.28,
    vy:0.18+Math.random()*0.38,
    a:0.45+Math.random()*0.55,
    swg:Math.random()*Math.PI*2,
    swgS:0.003+Math.random()*0.008,
    rot:Math.random()*Math.PI*2,
  };
}

function drawSnowflake(x,y,r,alpha,rot) {
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(215,232,255,0.90)';
  ctx.translate(x,y); ctx.rotate(rot);
  const pts = 8;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const ang = (i/pts)*Math.PI*2;
    const wobble = 1 + (Math.sin(ang*2.3+rot*1.7)*0.06 + Math.cos(ang*1.7+rot)*0.05);
    const rx = r*wobble;
    const ry = r*(1/wobble);
    const px = Math.cos(ang)*rx;
    const py = Math.sin(ang)*ry;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawSoftSnowTree(px, py, treeH) {
  ctx.save();
  ctx.lineCap='round'; ctx.lineJoin='round';

  ctx.strokeStyle='#2e1e0e'; ctx.lineWidth=treeH*0.035;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.bezierCurveTo(px-4, py-treeH*0.32, px+5, py-treeH*0.58, px-2, py-treeH*0.70);
  ctx.stroke();

  const branches=[
    {bx:px-2,by:py-treeH*0.70,ex:px-treeH*0.26,ey:py-treeH*0.54,w:treeH*0.018},
    {bx:px-2,by:py-treeH*0.70,ex:px+treeH*0.22,ey:py-treeH*0.50,w:treeH*0.016},
    {bx:px-2,by:py-treeH*0.70,ex:px-treeH*0.12,ey:py-treeH*0.82,w:treeH*0.014},
  ];
  branches.forEach(b=>{
    ctx.strokeStyle='rgba(36,22,10,0.75)'; ctx.lineWidth=b.w;
    ctx.beginPath(); ctx.moveTo(b.bx,b.by);
    ctx.quadraticCurveTo((b.bx+b.ex)/2+(b.ey<b.by?-15:10),(b.by+b.ey)/2-12,b.ex,b.ey);
    ctx.stroke();
  });

  const clusters=[
    {x:px+treeH*0.02, y:py-treeH*0.55, rx:treeH*0.28, ry:treeH*0.22},
    {x:px-treeH*0.14, y:py-treeH*0.62, rx:treeH*0.22, ry:treeH*0.18},
    {x:px+treeH*0.12, y:py-treeH*0.65, rx:treeH*0.20, ry:treeH*0.17},
    {x:px-treeH*0.04, y:py-treeH*0.76, rx:treeH*0.18, ry:treeH*0.15},
    {x:px+treeH*0.00, y:py-treeH*0.88, rx:treeH*0.12, ry:treeH*0.10},
  ];

  clusters.forEach(c=>{
    const layers=[
      {op:0.18,c:'#1a3520'},{op:0.22,c:'#1e3e26'},{op:0.26,c:'#224830'},
      {op:0.24,c:'#285038'},{op:0.20,c:'#305840'},
    ];
    layers.forEach((l,i)=>{
      ctx.save(); ctx.globalAlpha=l.op;
      ctx.fillStyle=l.c;
      ctx.beginPath();
      ctx.ellipse(c.x+(i-2)*2, c.y-(i*3), c.rx*(1-i*0.06), c.ry*(1-i*0.06), 0, 0, Math.PI*2);

    });
  });

  ctx.restore();
}

/* ════════════════════════════════════════════

function initAutumn() {

const autumnHues=[8,18,26,33,42];

function drawAutumnBG() {

// 가을 나무: 시드 기반 자연스러운 배치를 위해 seededRand 사용
function seededRand(seed){ let s=seed; return function(){ s=(s*9301+49297)%233280; return s/233280; }; }

function drawSoftAutumnTree(tx, ty, treeH, idx) {
  ctx.save();
  ctx.lineCap='round'; ctx.lineJoin='round';
  const rng = seededRand(idx*7919+31337);

  const lean = idx===0 ? -8 : 7;

  // 주 줄기: 더 많은 곡률로 자연스럽게
  const cp1x=tx+lean*0.2+(rng()-0.5)*8, cp1y=ty-treeH*0.25;
  const cp2x=tx+lean*0.6+(rng()-0.5)*8, cp2y=ty-treeH*0.50;
  const topX=tx+lean*0.5+(rng()-0.5)*6, topY=ty-treeH*0.65;

  ctx.strokeStyle='rgba(50,22,7,0.87)'; ctx.lineWidth=treeH*0.038;
  ctx.beginPath(); ctx.moveTo(tx,ty);
  ctx.bezierCurveTo(cp1x,cp1y, cp2x,cp2y, topX,topY);
  ctx.stroke();

  // 가지: 각도·위치·길이 모두 약간씩 무작위
  const branchDefs=[
    {side:idx===0?-1:1, ang:0.82+rng()*0.20, len:treeH*(0.26+rng()*0.06), w:0.019, from:0.04+rng()*0.04},
    {side:idx===0? 1:-1, ang:0.78+rng()*0.20, len:treeH*(0.24+rng()*0.06), w:0.016, from:0.13+rng()*0.04},
    {side:idx===0?-1:1, ang:0.55+rng()*0.18, len:treeH*(0.20+rng()*0.05), w:0.013, from:0.24+rng()*0.04},
    {side:idx===0? 1:-1, ang:0.40+rng()*0.18, len:treeH*(0.16+rng()*0.04), w:0.010, from:0.34+rng()*0.04},
    {side:idx===0?-1:1, ang:0.25+rng()*0.15, len:treeH*(0.12+rng()*0.03), w:0.008, from:0.44+rng()*0.04},
  ];

  const clusters=[];
  branchDefs.forEach((b,bi)=>{
    const bx=topX+(rng()-0.5)*5;
    const by=topY+treeH*b.from;
    const ang = b.side*(b.ang) - Math.PI/2;
    const ex=bx+Math.cos(ang)*b.len;
    const ey=by+Math.sin(ang)*b.len;
    const cpBx=bx+(ex-bx)*0.45+(rng()-0.5)*14;
    const cpBy=by+(ey-by)*0.45-(8+rng()*10);
    ctx.strokeStyle=`rgba(48,20,6,${0.80-bi*0.05})`; ctx.lineWidth=treeH*b.w;
    ctx.beginPath(); ctx.moveTo(bx,by);
    ctx.quadraticCurveTo(cpBx,cpBy,ex,ey); ctx.stroke();

    // 잔가지
    if(b.len>treeH*0.16){
      [-1,1].forEach(sd=>{
        const sa=ang+sd*(0.35+rng()*0.25);
        const sl=b.len*(0.38+rng()*0.14);
        const sx2=ex+Math.cos(sa)*sl, sy2=ey+Math.sin(sa)*sl;
        ctx.strokeStyle='rgba(48,20,6,0.52)'; ctx.lineWidth=treeH*b.w*0.52;
        ctx.beginPath(); ctx.moveTo(ex,ey);
        ctx.quadraticCurveTo((ex+sx2)/2+(rng()-0.5)*8,(ey+sy2)/2-4,sx2,sy2);
        ctx.stroke();
        clusters.push({x:sx2, y:sy2, r:sl*(0.50+rng()*0.15), hi:bi});
      });
    }
    clusters.push({x:ex, y:ey, r:b.len*(0.44+rng()*0.14), hi:bi});
  });
  clusters.push({x:topX, y:topY-treeH*0.05, r:treeH*(0.16+rng()*0.04), hi:0});

  // 잎 클러스터: 불규칙한 작은 원 무더기로 자연스러운 수관 표현
  clusters.forEach((c,ci)=>{
    const blobCount = 5+Math.floor(rng()*4);
    for(let b2=0;b2<blobCount;b2++){
      const offx=(rng()-0.5)*c.r*1.1;
      const offy=(rng()-0.5)*c.r*0.85;
      const br2=c.r*(0.38+rng()*0.30);
      const hue=autumnHues[( c.hi+b2 ) % autumnHues.length] + (rng()-0.5)*16;
      const op=0.28+rng()*0.24;
      ctx.save(); ctx.globalAlpha=op;
      ctx.fillStyle=`hsl(${hue},66%,${36+b2*3}%)`;
      ctx.beginPath(); ctx.arc(c.x+offx, c.y+offy, br2, 0, Math.PI*2);
      ctx.fill(); ctx.restore();
    }
  });

  ctx.restore();
}

function drawAutumnLeaf(p) {
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha=p.a;
  ctx.fillStyle=`hsl(${p.hue},70%,46%)`;
  ctx.beginPath();
  if(p.shape===0){
    ctx.ellipse(0,0,p.size*0.58,p.size*0.88,0,0,Math.PI*2);
  } else if(p.shape===1){
    ctx.moveTo(0,-p.size*0.88);
    ctx.bezierCurveTo(p.size*0.52,-p.size*0.35, p.size*0.60,p.size*0.32, 0,p.size*0.88);
    ctx.bezierCurveTo(-p.size*0.60,p.size*0.32,-p.size*0.52,-p.size*0.35, 0,-p.size*0.88);
  } else {
    ctx.ellipse(0,p.size*0.08,p.size*0.52,p.size*0.80,0,0,Math.PI*2);
  }
  ctx.fill();
  ctx.globalAlpha=p.a*0.25;
  ctx.strokeStyle=`hsl(${p.hue},40%,30%)`;
  ctx.lineWidth=0.7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-p.size*0.6); ctx.lineTo(0,p.size*0.6); ctx.stroke();
  ctx.restore();
}

function updateAutumnLeaf(p) {
  p.swg+=p.swgS;
  p.x+=p.vx+Math.sin(p.swg)*0.55;
  p.y+=p.vy; p.rot+=p.rotV;

  const floorY = H*0.78;

  if(p.y >= floorY) {
    p.y = floorY;
    extras.push({
      type:'settled',
      x:p.x, y:p.y,
      rot:p.rot+(Math.random()-0.5)*0.4,
      size:p.size*0.88,
      hue:p.hue, shape:p.shape,
      a:p.a,
      targetA:p.a*0.80,
    });
    if(extras.filter(e=>e.type==='settled').length>200) {
      const fi=extras.findIndex(e=>e.type==='settled');
      if(fi>-1) extras.splice(fi,1);
    }
    p._done = true;
  }
}

/* ════════════════════════════════════════════
   6. 반딧불이 초원
   ════════════════════════════════════════════ */
function initFireflies() {
  particles = [];
  for(let i=0;i<38;i++) particles.push(makeFirefly());
}
function makeFirefly() {
  return {
    type:'firefly',
    x: Math.random()*W,
    y: Math.random()*H,  // 화면 전체에서 생성
    vx: (Math.random()-0.5)*0.06,  // 속도 느리게 (기존 0.10 → 0.06)
    vy: (Math.random()-0.5)*0.05,  // 속도 느리게 (기존 0.08 → 0.05)
    phase: Math.random()*Math.PI*2,
    phaseS: 0.008 + Math.random()*0.012,
    blinkPhase: Math.random()*Math.PI*2,
    blinkS: 0.010 + Math.random()*0.018,
    r: 1.8 + Math.random()*2.2,
    wander: Math.random()*Math.PI*2,
    wanderS: 0.003 + Math.random()*0.004,  // 방향 전환도 느리게
    trail: [],
  };
}
let fireflyStars = null;
function drawFireflyBG() {
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050e08');
  sky.addColorStop(0.5,'#071a0e');
  sky.addColorStop(1,'#0a1f10');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 별 — 진짜 랜덤 위치 (첫 번째 호출 시 생성, 리사이즈 시 재생성)
  if(!fireflyStars || fireflyStars.length===0){
    fireflyStars=[];
    for(let i=0;i<60;i++){
      fireflyStars.push({
        x: Math.random()*W,
        y: Math.random()*H*0.80,
        r: 0.5+Math.random()*0.8,
        a: 0.15+Math.random()*0.35,
        twkOff: Math.random()*Math.PI*2,
      });
    }
  }
  ctx.save();
  fireflyStars.forEach(st=>{
    ctx.globalAlpha=st.a*(0.6+0.4*Math.sin(t*1.2+st.twkOff));
    ctx.fillStyle='#d8f0d0';
    ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();

  // 풀밭
  const gr = ctx.createLinearGradient(0,H*0.72,0,H);
  gr.addColorStop(0,'#071a0c');
  gr.addColorStop(1,'#030e06');
  ctx.fillStyle=gr; ctx.fillRect(0,H*0.74,W,H*0.26);

  // 풀 실루엣
  ctx.save();
  ctx.fillStyle='#040f07';
  for(let i=0;i<60;i++){
    const gx=((i*73.1)%1)*W;
    const gh=H*0.05+((i*53.7)%1)*H*0.10;
    ctx.beginPath();
    ctx.moveTo(gx-4, H*0.76);
    ctx.quadraticCurveTo(gx+((i%3)-1)*8, H*0.76-gh*0.5, gx+((i%5)-2)*3, H*0.76-gh);
    ctx.quadraticCurveTo(gx+((i%3)-1)*5, H*0.76-gh*0.5, gx+4, H*0.76);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}
function loopFireflies() {
  particles.forEach(p=>{
    p.wander += p.wanderS;
    p.vx += Math.cos(p.wander)*0.002;  // 가속도 줄임
    p.vy += Math.sin(p.wander)*0.002;
    p.vx *= 0.97; p.vy *= 0.97;
    p.x += p.vx; p.y += p.vy;
    if(p.x<0) p.x=W; if(p.x>W) p.x=0;
    if(p.y<0) p.y=H; if(p.y>H) p.y=0;  // 화면 전체 순환, 상단 제한 없음

    p.blinkPhase += p.blinkS;
    const blink = Math.max(0, Math.sin(p.blinkPhase));
    const glow = blink * blink;

    if(glow>0.05) {
      // 외부 글로우
      ctx.save();
      const glowR = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*9);
      glowR.addColorStop(0,`rgba(180,255,120,${glow*0.22})`);
      glowR.addColorStop(1,'rgba(180,255,120,0)');
      ctx.fillStyle=glowR;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*9,0,Math.PI*2); ctx.fill();
      // 코어
      const coreG = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.2);
      coreG.addColorStop(0,`rgba(230,255,180,${glow*0.95})`);
      coreG.addColorStop(0.4,`rgba(160,240,80,${glow*0.7})`);
      coreG.addColorStop(1,'rgba(100,200,60,0)');
      ctx.fillStyle=coreG;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.2,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  });
}

/* ════════════════════════════════════════════
   7. 연꽃 연못
   ════════════════════════════════════════════ */
let lotusRipples=[];
function initLotus() {
  particles=[]; lotusRipples=[];
  // 연꽃 배치
  const spots=[
    {x:W*0.22,y:H*0.58,s:1.0},{x:W*0.60,y:H*0.50,s:0.82},
    {x:W*0.80,y:H*0.70,s:0.70},{x:W*0.38,y:H*0.74,s:0.90},
    {x:W*0.10,y:H*0.72,s:0.62},{x:W*0.70,y:H*0.84,s:0.58},
  ];
  spots.forEach((sp,i)=>particles.push({type:'lotus',...sp,phase:i*1.1,phaseS:0.004+i*0.001}));
  // 잠자리
  extras=[{type:'dragonfly',x:W*0.5,y:H*0.35,vx:0.4,vy:0,phase:0,targetX:W*0.5,targetY:H*0.35,wait:0}];
}
function drawLotusBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#b8d4e8');
  sky.addColorStop(0.5,'#c8e0f0');
  sky.addColorStop(1,'#5a8aaa');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 수면
  const wg=ctx.createLinearGradient(0,H*0.38,0,H);
  wg.addColorStop(0,'rgba(80,140,170,0.92)');
  wg.addColorStop(0.3,'rgba(60,115,145,0.97)');
  wg.addColorStop(1,'rgba(40,85,115,1)');
  ctx.fillStyle=wg;
  ctx.beginPath();
  for(let x2=0;x2<=W;x2+=20){
    const wy=H*0.42+Math.sin(t*0.5+x2*0.03)*2.5+Math.cos(t*0.35+x2*0.018)*1.8;
    x2===0?ctx.moveTo(x2,wy):ctx.lineTo(x2,wy);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  // 수면 반짝임
  ctx.save();
  for(let i=0;i<14;i++){
    const sx=((i*157)%1)*W, sy=H*0.46+((i*73)%1)*H*0.48;
    const sa=0.08+0.12*Math.sin(t*1.2+i*2.3);
    ctx.globalAlpha=Math.max(0,sa);
    ctx.fillStyle='rgba(220,240,255,1)';
    ctx.beginPath(); ctx.ellipse(sx,sy,6+i%4,1.5,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 잔물결
  lotusRipples=lotusRipples.filter(r=>{
    r.life++;
    const a=r.a*(1-r.life/r.maxLife);
    ctx.save(); ctx.globalAlpha=a;
    ctx.strokeStyle='rgba(180,215,235,0.7)'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.ellipse(r.x,r.y,(r.life/r.maxLife)*r.maxR,(r.life/r.maxLife)*r.maxR*0.28,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    return r.life<r.maxLife;
  });
  if(Math.random()<0.012) lotusRipples.push({x:Math.random()*W,y:H*0.5+Math.random()*H*0.44,r:0,maxR:22+Math.random()*30,life:0,maxLife:120+Math.random()*80,a:0.55});
}
function drawLotusFlower(x,y,s,phase) {
  const bob=Math.sin(t*0.6+phase)*2.5*s;
  const fy=y+bob;

  // 연잎
  ctx.save();
  [[-0.18*W*0.08,0.06*H*0.08],[-0.06*W*0.08,0.12*H*0.08],[0.14*W*0.08,-0.04*H*0.08]].forEach(([lx,ly],i)=>{
    const lscale=(0.8+i*0.12)*s*55;
    ctx.save(); ctx.translate(x+lx,fy+ly+lscale*0.4);
    ctx.globalAlpha=0.72;
    ctx.fillStyle=`hsl(${140+i*8},52%,${32+i*4}%)`;
    ctx.beginPath();
    ctx.ellipse(0,0,lscale,lscale*0.55,i*0.4-0.3,0,Math.PI*2);
    ctx.fill();
    // 잎맥
    ctx.globalAlpha=0.15; ctx.strokeStyle='#1a4a1a'; ctx.lineWidth=0.8;
    for(let v=0;v<5;v++){
      const va=(v/4)*Math.PI-Math.PI/2;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(va)*lscale*0.85, Math.sin(va)*lscale*0.5); ctx.stroke();
    }
    ctx.restore();
  });

  // 꽃
  const petalCount=8;
  const pr=s*22;
  for(let pi=0;pi<petalCount;pi++){
    const ang=(pi/petalCount)*Math.PI*2;
    const px2=x+Math.cos(ang)*pr*0.85, py2=fy-s*8+Math.sin(ang)*pr*0.38;
    ctx.save(); ctx.translate(px2,py2); ctx.rotate(ang+Math.PI/2);
    ctx.globalAlpha=0.82;
    const pg=ctx.createLinearGradient(0,-pr*0.9,0,0);
    pg.addColorStop(0,'rgba(255,182,200,0.95)');
    pg.addColorStop(0.5,'rgba(255,210,220,0.88)');
    pg.addColorStop(1,'rgba(255,240,245,0.70)');
    ctx.fillStyle=pg;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-pr*0.38,-pr*0.45,-pr*0.32,-pr*0.85,0,-pr*0.92);
    ctx.bezierCurveTo(pr*0.32,-pr*0.85,pr*0.38,-pr*0.45,0,0);
    ctx.fill(); ctx.restore();
  }
  // 꽃술
  const cg=ctx.createRadialGradient(x,fy-s*8,0,x,fy-s*8,s*9);
  cg.addColorStop(0,'rgba(255,230,80,0.98)');
  cg.addColorStop(0.6,'rgba(255,200,50,0.82)');
  cg.addColorStop(1,'rgba(200,150,20,0)');
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.arc(x,fy-s*8,s*9,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function loopLotus() {
  particles.forEach(p=>{
    if(p.type==='lotus') drawLotusFlower(p.x,p.y,p.s,p.phase);
  });
  // 잠자리
  extras.forEach(d=>{
    if(d.type!=='dragonfly') return;
    d.wait--;
    if(d.wait<=0){
      d.targetX=W*0.1+Math.random()*W*0.8;
      d.targetY=H*0.35+Math.random()*H*0.25;
      d.wait=120+Math.random()*180;
    }
    d.x+=(d.targetX-d.x)*0.008;
    d.y+=(d.targetY-d.y)*0.008;
    d.phase+=0.25;
    const wx=d.x, wy=d.y;
    const ws=12;
    ctx.save(); ctx.translate(wx,wy);
    // 날개
    const wFlap=Math.sin(d.phase)*0.6;
    ctx.globalAlpha=0.55;
    ctx.fillStyle='rgba(160,220,240,0.6)';
    [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([sx2,sy2])=>{
      ctx.save(); ctx.scale(sx2,sy2);
      ctx.beginPath();
      ctx.ellipse(ws*0.4,ws*0.15*wFlap,ws*0.9,ws*0.35,wFlap*0.4,0,Math.PI*2);
      ctx.fill(); ctx.restore();
    });
    // 몸통
    ctx.globalAlpha=0.85;
    ctx.fillStyle='rgba(30,160,200,0.88)';
    ctx.beginPath(); ctx.ellipse(0,0,ws*0.22,ws*0.8,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

/* ════════════════════════════════════════════

function initSakura() {
  particles=[];
  for(let i=0;i<55;i++) particles.push(makeSakuraPetal(true));
}
function makeSakuraPetal(scatter) {
  return {
    type:'sakura',
    x: Math.random()*W*1.2 - W*0.1,
    y: scatter ? Math.random()*H : -20,
    vx: -0.10 - Math.random()*0.18,
    vy: 0.13 + Math.random()*0.22,
    rot: Math.random()*Math.PI*2,
    rotV: (Math.random()-0.5)*0.014,
    swg: Math.random()*Math.PI*2,
    swgS: 0.008 + Math.random()*0.012,
    size: 5 + Math.random()*7,
    a: 0.6 + Math.random()*0.35,
    hue: 340 + Math.random()*28,
    flip: Math.random()*Math.PI*2,
    flipS: 0.013 + Math.random()*0.016,
  };
}
function drawSakuraBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#2a1a2e');
  sky.addColorStop(0.45,'#3d1f3a');
  sky.addColorStop(1,'#1a0e1e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 달
  const mx=W*0.75, my=H*0.15, mr=32;
  ctx.save();
  const moonGlow=ctx.createRadialGradient(mx,my,0,mx,my,mr*5);
  moonGlow.addColorStop(0,'rgba(255,230,240,0.18)');
  moonGlow.addColorStop(1,'transparent');
  ctx.fillStyle=moonGlow; ctx.beginPath(); ctx.arc(mx,my,mr*5,0,Math.PI*2); ctx.fill();
  const moonBody=ctx.createRadialGradient(mx-mr*0.15,my-mr*0.15,0,mx,my,mr);
  moonBody.addColorStop(0,'#fff8f0'); moonBody.addColorStop(1,'#f0d8e8');
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fillStyle=moonBody; ctx.fill();
  ctx.restore();

  // 나무 줄기
  ctx.save();
  ctx.strokeStyle='rgba(80,40,55,0.90)'; ctx.lineWidth=18; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(W*0.18,H); ctx.bezierCurveTo(W*0.19,H*0.65,W*0.14,H*0.45,W*0.22,H*0.28); ctx.stroke();
  ctx.lineWidth=11;
  ctx.beginPath(); ctx.moveTo(W*0.22,H*0.50); ctx.bezierCurveTo(W*0.32,H*0.38,W*0.48,H*0.32,W*0.60,H*0.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.22,H*0.38); ctx.bezierCurveTo(W*0.08,H*0.28,W*0.02,H*0.18,W*0.12,H*0.10); ctx.stroke();
  ctx.restore();

  // 꽃구름
  const blooms=[
    {x:W*0.20,y:H*0.25,r:W*0.24},{x:W*0.58,y:H*0.26,r:W*0.20},
    {x:W*0.10,y:H*0.15,r:W*0.16},{x:W*0.38,y:H*0.22,r:W*0.18},
  ];
  blooms.forEach(b=>{
    ctx.save(); ctx.globalAlpha=0.14;
    const bg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    bg.addColorStop(0,'rgba(255,180,210,1)'); bg.addColorStop(1,'rgba(220,120,170,0)');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}
function drawSakuraPetalShape(x,y,size,rot,a,hue,flip) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  const scaleY=Math.abs(Math.cos(flip));
  ctx.scale(1, 0.35+scaleY*0.65);
  ctx.globalAlpha=a;
  const pg=ctx.createLinearGradient(0,-size,0,size);
  pg.addColorStop(0,`hsla(${hue},85%,82%,0.95)`);
  pg.addColorStop(0.5,`hsla(${hue},80%,88%,0.85)`);
  pg.addColorStop(1,`hsla(${hue},75%,78%,0.70)`);
  ctx.fillStyle=pg;
  ctx.beginPath();
  ctx.moveTo(0,-size);
  ctx.bezierCurveTo(size*0.55,-size*0.8,size*0.6,-size*0.1,0,size*0.3);
  ctx.bezierCurveTo(-size*0.6,-size*0.1,-size*0.55,-size*0.8,0,-size);
  ctx.fill();
  // 꽃잎 중앙선
  ctx.globalAlpha=a*0.18; ctx.strokeStyle=`hsl(${hue},60%,65%)`; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.moveTo(0,-size*0.9); ctx.lineTo(0,size*0.2); ctx.stroke();
  ctx.restore();
}
function loopSakura() {
  particles.forEach(p=>{
    p.swg+=p.swgS; p.flip+=p.flipS;
    p.x+=p.vx+Math.sin(p.swg)*0.35;
    p.y+=p.vy+Math.cos(p.swg*0.7)*0.15;
    p.rot+=p.rotV;
    if(p.y>H+20||p.x<-50) Object.assign(p,makeSakuraPetal(false));
    drawSakuraPetalShape(p.x,p.y,p.size,p.rot,p.a,p.hue,p.flip);
  });
}

/* ════════════════════════════════════════════
   9. 비눗방울
   ════════════════════════════════════════════ */
function initBubbles() {
  particles=[];
  for(let i=0;i<22;i++) particles.push(makeBubble(true));
}
function makeBubble(scatter) {
  const r=14+Math.random()*42;
  return {
    type:'bubble',
    x: W*0.05+Math.random()*W*0.90,
    y: scatter ? Math.random()*H : H+r,
    vy: -(0.22+Math.random()*0.38),
    vx: (Math.random()-0.5)*0.18,
    r,
    swg: Math.random()*Math.PI*2,
    swgS: 0.008+Math.random()*0.012,
    a: 0.55+Math.random()*0.35,
    hueShift: Math.random()*360,
    life: 0,
    maxLife: 320+Math.random()*280,
  };
}
function drawBubblesBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#e8f4fc');
  sky.addColorStop(0.5,'#d0eaf8');
  sky.addColorStop(1,'#b8d8f0');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 부드러운 빛 원들
  ctx.save();
  [[W*0.2,H*0.3,W*0.4],[W*0.75,H*0.6,W*0.3],[W*0.5,H*0.1,W*0.35]].forEach(([bx,by,br])=>{
    ctx.globalAlpha=0.07;
    const bg=ctx.createRadialGradient(bx,by,0,bx,by,br);
    bg.addColorStop(0,'rgba(180,220,255,1)'); bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}
function drawBubble(p) {
  const {x,y,r,a,hueShift,life,maxLife} = p;
  const lifeA = life>maxLife*0.88 ? (1-(life-maxLife*0.88)/(maxLife*0.12)) : 1;
  const finalA = a * lifeA;

  ctx.save();
  // 무지개 테두리
  const grad=ctx.createLinearGradient(x-r,y-r,x+r,y+r);
  grad.addColorStop(0,  `hsla(${hueShift},90%,72%,${finalA*0.85})`);
  grad.addColorStop(0.25,`hsla(${hueShift+80},88%,70%,${finalA*0.75})`);
  grad.addColorStop(0.5, `hsla(${hueShift+160},88%,72%,${finalA*0.80})`);
  grad.addColorStop(0.75,`hsla(${hueShift+240},88%,70%,${finalA*0.75})`);
  grad.addColorStop(1,   `hsla(${hueShift+320},90%,72%,${finalA*0.85})`);
  ctx.strokeStyle=grad; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();

  // 내부 반투명
  ctx.globalAlpha=finalA*0.06;
  ctx.fillStyle=`hsla(${hueShift+40},70%,88%,1)`;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();

  // 반사 하이라이트
  ctx.globalAlpha=finalA*0.65;
  const hl=ctx.createRadialGradient(x-r*0.32,y-r*0.35,0,x-r*0.32,y-r*0.35,r*0.38);
  hl.addColorStop(0,'rgba(255,255,255,0.82)'); hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl; ctx.beginPath(); ctx.arc(x-r*0.32,y-r*0.35,r*0.38,0,Math.PI*2); ctx.fill();
  // 작은 반사
  ctx.globalAlpha=finalA*0.4;
  const hl2=ctx.createRadialGradient(x+r*0.35,y+r*0.28,0,x+r*0.35,y+r*0.28,r*0.16);
  hl2.addColorStop(0,'rgba(255,255,255,0.55)'); hl2.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl2; ctx.beginPath(); ctx.arc(x+r*0.35,y+r*0.28,r*0.16,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function loopBubbles() {
  particles.forEach(p=>{
    p.swg+=p.swgS; p.life++;
    p.x+=p.vx+Math.sin(p.swg)*0.25;
    p.y+=p.vy;
    p.hueShift+=0.4;
    if(p.y<-p.r*2||p.life>=p.maxLife) Object.assign(p,makeBubble(false));
    drawBubble(p);
  });
  if(particles.length<22) particles.push(makeBubble(false));
}

/* ════════════════════════════════════════════
   10. 수중 해파리
   ════════════════════════════════════════════ */
function initJellyfish() {
  particles=[];
  for(let i=0;i<6;i++) particles.push(makeJellyfish(true,i));
}
function makeJellyfish(scatter,idx) {
  const r=12+Math.random()*20;
  const healingHues = [168, 175, 185, 190, 210, 220, 255, 270, 280, 200];
  const hue = healingHues[Math.floor(Math.random()*healingHues.length)] + (Math.random()-0.5)*15;
  const baseAngle = Math.random()*Math.PI*2;
  const speed = 0.04 + Math.random()*0.08;
  // 머리가 향하는 방향: 이동 방향 기준 (위=0, 오른쪽=π/2, 아래=π, ...)
  const facingAngle = baseAngle; // 몸체 회전각으로 사용
  return {
    type:'jelly',
    x: W*0.05+Math.random()*W*0.90,
    y: scatter ? Math.random()*H : H+r*2,
    vy: Math.sin(baseAngle)*speed,
    vx: Math.cos(baseAngle)*speed,
    r,
    phase: (idx||0)*1.2+Math.random()*Math.PI*2,
    phaseS: 0.010+Math.random()*0.012,
    hue,
    a: 0.58+Math.random()*0.28,
    facingAngle,          // 해파리 몸체 회전 (머리 방향)
    wanderAngle: Math.random()*Math.PI*2,
    wanderSpeed: 0.003+Math.random()*0.004,
    tentacles: Array.from({length:5+Math.floor(Math.random()*4)},(_,i)=>({
      offset: (i/(8))*Math.PI*2,
      swg: Math.random()*Math.PI*2,
      swgS: 0.010+Math.random()*0.015,
      len: r*1.2+Math.random()*r*0.8,
    })),
  };
}
function drawJellyfishBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#020818');
  sky.addColorStop(0.4,'#041230');
  sky.addColorStop(1,'#061840');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 빛 줄기
  ctx.save();
  for(let i=0;i<5;i++){
    const lx=W*(0.1+i*0.2);
    ctx.globalAlpha=0.025+0.015*Math.sin(t*0.4+i);
    const lg=ctx.createLinearGradient(lx,0,lx+30,H);
    lg.addColorStop(0,'rgba(80,160,255,0.5)');
    lg.addColorStop(1,'rgba(40,100,200,0)');
    ctx.fillStyle=lg;
    ctx.beginPath();
    ctx.moveTo(lx,0); ctx.lineTo(lx+40+i*8,H); ctx.lineTo(lx-20+i*6,H); ctx.lineTo(lx-15,0);
    ctx.closePath(); ctx.fill();
  }

  // 부유 입자
  for(let i=0;i<30;i++){
    const px2=((i*137+t*0.3)%W);
    const py2=((i*97+t*0.15)%H);
    ctx.globalAlpha=0.12+0.08*Math.sin(t+i);
    ctx.fillStyle='rgba(120,200,255,1)';
    ctx.beginPath(); ctx.arc(px2,py2,0.8+i%3*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawJellyBody(p) {
  const {x,y,r,hue,a,phase,tentacles,facingAngle}=p;
  const pulse=Math.sin(phase)*0.12;
  const rx=r*(1-pulse*0.5);
  const ry=r*(1+pulse*0.3);

  ctx.save();
  ctx.translate(x,y);
  // 이동 방향으로 몸체 회전 (기본 머리 방향=위쪽=-π/2 기준)
  ctx.rotate(facingAngle + Math.PI/2);

  // 벨 — 외부 글로우 (로컬 좌표 0,0 기준)
  const glowG=ctx.createRadialGradient(0,0,0,0,0,r*2.2);
  glowG.addColorStop(0,`hsla(${hue},80%,65%,${a*0.18})`);
  glowG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glowG; ctx.beginPath(); ctx.arc(0,0,r*2.2,0,Math.PI*2); ctx.fill();

  // 벨 내부
  const bellG=ctx.createRadialGradient(0,-ry*0.2,r*0.1,0,0,ry);
  bellG.addColorStop(0,`hsla(${hue},75%,85%,${a*0.55})`);
  bellG.addColorStop(0.5,`hsla(${hue},70%,65%,${a*0.40})`);
  bellG.addColorStop(1,`hsla(${hue},65%,50%,${a*0.15})`);
  ctx.fillStyle=bellG;
  ctx.beginPath();
  ctx.ellipse(0,0,rx,ry*0.72,0,Math.PI,Math.PI*2);
  ctx.bezierCurveTo(rx,ry*0.08,-rx,ry*0.08,-rx,0);
  ctx.closePath(); ctx.fill();

  // 테두리
  ctx.strokeStyle=`hsla(${hue},80%,80%,${a*0.45})`;
  ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.ellipse(0,0,rx,ry*0.72,0,Math.PI,Math.PI*2);
  ctx.bezierCurveTo(rx,ry*0.08,-rx,ry*0.08,-rx,0);
  ctx.closePath(); ctx.stroke();

  // 촉수 (아래쪽으로 뻗음, 로컬 y+ 방향)
  tentacles.forEach(ten=>{
    ten.swg+=ten.swgS;
    const tx0=Math.cos(ten.offset)*rx*0.65;
    ctx.beginPath(); ctx.moveTo(tx0, ry*0.05);
    let lx2=tx0, ly2=ry*0.05;
    const segs=12;
    for(let s=1;s<=segs;s++){
      const ratio=s/segs;
      const wave=Math.sin(ten.swg+ratio*3.5)*rx*0.35*ratio;
      const nx=tx0+wave+Math.cos(ten.offset)*(ratio*4);
      const ny=ry*0.05+ratio*ten.len;
      ctx.bezierCurveTo(lx2+wave*0.5,ly2+ten.len/segs*0.5,nx-wave*0.3,ny-ten.len/segs*0.3,nx,ny);
      lx2=nx; ly2=ny;
    }
    const ta=a*0.35;
    ctx.strokeStyle=`hsla(${hue},75%,72%,${ta})`;
    ctx.lineWidth=0.9+pulse*0.3; ctx.lineCap='round'; ctx.stroke();
  });
  ctx.restore();
}
function loopJellyfish() {
  particles.forEach(p=>{
    p.phase+=p.phaseS;
    p.wanderAngle += p.wanderSpeed;
    p.vx += Math.cos(p.wanderAngle)*0.0015;
    p.vy += Math.sin(p.wanderAngle)*0.0015;
    const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    const maxSpd = 0.12;
    if(spd>maxSpd){ p.vx=p.vx/spd*maxSpd; p.vy=p.vy/spd*maxSpd; }
    p.vx *= 0.99; p.vy *= 0.99;
    p.x += p.vx + Math.sin(p.phase*0.7)*0.08;
    p.y += p.vy + Math.cos(p.phase*0.5)*0.06;
    // 이동 방향으로 머리 방향 서서히 추종
    if(spd>0.005){
      const targetAngle = Math.atan2(p.vy, p.vx);
      let da = targetAngle - p.facingAngle;
      // 최단 경로로 회전
      while(da>Math.PI) da-=Math.PI*2;
      while(da<-Math.PI) da+=Math.PI*2;
      p.facingAngle += da*0.02;
    }
    if(p.x<-p.r*3) p.x=W+p.r*2;
    if(p.x>W+p.r*3) p.x=-p.r*2;
    if(p.y<-p.r*3) p.y=H+p.r*2;
    if(p.y>H+p.r*3) p.y=-p.r*2;
    drawJellyBody(p);
  });
}

let fwShells=[], fwParticles=[];
function initFireworks() {
  particles=[]; extras=[];
  fwShells=[]; fwParticles=[];
}

function spawnShell() {
  const targetX = W*0.12 + Math.random()*W*0.76;
  // 화면 상단 0~40% 사이에서 터짐
  const targetY = H*0.00 + Math.random()*H*0.40;
  const launchX = W*0.20 + Math.random()*W*0.60;
  const launchY = H*0.94;

  const dx = targetX - launchX;
  const dy = targetY - launchY; // 음수 (위쪽)
  const dist = Math.sqrt(dx*dx + dy*dy);

  // 속도: 3.5~5px/프레임 (충분히 목표까지 올라갈 수 있게)
  const spd = 3.5 + Math.random()*1.5;
  const vx = (dx/dist) * spd;
  const vy = (dy/dist) * spd;

  fwShells.push({
    x: launchX, y: launchY,
    vx, vy,
    gravity: 0.008,   // 중력 아주 작게 — 포물선 살짝만
    trail: [],
    life: 0,
    maxLife: Math.round(dist/spd) + 20,
    tx: targetX, ty: targetY,
  });
}

const FW_PALETTES = [
  [0,20,40,60],         // 빨강-주황-노랑
  [200,220,240,260],    // 파랑-하늘-보라
  [120,140,160,180],    // 초록-청록
  [300,320,340,360],    // 보라-핑크-빨강
  [30,50,60,80],        // 황금색
  [180,200,270,290],    // 청록-보라
  [0,60,120,180,240,300], // 무지개
];

const FW_SHAPES = ['circle','star','heart','chrysanthemum','willow','ring'];

function explodeShell(x, y) {
  const palette = FW_PALETTES[Math.floor(Math.random()*FW_PALETTES.length)];
  const shape = FW_SHAPES[Math.floor(Math.random()*FW_SHAPES.length)];
  const count = 80 + Math.floor(Math.random()*80);
  const speed = 1.2 + Math.random()*1.8;
  const isGlitter = Math.random()<0.4;
  const trailLen = shape==='willow' ? 28 : 12;

  for(let i=0;i<count;i++) {
    let angle, vMult=1;
    if(shape==='circle'||shape==='chrysanthemum'||shape==='glitter') {
      angle = (i/count)*Math.PI*2;
    } else if(shape==='star') {
      const sector = Math.floor(i/(count/5));
      const within = (i%(count/5))/(count/5);
      const baseAngle = sector*(Math.PI*2/5) - Math.PI/2;
      angle = baseAngle + (within-0.5)*0.55;
      vMult = within<0.15||within>0.85 ? 0.55 : 1.0;
    } else if(shape==='heart') {
      const u = (i/count)*Math.PI*2;
      angle = u; vMult = (1-Math.abs(Math.sin(u))*0.38);
    } else if(shape==='willow') {
      angle = (i/count)*Math.PI*2;
      vMult = 0.6 + Math.random()*0.5;
    } else if(shape==='ring') {
      angle = (i/count)*Math.PI*2;
      vMult = 0.85 + Math.random()*0.15;
    } else {
      angle = Math.random()*Math.PI*2;
    }

    const hue = palette[Math.floor(Math.random()*palette.length)] + (Math.random()-0.5)*18;
    const spd = speed * vMult * (0.82+Math.random()*0.36);
    const gravity = shape==='willow' ? 0.032 : 0.018 + Math.random()*0.010;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      hue,
      sat: 88+Math.random()*12,
      lit: 68+Math.random()*18,
      life: 0,
      maxLife: (shape==='willow'?140:95) + Math.random()*55,
      size: 1.4+Math.random()*1.8,
      gravity,
      isGlitter: isGlitter && Math.random()<0.5,
      trail: [],
      trailLen,
      shape,
    });
  }
  // 2차 터짐 (작은 별)
  if(Math.random()<0.35) {
    setTimeout(()=>{
      if(fwShells!==undefined) {
        const cnt=18+Math.floor(Math.random()*16);
        for(let i=0;i<cnt;i++){
          const ang=Math.random()*Math.PI*2;
          const spd2=0.5+Math.random()*0.8;
          fwParticles.push({
            x:x+(Math.random()-0.5)*30, y:y+(Math.random()-0.5)*30,
            vx:Math.cos(ang)*spd2, vy:Math.sin(ang)*spd2,
            hue:palette[Math.floor(Math.random()*palette.length)]+40,
            sat:90, lit:80,
            life:0, maxLife:55+Math.random()*35,
            size:0.9+Math.random()*1.2,
            gravity:0.022, isGlitter:true,
            trail:[], trailLen:8, shape:'circle',
          });
        }
      }
    }, 180+Math.random()*200);
  }
}

function drawFireworksBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#03020f');
  sky.addColorStop(0.55,'#07051a');
  sky.addColorStop(1,'#0b0820');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 별
  ctx.save();
  for(let i=0;i<120;i++){
    const sx=((i*157.3+3)%1)*W, sy=((i*89.1+5)%0.72)*H;
    const sa=0.12+((i*67)%100)/100*0.40;
    const twinkle=0.6+0.4*Math.sin(t*1.2+i*1.9);
    ctx.globalAlpha=sa*twinkle;
    ctx.fillStyle='#f0f4ff';
    ctx.beginPath(); ctx.arc(sx,sy,0.35+((i*31)%10)/10*0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 지평선 실루엣
  ctx.fillStyle='rgba(2,1,12,0.97)';
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.bezierCurveTo(W*0.10,H*0.87,W*0.22,H*0.83,W*0.35,H*0.89);
  ctx.bezierCurveTo(W*0.48,H*0.95,W*0.60,H*0.80,W*0.72,H*0.86);
  ctx.bezierCurveTo(W*0.83,H*0.92,W*0.92,H*0.84,W,H*0.88);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

let fwNextShell=0;
function loopFireworks() {
  // 껍질 발사
  fwNextShell--;
  if(fwNextShell<=0){
    spawnShell();
    if(Math.random()<0.25) spawnShell(); // 동시 2발
    fwNextShell = 70 + Math.random()*80; // 느린 간격
  }

  // 껍질 이동 & 폭발
  fwShells = fwShells.filter(s=>{
    s.life++;
    // 중력 적용 포물선 이동 (추적 방식 아님)
    s.vy += s.gravity;
    s.x += s.vx; s.y += s.vy;
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>18) s.trail.shift();

    // 껍질 궤적
    for(let i=1;i<s.trail.length;i++){
      const ta=i/s.trail.length;
      ctx.save(); ctx.globalAlpha=ta*0.55;
      ctx.strokeStyle='rgba(255,240,160,1)';
      ctx.lineWidth=1.2*ta; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(s.trail[i-1].x,s.trail[i-1].y);
      ctx.lineTo(s.trail[i].x,s.trail[i].y);
      ctx.stroke(); ctx.restore();
    }
    // 발광 헤드
    ctx.save(); ctx.globalAlpha=0.9;
    const hg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,5);
    hg.addColorStop(0,'rgba(255,248,200,1)'); hg.addColorStop(1,'rgba(255,220,100,0)');
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(s.x,s.y,5,0,Math.PI*2); ctx.fill();
    ctx.restore();

    if(s.life>=s.maxLife || s.y<=s.ty){
      explodeShell(s.x, s.y);
      return false;
    }
    return true;
  });

  // 파티클 렌더
  fwParticles = fwParticles.filter(p=>{
    p.life++;
    p.vx *= 0.975;
    p.vy *= 0.975;
    p.vy += p.gravity;
    p.x += p.vx; p.y += p.vy;
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>p.trailLen) p.trail.shift();

    const r = p.life/p.maxLife;
    if(r>=1) return false;
    const fadeIn = r<0.05?r/0.05:1;
    const fadeOut = r>0.55?(1-r)/0.45:1;
    const alpha = fadeIn*fadeOut;

    // 꼬리
    if(p.trail.length>2){
      for(let i=1;i<p.trail.length;i++){
        const ta=(i/p.trail.length);
        ctx.save();
        ctx.globalAlpha=alpha*ta*0.6;
        ctx.strokeStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,1)`;
        ctx.lineWidth=p.size*ta*0.8; ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(p.trail[i-1].x,p.trail[i-1].y);
        ctx.lineTo(p.trail[i].x,p.trail[i].y);
        ctx.stroke(); ctx.restore();
      }
    }

    // 파티클 코어
    if(p.isGlitter){
      const flicker=0.5+0.5*Math.sin(p.life*0.8);
      ctx.save(); ctx.globalAlpha=alpha*flicker*0.95;
      ctx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit+10}%,1)`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.9,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      ctx.save(); ctx.globalAlpha=alpha*0.88;
      const pg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*1.4);
      pg.addColorStop(0,`hsla(${p.hue+20},${p.sat}%,${p.lit+14}%,1)`);
      pg.addColorStop(0.5,`hsla(${p.hue},${p.sat}%,${p.lit}%,0.7)`);
      pg.addColorStop(1,`hsla(${p.hue-10},${p.sat}%,${p.lit-12}%,0)`);
      ctx.fillStyle=pg;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*1.4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    return true;
  });
}
function loop() {
  t+=0.016;
  ctx.clearRect(0,0,W,H);
  const id=scenes[currentIdx].id;

  if(id==='spring_tree'){
    drawSpringBG();
  }

  else if(id==='shooting_stars'){
    drawNightBG();
    particles.forEach(p=>{
      p.twk+=p.twkS;
      const alpha=p.a*(0.5+0.5*Math.sin(p.twk));
      ctx.fillStyle=`rgba(255,253,220,${alpha})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });

    extras=extras.filter(s=>{
      if(s.type!=='shooter') return true;
      s.life++;
      s.x+=s.vx; s.y+=s.vy;
      s.trail.push({x:s.x,y:s.y});
      if(s.trail.length>55) s.trail.shift();

      const prog=s.life/s.maxLife;
      const baseA=prog<0.15?prog/0.15:prog>0.80?(1-prog)/0.20:1;

      ctx.save();
      for(let i=1;i<s.trail.length;i++){
        const ta=i/s.trail.length;
        ctx.globalAlpha=baseA*ta*0.82;
        ctx.strokeStyle='rgba(255,250,195,1)';
        ctx.lineWidth=1.6*ta; ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(s.trail[i-1].x,s.trail[i-1].y);
        ctx.lineTo(s.trail[i].x,s.trail[i].y);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save(); ctx.globalAlpha=baseA*0.92;
      const gw=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,8);
      gw.addColorStop(0,'rgba(255,255,215,1)'); gw.addColorStop(1,'rgba(255,255,200,0)');
      ctx.fillStyle=gw; ctx.beginPath(); ctx.arc(s.x,s.y,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,235,1)'; ctx.beginPath(); ctx.arc(s.x,s.y,1.8,0,Math.PI*2); ctx.fill();
      ctx.restore();

      if(s.x<-80||s.x>W+80||s.y>H+80||s.y<-80) return false;
      return s.life<s.maxLife;
    });
    if(Math.random()<0.0025) spawnShooter();
  }

  else if(id==='snowfall'){
    drawSnowBG();
    particles.forEach(p=>{
      p.swg+=p.swgS;
      p.x+=p.vx+Math.sin(p.swg)*0.4;
      p.y+=p.vy; p.rot+=0.006;
      if(p.y>H+10) Object.assign(p,makeSnow(false));
      drawSnowflake(p.x,p.y,p.r,p.a,p.rot);
    });
  }

  else if(id==='autumn'){
    drawAutumnBG();
    extras.forEach(e=>{
      if(e.type!=='settled') return;
      ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.rot); ctx.globalAlpha=e.a;
      ctx.fillStyle=`hsl(${e.hue},70%,46%)`;
      ctx.beginPath();
      if(e.shape===0){
        ctx.ellipse(0,0,e.size*0.58,e.size*0.88,0,0,Math.PI*2);
      } else if(e.shape===1){
        ctx.moveTo(0,-e.size*0.88);
        ctx.bezierCurveTo(e.size*0.52,-e.size*0.35,e.size*0.60,e.size*0.32,0,e.size*0.88);
        ctx.bezierCurveTo(-e.size*0.60,e.size*0.32,-e.size*0.52,-e.size*0.35,0,-e.size*0.88);
      } else {
        ctx.ellipse(0,e.size*0.08,e.size*0.52,e.size*0.80,0,0,Math.PI*2);
      }
      ctx.fill(); ctx.restore();
    });
    const fallingCount = particles.filter(p=>!p._done).length;
    if(fallingCount < 3 && Math.random()<0.004) {
      particles.push(makeAutumnLeaf());
    }
    particles = particles.filter(p=>!p._done);
    particles.forEach(p=>{ updateAutumnLeaf(p); drawAutumnLeaf(p); });
  }

  else if(id==='fireflies'){
    drawFireflyBG();
    loopFireflies();
  }

  else if(id==='sakura'){
    drawSakuraBG();
    loopSakura();
  }

  else if(id==='jellyfish'){
    drawJellyfishBG();
    loopJellyfish();
  }

  else if(id==='fireworks'){
    drawFireworksBG();
    loopFireworks();
  }

  else if(id==='rain'){
    drawRainBG();
    loopRain();
  }



  else if(id==='mooncloud'){
    drawMoonCloudBG();
    loopMoonCloud();
  }





  animId=requestAnimationFrame(loop);
}

   A. 빗소리 + 수면 파문

function initRain() {
  particles = []; extras = [];
  for(let i=0;i<140;i++) particles.push(makeRaindrop(true));
}
// 바람 방향 (전체 비에 동일하게, 천천히 바뀜)
let rainWind = 0, rainWindTarget = (Math.random()-0.5)*0.4;
function makeRaindrop(scatter) {
  return {
    type:'drop',
    x: Math.random()*W,
    y: scatter ? Math.random()*H : -10,
    vy: 1.0 + Math.random()*0.7,
    vx: rainWind + (Math.random()-0.5)*0.08,
    swg: Math.random()*Math.PI*2,
    swgS: 0.006+Math.random()*0.006,
    len: 7 + Math.random()*7,
    a: 0.20 + Math.random()*0.20,
  };
}
function drawRainBG() {
  // 하늘
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#06080f'); sky.addColorStop(0.5,'#090d1a'); sky.addColorStop(1,'#0a1020');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 보름달
  const mx=W*0.28, my=H*0.18, mr=38;

  // 달 구름 뒤 은은한 후광
  ctx.save();
  const moonAura=ctx.createRadialGradient(mx,my,0,mx,my,mr*5.5);
  moonAura.addColorStop(0,  'rgba(220,235,255,0.13)');
  moonAura.addColorStop(0.3,'rgba(200,220,255,0.06)');
  moonAura.addColorStop(0.7,'rgba(170,200,240,0.02)');
  moonAura.addColorStop(1,  'rgba(0,0,0,0)');
  ctx.fillStyle=moonAura;
  ctx.beginPath(); ctx.arc(mx,my,mr*5.5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 달 본체 (보름달 — 그림자 없이 꽉 찬 원)
  const moonG=ctx.createRadialGradient(mx-mr*0.15,my-mr*0.2,0,mx,my,mr);
  moonG.addColorStop(0,  '#fffef8');
  moonG.addColorStop(0.5,'#fff8e8');
  moonG.addColorStop(0.85,'#ffefc0');
  moonG.addColorStop(1,  '#ffe090');
  ctx.save();
  ctx.fillStyle=moonG;
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
  // 달 표면 크레이터 (은은하게)
  ctx.globalAlpha=0.07;
  ctx.fillStyle='#c8b878';
  [[mx-10,my-8,8],[mx+12,my+10,5],[mx-4,my+14,4],[mx+6,my-14,3]].forEach(([cx,cy,cr])=>{
    ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();

  // 달빛이 빗속에서 번지는 효과 (비구름 느낌)
  ctx.save();
  ctx.globalAlpha=0.08;
  const rainMoonBlur=ctx.createRadialGradient(mx,my,mr*0.8,mx,my,mr*2.2);
  rainMoonBlur.addColorStop(0,'rgba(255,248,220,0.9)');
  rainMoonBlur.addColorStop(1,'rgba(255,240,200,0)');
  ctx.fillStyle=rainMoonBlur;
  ctx.beginPath(); ctx.arc(mx,my,mr*2.2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 별 (비오는 날이라 흐릿하게 몇 개만)
  ctx.save();
  for(let i=0;i<28;i++){
    const sx=((i*197.3+7)%1)*W, sy=((i*113.1+3)%0.45)*H;
    const sa=(0.06+((i*61)%100)/100*0.16)*(0.5+0.5*Math.sin(t*0.8+i*1.9));
    ctx.globalAlpha=sa; ctx.fillStyle='#ddeeff';
    ctx.beginPath(); ctx.arc(sx,sy,0.4+((i*41)%10)/10*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 달빛 수면 반사 (고정, 젖은 바닥)
  const wg=ctx.createLinearGradient(0,H*0.74,0,H);
  wg.addColorStop(0,'rgba(12,20,36,0.97)'); wg.addColorStop(1,'rgba(5,10,20,1)');
  ctx.fillStyle=wg; ctx.fillRect(0,H*0.76,W,H*0.24);



  // 수평선 은은한 달빛 번짐
  ctx.save(); ctx.globalAlpha=0.04;
  const hg=ctx.createLinearGradient(0,H*0.74,0,H*0.80);
  hg.addColorStop(0,'rgba(200,220,255,0.8)'); hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,H*0.74,W,H*0.06);
  ctx.restore();
}

function loopRain() {
  // 바람 천천히 변화
  if(Math.random()<0.004) rainWindTarget=(Math.random()-0.5)*0.5;
  rainWind += (rainWindTarget-rainWind)*0.002;

  ctx.save();
  particles.forEach(p=>{
    p.vx += (rainWind - p.vx)*0.01;
    p.swg += p.swgS;
    p.x += p.vx + Math.sin(p.swg)*0.12;
    p.y += p.vy;
    if(p.y > H*0.76){
      if(Math.random()<0.6){
        // 크기 다양하게 — 작은것 + 가끔 큰것
        const big = Math.random()<0.2;
        extras.push({
          type:'ripple',
          x: p.x + (Math.random()-0.5)*6,
          y: H*0.76 + Math.random()*H*0.20,
          r: 0,
          maxR: big ? 22+Math.random()*16 : 6+Math.random()*9,
          life: 0,
          maxLife: big ? 200+Math.random()*100 : 130+Math.random()*70,
          a: big ? 0.18 : 0.24,
          lw: big ? 0.7 : 0.55,
        });
      }
      Object.assign(p, makeRaindrop(false));
    }
    ctx.globalAlpha = p.a;
    ctx.strokeStyle = 'rgba(160,210,255,1)';
    ctx.lineWidth = 0.55;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + p.vx*3, p.y - p.len);
    ctx.stroke();
  });
  ctx.restore();

  // 파문
  extras = extras.filter(e=>{
    if(e.type!=='ripple') return true;
    e.life++;
    const prog = e.life / e.maxLife;
    e.r = e.maxR * Math.sqrt(prog);
    const a = e.a * (1-prog)*(1-prog);
    if(a < 0.004) return false;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = 'rgba(120,185,240,1)';
    ctx.lineWidth = e.lw || 0.6;
    ctx.beginPath();
    ctx.ellipse(e.x, e.y, e.r, e.r*0.25, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
    return e.life < e.maxLife;
  });
}

let clouds=[];

function makeCloud(scatter, idx) {
  // 구름 크기 다양하게: 작은것~매우 큰것
  const scale = 0.6 + Math.random()*1.6;
  const baseR = 28 + Math.random()*22;
  // 자연스러운 구름 모양: 넓게 퍼진 여러 puff
  const numPuffs = 7 + Math.floor(Math.random()*6);
  const puffs = [];
  // 중앙 큰 puff들
  for(let i=0;i<numPuffs;i++){
    const angle = (i/numPuffs)*Math.PI*1.8 - Math.PI*0.9;
    const dist = (baseR*0.5 + Math.random()*baseR*0.8)*scale;
    const px = Math.cos(angle)*dist*(1.8+Math.random()*0.6);
    const py = Math.sin(angle)*dist*0.55 - Math.abs(Math.cos(angle))*dist*0.3;
    puffs.push({
      ox: px, oy: py,
      r: (baseR*(0.55+Math.random()*0.7))*scale,
    });
  }
  // 하단을 평평하게 만드는 큰 베이스 puff
  puffs.push({ox:0, oy:baseR*0.25*scale, r:baseR*1.1*scale});
  puffs.push({ox:-baseR*0.7*scale, oy:baseR*0.35*scale, r:baseR*0.85*scale});
  puffs.push({ox: baseR*0.7*scale, oy:baseR*0.35*scale, r:baseR*0.85*scale});

  return {
    x: scatter ? Math.random()*W*1.8-W*0.4 : -(260+baseR*scale*2),
    y: H*(0.04+Math.random()*0.38),
    spd: 0.06+Math.random()*0.14,

    scale, puffs,
  };
}

  ctx.fillStyle=ma; ctx.beginPath(); ctx.arc(mx,my,mr*5,0,Math.PI*2); ctx.fill(); ctx.restore();
  const oc=document.createElement('canvas'); oc.width=mr*8; oc.height=mr*8;
  const oc2=oc.getContext('2d'); const ocC=mr*4;
  oc2.beginPath(); oc2.arc(ocC,ocC,mr,0,Math.PI*2);
  const mg=oc2.createRadialGradient(ocC+mr*0.1,ocC-mr*0.15,0,ocC,ocC,mr);

  ctx.bezierCurveTo(W*0.90,H*0.93,W*0.96,H*0.86,W,H*0.90);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}
function loopMoonCloud() {
  clouds.forEach(c=>{
    c.x += c.spd;

      ctx.beginPath(); ctx.arc(px, py, p.r, 0, Math.PI*2); ctx.fill();

    fg1.addColorStop(0,`rgba(255,140,20,${0.75+f.f2*0.2})`); fg1.addColorStop(0.5,'rgba(255,80,10,0.45)'); fg1.addColorStop(1,'rgba(200,40,0,0)');
    ctx.fillStyle=fg1;
    ctx.beginPath();
    ctx.moveTo(cx-7+f.f1*3,by);
    ctx.bezierCurveTo(cx-10+f.f1*4,by-f.height*0.4,cx+f.f1*6,tipY+5,cx+f.f1*3,tipY);
    ctx.bezierCurveTo(cx+f.f1*2,tipY,cx+8+f.f1*4,by-f.height*0.4,cx+6+f.f1*2,by);
    ctx.closePath(); ctx.fill(); ctx.restore();
    // 내부 불꽃
    ctx.save();
    const fg2=ctx.createRadialGradient(cx,by-f.height*0.2,0,cx,tipY,f.height*0.4);
    fg2.addColorStop(0,'rgba(255,255,185,0.95)'); fg2.addColorStop(0.4,'rgba(255,220,80,0.70)'); fg2.addColorStop(1,'rgba(255,160,20,0)');
    ctx.fillStyle=fg2;
    ctx.beginPath();
    ctx.moveTo(cx-4+f.f1*2,by);
    ctx.bezierCurveTo(cx-5+f.f1*3,by-f.height*0.5,cx+f.f1*4,tipY+6,cx+f.f1*2,tipY+3);
    ctx.bezierCurveTo(cx+f.f1,tipY+3,cx+4+f.f1*3,by-f.height*0.5,cx+3+f.f1,by);
    ctx.closePath(); ctx.fill(); ctx.restore();
  });
}

/* ════════════════════════════════════════════
   G. 대나무 숲
   ════════════════════════════════════════════ */
let bambooCulms=[];
function initBamboo() {
  particles=[]; bambooCulms=[];
  for(let i=0;i<22;i++) bambooCulms.push({
    x:W*(0.01+i/22*0.98), layer:i%3,
    sway:Math.random()*Math.PI*2, swayS:0.004+Math.random()*0.004, swayAmp:3+Math.random()*4,
    h:H*(0.55+Math.random()*0.35), w:8+Math.floor(i%3)*5+Math.random()*4,
    hue:95+Math.random()*20, sat:45+Math.random()*20, lit:30+Math.floor(i%3)*10+Math.random()*10,
    nodes:5+Math.floor(Math.random()*4),
  });
  bambooCulms.sort((a,b)=>a.layer-b.layer);
}
function drawBambooBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#d8ead0'); sky.addColorStop(0.5,'#c8e0c0'); sky.addColorStop(1,'#b8d4a8');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.save();
  const fog=ctx.createLinearGradient(0,0,0,H*0.5);
  fog.addColorStop(0,'rgba(220,235,215,0.55)'); fog.addColorStop(1,'rgba(200,220,195,0)');
  ctx.fillStyle=fog; ctx.fillRect(0,0,W,H*0.5); ctx.restore();
  const gr=ctx.createLinearGradient(0,H*0.78,0,H);
  gr.addColorStop(0,'#7a9a6a'); gr.addColorStop(1,'#5a7a4a');
  ctx.fillStyle=gr; ctx.fillRect(0,H*0.80,W,H*0.20);
}
function loopBamboo() {
  bambooCulms.forEach(c=>{
    c.sway+=c.swayS;
    const sway=Math.sin(c.sway)*c.swayAmp;
    const alpha=[0.45,0.70,0.92][c.layer];
    ctx.save(); ctx.globalAlpha=alpha;
    const baseY=H*0.82, topY=H*0.82-c.h;
    const topX=c.x+sway;
    const c1x=c.x+sway*0.3, c1y=baseY-c.h*0.35;
    const c2x=c.x+sway*0.7, c2y=baseY-c.h*0.65;
    const sg=ctx.createLinearGradient(c.x-c.w,0,c.x+c.w,0);
    sg.addColorStop(0,`hsl(${c.hue},${c.sat-10}%,${c.lit-8}%)`);
    sg.addColorStop(0.35,`hsl(${c.hue},${c.sat}%,${c.lit+12}%)`);
    sg.addColorStop(0.7,`hsl(${c.hue},${c.sat}%,${c.lit}%)`);
    sg.addColorStop(1,`hsl(${c.hue},${c.sat-10}%,${c.lit-6}%)`);
    ctx.strokeStyle=sg; ctx.lineWidth=c.w; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(c.x,baseY); ctx.bezierCurveTo(c1x,c1y,c2x,c2y,topX,topY); ctx.stroke();
    for(let n=1;n<=c.nodes;n++){
      const ratio=n/c.nodes;
      const nx=c.x+(topX-c.x)*ratio+sway*(ratio-0.5)*0.5;
      const ny=baseY-(baseY-topY)*ratio;
      ctx.strokeStyle=`hsl(${c.hue},${c.sat-5}%,${c.lit-12}%)`; ctx.lineWidth=c.w+3; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(nx-c.w*0.6,ny); ctx.lineTo(nx+c.w*0.6,ny); ctx.stroke();
    }
    if(c.layer>=1){
      for(let li=0;li<3;li++){
        const la=-0.8+li*0.6+sway*0.04;
        const lx=topX+(li-1)*13, ly=topY+li*7;
        ctx.save(); ctx.translate(lx,ly); ctx.rotate(la);
        const leafG=ctx.createLinearGradient(0,0,36,0);
        leafG.addColorStop(0,`hsl(${c.hue+5},${c.sat+5}%,${c.lit+5}%)`);
        leafG.addColorStop(1,`hsl(${c.hue},${c.sat}%,${c.lit-5}%)`);
        ctx.fillStyle=leafG; ctx.globalAlpha=alpha*0.85;
        ctx.beginPath();
        ctx.moveTo(0,0); ctx.bezierCurveTo(8,-10,28,-8,38,0);
        ctx.bezierCurveTo(28,8,8,10,0,0); ctx.closePath(); ctx.fill(); ctx.restore();
      }
    }
    ctx.restore();
  });
}

/* ════════════════════════════════════════════
   H. 수중 해초
   ════════════════════════════════════════════ */
let seaweedPlants=[];
function initSeaweed() {
  particles=[]; seaweedPlants=[];
  for(let i=0;i<18;i++) seaweedPlants.push({
    x:W*(0.02+i/18*0.96), layer:i%3,
    sway:Math.random()*Math.PI*2, swayS:0.006+Math.random()*0.006, swayAmp:12+Math.random()*14,
    segs:8+Math.floor(Math.random()*5), segLen:18+Math.random()*14,
    w:4+Math.floor(i%3)*2+Math.random()*3,
    hue:140+Math.random()*40, sat:55+Math.random()*25, lit:22+Math.floor(i%3)*8+Math.random()*8,
  });
  seaweedPlants.sort((a,b)=>a.layer-b.layer);
  for(let i=0;i<40;i++) particles.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-0.5)*0.08, vy:-(0.04+Math.random()*0.08),
    r:0.6+Math.random()*1.2, a:0.07+Math.random()*0.14,
    twk:Math.random()*Math.PI*2, twkS:0.008+Math.random()*0.01,
  });
}
function drawSeaweedBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#020d12'); sky.addColorStop(0.5,'#031420'); sky.addColorStop(1,'#041a28');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.save();
  for(let i=0;i<4;i++){
    const lx=W*(0.15+i*0.22);
    ctx.globalAlpha=0.028+0.014*Math.sin(t*0.3+i*1.1);
    const lg=ctx.createLinearGradient(lx,0,lx+40,H*0.5);
    lg.addColorStop(0,'rgba(60,180,220,0.6)'); lg.addColorStop(1,'rgba(20,100,160,0)');
    ctx.fillStyle=lg;
    ctx.beginPath(); ctx.moveTo(lx-10,0); ctx.lineTo(lx+50,0); ctx.lineTo(lx+70,H*0.5); ctx.lineTo(lx-5,H*0.5); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  const sg=ctx.createLinearGradient(0,H*0.84,0,H);
  sg.addColorStop(0,'#0a1a0e'); sg.addColorStop(1,'#050e08');
  ctx.fillStyle=sg; ctx.fillRect(0,H*0.86,W,H*0.14);
  ctx.save(); ctx.globalAlpha=0.35;
  for(let i=0;i<30;i++){
    const gx=((i*137+23)%1)*W, gr2=3+((i*71)%10)/10*5;
    ctx.fillStyle=`hsl(${160+i%40},20%,${18+i%15}%)`;
    ctx.beginPath(); ctx.ellipse(gx,H*0.88+((i*53)%10)/10*4,gr2,gr2*0.55,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function loopSeaweed() {
  particles.forEach(p=>{
    p.twk+=p.twkS; p.x+=p.vx+Math.sin(p.twk*0.5)*0.03; p.y+=p.vy;
    if(p.y<-5){p.y=H+5; p.x=Math.random()*W;}
    ctx.save(); ctx.globalAlpha=p.a*(0.5+0.5*Math.sin(p.twk));
    ctx.fillStyle='rgba(80,200,220,1)'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
  seaweedPlants.forEach(c=>{
    c.sway+=c.swayS;
    const alpha=[0.50,0.72,0.92][c.layer];
    ctx.save(); ctx.globalAlpha=alpha; ctx.lineCap='round'; ctx.lineJoin='round';
    let bx=c.x, by=H*0.87;
    ctx.beginPath(); ctx.moveTo(bx,by);
    for(let s=0;s<c.segs;s++){
      const ratio=(s+1)/c.segs;
      const pow=ratio*ratio;
      const swX=Math.sin(c.sway+s*0.5)*c.swayAmp*pow;
      const swY=Math.cos(c.sway*0.7+s*0.3)*c.swayAmp*0.25*pow;
      const nx=c.x+swX, ny=by-c.segLen-swY;
      ctx.bezierCurveTo(bx+swX*0.5,by-c.segLen*0.4,nx-swX*0.3,ny+c.segLen*0.3,nx,ny);
      bx=nx; by=ny;
    }
    const grad=ctx.createLinearGradient(c.x,H*0.87,c.x,H*0.87-c.segs*c.segLen);
    grad.addColorStop(0,`hsl(${c.hue},${c.sat}%,${c.lit}%)`);
    grad.addColorStop(0.5,`hsl(${c.hue+8},${c.sat+5}%,${c.lit+10}%)`);
    grad.addColorStop(1,`hsl(${c.hue+15},${c.sat+8}%,${c.lit+18}%)`);
    ctx.strokeStyle=grad; ctx.lineWidth=c.w; ctx.stroke(); ctx.restore();
  });
}


updateUI();
resize();

})();
</script>

<!-- 낙엽 애니메이션 — 봄 나무 테마 전용 -->
<script>
(function(){
  const canvas = document.getElementById('leaf-canvas');
  const ctx    = canvas.getContext('2d');
  const area   = document.getElementById('app');

  function resize(){
    canvas.width  = area.clientWidth;
    canvas.height = area.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS=['#78c878','#96dc96','#a4e0a4','#b5d99c','#88d288','#6ab86a','#bceabc','#c6eec6'];

  function drawLeaf(x,y,size,angle,alpha,color){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0,0,size*0.42,size*0.22,0,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-size*0.38,0); ctx.lineTo(size*0.38,0);
    ctx.strokeStyle='rgba(60,120,60,0.35)';
    ctx.lineWidth=0.7;
    ctx.stroke();
    ctx.restore();
  }

  const MAX_LEAVES=18;
  const MAX_PILE=40;
  let leaves=[];
  let pile=[];

  function spawnLeaf(){
    if(leaves.length>=MAX_LEAVES) return;
    const w=canvas.width, h=canvas.height;
    const x=w*0.10+Math.random()*w*0.80;
    const y=h*0.05+Math.random()*h*0.42;
    leaves.push({
      x, y,
      vx:(Math.random()-0.5)*0.5,
      vy:0.35+Math.random()*0.45,
      angle:Math.random()*Math.PI*2,
      va:(Math.random()-0.5)*0.04,
      swing:Math.random()*Math.PI*2,
      swingSpeed:0.018+Math.random()*0.018,
      swingAmp:0.6+Math.random()*0.9,
      size:7+Math.random()*7,
      alpha:0.55+Math.random()*0.3,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
    });
  }

  let frameCount=0;

  function isSpringScene(){
    return document.getElementById('scene-label').textContent==='봄 나무';
  }

  function animate(){
    if(!isSpringScene()){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      canvas.style.display='none';
      leaves=[]; pile=[];
      requestAnimationFrame(animate);
      return;
    }
    canvas.style.display='block';
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frameCount++;
    if(frameCount%90===0) spawnLeaf();

    const floor=canvas.height-14;
    pile.forEach(p=>drawLeaf(p.x,p.y,p.size,p.angle,p.alpha*0.65,p.color));
    leaves=leaves.filter(l=>{
      l.swing+=l.swingSpeed;
      l.x+=l.vx+Math.sin(l.swing)*l.swingAmp*0.3;
      l.y+=l.vy;
      l.angle+=l.va;
      if(l.y>=floor){
        l.y=floor;
        if(pile.length<MAX_PILE) pile.push({x:l.x,y:l.y,size:l.size,angle:l.angle,alpha:l.alpha,color:l.color});
        return false;
      }
      drawLeaf(l.x,l.y,l.size,l.angle,l.alpha,l.color);
      return true;
    });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
