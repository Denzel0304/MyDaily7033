// ── MEMO AUTO-NUMBERING ──

// 번호 재정렬: 내용 변경 시 번호가 있는 줄을 1부터 순서대로 재부여
function renumberMemo(ta) {
  const oldVal = ta.value;
  const oldPos = ta.selectionStart;
  let n = 1;
  let offsetAdjust = 0;

  // 각 줄에서 "숫자. " 패턴을 찾아 순서대로 교체
  const newVal = oldVal.replace(/^(\d+)(\.\s)/gm, (match, num, dot, offset) => {
    const newNum = String(n++);
    // 커서보다 앞쪽에서 숫자 길이가 바뀌면 커서 위치 보정
    if (offset < oldPos) offsetAdjust += newNum.length - num.length;
    return newNum + dot;
  });

  if (newVal === oldVal) return; // 변경 없으면 그대로

  ta.value = newVal;
  const newPos = Math.max(0, Math.min(oldPos + offsetAdjust, newVal.length));
  ta.selectionStart = ta.selectionEnd = newPos;
}
function handleMemoKey(e, ta, sec) {
  if (e.key !== 'Enter') return;

  const val = ta.value;
  const pos = ta.selectionStart;
  const before = val.substring(0, pos);
  const after = val.substring(pos);
  const lastLine = before.split('\n').pop();

  // Check if current line is a numbered list item "N. something"
  const numMatch = lastLine.match(/^(\d+)\.\s+(.*)/);

  if (numMatch) {
    const content = numMatch[2];
    const curNum = parseInt(numMatch[1]);

    e.preventDefault();

    if (content.trim() === '') {
      // Empty numbered line → remove the number
      const lines = before.split('\n');
      lines[lines.length - 1] = '';
      const newVal = lines.join('\n') + after;
      ta.value = newVal;
      const newPos = lines.join('\n').length;
      ta.selectionStart = ta.selectionEnd = newPos;
    } else {
      // Add next number
      const insert = '\n' + (curNum + 1) + '. ';
      ta.value = before + insert + after;
      ta.selectionStart = ta.selectionEnd = pos + insert.length;
    }
    sec.content = ta.value;
  }
  // If line is just "N. " (number+dot+space, no content)
  else {
    const emptyNumMatch = lastLine.match(/^(\d+)\.\s*$/);
    if (emptyNumMatch) {
      e.preventDefault();
      const lines = before.split('\n');
      lines[lines.length - 1] = '';
      ta.value = lines.join('\n') + after;
      ta.selectionStart = ta.selectionEnd = lines.join('\n').length;
      sec.content = ta.value;
    }
  }
}

// ── SAVE ──
function saveCurrent() {
  if (editMode === 'dose') saveDose();
  else if (editMode === 'take') saveTake();
}

function saveDose() {
  const titleEl = document.getElementById('editTitle');
  const title = titleEl.value.trim();

  // 1) 병명 필수
  if (!title) {
    titleEl.focus();
    titleEl.style.borderColor = var_css('--danger');
    setTimeout(() => titleEl.style.borderColor = '', 1500);
    showAlert('병명 필요', '병명을 입력해주세요.');
    return;
  }

  // 2) 투약 섹션이 최소 1개 있어야 함
  const doseSecs = editSections.filter(s => s.type === 'sauce');
  if (doseSecs.length === 0) {
    showAlert('투약 필요', '투약을 1개 이상 추가해주세요.');
    return;
  }

  // 3) 각 투약 섹션마다: 병원 이름, 약 이름 1개 이상, 복용 일수 필수
  for (let i = 0; i < editSections.length; i++) {
    const sec = editSections[i];
    if (sec.type !== 'sauce') continue;

    // 등록된 섹션은 검증 통과 (이미 등록 시 검증됨)
    if (sec.registered) continue;

    if (!(sec.title || '').trim()) {
      showAlert('병원 이름 필요', '모든 투약에 병원 이름을 입력해주세요.');
      return;
    }
    const meds = (sec.rows || []).filter(r => (r.name || '').trim());
    if (meds.length === 0) {
      showAlert('약 이름 필요', `투약에 약 이름을 1개 이상 입력해주세요.`);
      return;
    }
    const dur = parseInt(sec.duration);
    if (!dur || dur < 1) {
      showAlert('복용 일수 필요', `투약의 복용 일수를 입력해주세요.`);
      return;
    }
  }

  if (editingId) {
    const idx = doses.findIndex(r => r.id === editingId);
    if (idx !== -1) {
      doses[idx] = { ...doses[idx], title, startDate: editStartDate, sections: editSections };
    }
  } else {
    doses.push({ id: newId(), title, startDate: editStartDate, sections: editSections });
  }
  saveToStorage();
  closeEdit();
  renderList();
}

function var_css(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// ══════════════════════════════════════════════
//  CALENDAR MODAL
// ══════════════════════════════════════════════
// 호출처 식별: 'start'(편집모달의 발병일), 'section'(편집모달 sec.date), 'take'(복약모달 일자)
const cal = { ctx: null, sIdx: null, year: 0, month: 0, selected: '', initialDate: '' };

function openCalendarFor(ctx, sIdx, _ignore) {
  cal.ctx = ctx;
  cal.sIdx = sIdx;
  let initial;
  if (ctx === 'start') initial = editStartDate || todayStr();
  else if (ctx === 'section') initial = editSections[sIdx].date || todayStr();
  else if (ctx === 'take') initial = takeDraft.day || todayStr();
  else initial = todayStr();
  const [y, m, d] = initial.split('-').map(Number);
  cal.year = y; cal.month = m; cal.selected = initial; cal.initialDate = initial;
  renderCalendar();
  openModal('calendarModal');
}

function calNav(delta) {
  cal.month += delta;
  if (cal.month < 1) { cal.month = 12; cal.year--; }
  else if (cal.month > 12) { cal.month = 1; cal.year++; }
  renderCalendar();
}

function calPickToday() {
  const t = todayStr();
  const [y, m] = t.split('-').map(Number);
  cal.year = y; cal.month = m; cal.selected = t;
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = `${cal.year}년 ${cal.month}월`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const dows = ['일','월','화','수','목','금','토'];
  dows.forEach((d, i) => {
    const el = makeEl('div', 'cal-dow' + (i === 0 ? ' sun' : i === 6 ? ' sat' : ''));
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(cal.year, cal.month - 1, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(cal.year, cal.month, 0).getDate();
  const prevMonthDays = new Date(cal.year, cal.month - 1, 0).getDate();
  const tStr = todayStr();

  // prev month tail
  for (let i = startDow - 1; i >= 0; i--) {
    const dnum = prevMonthDays - i;
    const el = makeEl('div', 'cal-day other');
    el.textContent = dnum;
    grid.appendChild(el);
  }
  // current month
  for (let day = 1; day <= daysInMonth; day++) {
    const dStr = `${cal.year}-${String(cal.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow = new Date(cal.year, cal.month - 1, day).getDay();
    let cls = 'cal-day';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (dStr === tStr) cls += ' today';
    if (dStr === cal.selected) cls += ' selected';
    const el = makeEl('div', cls);
    el.textContent = day;
    el.onclick = () => { cal.selected = dStr; renderCalendar(); };
    grid.appendChild(el);
  }
  // next month head
  const totalCells = startDow + daysInMonth;
  const remain = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remain; i++) {
    const el = makeEl('div', 'cal-day other');
    el.textContent = i;
    grid.appendChild(el);
  }
}

function calConfirm() {
  const picked = cal.selected;
  if (cal.ctx === 'start') {
    editStartDate = picked;
    const t = document.getElementById('editStartDateText');
    if (t) t.textContent = fmtDate(picked);
    // 섹션 중 발병일과 같았던 것은 따라가게 두지 않고 그대로 유지 (사용자가 명시 변경한 처방일 보존)
  } else if (cal.ctx === 'section') {
    editSections[cal.sIdx].date = picked;
    renderSectionBody(editSections[cal.sIdx], cal.sIdx);
  } else if (cal.ctx === 'take') {
    takeDraft.day = picked;
    const t = document.getElementById('takeDayText');
    if (t) t.textContent = fmtDate(picked);
  }
  closeModal('calendarModal');
}

// ══════════════════════════════════════════════
//  복약 (TAKE) — 탭, 모달, 렌더
// ══════════════════════════════════════════════
// takeBundles 항목: { id, day:'YYYY-MM-DD', time:'HH:MM', meds:[{name}], checked:bool, groupId }
// 한 번에 N일 복사하면 같은 groupId를 부여하지만, 체크는 각 날짜별 묶음 단위로 독립

let takeDraft = { day: '', dayCount: 1, meds: [{ name: '', time: '08:00' }] };
// meds 배열의 한 묶음(=하나의 묶음으로 입력) — 모든 약 + 각 시간 포함
// 저장 시: dayCount 만큼 복제, 각 day 마다 하나의 bundle 생성 (= 하나의 체크 단위)
// meds는 시간 정보 보유 (한 묶음 안에서도 약별로 시간 다를 수 있게)
// 단, 사용자가 지정한 정의: "투약 묶음이 하나로 체크" → 하나의 입력 묶음 = 하나의 체크박스

function openTakeEdit(id) {
  editMode = 'take';
  editingId = id;
  if (id) {
    // 수정: 한 묶음(특정 날짜 + 특정 시간) 만 수정
    const t = takeBundles.find(x => x.id === id);
    document.getElementById('editModalTitle').textContent = '복약 수정';
    takeDraft = {
      day: t.day,
      duration: 1,
      times: [t.time || '08:00'],
      meds: (t.meds || []).map(m => ({ id: newId(), name: m.name })),
      sourceLabel: '',
      isEditing: true,
    };
  } else {
    document.getElementById('editModalTitle').textContent = '새 복약';
    takeDraft = {
      day: todayStr(),
      duration: 1,
      times: ['08:00'],
      meds: [{ id: newId(), name: '' }],
      sourceLabel: '',
      isEditing: false,
    };
  }
  renderTakeEditBody();
  openModal('editModal');
  requestAnimationFrame(() => {
    const body = document.getElementById('editBody');
    if (body) body.scrollTop = 0;
  });
}

// 투약 편집 모달 안에서, 특정 sec(투약 묶음)을 복약으로 직접 등록
// sec.dailyTimes (1일 N회) × sec.duration (일수) 만큼 복약 묶음 생성
function sendSectionToTake(sIdx) {
  const sec = editSections[sIdx];
  if (!sec || sec.type !== 'sauce') return;
  const meds = (sec.rows || []).filter(r => (r.name || '').trim());
  if (meds.length === 0) {
    showAlert('약 없음', '먼저 이 투약 묶음에 약 이름을 1개 이상 입력해주세요.');
    return;
  }
  const times = (sec.dailyTimes || []).filter(t => t);
  if (times.length === 0) {
    showAlert('시간 없음', '복용 시간을 1개 이상 설정해주세요.');
    return;
  }
  const durationVal = parseInt(sec.duration);
  if (!durationVal || durationVal < 1) {
    showAlert('복용 일수 필요', '복용 일수를 입력해주세요.');
    return;
  }
  const duration = Math.max(1, durationVal);

  // 현재 dose 자동 저장 (dose 변경분과 sec.registered 같이 보존)
  const titleEl = document.getElementById('editTitle');
  const title = titleEl ? titleEl.value.trim() : '';
  if (!title) {
    showAlert('병명 필요', '먼저 병명을 입력해주세요.');
    return;
  }

  sec.registered = true; // 등록 완료 표시 (저장 전에 미리 마킹)

  if (editingId) {
    const idx = doses.findIndex(r => r.id === editingId);
    if (idx !== -1) {
      doses[idx] = { ...doses[idx], title, startDate: editStartDate, sections: editSections };
    }
  } else {
    const newDose = { id: newId(), title, startDate: editStartDate, sections: editSections };
    doses.push(newDose);
    editingId = newDose.id;
  }

  // 복약 묶음 생성: duration일 × times 시간대
  const groupId = newId();
  const startD = new Date((sec.date || todayStr()) + 'T00:00:00');
  // 라벨: 병명 · 병원
  const sourceLabel = title + (sec.title ? ` · ${sec.title}` : '');

  for (let i = 0; i < duration; i++) {
    const d = new Date(startD);
    d.setDate(startD.getDate() + i);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const dayStr = `${y}-${m}-${dd}`;
    times.forEach(t => {
      takeBundles.push({
        id: newId(),
        groupId,
        sourceLabel,
        day: dayStr,
        time: t,
        meds: meds.map(mm => ({ id: newId(), name: mm.name })),
        checked: false,
        createdAt: Date.now(),
      });
    });
  }

  saveToStorage();

  // 등록완료 버튼 갱신 (모달 안에서 즉시 반영)
  renderSectionBody(sec, sIdx);

  // 안내 후 자동으로 모달 닫고 복약 탭으로 전환
  showAlert('등록 완료', `${duration}일 × 1일 ${times.length}회 = 총 ${duration * times.length}회 복약이 등록되었습니다.`, 'success');
  // alert 닫힌 후의 처리는 사용자가 알아서 — 모달은 그대로 두고 등록 상태만 보여줌
}

function renderTakeEditBody() {
  const body = document.getElementById('editBody');
  body.innerHTML = '';

  // 시작일
  const dateGroup = makeEl('div', 'form-group');
  dateGroup.innerHTML = `<label class="form-label">시작일</label>
    <button type="button" class="date-input-btn" onclick="openCalendarFor('take', null, null)">
      <span class="date-icon">📅</span>
      <span id="takeDayText">${fmtDate(takeDraft.day)}</span>
    </button>`;
  body.appendChild(dateGroup);

  // 약 목록
  const medGroup = makeEl('div', 'form-group');
  medGroup.innerHTML = `<label class="form-label">약 목록 (한 묶음 = 한 번에 체크)</label>
    <div id="takeMedRows"></div>
    <button class="btn-add-row" onclick="addTakeMedRow()">+ 약 추가</button>`;
  body.appendChild(medGroup);
  renderTakeMedRows();

  // 1일 N회 시간들
  const timesGroup = makeEl('div', 'form-group');
  timesGroup.innerHTML = `<label class="form-label">⏰ 1일 ${takeDraft.times.length}회 — 복용 시간</label>
    <div class="dose-times-wrap" style="background:#fafdff">
      <div class="dose-times-row" id="takeTimesRow"></div>
    </div>`;
  body.appendChild(timesGroup);
  renderTakeTimes();

  // 복용 일수 (신규일 때만)
  if (!takeDraft.isEditing) {
    const dayCntGroup = makeEl('div', 'form-group');
    dayCntGroup.innerHTML = `<label class="form-label">📆 복용 일수</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" min="1" max="60" class="take-day-count" value="${takeDraft.duration}" oninput="takeDraft.duration=parseInt(this.value)||1">
        <span style="color:var(--text-muted);font-size:0.85rem">일치</span>
      </div>`;
    body.appendChild(dayCntGroup);
  }
}

function renderTakeMedRows() {
  const wrap = document.getElementById('takeMedRows');
  if (!wrap) return;
  wrap.innerHTML = '';
  takeDraft.meds.forEach((med, i) => {
    const row = makeEl('div', 'sauce-row med-row');
    row.dataset.rIdx = i;
    row.innerHTML = `
      <span class="sauce-drag" title="드래그로 순서 변경">☰</span>
      <input class="sauce-name" type="text" placeholder="약 이름" value="${escHtml(med.name||'')}" oninput="takeDraft.meds[${i}].name=this.value">
      <button class="sauce-del" onclick="removeTakeMedRow(${i})" title="삭제">✕</button>
    `;
    wrap.appendChild(row);
  });
  setupSortable(wrap, '.sauce-row', '.sauce-drag', (from, to) => {
    const [moved] = takeDraft.meds.splice(from, 1);
    takeDraft.meds.splice(to, 0, moved);
    renderTakeMedRows();
  });
}

function renderTakeTimes() {
  const row = document.getElementById('takeTimesRow');
  if (!row) return;
  row.innerHTML = '';
  takeDraft.times.forEach((t, i) => {
    const chip = makeEl('div', 'dose-time-chip');
    chip.innerHTML = `
      <input type="time" value="${escHtml(t)}" data-i="${i}">
      <button class="dose-time-chip-del" title="삭제">✕</button>
    `;
    chip.querySelector('input').addEventListener('input', e => {
      takeDraft.times[i] = e.target.value;
    });
    chip.querySelector('button').addEventListener('click', () => {
      if (takeDraft.times.length <= 1) {
        showAlert('알림', '최소 1개의 시간이 필요해요.');
        return;
      }
      takeDraft.times.splice(i, 1);
      renderTakeEditBody();
    });
    row.appendChild(chip);
  });
  // 수정 모드면 시간 추가/삭제는 의미 없으니 +버튼 안 보여줌 (수정은 단일 묶음 단위)
  if (!takeDraft.isEditing) {
    const addBtn = makeEl('button', 'dose-time-add');
    addBtn.type = 'button';
    addBtn.textContent = '+ 시간';
    addBtn.onclick = () => {
      takeDraft.times.push('12:00');
      renderTakeEditBody();
    };
    row.appendChild(addBtn);
  }
}

function addTakeMedRow() {
  takeDraft.meds.push({ id: newId(), name: '' });
  renderTakeMedRows();
}
function removeTakeMedRow(i) {
  takeDraft.meds.splice(i, 1);
  renderTakeMedRows();
}

function saveTake() {
  const meds = takeDraft.meds.filter(m => (m.name || '').trim());
  if (meds.length === 0) {
    showAlert('입력 필요', '약 이름을 1개 이상 입력해주세요.');
    return;
  }
  const times = takeDraft.times.filter(t => t);
  if (times.length === 0) {
    showAlert('시간 필요', '복용 시간을 1개 이상 입력해주세요.');
    return;
  }

  if (editingId) {
    // 수정: 단일 묶음만 갱신
    const idx = takeBundles.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      takeBundles[idx] = {
        ...takeBundles[idx],
        day: takeDraft.day,
        time: times[0],
        meds: meds.map(m => ({ id: newId(), name: m.name })),
      };
    }
  } else {
    // 신규: duration일 × times회
    const duration = Math.max(1, parseInt(takeDraft.duration) || 1);
    const groupId = newId();
    const startD = new Date(takeDraft.day + 'T00:00:00');
    for (let i = 0; i < duration; i++) {
      const d = new Date(startD);
      d.setDate(startD.getDate() + i);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const dayStr = `${y}-${m}-${dd}`;
      times.forEach(t => {
        takeBundles.push({
          id: newId(),
          groupId,
          sourceLabel: '',
          day: dayStr,
          time: t,
          meds: meds.map(mm => ({ id: newId(), name: mm.name })),
          checked: false,
          createdAt: Date.now(),
        });
      });
    }
  }
  saveToStorage();
  closeEdit();
  renderTakes();
}

function deleteTake(id) {
  const idx = takeBundles.findIndex(x => x.id === id);
  if (idx === -1) return;
  document.getElementById('confirmTitle').textContent = '복약 항목 삭제';
  document.getElementById('confirmMsg').textContent = '이 복약 묶음을 삭제할까요?\n삭제 후 복구할 수 없어요.';
  openModal('confirmModal');
  confirmCallback = (yes) => {
    if (yes) {
      takeBundles = takeBundles.filter(x => x.id !== id);
      saveToStorage();
      renderTakes();
    }
  };
}

function toggleTake(id) {
  const t = takeBundles.find(x => x.id === id);
  if (!t) return;
  t.checked = !t.checked;
  saveToStorage();
  renderTakes();
}

// 복약 탭 - 날짜 그룹별 접기 상태 (key: 'YYYY-MM-DD' → bool)
let takeDayCollapsed = {};

function renderTakes() {
  const list = [...takeBundles];
  // 정렬: 날짜 오름차순(빠른 날짜가 위), 같은 날짜 안에서는 시간 오름차순(빠른 시간이 위)
  list.sort((a, b) => {
    if (a.day !== b.day) return (a.day || '').localeCompare(b.day || '');
    return (a.time || '').localeCompare(b.time || '');
  });
  // 날짜별 그룹화 (등장 순서 유지 = 빠른 날짜부터)
  const byDay = {};
  const dayOrder = [];
  list.forEach(b => {
    if (!byDay[b.day]) { byDay[b.day] = []; dayOrder.push(b.day); }
    byDay[b.day].push(b);
  });

  // 미완료 그룹과 완료 그룹 분리 (날짜 안에서의 정렬은 유지)
  const pendingDays = [];
  const doneDays = [];
  dayOrder.forEach(day => {
    const bundles = byDay[day];
    const allDone = bundles.length > 0 && bundles.every(b => b.checked);
    if (allDone) doneDays.push(day);
    else pendingDays.push(day);
  });

  const container = document.getElementById('takeList');
  container.innerHTML = '';
  document.getElementById('takeEmptyState').style.display = list.length === 0 ? 'block' : 'none';

  // 미완료 → (구분선) → 완료 순으로 출력
  pendingDays.forEach(day => container.appendChild(buildTakeDayGroup(day, byDay[day], false)));

  if (doneDays.length > 0 && pendingDays.length > 0) {
    const divider = makeEl('div', 'take-divider');
    divider.innerHTML = `<span class="take-divider-text">✨ 완료 ${doneDays.length}일</span>`;
    container.appendChild(divider);
  }

  doneDays.forEach(day => container.appendChild(buildTakeDayGroup(day, byDay[day], true)));
}

// 한 날짜 그룹 DOM 생성
function buildTakeDayGroup(day, dayBundles, allDone) {
  const dayGroup = makeEl('div', 'take-day-group');
  const isCollapsed = !!takeDayCollapsed[day];
  if (isCollapsed) dayGroup.classList.add('collapsed');
  if (allDone) dayGroup.classList.add('all-done');

  const checkedCnt = dayBundles.filter(b => b.checked).length;
  const dayEl = new Date(day + 'T00:00:00');
  const dows = ['일','월','화','수','목','금','토'];
  const dayLabel = `${fmtDate(day)} (${dows[dayEl.getDay()]})`;
  const collapsedClass = isCollapsed ? ' collapsed' : '';

  dayGroup.innerHTML = `
    <div class="take-day-header" onclick="toggleTakeDayCollapse('${day}')">
      <div class="take-day-header-left">
        <button class="take-day-collapse-btn${collapsedClass}" tabindex="-1" aria-hidden="true">▼</button>
        <span>${dayLabel}</span>
      </div>
      <div class="take-day-header-right">
        <span class="day-progress">${checkedCnt}/${dayBundles.length}</span>
        <button class="take-day-delete" onclick="event.stopPropagation(); deleteTakeDay('${day}')" title="이 날짜 묶음 삭제">✕</button>
      </div>
    </div>
  `;
  dayBundles.forEach(bundle => {
    const bEl = makeEl('div', 'take-bundle' + (bundle.checked ? ' checked' : ''));
    const meds = bundle.meds || [];
    // 약마다 한 줄: [시간 칩(첫 줄에만 보임)] [약 이름] ............ [✕]
    const rowsHtml = meds.map((m, i) => {
      const timeChip = i === 0
        ? `<span class="med-time" onclick="openTakeEdit('${bundle.id}')">⏰ ${escHtml(bundle.time || '')}</span>`
        : `<span class="med-time invisible">⏰ ${escHtml(bundle.time || '')}</span>`;
      return `<div class="take-med-row">
        ${timeChip}
        <span class="med-name">${escHtml(m.name)}</span>
        <button class="take-med-del" onclick="event.stopPropagation(); deleteTakeMed('${bundle.id}','${m.id}')" title="이 약만 삭제">✕</button>
      </div>`;
    }).join('');
    const srcHtml = bundle.sourceLabel
      ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:3px">📌 ${escHtml(bundle.sourceLabel)}</div>`
      : '';
    bEl.innerHTML = `
      <button class="take-check${bundle.checked ? ' checked' : ''}" onclick="toggleTake('${bundle.id}')">${bundle.checked ? '✓' : ''}</button>
      <div class="take-bundle-info">
        ${rowsHtml}
        ${srcHtml}
      </div>
    `;
    dayGroup.appendChild(bEl);
  });
  return dayGroup;
}

function toggleTakeDayCollapse(day) {
  takeDayCollapsed[day] = !takeDayCollapsed[day];
  renderTakes();
}

// 묶음 안의 특정 약 1개만 삭제 (마지막 약이면 묶음 자체 삭제)
function deleteTakeMed(bundleId, medId) {
  const bundle = takeBundles.find(b => b.id === bundleId);
  if (!bundle) return;
  const med = (bundle.meds || []).find(m => m.id === medId);
  if (!med) return;

  const isLast = (bundle.meds || []).length <= 1;
  document.getElementById('confirmTitle').textContent = '약 삭제';
  document.getElementById('confirmMsg').textContent = isLast
    ? `"${med.name || '이 약'}" 을(를) 삭제하면 이 시간(${bundle.time || ''}) 묶음도 함께 사라져요.\n계속할까요?`
    : `"${med.name || '이 약'}" 을(를) 이 묶음에서 삭제할까요?\n삭제 후 복구할 수 없어요.`;
  openModal('confirmModal');
  confirmCallback = (yes) => {
    if (!yes) return;
    if (isLast) {
      // 마지막 약 → 묶음 통째로 제거
      takeBundles = takeBundles.filter(b => b.id !== bundleId);
    } else {
      bundle.meds = bundle.meds.filter(m => m.id !== medId);
    }
    saveToStorage();
    renderTakes();
  };
}

// 한 날짜의 모든 복약 묶음을 삭제
function deleteTakeDay(day) {
  const cnt = takeBundles.filter(b => b.day === day).length;
  if (cnt === 0) return;
  document.getElementById('confirmTitle').textContent = '복약 묶음 삭제';
  document.getElementById('confirmMsg').textContent = `${fmtDate(day)} 의 복약 ${cnt}개를 모두 삭제할까요?\n삭제 후 복구할 수 없어요.`;
  openModal('confirmModal');
  confirmCallback = (yes) => {
    if (yes) {
      takeBundles = takeBundles.filter(b => b.day !== day);
      saveToStorage();
      renderTakes();
    }
  };
}

// ══════════════════════════════════════════════
//  DELETE
// ══════════════════════════════════════════════
function deleteDose(id) {
  const r = doses.find(x => x.id === id);
  document.getElementById('confirmTitle').textContent = '투약 항목 삭제';
  document.getElementById('confirmMsg').textContent = `"${r ? r.title : ''}" 항목을 삭제할까요?\n삭제 후 복구할 수 없어요.`;
  openModal('confirmModal');
  confirmCallback = (yes) => {
    if (yes) {
      doses = doses.filter(x => x.id !== id);
      saveToStorage();
      renderList();
    }
  };
}
function closeConfirm(yes) {
  if (yes && confirmCallback) {
    const cb = confirmCallback;
    confirmCallback = null;
    cb(true);
  } else {
    confirmCallback = null;
  }
  closeModal('confirmModal');
}

// ══════════════════════════════════════════════
//  ALERT
// ══════════════════════════════════════════════
function showAlert(title, msg, type) {
  document.getElementById('alertTitle').textContent = title;
  document.getElementById('alertMsg').textContent = msg;
  const isSuccess = type === 'success';
  document.getElementById('alertTitle').style.color = isSuccess ? 'var(--success)' : 'var(--danger)';
  document.getElementById('alertIcon').textContent = isSuccess ? '✅' : '⚠️';
  openModal('alertModal');
}
function closeAlert() {
  closeModal('alertModal');
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function makeEl(tag, cls) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  return el;
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Close modals on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});
document.getElementById('calendarModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('calendarModal');
});
document.getElementById('confirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm(false);
});
document.getElementById('alertModal').addEventListener('click', function(e) {
  if (e.target === this) closeAlert();
});

// ── INIT ──
// 복약 탭의 모든 날짜 그룹은 초기에 접힌 상태로 시작
takeBundles.forEach(b => { takeDayCollapsed[b.day] = true; });
renderList();
renderTakes();
</script>
</body>
