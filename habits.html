<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>습관 트래커 · MyDaily7</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky1: #dff1fb;
      --sky2: #b8e0f7;
      --sky3: #85c8f0;
      --sky4: #4faee0;
      --accent: #2e90c8;
      --soft-purple: #e4d8f8;
      --purple-mid: #9370db;
      --purple-dark: #6c3fc5;
      --text-dark: #1a2e3b;
      --text-mid: #4a6478;
      --text-light: #8aafc2;
      --card-bg: rgba(255,255,255,0.85);
      --shadow: 0 8px 32px rgba(79,174,224,0.13);
      --radius: 22px;
      --radius-sm: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #e8f6fd 0%, #ceeaf8 40%, #d9f0fc 70%, #e4f5fb 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.35; pointer-events: none; z-index: 0; }
    .bg-blob-1 { width: 280px; height: 280px; background: #aeddf5; top: -60px; left: -80px; }
    .bg-blob-2 { width: 200px; height: 200px; background: #d8c8f8; bottom: 80px; right: -60px; }
    .bg-blob-3 { width: 150px; height: 150px; background: #fce4ef; top: 40%; left: -50px; }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 0 18px 100px;
      display: flex; flex-direction: column;
    }

    /* 헤더 */
    header {
      padding: 52px 4px 20px;
      animation: fadeUp 0.4s ease both;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: var(--accent);
      text-decoration: none; margin-bottom: 16px;
      background: white; border-radius: 50px;
      padding: 6px 14px;
      box-shadow: 0 2px 10px rgba(79,174,224,0.12);
    }
    .page-title {
      font-family: 'Nunito', sans-serif;
      font-size: 28px; font-weight: 900;
      color: var(--text-dark); letter-spacing: -0.5px;
    }
    .page-title span { color: var(--purple-mid); }
    .page-subtitle { font-size: 13px; color: var(--text-light); margin-top: 4px; }

    /* 주/월 탭 */
    .view-tabs {
      display: flex; gap: 8px;
      margin-top: 20px;
      animation: fadeUp 0.4s 0.08s ease both;
    }
    .tab-btn {
      flex: 1; padding: 10px;
      border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--purple-mid); color: white;
      box-shadow: 0 4px 14px rgba(147,112,219,0.35);
    }
    .tab-btn:not(.active) {
      background: white; color: var(--text-mid);
      box-shadow: 0 2px 8px rgba(79,174,224,0.1);
    }

    /* 주간 네비게이션 */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px;
      animation: fadeUp 0.4s 0.12s ease both;
    }
    .week-nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: none; background: white;
      box-shadow: 0 2px 8px rgba(79,174,224,0.12);
      font-size: 16px; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .week-nav-btn:active { transform: scale(0.9); }
    .week-label {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--text-mid);
    }

    /* 주간 요일 헤더 */
    .week-days {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; margin-top: 14px;
      animation: fadeUp 0.4s 0.14s ease both;
    }
    .day-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .day-name {
      font-size: 11px; font-weight: 600;
      color: var(--text-light); text-align: center;
    }
    .day-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--text-mid);
    }
    .day-num.today {
      background: var(--purple-mid); color: white;
      box-shadow: 0 2px 8px rgba(147,112,219,0.4);
    }

    /* 습관 리스트 (주간) */
    .habits-list {
      display: flex; flex-direction: column; gap: 12px;
      margin-top: 16px;
      animation: fadeUp 0.4s 0.18s ease both;
    }

    .habit-row {
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.7);
      overflow: hidden;
    }
    .habit-row-header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px 11px;
    }
    .habit-icon-badge {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      background: var(--soft-purple);
    }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 800;
      color: var(--text-dark);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .habit-goal-label {
      font-size: 11px; color: var(--text-light); margin-top: 1px;
    }
    .habit-progress-text {
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--purple-mid);
      flex-shrink: 0;
    }

    /* 주간 체크 그리드 */
    .habit-week-checks {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; padding: 0 14px 13px;
    }
    .check-cell {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .check-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #e0eaf2;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
      background: transparent;
      -webkit-user-select: none; user-select: none;
    }
    .check-dot.done {
      background: var(--purple-mid); border-color: var(--purple-mid);
      box-shadow: 0 2px 8px rgba(147,112,219,0.4);
    }
    .check-dot.done::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }
    .check-dot.future { opacity: 0.35; cursor: default; }
    .check-dot:not(.future):not(.done):active { transform: scale(0.85); }

    /* 진행 바 */
    .habit-prog-bar-wrap {
      padding: 0 14px 13px; margin-top: -4px;
    }
    .prog-bar-bg {
      width: 100%; height: 5px; border-radius: 99px;
      background: #e8f0f7; overflow: hidden;
    }
    .prog-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #c4b5fd, #9370db);
      transition: width 0.4s ease;
    }

    /* 월간 뷰 */
    .month-view { display: none; margin-top: 16px; }
    .month-view.active { display: block; animation: fadeUp 0.35s ease both; }

    .month-habit-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.7);
      padding: 16px;
      margin-bottom: 14px;
    }
    .month-habit-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .month-habit-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--soft-purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .month-habit-meta { flex: 1; }
    .month-habit-name {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 800; color: var(--text-dark);
    }
    .month-habit-rate {
      font-size: 11px; color: var(--text-light); margin-top: 1px;
    }
    .month-rate-badge {
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 900; color: var(--purple-mid);
    }

    /* 월간 캘린더 도트 그리드 */
    .month-dot-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }
    .month-day-header {
      font-size: 10px; font-weight: 600;
      color: var(--text-light); text-align: center; padding-bottom: 4px;
    }
    .month-dot {
      width: 100%; aspect-ratio: 1;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .month-dot.empty { background: transparent; cursor: default; }
    .month-dot.future { background: #f0f4f8; color: var(--text-light); cursor: default; opacity: 0.5; }
    .month-dot.miss { background: #f0f4f8; color: var(--text-light); }
    .month-dot.done { background: linear-gradient(135deg, #c4b5fd, #9370db); color: white; }
    .month-dot.today-dot { box-shadow: 0 0 0 2px var(--purple-mid); }

    /* 습관 추가 버튼 */
    .add-fab {
      position: fixed; bottom: 28px; right: calc(50% - 210px + 18px);
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #b39ddb, #7c4ddb);
      border: none; cursor: pointer;
      box-shadow: 0 6px 20px rgba(124,77,219,0.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: white;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
      z-index: 100;
    }
    .add-fab:active { transform: scale(0.9); }

    /* 모달 오버레이 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(20,40,60,0.45); backdrop-filter: blur(6px);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease both; }

    .modal-sheet {
      width: 100%; max-width: 420px;
      background: linear-gradient(160deg, #f0f8fe 0%, #e8f4fc 100%);
      border-radius: 28px 28px 0 0;
      padding: 24px 22px 40px;
      animation: slideUp 0.3s cubic-bezier(.34,1.2,.64,1) both;
      max-height: 92dvh; overflow-y: auto;
    }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 99px;
      background: #c8dce8; margin: 0 auto 20px;
    }
    .modal-title {
      font-family: 'Nunito', sans-serif;
      font-size: 20px; font-weight: 900;
      color: var(--text-dark); margin-bottom: 20px;
    }

    /* 폼 */
    .form-label {
      font-size: 12px; font-weight: 700;
      color: var(--text-mid); letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 8px;
      display: block;
    }
    .form-group { margin-bottom: 18px; }
    .form-input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(79,174,224,0.2);
      border-radius: var(--radius-sm);
      background: white; font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark); outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--purple-mid); }

    /* 아이콘 피커 */
    .icon-picker-grid {
      display: grid; grid-template-columns: repeat(8, 1fr);
      gap: 6px; max-height: 220px; overflow-y: auto;
      padding: 4px 2px;
    }
    .icon-option {
      width: 100%; aspect-ratio: 1;
      border-radius: 10px; border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer;
      background: white;
      transition: all 0.15s;
      -webkit-user-select: none; user-select: none;
    }
    .icon-option:active { transform: scale(0.85); }
    .icon-option.selected {
      border-color: var(--purple-mid);
      background: var(--soft-purple);
      box-shadow: 0 2px 8px rgba(147,112,219,0.3);
    }

    /* 목표 타입 선택 */
    .goal-type-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .goal-type-btn {
      padding: 10px 6px; border-radius: var(--radius-sm);
      border: 1.5px solid rgba(79,174,224,0.2);
      background: white; cursor: pointer;
      font-size: 11px; font-weight: 700; color: var(--text-mid);
      text-align: center; line-height: 1.4;
      transition: all 0.15s;
    }
    .goal-type-btn.selected {
      border-color: var(--purple-mid); background: var(--soft-purple);
      color: var(--purple-dark);
    }
    .goal-type-btn .type-emoji { font-size: 18px; display: block; margin-bottom: 4px; }

    /* 목표 수치 입력 */
    .goal-num-row {
      display: flex; align-items: center; gap: 10px; margin-top: 12px;
    }
    .num-input {
      width: 80px; padding: 10px 14px;
      border: 1.5px solid rgba(79,174,224,0.2);
      border-radius: var(--radius-sm); background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 800; color: var(--text-dark);
      text-align: center; outline: none;
    }
    .num-input:focus { border-color: var(--purple-mid); }
    .num-unit {
      font-size: 13px; color: var(--text-mid); font-weight: 600;
    }
    .num-unit-input {
      flex: 1; padding: 10px 14px;
      border: 1.5px solid rgba(79,174,224,0.2);
      border-radius: var(--radius-sm); background: white;
      font-size: 14px; color: var(--text-dark); outline: none;
    }
    .num-unit-input:focus { border-color: var(--purple-mid); }

    /* 저장 버튼 */
    .save-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #b39ddb, #7c4ddb);
      border: none; border-radius: var(--radius-sm);
      color: white; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 16px rgba(124,77,219,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .save-btn:active { transform: scale(0.97); box-shadow: none; }

    /* 빈 상태 */
    .empty-state {
      text-align: center; padding: 48px 20px;
      animation: fadeUp 0.4s 0.2s ease both;
    }
    .empty-state .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state p { font-size: 14px; color: var(--text-light); line-height: 1.7; }

    /* 로딩 */
    .loading-wrap {
      text-align: center; padding: 40px;
      color: var(--text-light); font-size: 13px;
    }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #dde8f0;
      border-top-color: var(--purple-mid);
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

    /* 삭제 버튼 (스와이프 힌트 대신 롱프레스 메뉴) */
    .habit-row-header .del-btn {
      background: none; border: none; font-size: 16px;
      color: #c8d8e4; cursor: pointer; padding: 2px 4px;
      border-radius: 6px; transition: color 0.15s;
      display: none;
    }
    .habit-row:hover .del-btn,
    .habit-row.show-del .del-btn { display: block; }

    /* 섹션 구분 (월간) */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px; margin-bottom: 4px;
      animation: fadeUp 0.35s ease both;
    }
    .month-nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: none; background: white;
      box-shadow: 0 2px 8px rgba(79,174,224,0.12);
      font-size: 16px; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .month-nav-label {
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--text-mid);
    }

    @media (max-width: 400px) {
      .icon-picker-grid { grid-template-columns: repeat(7, 1fr); }
    }
  </style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<div class="container">
  <header>
    <a href="index.html" class="back-btn">← 홈</a>
    <h1 class="page-title">습관 <span>트래커</span></h1>
    <p class="page-subtitle">작은 반복이 큰 변화를 만듭니다.</p>
  </header>

  <!-- 주/월 탭 -->
  <div class="view-tabs">
    <button class="tab-btn active" id="tab-week" onclick="switchTab('week')">📅 이번 주</button>
    <button class="tab-btn" id="tab-month" onclick="switchTab('month')">📆 이번 달</button>
  </div>

  <!-- 주간 뷰 -->
  <div id="view-week">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-label" id="week-label">로딩중...</span>
      <button class="week-nav-btn" onclick="shiftWeek(1)">›</button>
    </div>

    <div class="week-days" id="week-days-header"></div>

    <div class="habits-list" id="week-habits-list">
      <div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>

  <!-- 월간 뷰 -->
  <div id="view-month" style="display:none;">
    <div class="month-nav">
      <button class="month-nav-btn" onclick="shiftMonth(-1)">‹</button>
      <span class="month-nav-label" id="month-label">로딩중...</span>
      <button class="month-nav-btn" onclick="shiftMonth(1)">›</button>
    </div>
    <div id="month-habits-list" class="month-view active">
      <div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="add-fab" onclick="openModal()" title="습관 추가">＋</button>

<!-- 추가 모달 -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✨ 새 습관 추가</div>

    <div class="form-group">
      <label class="form-label">습관 이름</label>
      <input class="form-input" id="habit-name-input" type="text" placeholder="예: 물 2리터 마시기" maxlength="30" />
    </div>

    <div class="form-group">
      <label class="form-label">아이콘 선택</label>
      <div class="icon-picker-grid" id="icon-picker"></div>
    </div>

    <div class="form-group">
      <label class="form-label">목표 유형</label>
      <div class="goal-type-row">
        <button class="goal-type-btn selected" data-type="weekly" onclick="selectGoalType(this,'weekly')">
          <span class="type-emoji">📅</span>주 N회
        </button>
        <button class="goal-type-btn" data-type="daily_count" onclick="selectGoalType(this,'daily_count')">
          <span class="type-emoji">🔁</span>하루 N회
        </button>
        <button class="goal-type-btn" data-type="daily_amount" onclick="selectGoalType(this,'daily_amount')">
          <span class="type-emoji">📏</span>하루 N량
        </button>
      </div>

      <div class="goal-num-row">
        <input class="num-input" id="goal-num" type="number" min="1" max="99" value="5" />
        <span class="num-unit" id="goal-unit-label">회 / 주</span>
        <input class="num-unit-input" id="goal-unit-custom" type="text"
          placeholder="단위 (예: L, 분, 페이지)"
          style="display:none;" maxlength="10" />
      </div>
    </div>

    <button class="save-btn" onclick="saveHabit()">저장하기</button>
  </div>
</div>

<script>
// ─── Supabase 설정 ───────────────────────────────────────
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
const TABLE = 'zdaily_logs';

async function sbFetch(method, body, params = '') {
  const url = `${SUPABASE_URL}/rest/v1/${TABLE}${params}`;
  const res = await fetch(url, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ─── 아이콘 목록 ─────────────────────────────────────────
const ICONS = [
  // 건강/운동
  '🏃','🏋️','🧘','🚴','🏊','🤸','💪','🧗',
  // 음식/음료
  '💧','🥤','🍎','🥗','🥩','🥦','☕','🍵',
  // 공부/업무
  '📖','📝','💻','🎯','🧠','📚','✏️','🔬',
  // 수면/회복
  '😴','🛌','🌙','⏰','🧸','🛁','🪥','💊',
  // 마음/명상
  '🧘','🌿','🌸','🌻','🫁','❤️','🙏','✨',
  // 취미/생활
  '🎵','🎨','📷','🌱','🐾','🚶','🚗','✈️',
  // 소통/관계
  '📞','💌','🤝','👨‍👩‍👧','🎁','😊','🗣️','👂',
  // 기타
  '⭐','🔥','💡','🏆','🎉','🪄','🌈','💎'
];

let selectedIcon = ICONS[0];
let selectedGoalType = 'weekly';

function buildIconPicker() {
  const grid = document.getElementById('icon-picker');
  grid.innerHTML = '';
  ICONS.forEach(ico => {
    const btn = document.createElement('div');
    btn.className = 'icon-option' + (ico === selectedIcon ? ' selected' : '');
    btn.textContent = ico;
    btn.onclick = () => {
      document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedIcon = ico;
    };
    grid.appendChild(btn);
  });
}

function selectGoalType(el, type) {
  document.querySelectorAll('.goal-type-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedGoalType = type;
  const unitLabel = document.getElementById('goal-unit-label');
  const unitCustom = document.getElementById('goal-unit-custom');
  if (type === 'weekly') { unitLabel.textContent = '회 / 주'; unitLabel.style.display=''; unitCustom.style.display='none'; }
  else if (type === 'daily_count') { unitLabel.textContent = '회 / 일'; unitLabel.style.display=''; unitCustom.style.display='none'; }
  else { unitLabel.style.display='none'; unitCustom.style.display=''; }
}

// ─── 모달 ─────────────────────────────────────────────────
function openModal() {
  buildIconPicker();
  document.getElementById('habit-name-input').value = '';
  document.getElementById('goal-num').value = 5;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('habit-name-input').focus(), 300);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target.id === 'modal') closeModal(); }

// ─── 데이터 저장 ──────────────────────────────────────────
async function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) { alert('습관 이름을 입력해주세요.'); return; }
  const num = parseInt(document.getElementById('goal-num').value) || 1;
  const customUnit = document.getElementById('goal-unit-custom').value.trim() || '';

  const habitId = 'h_' + Date.now();
  const data = {
    habit_id: habitId,
    name,
    icon: selectedIcon,
    goal_type: selectedGoalType,   // weekly | daily_count | daily_amount
    goal_value: num,
    goal_unit: customUnit,
    created_at: new Date().toISOString()
  };

  try {
    await sbFetch('POST', { type: 'habit_def', log_date: todayStr(), data });
    closeModal();
    await loadAll();
  } catch(e) {
    alert('저장 실패: ' + e.message);
  }
}

// ─── 날짜 유틸 ────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function dateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }

const DAY_NAMES = ['일','월','화','수','목','금','토'];

// 주 오프셋 (0 = 이번 주)
let weekOffset = 0;
let monthOffset = 0;

function getWeekDates(offset = 0) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay(); // 0=일
  const monday = addDays(today, -dow + (dow === 0 ? -6 : 1) + offset * 7);
  return Array.from({length:7}, (_,i) => addDays(monday, i));
}

function shiftWeek(dir) { weekOffset += dir; renderWeek(); }
function shiftMonth(dir) { monthOffset += dir; renderMonth(); }

// ─── 전체 데이터 로드 ─────────────────────────────────────
let habitDefs = [];
let habitLogs = [];  // type=habit_log

async function loadAll() {
  try {
    const rows = await sbFetch('GET', null,
      `?type=in.("habit_def","habit_log")&order=created_at.asc&select=*`
    );
    habitDefs = (rows || []).filter(r => r.type === 'habit_def')
      .reduce((acc, r) => {
        // deduplicate by habit_id, keep latest definition
        const id = r.data.habit_id;
        if (!acc[id] || r.id > acc[id].id) acc[id] = r;
        return acc;
      }, {});
    habitDefs = Object.values(habitDefs).filter(r => !r.data.deleted);

    habitLogs = (rows || []).filter(r => r.type === 'habit_log');
    renderWeek();
    renderMonth();
  } catch(e) {
    console.error(e);
    document.getElementById('week-habits-list').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><p>연결 오류: Supabase URL/KEY를 확인해주세요.</p></div>`;
  }
}

// ─── 로그 토글 ────────────────────────────────────────────
async function toggleLog(habitId, dateS, countTarget) {
  // 해당 날짜의 기존 로그 확인
  const existing = habitLogs.find(l =>
    l.data.habit_id === habitId && l.log_date === dateS
  );

  if (existing) {
    // 삭제 (달성 취소)
    await sbFetch('DELETE', null, `?id=eq.${existing.id}`);
    habitLogs = habitLogs.filter(l => l.id !== existing.id);
  } else {
    // 추가 (달성)
    const body = {
      type: 'habit_log',
      log_date: dateS,
      data: { habit_id: habitId, done: true, ts: new Date().toISOString() }
    };
    const saved = await sbFetch('POST', body);
    if (saved && saved[0]) habitLogs.push(saved[0]);
  }
  renderWeek();
  renderMonth();
}

// ─── 주간 렌더 ────────────────────────────────────────────
function renderWeek() {
  const dates = getWeekDates(weekOffset);
  const today = new Date(); today.setHours(0,0,0,0);

  // 레이블
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-label').textContent =
    `${fmt(dates[0])} – ${fmt(dates[6])}`;

  // 요일 헤더
  const hdr = document.getElementById('week-days-header');
  hdr.innerHTML = dates.map(d => {
    const isToday = dateStr(d) === dateStr(today);
    return `<div class="day-col">
      <div class="day-name">${DAY_NAMES[d.getDay()]}</div>
      <div class="day-num${isToday ? ' today' : ''}">${d.getDate()}</div>
    </div>`;
  }).join('');

  const list = document.getElementById('week-habits-list');

  if (habitDefs.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✅</div>
      <p>아직 등록된 습관이 없어요.<br>아래 <strong>＋</strong> 버튼으로 추가해보세요!</p>
    </div>`;
    return;
  }

  list.innerHTML = habitDefs.map(def => {
    const h = def.data;
    const doneCount = dates.filter(d => {
      const ds = dateStr(d);
      return habitLogs.some(l => l.data.habit_id === h.habit_id && l.log_date === ds);
    }).length;

    const target = goalWeeklyTarget(h);
    const pct = Math.min(100, Math.round(doneCount / target * 100));

    const checks = dates.map(d => {
      const ds = dateStr(d);
      const isFuture = d > today;
      const isDone = habitLogs.some(l => l.data.habit_id === h.habit_id && l.log_date === ds);
      let cls = 'check-dot';
      if (isFuture) cls += ' future';
      else if (isDone) cls += ' done';
      const click = isFuture ? '' : `onclick="toggleLog('${h.habit_id}','${ds}',1)"`;
      return `<div class="check-cell"><div class="${cls}" ${click}></div></div>`;
    }).join('');

    return `<div class="habit-row" id="row-${h.habit_id}">
      <div class="habit-row-header">
        <div class="habit-icon-badge">${h.icon}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-goal-label">${goalLabel(h)}</div>
        </div>
        <div class="habit-progress-text">${doneCount}/${target}</div>
        <button class="del-btn" onclick="deleteHabit('${h.habit_id}')">🗑</button>
      </div>
      <div class="habit-week-checks">${checks}</div>
      <div class="habit-prog-bar-wrap">
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function goalWeeklyTarget(h) {
  if (h.goal_type === 'weekly') return h.goal_value;
  if (h.goal_type === 'daily_count') return 7; // 매일이 목표
  return 7;
}

function goalLabel(h) {
  if (h.goal_type === 'weekly') return `주 ${h.goal_value}회 목표`;
  if (h.goal_type === 'daily_count') return `하루 ${h.goal_value}회 목표`;
  return `하루 ${h.goal_value}${h.goal_unit || ''} 목표`;
}

// ─── 월간 렌더 ────────────────────────────────────────────
function renderMonth() {
  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const y = base.getFullYear(), m = base.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const firstDow = new Date(y, m, 1).getDay(); // 0=일

  document.getElementById('month-label').textContent =
    `${y}년 ${m+1}월`;

  const list = document.getElementById('month-habits-list');

  if (habitDefs.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📆</div>
      <p>등록된 습관이 없어요.</p>
    </div>`;
    return;
  }

  list.innerHTML = habitDefs.map(def => {
    const h = def.data;
    let doneCount = 0, totalDays = 0;

    const dayHeaders = DAY_NAMES.map(n =>
      `<div class="month-day-header">${n}</div>`).join('');

    const blanks = Array.from({length: firstDow}, () =>
      `<div class="month-dot empty"></div>`).join('');

    const dayCells = Array.from({length: daysInMonth}, (_, i) => {
      const day = i + 1;
      const d = new Date(y, m, day); d.setHours(0,0,0,0);
      const ds = dateStr(d);
      const isFuture = d > today;
      const isDone = habitLogs.some(l => l.data.habit_id === h.habit_id && l.log_date === ds);
      const isToday = ds === dateStr(today);

      if (!isFuture) totalDays++;
      if (isDone) doneCount++;

      let cls = 'month-dot';
      if (isFuture) cls += ' future';
      else if (isDone) cls += ' done';
      else cls += ' miss';
      if (isToday) cls += ' today-dot';

      const click = isFuture ? '' : `onclick="toggleLog('${h.habit_id}','${ds}',1)"`;
      return `<div class="${cls}" ${click}>${day}</div>`;
    }).join('');

    const pct = totalDays > 0 ? Math.round(doneCount / totalDays * 100) : 0;

    return `<div class="month-habit-card">
      <div class="month-habit-header">
        <div class="month-habit-icon">${h.icon}</div>
        <div class="month-habit-meta">
          <div class="month-habit-name">${h.name}</div>
          <div class="month-habit-rate">${goalLabel(h)} · ${doneCount}/${totalDays}일 달성</div>
        </div>
        <div class="month-rate-badge">${pct}%</div>
      </div>
      <div class="month-dot-grid">
        ${dayHeaders}${blanks}${dayCells}
      </div>
    </div>`;
  }).join('');
}

// ─── 습관 삭제 ────────────────────────────────────────────
async function deleteHabit(habitId) {
  if (!confirm('이 습관을 삭제할까요?')) return;
  // habit_def 행 data에 deleted:true 업데이트 방식 대신 직접 삭제
  const def = habitDefs.find(d => d.data.habit_id === habitId);
  if (!def) return;
  await sbFetch('DELETE', null, `?id=eq.${def.id}`);
  await loadAll();
}

// ─── 탭 전환 ─────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-week').classList.toggle('active', tab === 'week');
  document.getElementById('tab-month').classList.toggle('active', tab === 'month');
  document.getElementById('view-week').style.display = tab === 'week' ? '' : 'none';
  document.getElementById('view-month').style.display = tab === 'month' ? '' : 'none';
}

// ─── 초기 로드 ────────────────────────────────────────────
loadAll();
</script>
