<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>습관 트래커 · MyDaily7</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky1: #dff1fb; --sky2: #b8e0f7; --sky3: #85c8f0; --sky4: #4faee0;
      --accent: #2e90c8; --soft-purple: #e4d8f8;
      --purple-mid: #9370db; --purple-dark: #6c3fc5;
      --text-dark: #1a2e3b; --text-mid: #4a6478; --text-light: #8aafc2;
      --card-bg: rgba(255,255,255,0.85);
      --shadow: 0 8px 32px rgba(79,174,224,0.13);
      --radius: 22px; --radius-sm: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #e8f6fd 0%, #ceeaf8 40%, #d9f0fc 70%, #e4f5fb 100%);
      min-height: 100dvh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
    }
    .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.35; pointer-events: none; z-index: 0; }
    .bg-blob-1 { width: 280px; height: 280px; background: #aeddf5; top: -60px; left: -80px; }
    .bg-blob-2 { width: 200px; height: 200px; background: #d8c8f8; bottom: 80px; right: -60px; }
    .bg-blob-3 { width: 150px; height: 150px; background: #fce4ef; top: 40%; left: -50px; }
    .container {
      position: relative; z-index: 1; width: 100%; max-width: 420px;
      padding: 0 18px 100px; display: flex; flex-direction: column;
    }
    header { padding: 16px 4px 10px; animation: fadeUp 0.4s ease both; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: #8b5cf6;
      text-decoration: none; flex-shrink: 0; background: white; border-radius: 50px;
      padding: 10px 16px; min-height: 42px; box-shadow: 0 2px 10px rgba(79,174,224,0.12);
    }
    .header-title-wrap { flex: 1; text-align: center; }
    .page-title {
      font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900;
      color: var(--text-dark); letter-spacing: -0.5px; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .page-title-icon {
      width: 32px; height: 32px; border-radius: 9px; background: #ede9fe;
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .page-title span { color: var(--purple-mid); }
    .page-subtitle { font-size: 13px; color: var(--text-light); margin-top: 4px; text-align: center; }
    .view-tabs { display: flex; gap: 8px; margin-top: 10px; animation: fadeUp 0.4s 0.08s ease both; padding-bottom: 12px; }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--purple-mid); color: white; box-shadow: 0 4px 14px rgba(147,112,219,0.35); }
    .tab-btn:not(.active) { background: white; color: var(--text-mid); box-shadow: 0 2px 8px rgba(79,174,224,0.1); }
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px; animation: fadeUp 0.4s 0.12s ease both;
    }
    .week-nav-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none; background: white;
      box-shadow: 0 2px 8px rgba(79,174,224,0.12); font-size: 16px; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .week-nav-btn:active { transform: scale(0.9); }
    .week-label { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-mid); }
    .week-days {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 14px;
      animation: fadeUp 0.4s 0.14s ease both;
    }
    .day-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .day-name { font-size: 11px; font-weight: 600; color: var(--text-light); text-align: center; }
    .day-num {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-mid);
    }
    .day-num.today { background: var(--purple-mid); color: white; box-shadow: 0 2px 8px rgba(147,112,219,0.4); }
    .habits-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; animation: fadeUp 0.4s 0.18s ease both; }
    .habit-row {
      background: var(--card-bg); border-radius: var(--radius-sm); box-shadow: var(--shadow);
      backdrop-filter: blur(12px); border: 1.5px solid rgba(255,255,255,0.7); overflow: hidden;
    }
    .habit-row-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px 11px; }
    .habit-icon-badge {
      width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; background: var(--soft-purple);
    }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name {
      font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--text-dark);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .habit-goal-label { font-size: 11px; color: var(--text-light); margin-top: 1px; }
    .habit-progress-text { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--purple-mid); flex-shrink: 0; }
    .habit-week-checks { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 14px 13px; }
    .check-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .check-dot {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e0eaf2;
      display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1); background: transparent;
      -webkit-user-select: none; user-select: none;
    }
    .check-dot.done {
      background: var(--purple-mid); border-color: var(--purple-mid);
      box-shadow: 0 2px 8px rgba(147,112,219,0.4); color: white; font-size: 13px; font-weight: 700;
    }
    .check-dot.partial { border-color: var(--purple-mid); background: rgba(147,112,219,0.08); }
    .check-dot.future { opacity: 1; cursor: default; background: #b0bec5; border-color: #90a4ae; }
    .check-dot:not(.future):not(.done):active { transform: scale(0.85); }
    .habit-prog-bar-wrap { padding: 0 14px 13px; margin-top: -4px; display: flex; align-items: center; gap: 8px; }
    .prog-bar-bg { flex: 1; height: 5px; border-radius: 99px; background: #e8f0f7; overflow: hidden; }
    .prog-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #c4b5fd, #9370db); transition: width 0.4s ease; }
    .prog-bar-pct { font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; color: var(--purple-mid); width: 38px; text-align: right; flex-shrink: 0; }
    .month-view { display: none; margin-top: 16px; }
    .month-view.active { display: block; animation: fadeUp 0.35s ease both; }
    .month-habit-card {
      background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
      backdrop-filter: blur(12px); border: 1.5px solid rgba(255,255,255,0.7); padding: 16px; margin-bottom: 14px;
    }
    .month-habit-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .month-habit-icon {
      width: 36px; height: 36px; border-radius: 10px; background: var(--soft-purple);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .month-habit-meta { flex: 1; }
    .month-habit-name { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--text-dark); }
    .month-habit-rate { font-size: 11px; color: var(--text-light); margin-top: 1px; }
    .month-rate-badge { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: var(--purple-mid); }
    .month-dot-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .month-day-header { font-size: 10px; font-weight: 600; color: var(--text-light); text-align: center; padding-bottom: 4px; }
    .add-fab {
      position: fixed; bottom: 28px; right: calc(50% - 210px + 18px);
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #b39ddb, #7c4ddb); border: none; cursor: pointer;
      box-shadow: 0 6px 20px rgba(124,77,219,0.45); display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: white; transition: transform 0.2s cubic-bezier(.34,1.56,.64,1); z-index: 100;
    }
    .add-fab:active { transform: scale(0.9); }
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(20,40,60,0.45); backdrop-filter: blur(6px);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease both; }
    .modal-sheet {
      width: 100%; max-width: 420px; background: linear-gradient(160deg, #f0f8fe 0%, #e8f4fc 100%);
      border-radius: 28px 28px 0 0; padding: 24px 22px 40px;
      animation: slideUp 0.3s cubic-bezier(.34,1.2,.64,1) both; max-height: 92dvh; overflow-y: auto;
    }
    .modal-handle { width: 40px; height: 4px; border-radius: 99px; background: #c8dce8; margin: 0 auto 20px; }
    .modal-title { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--text-dark); margin-bottom: 20px; }
    .form-label {
      font-size: 12px; font-weight: 700; color: var(--text-mid); letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 8px; display: block;
    }
    .form-group { margin-bottom: 18px; }
    .form-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid rgba(79,174,224,0.2); border-radius: var(--radius-sm);
      background: white; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; color: var(--text-dark); outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--purple-mid); }
    .icon-picker-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; max-height: 220px; overflow-y: auto; padding: 4px 2px; }
    .icon-option {
      width: 100%; aspect-ratio: 1; border-radius: 10px; border: 2px solid transparent;
      display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer;
      background: white; transition: all 0.15s; -webkit-user-select: none; user-select: none;
    }
    .icon-option:active { transform: scale(0.85); }
    .icon-option.selected { border-color: var(--purple-mid); background: var(--soft-purple); box-shadow: 0 2px 8px rgba(147,112,219,0.3); }
    .goal-type-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .goal-type-btn {
      padding: 10px 6px; border-radius: var(--radius-sm); border: 1.5px solid rgba(79,174,224,0.2);
      background: white; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--text-mid);
      text-align: center; line-height: 1.4; transition: all 0.15s;
    }
    .goal-type-btn.selected { border-color: var(--purple-mid); background: var(--soft-purple); color: var(--purple-dark); }
    .goal-type-btn .type-emoji { font-size: 18px; display: block; margin-bottom: 4px; }
    .goal-num-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .num-input {
      width: 80px; padding: 10px 14px; border: 1.5px solid rgba(79,174,224,0.2); border-radius: var(--radius-sm);
      background: white; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; color: var(--text-dark);
      text-align: center; outline: none;
    }
    .num-input:focus { border-color: var(--purple-mid); }
    .num-unit { font-size: 13px; color: var(--text-mid); font-weight: 600; }
    .num-unit-input {
      flex: 1; padding: 10px 14px; border: 1.5px solid rgba(79,174,224,0.2); border-radius: var(--radius-sm);
      background: white; font-size: 14px; color: var(--text-dark); outline: none;
    }
    .num-unit-input:focus { border-color: var(--purple-mid); }
    .save-btn {
      width: 100%; padding: 15px; background: linear-gradient(135deg, #b39ddb, #7c4ddb); border: none;
      border-radius: var(--radius-sm); color: white; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
      cursor: pointer; margin-top: 8px; box-shadow: 0 4px 16px rgba(124,77,219,0.3); transition: transform 0.15s, box-shadow 0.15s;
    }
    .save-btn:active { transform: scale(0.97); box-shadow: none; }
    .empty-state { text-align: center; padding: 48px 20px; animation: fadeUp 0.4s 0.2s ease both; }
    .empty-state .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state p { font-size: 14px; color: var(--text-light); line-height: 1.7; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .habit-row-header .del-btn, .habit-row-header .edit-btn, .habit-row-header .drag-handle {
      background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px 5px;
      border-radius: 8px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; flex-shrink: 0;
    }
    .habit-row-header .del-btn { color: #c8d8e4; }
    .habit-row-header .del-btn:hover { background: #fee2e2; color: #ef4444; }
    .habit-row-header .edit-btn { color: #b0c8d8; font-size: 13px; }
    .habit-row-header .edit-btn:hover { background: var(--soft-purple); color: var(--purple-mid); }
    .habit-row-header .drag-handle { cursor: grab; color: #c8d8e4; flex-direction: column; gap: 3px; }
    .habit-row-header .drag-handle:active { cursor: grabbing; color: var(--purple-mid); }
    .drag-handle-lines { display: flex; flex-direction: column; gap: 3px; pointer-events: none; }
    .drag-handle-lines span { display: block; width: 16px; height: 2px; border-radius: 2px; background: currentColor; }
    .habit-row.dragging { opacity: 0.4; transform: scale(0.98); box-shadow: none; transition: none; }
    .habit-row.drag-over { border-color: var(--purple-mid); box-shadow: 0 0 0 2px rgba(147,112,219,0.3); }
    .month-dot {
      width: 100%; aspect-ratio: 1; border-radius: 6px; position: relative; overflow: hidden;
      display: flex; align-items: flex-end; justify-content: center; cursor: default; transition: all 0.15s;
    }
    .month-dot-label { position: relative; z-index: 2; font-size: 9px; font-weight: 700; line-height: 1; padding-bottom: 2px; color: var(--text-mid); }
    .month-dot-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, #c4b5fd, #9370db); transition: height 0.3s ease; }
    .month-dot.empty { background: transparent; cursor: default; }
    .month-dot.future { background: #f0f4f8; cursor: default; opacity: 0.45; }
    .month-dot.miss { background: #f0f4f8; }
    .month-dot.miss .month-dot-label { color: var(--text-light); }
    .month-dot.today-dot { box-shadow: 0 0 0 2px var(--purple-mid); }
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px; margin-bottom: 4px; animation: fadeUp 0.35s ease both;
    }
    .month-nav-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none; background: white;
      box-shadow: 0 2px 8px rgba(79,174,224,0.12); font-size: 16px; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .month-nav-label { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-mid); }
    .sticky-header {
      position: sticky; top: 0; z-index: 50;
      margin: 0 -18px;
      padding: 0 18px;
      background: rgba(232,246,253,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 2px 16px rgba(79,174,224,0.10);
      border-bottom: 1.5px solid rgba(176,210,235,0.4);
    }
    .confirm-overlay {
      display: none; position: fixed; inset: 0; background: rgba(20,40,60,0.45); backdrop-filter: blur(6px);
      z-index: 300; align-items: center; justify-content: center;
    }
    .confirm-overlay.open { display: flex; animation: fadeIn 0.18s ease both; }
    .confirm-sheet {
      width: calc(100% - 48px); max-width: 320px;
      background: linear-gradient(160deg, #f0f8fe 0%, #e8f4fc 100%);
      border-radius: 24px; padding: 28px 24px 20px;
      animation: scaleIn 0.2s cubic-bezier(.34,1.2,.64,1) both;
      box-shadow: 0 16px 48px rgba(79,174,224,0.18);
    }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
    .confirm-icon { font-size: 36px; text-align: center; margin-bottom: 12px; }
    .confirm-title { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; color: var(--text-dark); text-align: center; margin-bottom: 8px; }
    .confirm-desc { font-size: 13px; color: var(--text-mid); text-align: center; line-height: 1.6; margin-bottom: 22px; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btn-cancel {
      flex: 1; padding: 13px; border: 1.5px solid rgba(79,174,224,0.2); border-radius: var(--radius-sm);
      background: white; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
      color: var(--text-mid); cursor: pointer; transition: all 0.15s;
    }
    .confirm-btn-cancel:active { background: #f0f4f8; }
    .confirm-btn-delete {
      flex: 1; padding: 13px; border: none; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #f87171, #ef4444); font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 800; color: white; cursor: pointer;
      box-shadow: 0 4px 14px rgba(239,68,68,0.3); transition: all 0.15s;
    }
    .confirm-btn-delete:active { transform: scale(0.97); box-shadow: none; }
    @media (max-width: 400px) { .icon-picker-grid { grid-template-columns: repeat(7, 1fr); } }
  </style>
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<div class="container">
  <div class="sticky-header">
  <header>
    <div class="header-top">
      <div class="header-title-wrap">
        <h1 class="page-title"><div class="page-title-icon">✅</div>습관 <span>트래커</span></h1>
      </div>
    </div>
    <p class="page-subtitle">작은 반복이 큰 변화를 만듭니다.</p>
  </header>

  <div class="view-tabs">
    <button class="tab-btn active" id="tab-week" onclick="switchTab('week')">📅 이번 주</button>
    <button class="tab-btn" id="tab-month" onclick="switchTab('month')">📆 이번 달</button>
  </div>
  </div>

  <!-- 주간 뷰 -->
  <div id="view-week">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-label" id="week-label"></span>
      <button class="week-nav-btn" onclick="shiftWeek(1)">›</button>
    </div>
    <div class="week-days" id="week-days-header"></div>
    <div class="habits-list" id="week-habits-list"></div>
  </div>

  <!-- 월간 뷰 -->
  <div id="view-month" style="display:none;">
    <div class="month-nav">
      <button class="month-nav-btn" onclick="shiftMonth(-1)">‹</button>
      <span class="month-nav-label" id="month-label"></span>
      <button class="month-nav-btn" onclick="shiftMonth(1)">›</button>
    </div>
    <div id="month-habits-list" class="month-view active"></div>
  </div>
</div>

<!-- FAB -->
<button class="add-fab" onclick="openModal()" title="습관 추가">＋</button>

<!-- 삭제 확인 모달 -->
<div class="confirm-overlay" id="confirm-modal">
  <div class="confirm-sheet">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">습관을 삭제할까요?</div>
    <div class="confirm-desc" id="confirm-desc">이 습관과 모든 기록이 삭제돼요.<br>삭제 후에는 복구할 수 없어요.</div>
    <div class="confirm-btns">
      <button class="confirm-btn-cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-btn-delete" id="confirm-delete-btn">삭제</button>
    </div>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✨ 새 습관 추가</div>
    <div class="form-group">
      <label class="form-label">습관 이름</label>
      <input class="form-input" id="habit-name-input" type="text" placeholder="예: 물 2리터 마시기" maxlength="30" />
    </div>

<script>
const LS_DEFS = 'habit_defs';

function logKey(habitId, dateS) { return `${habitId}|${dateS}`; }
function pruneOldLogs(logs) {
  const keys = Object.keys(logs);
  if (keys.length === 0) return logs;
  const months = [...new Set(keys.map(k => k.split('|')[1].slice(0,7)))].sort();
  if (months.length <= 12) return logs;
  const oldest = months[0];
  const pruned = {};
  for (const k of keys) { if (!k.split('|')[1].startsWith(oldest)) pruned[k] = logs[k]; }
  return pruned;
}
let habitDefs = [], habitLogs = {}, weekOffset = 0, monthOffset = 0, editingHabitId = null;
const ICONS = [

  '😴','🛌','🌙','⏰','🧸','🛁','🪥','💊','🩺','🩹','🧴','🪞','🌡️','🧹','🛏️','🫧',
  '🌿','🌸','🌻','❤️','🙏','✨','🕯️','🪷','🫶','🌬️','🧩','🎋','🪴','🌊','☁️','🫐',
  '🎵','🎨','📷','🌱','🐾','🎸','🎭','🖌️','📸','🎬','🎹','✂️','🧶','🪆','🎲','🎻',

  '⭐','🔥','💡','🏆','🎉','🪄','🌈','💎','🚀','🎖️','🥇','🎗️','📌','🔑','🪙','⚡'

let selectedIcon = ICONS[0], selectedGoalType = 'weekly';

  } else if (h.goal_type === 'daily_count') {

function closeModal() {

  modal.classList.remove('open');
  if (history.state && history.state.modal) history.back();
}
function handleOverlayClick(e) { if (e.target.id === 'modal') closeModal(); }

function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) { alert('습관 이름을 입력해주세요.'); return; }
  const num = parseInt(document.getElementById('goal-num').value);
  if (isNaN(num)||num<1) { alert('목표 수치를 입력해주세요.'); return; }

  let daysPerWeek = 7;

    const dpw = parseInt(document.getElementById('goal-days-per-week').value);

}
function deleteHabit(habitId) {
  const h = habitDefs.find(d => d.habit_id === habitId); if (!h) return;

}
function openConfirm(habitName, onConfirm) {

function closeConfirm() {

}
function toggleLog(habitId, dateS) {
  const h = habitDefs.find(d => d.habit_id===habitId); if (!h) return;
  const k = logKey(habitId, dateS), currentVal = habitLogs[k] ? (habitLogs[k].value||1) : 0;
  let nextVal;

  else if (h.goal_type==='daily_amount') { const steps=[0,25,50,75,100]; const idx=steps.indexOf(currentVal); nextVal=steps[(idx+1)%steps.length]; }

  const pruned = pruneOldLogs(logs); saveLogs(pruned); habitLogs = pruned; renderWeek();

let dragState = null;
function initDragHandles() {

}
function getHandle(el) { return el.closest('.drag-handle'); }
function onDragTouchStart(e) { const handle=getHandle(e.target); if (!handle) return; e.preventDefault(); const row=handle.closest('.habit-row'); if (!row) return; startDrag(row,e.touches[0].clientY); document.addEventListener('touchmove',onDragTouchMove,{passive:false}); document.addEventListener('touchend',onDragTouchEnd,{once:true}); }
function onDragTouchMove(e) { if (!dragState) return; e.preventDefault(); moveDrag(e.touches[0].clientY); }
function onDragTouchEnd() { document.removeEventListener('touchmove',onDragTouchMove); endDrag(); }
function onDragMouseDown(e) { const handle=getHandle(e.target); if (!handle) return; const row=handle.closest('.habit-row'); if (!row) return; startDrag(row,e.clientY); document.addEventListener('mousemove',onDragMouseMove); document.addEventListener('mouseup',onDragMouseUp,{once:true}); }
function onDragMouseMove(e) { if (!dragState) return; moveDrag(e.clientY); }
function onDragMouseUp() { document.removeEventListener('mousemove',onDragMouseMove); endDrag(); }
function startDrag(row, clientY) {
  row.classList.add('dragging'); const rect=row.getBoundingClientRect(); const clone=row.cloneNode(true);
  clone.style.cssText=`position:fixed;z-index:999;pointer-events:none;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;opacity:0.85;box-shadow:0 12px 32px rgba(147,112,219,0.35);transform:scale(1.02);border-radius:14px;background:rgba(255,255,255,0.95);transition:none;`;

function moveDrag(clientY) {

function endDrag() {

function swapHabits(idA, idB) {

function todayStr() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

        <div class="habit-progress-text">${h.goal_type==='daily_amount'?Math.round(doneCount)+'/'+target:doneCount+'/'+target}</div>
        <button class="edit-btn" onclick="openEditModal('${h.habit_id}')" title="수정">✏️</button>
        <button class="del-btn" onclick="deleteHabit('${h.habit_id}')" title="삭제">🗑️</button>
      </div>
      <div class="habit-week-checks">${checks}</div>
      <div class="habit-prog-bar-wrap"><div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pctRaw}%"></div></div><div class="prog-bar-pct">${pctStr}</div></div>
    </div>`;
  }).join('');
}
function goalWeeklyTarget(h) { const dpw=h.days_per_week||7; if (h.goal_type==='weekly') return h.goal_value; if (h.goal_type==='daily_count') return dpw*h.goal_value; if (h.goal_type==='daily_amount') return dpw; return 7; }
function goalLabel(h) { const dpw=h.days_per_week||7; if (h.goal_type==='weekly') return `주 ${h.goal_value}회`; if (h.goal_type==='daily_count') return `하루 ${h.goal_value}회 · 주 ${dpw}일`; return `하루 ${h.goal_value}${h.goal_unit||''} · 주 ${dpw}일`; }
function dayAchievePct(h, ds) { const val=(habitLogs[logKey(h.habit_id,ds)]||{}).value||0; if (h.goal_type==='weekly') return val>=1?100:0; if (h.goal_type==='daily_count') return val===0?0:Math.min(100,Math.round(val/h.goal_value*100)); if (h.goal_type==='daily_amount') return val; return 0; }
function toStep10(pct) { return Math.round(pct/10)*10; }
function renderMonth() {
  const today=new Date(); today.setHours(0,0,0,0); const base=new Date(today.getFullYear(),today.getMonth()+monthOffset,1);
  const y=base.getFullYear(), m=base.getMonth(), daysInMonth=new Date(y,m+1,0).getDate(), firstDow=new Date(y,m,1).getDay();
  document.getElementById('month-label').textContent=`${y}년 ${m+1}월`;
  const list=document.getElementById('month-habits-list');
  if (habitDefs.length===0) { list.innerHTML=`<div class="empty-state"><div class="empty-icon">📆</div><p>등록된 습관이 없어요.</p></div>`; return; }
  const dayHeaders=DAY_NAMES.map(n=>`<div class="month-day-header">${n}</div>`).join('');
  const blanks=Array.from({length:firstDow},()=>`<div class="month-dot empty"></div>`).join('');
  list.innerHTML=habitDefs.map(h=>{
    let totalPctSum=0, totalDays=0;
    const dayCells=Array.from({length:daysInMonth},(_,i)=>{
      const day=i+1, d=new Date(y,m,day); d.setHours(0,0,0,0); const ds=dateStr(d);
      const isFuture=d>today, isToday=ds===dateStr(today);
      if (!isFuture) { totalDays++; totalPctSum+=dayAchievePct(h,ds); }
      if (isFuture) return `<div class="month-dot future"><div class="month-dot-label" style="color:var(--text-light)">${day}</div></div>`;
      const rawPct=dayAchievePct(h,ds), stepPct=toStep10(rawPct);
      const labelColor=stepPct>=60?'white':(stepPct>0?'var(--purple-dark)':'var(--text-light)');
      let cls='month-dot'+(rawPct===0?' miss':'')+(isToday?' today-dot':'');
      return `<div class="${cls}"><div class="month-dot-fill" style="height:${stepPct}%"></div><div class="month-dot-label" style="color:${labelColor}">${day}</div></div>`;
    }).join('');
    const overallRaw=totalDays>0?totalPctSum/(totalDays*100)*100:0;
    const overallPct=Math.abs(overallRaw%1)<0.05?Math.round(overallRaw)+'%':overallRaw.toFixed(1)+'%';
    return `<div class="month-habit-card"><div class="month-habit-header"><div class="month-habit-icon">${h.icon}</div><div class="month-habit-meta"><div class="month-habit-name">${h.name}</div><div class="month-habit-rate">${goalLabel(h)}</div></div><div class="month-rate-badge">${overallPct}</div></div><div class="month-dot-grid">${dayHeaders}${blanks}${dayCells}</div></div>`;
  }).join('');
}
function switchTab(tab) {
  document.getElementById('tab-week').classList.toggle('active',tab==='week');
  document.getElementById('tab-month').classList.toggle('active',tab==='month');
  document.getElementById('view-week').style.display=tab==='week'?'':'none';
  document.getElementById('view-month').style.display=tab==='month'?'':'none';
  if (tab==='month') renderMonth();
  window.scrollTo({top:0, behavior:'instant'});
}
loadAll(); renderWeek(); initDragHandles();
</script>
